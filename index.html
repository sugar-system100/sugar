function toast(msg, type='info') {
    const t = document.getElementById('toast');
    t.style.background = type==='success' ? '#2e7d32' : '#d32f2f';
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
}

<script>
// ================== الدوال الأساسية ==================
async function login() {
    const pt = document.getElementById('pointTypeSelect').value;
    const br = document.getElementById('branchSelect').value;
    const pw = document.getElementById('passInput').value;
    if (!pt || !br || !pw) return toast('املأ جميع الحقول', 'error');

    try {
        const res = await jsonp('authenticate', { pointType: pt, branch: br, pass: pw });
        if (!res.ok) return toast(res.error, 'error');

        State.currentUser = { branch: br, pointType: pt, username: br, token: res.token };
        localStorage.setItem('SOKAR_USER', JSON.stringify(State.currentUser));

        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appContainer').classList.remove('hidden');

        await refreshData();
        buildNav();
        showSection(pt === 'خدمة العملاء' ? 'crm' : 'pos');
        toast('✅ تم تسجيل الدخول بنجاح', 'success');
    } catch(e) { toast('خطأ في الاتصال', 'error'); }
}

async function refreshData() {
    if (!State.currentUser) return;
    const res = await jsonp('getInitialData', {
        userType: State.currentUser.pointType,
        branch: State.currentUser.branch,
        username: State.currentUser.username
    });
    if (res.ok) State.db = res;
}

function buildNav() {
    const pt = State.currentUser.pointType;
    let menu = [];

    if (pt === 'خدمة العملاء') {

            ['crm', '📞 خدمة العملاء', 'headset'],
            ['stock', '📦 المخزون', 'boxes'],
            ['orders', '📋 متابعة طلبات', 'list-check']
        ];
    } else if (pt === 'دليفري') {
        menu = [
            ['pos', '🍬 نقطة البيع', 'store'],
            ['delivery', '🛵 طلباتي', 'motorcycle']
        ];
    } else {
        menu = [
            ['pos', '🍬 نقطة البيع', 'store'],
            ['stock', '📦 المخزون', 'boxes'],
            ['reports', '📊 تقارير', 'chart-bar']
        ];
    }

    document.getElementById('navMenu').innerHTML = menu.map(([id, text, icon]) => `
        <div class="nav-item" onclick="showSection('${id}')">
            <i class="fas fa-${icon}"></i> ${text}
        </div>
    `).join('');
}

        document.getElementById('deliveryPriceShow').innerHTML = `🚚 رسوم التوصيل: <b>${fee} جنيه</b>`;
    }
}

// ================== JSONP + Post ==================
async function jsonp(action, params={}) {
    return new Promise((resolve, reject) => {
        const cb = 'jsonp_' + Date.now();
        window[cb] = (data) => {
            delete window[cb];
            resolve(data);
        };
        const url = `${SCRIPT_URL}?action=${action}&callback=${cb}&${new URLSearchParams(params)}`;
        const script = document.createElement('script');
        script.src = url;
        document.head.appendChild(script);
    });
}
