<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>سكر V21 QR FIX | م/ محمود سلامه</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    :root{--primary:#b3125d;--primary-2:#d81b60;--secondary:#6a1b9a;--accent:#ffd54f;--success:#2e7d32;--danger:#c62828;--info:#1565c0;--crm:#00897b;--bg:#f8f3f6;--surface:#fff;--surface-2:#fff8fb;--text:#23151c;--muted:#6b7280;--border:#ead5df;--shadow:0 12px 30px rgba(90,20,55,.12);--font-base:18px;--font-sm:16px;--font-xl:28px}
    *{box-sizing:border-box}body{margin:0;padding:12px;background:linear-gradient(180deg,#fcf7fa 0%,#f5eef3 100%);color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;font-size:var(--font-base)}
    .container{max-width:1200px;margin:0 auto;background:var(--surface);padding:24px;border-radius:24px;box-shadow:var(--shadow);border-top:10px solid var(--primary)}
    h1,h2,h3,h4{margin:0 0 10px}.btn{border:none;border-radius:14px;padding:16px 18px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff}.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-info{background:var(--info);color:#fff}.btn-light{background:#f3f4f6;color:#222}.btn-block{width:100%}.hidden{display:none!important}
    input,select,textarea{width:100%;padding:16px;border-radius:14px;border:1px solid #e4d3dd;background:#fff;margin:4px 0;font-size:18px}label{display:block;font-weight:800;margin:8px 0 6px;color:#5b1b3d}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 20px}.tabs button{flex:1;min-width:140px;padding:16px;border:none;border-radius:14px;background:#efe7ec;font-weight:800;color:#4a2340}.tabs button.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
    .report-box{background:var(--surface-2);padding:18px;border-radius:18px;margin-bottom:18px;border-right:6px solid var(--primary)}
    .toolbar,.row-flex,.inline-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar{justify-content:space-between;margin-bottom:14px}
    .card{padding:22px 12px;border-radius:18px;background:linear-gradient(160deg,var(--primary),#8d1b57);color:#fff;text-align:center;font-weight:800;cursor:pointer;transition:.2s;min-height:100px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}.card:hover{background:linear-gradient(160deg,var(--accent),#ffe082);color:#3b2b00}
    #loader{position:fixed;inset:0;background:rgba(255,255,255,.96);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:20000;text-align:center;padding:20px}
    #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:14px 18px;border-radius:12px;display:none;z-index:25000;max-width:90%;text-align:center;font-weight:700}
    @media print{body{background:#fff;padding:0}.no-print{display:none!important}#printZone{display:block!important;width:280px!important}#printZone img{image-rendering:pixelated}}
  </style>
</head>
<body>
<div id="loader"><h2>جاري تجهيز سكر V21...</h2><p>حل مشكلة QR بالطباعة</p></div>
<div id="toast"></div>
<div id="loginPage" class="container" style="margin-top:40px;text-align:center"><h1 style="color:var(--primary)">نظام سكر V21 🍬</h1><label for="userSelect">اختر الفرع أو المستخدم</label><select id="userSelect"><option value="">--- جاري التحميل ---</option></select><label for="userPass">كلمة المرور</label><input id="userPass" type="password" placeholder="أدخل كلمة المرور"><button class="btn btn-primary btn-block" onclick="handleLogin()">دخول النظام</button></div>
<div id="mainApp" style="display:none;"><div class="container no-print"><div class="toolbar"><div class="inline-actions"><button class="btn btn-info" onclick="syncData()">🔄 مزامنة</button><button class="btn btn-light" onclick="logout()">خروج</button></div><h3 id="branchInfo" style="color:var(--primary)"></h3></div><div class="tabs"><button id="t-pos" class="active" onclick="switchTab('pos')">🛒 الكاشير</button><button id="t-stock" onclick="switchTab('stock')">📦 المخزون</button></div><div id="s-pos"><label for="pSearch">بحث عن صنف</label><input type="text" id="pSearch" placeholder="ابحث بالاسم أو القسم..." oninput="filterProducts(this.value)"><div id="catGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:10px"></div><div id="prodGrid" style="display:none;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:10px"></div><button id="btnBack" class="btn btn-light btn-block hidden" onclick="showCats()" style="margin-top:10px">🔙 عودة</button><div id="cartArea" class="report-box hidden" style="margin-top:20px"><h3 style="color:var(--primary)">السلة الحالية</h3><div id="cartItems"></div><h2 style="text-align:left">الإجمالي: <span id="finalTotal">0</span> ج.م</h2><div class="row-flex"><button class="btn btn-danger" onclick="clearCart()">مسح السلة</button><button class="btn btn-success" style="flex:1" onclick="submitOrder()">تأكيد وطباعة QR ✅</button></div></div></div><div id="s-stock" style="display:none"><div class="report-box"><h3>📦 تقرير المخزون</h3><div id="stockList"></div></div></div></div>
<div id="printZone" style="display:none;text-align:center;width:300px;margin:0 auto;background:#fff;padding:12px"><h2>حلواني بندق</h2><hr><p id="p-branch"></p><p id="p-inv"></p><p id="p-date"></p><div id="p-items" style="text-align:right"></div><hr><h2 id="p-total"></h2><div id="qrcode" style="display:flex;justify-content:center;margin:15px 0;min-height:180px"></div><p>تطوير م/ محمود سلامه</p><button class="no-print btn btn-primary" onclick="resetAppAfterPrint()">أوردر جديد</button></div>
<script>
const API="https://script.google.com/macros/s/AKfycbzFTfY-9nSif1XtygFcQxejs6gn0RQvCU4m2ZUhGaKXAfbhrKGCQIGZ6eQqnDmKXgLwUg/exec";let db={products:[],users:[],stock:[],sales:[]},cart=[],userObj=null,printingInProgress=false;
function showLoader(show,text='جاري التحميل...'){const l=document.getElementById('loader');l.querySelector('h2').innerText=text;l.style.display=show?'flex':'none'}
function showToast(msg,isError=false){const t=document.getElementById('toast');t.innerText=msg;t.style.background=isError?'#b91c1c':'#222';t.style.display='block';clearTimeout(showToast._timer);showToast._timer=setTimeout(()=>t.style.display='none',3500)}
function escapeHtml(str=''){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;')}
async function apiGet(actionAndQuery){const res=await fetch(API+'?action='+actionAndQuery);if(!res.ok)throw new Error('HTTP '+res.status);return await res.json()}
async function apiPost(payload){const body='payload='+encodeURIComponent(JSON.stringify(payload));const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body});const txt=await res.text();let data={};try{data=txt?JSON.parse(txt):{ok:true}}catch(e){throw new Error('رد غير صالح من السكربت: '+txt)}if(data&&data.ok===false)throw new Error(data.error||'فشل غير معروف');return data}
function hasPerm(){return true}
async function syncData(){showLoader(true,'جاري مزامنة البيانات...');try{const res=await apiGet('getInitialData');db.products=(res.products||[]).map(r=>({name:r[0],cat:r[1],price:parseFloat(r[2]||0),type:r[3]||'قطعة'}));db.users=(res.users||[]);db.stock=(res.stock||[]).map(r=>({branch:r[0],item:r[1],qty:parseFloat(r[2]||0)}));const sel=document.getElementById('userSelect');sel.innerHTML='<option value="">--- اختر الفرع ---</option><option value="الإدارة">👑 الإدارة العامة</option>';db.users.forEach(u=>sel.innerHTML+=`<option value="${escapeHtml(u.branch)}">${escapeHtml(u.branch)}</option>`);if(userObj){document.getElementById('branchInfo').innerText=userObj.branch;showCats();renderStock()}}catch(e){showToast('خطأ في المزامنة: '+e.message,true)}finally{showLoader(false)}}
function handleLogin(){const u=document.getElementById('userSelect').value,p=document.getElementById('userPass').value.trim();if(u==='الإدارة'&&p==='0000'){userObj={branch:'الإدارة'};loginOK();return}const user=db.users.find(x=>String(x.branch).trim()===String(u).trim()&&(String(x.pass).trim()===p||String(x.superPass).trim()===p));if(!user)return showToast('خطأ في الرقم السري',true);userObj=user;loginOK()}
function loginOK(){document.getElementById('loginPage').style.display='none';document.getElementById('mainApp').style.display='block';document.getElementById('branchInfo').innerText=userObj.branch;showCats();renderStock()}
function logout(){userObj=null;cart=[];document.getElementById('mainApp').style.display='none';document.getElementById('printZone').style.display='none';document.getElementById('loginPage').style.display='block';document.getElementById('userPass').value=''}
function switchTab(t){['pos','stock'].forEach(s=>document.getElementById('s-'+s).style.display='none');['t-pos','t-stock'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById('s-'+t).style.display='block';document.getElementById('t-'+t).classList.add('active')}
function renderStock(){const box=document.getElementById('stockList');box.innerHTML='';db.products.forEach(p=>{const qty=db.stock.filter(s=>s.item===p.name&&s.branch===userObj.branch).reduce((a,c)=>a+parseFloat(c.qty||0),0);box.innerHTML+=`<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee"><span>${escapeHtml(p.name)}</span><span>رصيد: <b>${qty}</b></span></div>`})}
function filterProducts(q){q=(q||'').trim();if(!q)return showCats();document.getElementById('catGrid').style.display='none';document.getElementById('btnBack').classList.remove('hidden');const grid=document.getElementById('prodGrid');grid.style.display='grid';grid.innerHTML='';db.products.filter(p=>p.name.includes(q)||p.cat.includes(q)).forEach(p=>{const d=document.createElement('div');d.className='card';d.innerHTML=`<div>${escapeHtml(p.name)}</div><small>${p.price} ج</small>`;d.onclick=()=>addToCart(p);grid.appendChild(d)})}
function showCats(){document.getElementById('btnBack').classList.add('hidden');document.getElementById('prodGrid').style.display='none';const grid=document.getElementById('catGrid');grid.style.display='grid';grid.innerHTML='';[...new Set(db.products.map(p=>p.cat))].forEach(c=>{const d=document.createElement('div');d.className='card';d.innerText=c;d.onclick=()=>showProds(c);grid.appendChild(d)})}
function showProds(cat){document.getElementById('catGrid').style.display='none';document.getElementById('btnBack').classList.remove('hidden');const grid=document.getElementById('prodGrid');grid.style.display='grid';grid.innerHTML='';db.products.filter(p=>p.cat===cat).forEach(p=>{const d=document.createElement('div');d.className='card';d.innerHTML=`<div>${escapeHtml(p.name)}</div><small>${p.price} ج</small>`;d.onclick=()=>addToCart(p);grid.appendChild(d)})}
function addToCart(p){let q=prompt(`كمية ${p.name}:`,'1');if(!q)return;const qty=parseFloat(q||0);if(!qty||qty<=0)return;cart.push({name:p.name,qty:qty,total:p.price*qty});renderCart()}
function renderCart(){const area=document.getElementById('cartArea'),items=document.getElementById('cartItems');items.innerHTML='';if(!cart.length){area.classList.add('hidden');document.getElementById('finalTotal').innerText='0';return}area.classList.remove('hidden');let t=0;cart.forEach((i,idx)=>{t+=parseFloat(i.total||0);items.innerHTML+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee"><span>${escapeHtml(i.name)} (${i.qty})</span><button class="btn btn-danger" style="padding:8px 10px" onclick="removeCartItem(${idx})">حذف</button></div>`});document.getElementById('finalTotal').innerText=t.toFixed(2)}
function removeCartItem(i){cart.splice(i,1);renderCart()}function clearCart(){cart=[];renderCart()}
function renderPrintableQr(text){const box=document.getElementById('qrcode');box.innerHTML='';const canvas=document.createElement('canvas');new QRious({element:canvas,value:String(text||''),size:180,level:'M',background:'white',foreground:'black'});const img=new Image();img.src=canvas.toDataURL('image/png');img.width=180;img.height=180;img.alt='QR';img.style.display='block';img.style.margin='0 auto';box.appendChild(img);return new Promise((resolve)=>{if(img.complete)resolve();else{img.onload=()=>resolve();img.onerror=()=>resolve();}})}
async function submitOrder(){if(!cart.length)return showToast('السلة فارغة',true);if(printingInProgress)return;printingInProgress=true;showLoader(true,'جاري حفظ الفاتورة وتجهيز الطباعة...');try{const inv='INV-'+Date.now().toString().slice(-6),now=new Date(),shift=now.getHours()<16?'صباحية':'مسائية',total=parseFloat(document.getElementById('finalTotal').innerText||0).toFixed(2);const order={date:now.toLocaleDateString('ar-EG'),branch:userObj.branch,details:cart.map(i=>`${i.name}(${i.qty})`).join(' + '),total,invoice:inv,isoDate:now.toISOString(),shift};await apiPost({action:'saveOrder',order});document.getElementById('p-branch').innerText='فرع: '+userObj.branch;document.getElementById('p-inv').innerText='فاتورة: '+inv;document.getElementById('p-date').innerText='التاريخ: '+now.toLocaleString('ar-EG');document.getElementById('p-items').innerHTML=cart.map(i=>`<div>${escapeHtml(i.name)} × ${i.qty}</div>`).join('');document.getElementById('p-total').innerText=total+' ج.م';document.getElementById('mainApp').style.display='none';document.getElementById('printZone').style.display='block';await renderPrintableQr(inv);showLoader(false);setTimeout(()=>window.print(),600)}catch(e){printingInProgress=false;showLoader(false);showToast('فشل حفظ الفاتورة أو الطباعة: '+e.message,true)}}
function resetAppAfterPrint(){cart=[];printingInProgress=false;document.getElementById('qrcode').innerHTML='';document.getElementById('printZone').style.display='none';document.getElementById('mainApp').style.display='block';renderCart();showCats();syncData()}window.addEventListener('afterprint',resetAppAfterPrint)
window.onload=syncData;
</script>
</body>
</html>
