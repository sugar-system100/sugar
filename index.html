<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <meta name="theme-color" content="#b81b5c">
  <meta name="description" content="نقطة بيع وإدارة فروع متكاملة">

  <title>نظام المبيعات</title>

  <!-- مكتبات خارجية -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/idb@7.1.1/build/umd.min.js"></script>

  <style>
    :root {
      --primary: #b81b5c;
      --primary-light: #e84a8a;
      --primary-soft: #fce4f0;
      --primary-dark: #8a1240;
      --accent: #0f9d58;
      --accent-soft: #e6f4ea;
      --accent-dark: #0b6e3e;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --orange: #f9ab00;
      --orange-soft: #fff8e1;
      --purple: #7c4dff;
      --purple-soft: #ede7f6;
      --bg: #f9f6f8;
      --surface: #ffffff;
      --surface-hover: #fdf8fa;
      --border: #e9dee5;
      --text: #1e1e2a;
      --text-muted: #6b5e66;
      --text-light: #9e8e96;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 60px -15px rgba(0,0,0,0.12);
      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 28px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
      font-family: 'Cairo';
      src: url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap');
    }

    body {
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-family: Cairo, Segoe UI, Tahoma, sans-serif;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-light);
    }

    button, input, select, textarea {
      font-family: inherit;
      font-size: 1rem;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    button {
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    input, select, textarea {
      border: 2px solid var(--border);
      padding: 12px 16px;
      background: var(--surface);
      outline: none;
      width: 100%;
      color: var(--text);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(184, 27, 92, 0.1);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: var(--text-light);
    }

    /* Layout */
    .app-wrapper {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      z-index: 100;
      transition: var(--transition);
    }

    .sidebar.collapsed {
      width: 80px;
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-item span,
    .sidebar.collapsed .user-badge span,
    .sidebar.collapsed .copyright {
      display: none;
    }

    .logo-area {
      padding: 12px 16px 28px;
      text-align: center;
      border-bottom: 2px solid var(--primary-soft);
      position: relative;
    }

    .logo-icon {
      font-size: 44px;
      color: var(--primary);
    }

    .logo-text {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), #d63384);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 8px;
    }

    .toggle-sidebar {
      position: absolute;
      left: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
    }

    .nav-menu {
      flex: 1;
      margin: 24px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      margin: 6px 0;
      border-radius: var(--radius);
      color: var(--text-muted);
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: right;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.3rem;
      text-align: center;
    }

    .nav-item:hover {
      background: var(--primary-soft);
      color: var(--primary);
      transform: translateX(-4px);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 8px 20px -6px rgba(184, 27, 92, 0.35);
      transform: translateX(-4px);
    }

    .user-badge {
      margin-top: auto;
      background: var(--blue-soft);
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    .logout-btn {
      width: 100%;
      margin-top: 12px;
      background: white;
      border: 2px solid var(--border);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-weight: 600;
    }

    .main-content {
      flex: 1;
      margin-right: 280px;
      padding: 24px 32px;
      transition: var(--transition);
    }

    .main-content.expanded {
      margin-right: 80px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .page-title i {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(184, 27, 92, 0.25);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 50px;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
      border: 2px solid transparent;
      transition: var(--transition-bounce);
      font-size: 0.95rem;
      position: relative;
      overflow: hidden;
      min-height: 44px;
      min-width: 44px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
    }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #34a853);
      color: white;
    }

    .btn-outline {
      background: white;
      border-color: var(--border);
      color: var(--text);
    }

    .btn-danger {
      background: linear-gradient(135deg, #d32f2f, #f44336);
      color: white;
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 0.85rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 1.25rem;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--text);
    }

    .pos-layout {
      display: flex;
      gap: 24px;
    }

    .pos-cart-panel {
      width: 380px;
      flex-shrink: 0;
    }

    .pos-products-panel {
      flex: 1;
      min-width: 0;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      max-height: 65vh;
      overflow-y: auto;
      padding: 8px 4px;
    }

    .product-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 14px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition-bounce);
      min-height: 80px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-card:active {
      transform: scale(0.97);
      background: var(--surface-hover);
    }

    .product-name {
      font-weight: 800;
      margin-bottom: 4px;
      font-size: 1.05rem;
      color: var(--text);
    }

    .product-meta {
      font-size: 0.95rem;
      color: var(--primary);
      font-weight: 700;
    }

    .stock-badge {
      background: var(--blue-soft);
      color: var(--blue);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.85rem;
      display: inline-block;
      margin-top: 6px;
      font-weight: 600;
    }

    .stock-badge.low {
      background: #ffebee;
      color: #c62828;
    }

    .cart-items {
      max-height: 400px;
      overflow-y: auto;
      padding: 4px;
    }

    .cart-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px dashed var(--border);
      gap: 12px;
    }

    .total-section {
      border-top: 2px solid var(--border);
      margin-top: 20px;
      padding-top: 24px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .total-row.grand {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary);
      border-top: 2px solid var(--border);
      margin-top: 8px;
      padding-top: 16px;
    }

    .section {
      display: none;
    }
    .section.active {
      display: block;
    }

    .badge {
      background: #e4e7eb;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      display: inline-block;
      cursor: pointer;
      font-weight: 600;
      border: 2px solid transparent;
    }

    .badge-success {
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: right;
      padding: 14px 12px;
      background: linear-gradient(135deg, #f5edf1, #fce4f0);
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      border-bottom: 2px solid var(--primary-soft);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-card {
      background: white;
      width: 520px;
      max-width: 94%;
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    .modal-header i {
      width: 40px;
      height: 40px;
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 28px;
      background: var(--text);
      color: white;
      padding: 16px 28px;
      border-radius: 50px;
      font-weight: 600;
      z-index: 9999;
      display: none;
      box-shadow: var(--shadow-lg);
      max-width: 400px;
      line-height: 1.5;
    }

    .toast.error {
      background: linear-gradient(135deg, #d32f2f, #f44336);
    }

    .toast.success {
      background: linear-gradient(135deg, var(--accent), #34a853);
    }

    /* Login */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg) 0, var(--primary-soft) 100%);
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo i {
      font-size: 56px;
      color: var(--primary);
    }

    .login-logo h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), #d63384);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 0.95rem;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input-wrapper i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 16px;
    }

    .form-input-wrapper input,
    .form-input-wrapper select {
      padding-right: 44px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1024px) {
      .sidebar {
        width: 80px;
        padding: 16px 8px;
      }
      .sidebar .logo-text,
      .sidebar .nav-item span,
      .sidebar .user-badge span,
      .sidebar .copyright {
        display: none;
      }
      .main-content {
        margin-right: 80px;
        padding: 16px;
      }
      .pos-layout {
        flex-direction: column;
      }
      .pos-cart-panel {
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .page-title {
        font-size: 24px;
      }
      .action-buttons .btn {
        flex: 1;
        justify-content: center;
      }
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

  </style>
</head>
<body>

  <!-- شاشة الدخول -->
  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-cash-register"></i>
        <h1>نظام المبيعات</h1>
        <p style="color:var(--text-muted);margin-top:8px;font-size:0.95rem">
          اختر نوع نقطة البيع والفرع ثم أدخل كلمة المرور.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label">نوع المستخدم</label>
        <div class="form-input-wrapper">
          <i class="fas fa-user-tag"></i>
          <select id="pointTypeSelect">
            <option value="">اختر النوع</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">الفرع / المستخدم</label>
        <div class="form-input-wrapper">
          <i class="fas fa-store"></i>
          <select id="branchSelect">
            <option value="">اختر الفرع</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <div class="form-input-wrapper">
          <i class="fas fa-lock"></i>
          <input id="passInput" type="password" placeholder="********"
                 onkeydown="if(event.key==='Enter') login()">
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;padding:16px;margin-top:8px"
              onclick="login()">
        <i class="fas fa-sign-in-alt"></i> دخول
      </button>

      <div id="loginMsg" style="margin-top:16px;text-align:center;color:#b0003a;font-weight:500"></div>
      <div id="loginLoading" style="display:none;text-align:center;margin-top:16px">
        <div class="spinner" style="width:30px;height:30px;border-width:3px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;"></div>
        <p style="color:var(--text-muted);margin-top:8px;font-size:0.9rem">جاري التحميل...</p>
      </div>
    </div>
  </div>

  <!-- التطبيق الرئيسي -->
  <div id="appWrapper" class="app-wrapper hidden">

    <div class="sidebar" id="sidebar">
      <div class="logo-area">
        <i class="fas fa-candy-cane logo-icon"></i>
        <div class="logo-text">النظام</div>
        <div class="toggle-sidebar" onclick="toggleSidebar()">
          <i class="fas fa-chevron-right" id="toggleIcon"></i>
        </div>
      </div>

      <div class="nav-menu" id="navMenu"></div>

      <div class="user-badge">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:1.1rem">
            <i class="fas fa-user"></i>
          </div>
          <div>
            <div id="whoami" style="font-weight:700;color:var(--text)"></div>
            <div id="shiftStatus" style="font-size:12px;color:var(--text-muted);margin-top:2px"></div>
          </div>
        </div>
        <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">
          <i class="fas fa-right-from-bracket"></i>
          <span>تسجيل الخروج</span>
        </button>
      </div>

      <div class="copyright"
           style="font-size:11px;color:var(--text-muted);margin-top:8px;opacity:0.8;text-align:center">
        2026 &copy; نقطة بيع
      </div>
    </div>

    <div class="main-content" id="mainContent">
      <div id="appSections" class="hidden">
        <div id="sec-dashboard" class="section"></div>
        <div id="sec-pos" class="section"></div>
        <div id="sec-crm" class="section"></div>
        <div id="sec-delivery" class="section"></div>
        <div id="sec-search" class="section"></div>
        <div id="sec-stock" class="section"></div>
        <div id="sec-products" class="section"></div>
        <div id="sec-users" class="section"></div>
        <div id="sec-reports" class="section"></div>
        <div id="sec-complaints" class="section"></div>
        <div id="sec-forecast" class="section"></div>
        <div id="sec-loyalty" class="section"></div>
        <div id="sec-expenses" class="section"></div>
        <div id="sec-returns" class="section"></div>
      </div>
    </div>
  </div>

  <!-- Modals الأساسية: الكمية + QR + العملاء + الدفع + Shift ... -->
  <div class="modal" id="qtyModal">
    <div class="modal-card">
      <div class="modal-header">
        <i class="fas fa-weight-hanging"></i>
        <h3 class="modal-title" id="qtyTitle">الكمية</h3>
      </div>
      <div class="form-group">
        <input id="qtyInput" type="number" min="0.05" step="0.05" value="1"
               style="font-size:1.4rem;text-align:center;">
      </div>
      <div style="display:flex;justify-content:center;gap:12px;margin:10px 0">
        <button class="btn btn-sm btn-outline" style="min-width:48px" onclick="changeQty(-1)">-</button>
        <button class="btn btn-sm btn-outline" style="min-width:48px" onclick="changeQty(1)">+</button>
      </div>
      <div class="form-group">
        <textarea id="itemNote" placeholder="ملاحظة على الصنف" rows="2"></textarea>
      </div>
      <div id="qtyHint" style="margin-bottom:16px;color:var(--text-muted);font-size:0.9rem"></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-outline" style="flex:1" onclick="closeQty()">إلغاء</button>
        <button class="btn btn-primary" style="flex:1" onclick="confirmQty()">تأكيد</button>
      </div>
    </div>
  </div>

  <div class="modal" id="qrModal">

const Cache = {
  memory: new Map(),
  get(key) {
    const item = this.memory.get(key);
    if (!item) return null;
    if (Date.now() - item.time > CACHETTL) {
      this.memory.delete(key);
      return null;
    }
    return item.value;
  },
  set(key, value) {
    this.memory.set(key, { value, time: Date.now() });
  },
  clear() {
    this.memory.clear();
  },
  invalidate(pattern) {
    for (const key of this.memory.keys()) {
      if (key.includes(pattern)) this.memory.delete(key);
    }
  }
};

/********************
 * NETWORK LAYER    *
 ********************/
function jsonp(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cacheKey = action + JSON.stringify(params);
    const cached = Cache.get(cacheKey);
    if (cached && action !== 'saveOrder' && action !== 'saveCrmOrder') {
      return resolve(cached);
    }

    const cb = 'cb_' + Date.now() + Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({ action, callback: cb, ...params });
    const script = document.createElement('script');
    let finished = false;

    window[cb] = (data) => {
      if (finished) return;
      finished = true;
      cleanup();
      if (!data || data.ok === false) return reject(new Error(data?.error || 'Error'));
      Cache.set(cacheKey, data);
      resolve(data);
    };

    script.onerror = () => {
      if (finished) return;
      finished = true;
      cleanup();
      reject(new Error('Network error'));
    };

    function cleanup() {
      try { delete window[cb]; } catch (e) {}
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.src = SCRIPTURL + (SCRIPTURL.includes('?') ? '&' : '?') + qs.toString();
    document.body.appendChild(script);

    setTimeout(() => {
      if (!finished) {
        finished = true;
        cleanup();
        reject(new Error('Timeout'));
      }
    }, 25000);
  });
}

function postForm(action, payload) {
  return new Promise(async (resolve, reject) => {
    if (!State.isOnline) {
      await OfflineDB.queueSale(action, payload);
      toast('تم حفظ العملية لتنفيذها عند الاتصال بالإنترنت', 'success');
      return resolve({ ok: true, offline: true });
    }

    const iframe = document.createElement('iframe');
    iframe.name = 'frm_' + Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPTURL;
    form.target = iframe.name;
    form.style.display = 'none';

    const inp = document.createElement('input');
    inp.name = 'payload';
    inp.value = JSON.stringify({ action, ...payload });
    form.appendChild(inp);
    document.body.appendChild(form);

    let done = false;

    const fin = () => {
      if (done) return;
      done = true;
      setTimeout(() => {
        if (form.parentNode) form.parentNode.removeChild(form);
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        resolve({ ok: true });
      }, 300);
    };

    iframe.onload = fin;
    form.submit();
    setTimeout(fin, 6000);
  });
}

async function login() {
  const pointType = document.getElementById('pointTypeSelect').value;
  const username  = document.getElementById('branchSelect').value;
  const pass      = document.getElementById('passInput').value;

  if (!pointType || !username || !pass) {
    toast('من فضلك أكمل بيانات الدخول', 'error');
    return;
  }

  const loadingDiv = document.getElementById('loginLoading');
  loadingDiv.style.display = 'block';

  try {
    // جلب اليوزر المرتبط بهذه البيانات من الكاش
    const userRow = State.db.users.find(
      u => u.pointType === pointType && u.username === username && u.active
    );
    if (!userRow) {
      toast('مستخدم غير موجود أو غير نشط', 'error');
      return;
    }

    const res = await jsonp('authenticate', {
      pointType,
      branch: userRow.branch,
      pass
    });

    await hashPassword(pass); // شكلية

    if (!res.ok || !res.token) {
      toast(res.error || 'خطأ في كلمة المرور', 'error');
      return;
    }

    State.currentUser = {
      branch: userRow.branch,
      pointType,
      username: userRow.username,
      token: res.token,
      superPass: res.superPass
    };

    localStorage.setItem('SOKAR_TOKEN', res.token);
    localStorage.setItem('SOKAR_USER', JSON.stringify({
      branch: userRow.branch,
      pointType,
      username: userRow.username
    }));

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appWrapper').classList.remove('hidden');
    document.getElementById('appSections').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');

    setText('whoami', `${userRow.branch} - ${pointType}`);
    await refreshData();
    buildNav();
    showSection(pointType === 'crm' ? 'crm' : pointType === 'delivery' ? 'delivery' : 'dashboard');
  } catch (e) {
    toast(e.message || 'خطأ في الاتصال', 'error');
  } finally {
    loadingDiv.style.display = 'none';
  }
}

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function logout() {
  if (State.deliveryOrdersRefreshInterval) {
    clearInterval(State.deliveryOrdersRefreshInterval);
  }
  localStorage.removeItem('SOKAR_TOKEN');
  localStorage.removeItem('SOKAR_USER');
  State.currentUser = null;
  Cache.clear();
  location.reload();
}

function restoreSession() {
  try {
    const token = localStorage.getItem('SOKAR_TOKEN');
    const userData = JSON.parse(localStorage.getItem('SOKAR_USER') || 'null');
    if (token && userData && userData.username) {
      jsonp('verifyToken', { token }).then(res => {
        if (res.ok && res.valid) {
          State.currentUser = { ...userData, token };
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('appWrapper').classList.remove('hidden');
          document.getElementById('appSections').classList.remove('hidden');
          document.getElementById('logoutBtn').classList.remove('hidden');
          setText('whoami', `${userData.branch} - ${userData.pointType}`);
          refreshData().then(() => {
            buildNav();
            showSection(userData.pointType === 'crm' ? 'crm'
              : userData.pointType === 'delivery' ? 'delivery'
              : 'dashboard');
          });
        } else {
          localStorage.removeItem('SOKAR_TOKEN');
          localStorage.removeItem('SOKAR_USER');
        }
      }).catch(() => {
        localStorage.removeItem('SOKAR_TOKEN');
        localStorage.removeItem('SOKAR_USER');
      });
    }
  } catch (e) {
    localStorage.removeItem('SOKAR_TOKEN');
    localStorage.removeItem('SOKAR_USER');
  }
}

function stockFor(itemName) {
  const row = (State.db.stock || []).find(
    s => s.branch === State.currentUser.branch && s.item === itemName
  );
  return row ? Number(row.qty || 0) : 0;
}

function changeQty(delta) {
  const input = document.getElementById('qtyInput');
  if (!input) return;
  let val = parseFloat(input.value || '0');
  const step = parseFloat(input.step || '1');
  val = val + delta * step;
  const min = parseFloat(input.min || '0');
  if (val < min) val = min;
  input.value = val;
}

function renderCats() {
  const cats = ['', ...new Set((State.db.products || []).map(p => p.cat).filter(Boolean))];
  const container = document.getElementById('catsList');
  if (!container) return;
  container.innerHTML = cats.map(c => `

          onclick="setCategory('${sanitizeHTML(c)}')">
      ${c ? sanitizeHTML(c) : 'الكل'}
    </span>
  `).join('');
}

function setCategory(cat) {
  State.currentCat = cat || null;
  renderCats();
  renderProducts();
}

function renderProducts() {
  const searchTerm = document.getElementById('searchInput')?.value.trim();
  let filtered = (State.db.products || []).slice();

  if (State.currentCat) {
    filtered = filtered.filter(p => p.cat === State.currentCat);
  }
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(s));
  }

  const grid = document.getElementById('productsGrid');
  if (!grid) return;

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-search"></i>
        <h3>لا توجد منتجات</h3>
        <p>حاول تعديل البحث أو الفئة.</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const stock = stockFor(p.name);
    const isLow = stock <= 5;
    return `
      <div class="product-card" onclick="askQty('${sanitizeHTML(p.name)}')">
        <div class="product-name">${sanitizeHTML(p.name)}</div>
        <div class="product-meta">${money(p.price)} ${isWeight(p) ? '/ كجم' : ''}</div>
        <div class="stock-badge ${isLow ? 'low' : ''}">
          ${isLow ? '<i class="fas fa-exclamation-triangle"></i> ' : ''}
          متاح: ${stock}
        </div>
      </div>
    `;
  }).join('');
}

 ****************/
function askQty(name) {
  const p = (State.db.products || []).find(x => x.name === name);
  if (!p) return;
  State.pendingProduct = p;
  State.pendingEditIndex = -1;

  const title = document.getElementById('qtyTitle');
  const input = document.getElementById('qtyInput');
  const note = document.getElementById('itemNote');
  const hint = document.getElementById('qtyHint');

  title.textContent = isWeight(p) ? `الكمية بالجرام - ${p.name}` : `الكمية - ${p.name}`;
  input.value = isWeight(p) ? 1000 : 1;
  input.step = isWeight(p) ? 50 : 1;
  input.min = isWeight(p) ? 50 : 1;
  note.value = '';
  hint.textContent = isWeight(p) ? 'أدخل الكمية بالجرام - مثال 1000 = 1 كجم' : 'الكمية بالعدد';

  document.getElementById('qtyModal').style.display = 'flex';
}

function closeQty() {
  document.getElementById('qtyModal').style.display = 'none';
  State.pendingProduct = null;
  State.pendingEditIndex = -1;
}

function confirmQty() {
  let qty = parseFloat(document.getElementById('qtyInput').value);
  if (isNaN(qty) || qty <= 0) return;
  if (!State.pendingProduct) return;

  const note = document.getElementById('itemNote').value.trim();
  const p = State.pendingProduct;

  const chargeQty = isWeight(p) ? qty / 1000 : qty;
  const total = chargeQty * Number(p.price || 0);

  if (State.pendingEditIndex >= 0) {
    const item = State.cart[State.pendingEditIndex];
    if (item) {
      item.qty = qty;
      item.chargeQty = chargeQty;
      item.total = total;
      item.note = note;
    }
  } else {
    const existing = State.cart.find(i => i.name === p.name);
    if (existing) {
      existing.qty = qty;
      existing.chargeQty = chargeQty;
      existing.total = chargeQty * existing.price;
      if (note) existing.note = note;
    } else {
      State.cart.push({
        name: p.name,
        unit: p.unit,
        price: p.price,
        qty,
        chargeQty,
        total,
        note
      });
    }
  }

  closeQty();
  renderCart();
  toast('تم إضافة الصنف للسلة', 'success');
}

function editCartItem(idx) {
  const item = State.cart[idx];
  if (!item) return;
  const p = (State.db.products || []).find(x => x.name === item.name);
  if (!p) return;

  State.pendingProduct = p;
  State.pendingEditIndex = idx;

  const title = document.getElementById('qtyTitle');
  const input = document.getElementById('qtyInput');
  const note = document.getElementById('itemNote');
  const hint = document.getElementById('qtyHint');

  title.textContent = isWeight(p) ? `الكمية بالجرام - ${p.name}` : `الكمية - ${p.name}`;
  input.value = item.qty;
  input.step = isWeight(p) ? 50 : 1;
  input.min = isWeight(p) ? 50 : 1;
  note.value = item.note || '';
  hint.textContent = isWeight(p) ? 'أدخل الكمية بالجرام' : 'الكمية بالعدد';

  document.getElementById('qtyModal').style.display = 'flex';
}

function removeFromCart(idx) {

function renderCart() {
  const box = document.getElementById('cartList');

  if (!State.cart.length) {
    box.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-shopping-basket"></i>
        <h3>السلة فارغة</h3>

      </div>
    `;
  } else {
    box.innerHTML = State.cart.map((i, idx) => `
      <div class="cart-row">
        <div style="flex:1">
          <strong style="color:var(--text);font-size:1.05rem">${sanitizeHTML(i.name)}</strong>
          <div style="color:var(--text-muted);font-size:0.9rem;margin-top:4px">
            ${isWeight(i) ? `${i.qty} جم` : `${i.qty} قطعة`} × ${money(i.price)} = ${money(i.total)}
          </div>
          ${i.note ? `
            <div style="font-size:12px;color:var(--primary);margin-top:4px;background:var(--primary-soft);padding:4px 8px;border-radius:8px;display:inline-block">
              <i class="fas fa-sticky-note"></i> ${sanitizeHTML(i.note)}
            </div>
          ` : ''}
        </div>
        <div style="text-align:left">
          <div style="font-weight:700;color:var(--primary);font-size:1.1rem;margin-bottom:6px">
            ${money(i.total)}
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-outline" onclick="editCartItem(${idx})"
                    style="padding:6px 10px">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-outline"
                    onclick="removeFromCart(${idx})"
                    style="padding:6px 10px;color:#d32f2f;border-color:#ffcdd2">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  const sub = State.cart.reduce((a, b) => a + (b.total || 0), 0);

  let fee = parseFloat(document.getElementById('deliveryFee')?.value || '0');
  let discType = document.getElementById('discountType')?.value;
  let disc = parseFloat(document.getElementById('discountVal')?.value || '0');

  if (State.currentUser.pointType === 'seller') {
    fee = 0;
    disc = 0;
    discType = 'fixed';
    const feeInput = document.getElementById('deliveryFee');
    const discInput = document.getElementById('discountVal');
    if (feeInput) feeInput.value = 0;
    if (discInput) discInput.value = 0;
  } else {
    if (discType === 'percent') {
      disc = sub * disc / 100;
    }
  }

  const total = Math.max(0, sub + fee - disc);

  setText('subTotal', money(sub));
  const grandEl = document.getElementById('grandTotal');
  if (grandEl) {
    grandEl.innerHTML = `
      <span style="font-size:1.4rem">${money(total)}</span>
      <span style="font-size:0.9rem"> ج.م</span>
    `;
  }
}

function proceedToPayment() {
  if (!State.cart.length) {
    toast('السلة فارغة', 'error');
    return;
  }

  const pt = State.currentUser.pointType;

  if (pt === 'seller') {
    // مندوب البيع: إنشاء QR فقط بدون دفع/وردية
    return createQROrder();
  }

  if (!State.currentShift) {
    toast('من فضلك افتح وردية أولاً', 'error');
    return;
  }

  // لغير مندوب البيع: نفتح بيانات العميل والدفع (سيُكمل في الجزء الخامس)
  openCustomerModal(parseFloat(document.getElementById('deliveryFee')?.value || '0'), 0);
}

async function createQROrder() {
  if (!State.cart.length) {
    toast('السلة فارغة', 'error');
    return;
  }

  const sub = State.cart.reduce((a, b) => a + (b.total || 0), 0);
  let fee = parseFloat(document.getElementById('deliveryFee')?.value || '0');
  let discType = document.getElementById('discountType')?.value;
  let disc = parseFloat(document.getElementById('discountVal')?.value || '0');

  if (State.currentUser.pointType === 'seller') {
    fee = 0;
    disc = 0;
    discType = 'fixed';
  } else if (discType === 'percent') {
    disc = sub * disc / 100;
  }

  const total = Math.max(0, sub + fee - disc);

  try {
    const res = await postForm('createQROrder', {
      order: {
        branch: State.currentUser.branch,
        creator: State.currentUser.username,
        salesmanName: State.currentUser.username,
        items: State.cart.map(i => ({
          name: i.name,
          qty: i.qty,
          price: i.price,
          total: i.total
        })),
        subtotal: sub,
        discount: disc,
        delivery: fee,
        total
      }
    });

    if (!res || res.ok === false) {
      toast(res?.error || 'فشل إنشاء QR', 'error');
      return;
    }

    // في postForm مابنستقبلش body، فاعتمد على الـ Apps Script لو رجّع JSONP في سيناريو مختلف.
    // لو حابب تعتمد على JSONP فقط لإنشاء QR، تقدر تغيرها لطلب jsonp('createQROrder', ...)
    // ولكن سنفترض هنا أنك ستعدل Apps Script ليرجع orderId أيضاً في postForm.

    // لتبسيط، نستدعي jsonp مرة أخرى للبحث عن آخر QR (أو تتحكم فيها من السيرفر).
    // هنا مثال بسيط: يمكن تعديل السيرفر ليعيد orderId من doPost.

    // placeholder: لو عندك orderId في res.orderId
    const orderId = res.orderId || 'تم إنشاء QR - راجع النظام';
    State.currentQROrderId = orderId;

    setText('qrOrderId', orderId);
    const container = document.getElementById('qrCodeContainer');
    container.innerHTML = '';

    QRCode.toCanvas(orderId, { width: 260, margin: 2 }, (err, canvas) => {
      if (err) {
        container.innerHTML = '<p style="color:#d32f2f">خطأ في إنشاء QR</p>';
      } else {
        canvas.style.borderRadius = '16px';
        canvas.style.boxShadow = '0 4px 16px rgba(0,0,0,0.1)';
        container.appendChild(canvas);
      }
    });

    document.getElementById('qrModal').style.display = 'flex';
    toast('تم إنشاء QR، قم بطباعته وتسليمه للعميل', 'success');
  } catch (e) {
    toast(e.message || 'خطأ في إنشاء QR', 'error');
  }
}

function closeQrModal() {
  document.getElementById('qrModal').style.display = 'none';
}

function printQR() {
  const orderId = State.currentQROrderId;
  if (!orderId) return;
  const win = window.open('', '_blank');
  if (!win) return;

  win.document.write(`
    <html dir="rtl">
      <head>
        <title>QR - ${orderId}</title>
        <style>
          body { font-family: Cairo, sans-serif; text-align:center; padding:20px; }
          .box { border:1px solid #ddd;padding:20px;border-radius:12px;display:inline-block; }
          h1 { font-size:20px;margin-bottom:10px;color:#b81b5c; }
        </style>
      </head>
      <body>
        <div class="box">
          <h1>طلب جديد</h1>
          <p>${orderId}</p>
        </div>
        <script>
          window.print();
          window.close();
        <\/script>
      </body>
    </html>
  `);
  win.document.close();
}

  const method = document.getElementById('paymentMethod').value;
  let paid = parseFloat(document.getElementById('paidAmount').value || '0');
  const notes = document.getElementById('paymentNotes').value;
  let redeemedPoints = 0;

  if (!State.cart.length) return toast('السلة فارغة', 'error');
  if (!State.currentShift) return toast('من فضلك افتح وردية أولاً', 'error');

  if (!State.customerData.name) State.customerData.name = 'عميل نقدي';

  if (method && State.customerData.phone) {
    const pts = parseInt(document.getElementById('redeemPoints').value || '0', 10);
    if (pts > 0) {
      try {
        const res = await postForm('redeemLoyaltyPoints', {
          phone: State.customerData.phone,
          points: pts
        });
        if (res.ok && res.discount) {
          redeemedPoints = pts;
        }
      } catch (e) {}
    }
  }

  closePaymentModal();

  const sub = State.cart.reduce((a, b) => a + (b.total || 0), 0);
  let fee = parseFloat(document.getElementById('deliveryFee')?.value || '0');
  let discType = document.getElementById('discountType')?.value;
  let disc = parseFloat(document.getElementById('discountVal')?.value || '0');

  if (discType === 'percent') {
    disc = sub * disc / 100;
  }

  let total = Math.max(0, sub + fee - disc);
  if (paid < total) paid = total; // تبسيط: اعتبره مدفوع بالكامل

  const orderData = {
    saleId: State.currentQROrderId || ('SALE-' + Date.now().toString(36).toUpperCase()),
    date: new Date().toLocaleDateString('ar-EG'),
    branch: State.currentUser.branch,
    customer: State.customerData.name || '',
    phone: State.customerData.phone || '',
    address: State.customerData.address || '',
    channel: State.currentQROrderId ? 'QR' : 'POS',
    status: '',
    subtotal: sub,
    discount: disc,
    delivery: fee,
    total: total,
    cashier: State.currentUser.username,
    username: State.currentUser.username,
    notes,
    shiftId: State.currentShift?.id || '',
    paymentMethod: method,
    paidAmount: paid,
    qrOrderId: State.currentQROrderId || '',
    itemsJson: JSON.stringify(State.cart.map(i => ({
      name: i.name,
      qty: i.qty,
      price: i.price,
      total: i.total,
      note: i.note
    }))),
    redeemedPoints
  };

  try {
    const res = await postForm('saveOrder', { order: orderData });
    if (!res || res.ok === false) {
      toast(res?.error || 'فشل حفظ الفاتورة', 'error');
      return;
    }
    toast('تم حفظ الفاتورة بنجاح', 'success');
    clearCart();
    await refreshData();
    renderPOS();
  } catch (e) {
    toast(e.message || 'خطأ في حفظ الفاتورة', 'error');
  }
}

/***********************
 * SHIFT MODALS        *
 ***********************/
function showShiftModal() {
  const modal = document.getElementById('shiftModal');
  const info = document.getElementById('shiftInfo');
  const actions = document.getElementById('shiftActions');
  if (!modal || !info || !actions) return;

  if (!State.currentShift) {
    info.innerHTML = `<p>لا توجد وردية مفتوحة لهذا المستخدم.</p>`;
    actions.innerHTML = `
      <button class="btn btn-primary" style="width:100%" onclick="openShiftConfirmed()">
        فتح وردية جديدة
      </button>
    `;
  } else {
    info.innerHTML = `
      <p><strong>الكود:</strong> ${State.currentShift.id}</p>
      <p><strong>الفرع:</strong> ${sanitizeHTML(State.currentShift.branch)}</p>
      <p><strong>الكاشير:</strong> ${sanitizeHTML(State.currentShift.cashier)}</p>
      <p><strong>وقت الفتح:</strong> ${State.currentShift.openTime || ''}</p>
      <p><strong>إجمالي مبيعات الورديّة:</strong> ${money(State.currentShift.totalSales || 0)}</p>
      <p><strong>عدد الفواتير:</strong> ${State.currentShift.invoicesCount || 0}</p>
    `;
    actions.innerHTML = `
      <button class="btn btn-outline" style="width:100%;margin-bottom:8px"
              onclick="showShiftCashModal()">تسوية الكاش</button>
      <button class="btn btn-danger" style="width:100%" onclick="closeShiftConfirmed()">
        إغلاق الورديّة
      </button>
    `;
  }

  modal.style.display = 'flex';
}

function closeShiftModal() {
  const modal = document.getElementById('shiftModal');
  if (modal) modal.style.display = 'none';
}

async function openShiftConfirmed() {
  try {
    const res = await postForm('openShift', {
      branch: State.currentUser.branch,
      cashier: State.currentUser.username
    });
    if (res.ok === false) {
      toast(res.error || 'فشل فتح الورديّة', 'error');
      return;
    }
    toast('تم فتح الورديّة', 'success');
    await refreshData();
    closeShiftModal();
  } catch (e) {
    toast(e.message || 'خطأ في فتح الورديّة', 'error');
  }
}

async function closeShiftConfirmed() {
  if (!State.currentShift) return;
  try {
    const res = await postForm('closeShift', {
      shiftId: State.currentShift.id,
      branch: State.currentUser.branch
    });
    if (res.ok === false) {
      toast(res.error || 'فشل إغلاق الورديّة', 'error');
      return;
    }
    toast('تم إغلاق الورديّة', 'success');
    State.currentShift = null;
    await refreshData();
    closeShiftModal();
  } catch (e) {
    toast(e.message || 'خطأ في إغلاق الورديّة', 'error');
  }
}

async function showShiftCashModal() {
  if (!State.currentShift) return;
  const modal = document.getElementById('shiftCashModal');
  const expectedSpan = document.getElementById('expectedCash');
  if (!modal || !expectedSpan) return;

  try {
    const res = await jsonp('getShiftExpectedCash', { shiftId: State.currentShift.id });
    if (res.ok && typeof res.cash !== 'undefined') {
      expectedSpan.textContent = money(res.cash);
    } else {
      expectedSpan.textContent = '0.00';
    }
  } catch (e) {
    expectedSpan.textContent = '0.00';
  }

  document.getElementById('actualCash').value = '';
  modal.style.display = 'flex';
}

function closeShiftCashModal() {
  const modal = document.getElementById('shiftCashModal');
  if (modal) modal.style.display = 'none';
}

async function saveShiftCash() {
  if (!State.currentShift) return;
  const actual = parseFloat(document.getElementById('actualCash').value || '0');
  try {
    const res = await postForm('updateShiftActualCash', {
      shiftId: State.currentShift.id,
      actualCash: actual
    });
    if (res.ok === false) {
      toast(res.error || 'فشل حفظ الكاش الفعلي', 'error');
      return;
    }
    toast('تم حفظ الكاش الفعلي للورديّة', 'success');
    closeShiftCashModal();
    await refreshData();
  } catch (e) {
    toast(e.message || 'خطأ في حفظ الكاش الفعلي', 'error');
  }
}
