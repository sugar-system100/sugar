<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>سكّر 33 · نظام مبيعات متكامل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  <style>
    :root {
      --primary: #b81b5c; --primary-light: #e84a8a; --primary-soft: #fce4f0;
      --accent: #0f9d58;  --accent-soft: #e6f4ea;
      --blue: #1a73e8;    --blue-soft: #e8f0fe;
      --orange: #f57c00;  --orange-soft: #fff3e0;
      --bg: #f9f6f8; --surface: #ffffff; --border: #e9dee5;
      --text: #1e1e2a; --text-muted: #6b5e66;
      --shadow: 0 10px 25px -5px rgba(0,0,0,.05), 0 8px 10px -6px rgba(0,0,0,.02);
      --radius-card: 24px; --radius-btn: 16px; --transition: all 0.2s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Tahoma',sans-serif; }
    body { background:var(--bg); color:var(--text); line-height:1.5; }
    button,input,select,textarea { font-size:1rem; border-radius:14px; }
    button { cursor:pointer; background:none; border:none; font-weight:600; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:var(--transition); }
    input,select,textarea { border:1.5px solid var(--border); padding:12px 16px; background:var(--surface); outline:none; width:100%; }
    input:focus,select:focus,textarea:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(184,27,92,.08); }

    /* Layout */
    .app-wrapper { display:flex; min-height:100vh; }
    .sidebar { width:260px; background:var(--surface); border-left:1px solid var(--border); padding:24px 12px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; box-shadow:var(--shadow); }
    .logo-area { padding:8px 16px 24px; text-align:center; border-bottom:2px solid var(--primary-soft); }
    .logo-icon { font-size:40px; color:var(--primary); }
    .logo-text { font-size:26px; font-weight:800; background:linear-gradient(135deg,var(--primary),#d63384); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-menu { flex:1; margin:20px 0; }
    .nav-item { display:flex; align-items:center; gap:14px; padding:14px 18px; margin:6px 0; border-radius:18px; color:var(--text-muted); font-weight:600; cursor:pointer; width:100%; text-align:right; transition:var(--transition); }
    .nav-item i { width:24px; font-size:1.3rem; }
    .nav-item:hover { background:var(--primary-soft); color:var(--primary); }
    .nav-item.active { background:var(--primary); color:white; box-shadow:0 8px 14px -6px rgba(184,27,92,.3); }
    .user-badge { margin-top:auto; background:var(--blue-soft); padding:16px; border-radius:22px; }
    .logout-btn { width:100%; margin-top:10px; background:#fff; border:1px solid var(--border); padding:10px 14px; border-radius:14px; }

    .main-content { flex:1; padding:24px 32px; max-width:calc(100% - 260px); }
    .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; gap:12px; flex-wrap:wrap; }
    .page-title { font-size:28px; font-weight:700; color:#2c1b24; display:flex; align-items:center; gap:10px; }
    .action-buttons { display:flex; gap:12px; flex-wrap:wrap; }

    /* Buttons */
    .btn { padding:14px 22px; border-radius:40px; font-weight:700; box-shadow:var(--shadow); border:1px solid transparent; transition:var(--transition); font-size:1rem; }
    .btn-primary { background:var(--primary); color:white; }
    .btn-primary:hover { background:#9f1650; transform:scale(.98); }
    .btn-accent  { background:var(--accent); color:white; }
    .btn-orange  { background:var(--orange); color:white; }
    .btn-outline { background:white; border-color:var(--border); color:var(--text); }
    .btn-outline:hover { background:#f5f0f2; }
    .btn-danger  { background:#d32f2f; color:white; }
    .btn-sm      { padding:8px 16px; font-size:.9rem; }
    .btn-icon    { padding:10px 14px; }

    /* Cards */
    .card { background:var(--surface); border-radius:var(--radius-card); padding:20px; box-shadow:var(--shadow); border:1px solid var(--border); }
    .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; font-weight:700; font-size:1.2rem; gap:12px; flex-wrap:wrap; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }

    /* KPI Cards */
    .kpi-card { background:var(--surface); border-radius:20px; padding:20px; box-shadow:var(--shadow); border:1px solid var(--border); text-align:center; }
    .kpi-icon { font-size:32px; margin-bottom:10px; }
    .kpi-value { font-size:2rem; font-weight:800; color:var(--primary); }
    .kpi-label { font-size:.9rem; color:var(--text-muted); margin-top:4px; }

    /* POS */
    .pos-layout,.crm-layout { display:flex; gap:20px; }
    .pos-cart-panel,.crm-cart-panel { width:340px; flex-shrink:0; }
    .pos-products-panel,.crm-products-panel { flex:1; min-width:0; }
    .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; max-height:65vh; overflow-y:auto; padding:8px 4px; }
    .product-card { background:#fdfbfc; border:2px solid var(--border); border-radius:24px; padding:18px 12px; text-align:center; cursor:pointer; transition:var(--transition); position:relative; }
    .product-card:hover { background:var(--primary-soft); border-color:var(--primary); transform:translateY(-4px); }
    .product-card.out-of-stock { opacity:.5; cursor:not-allowed; }
    .product-name { font-weight:800; margin-bottom:6px; font-size:1rem; }
    .product-meta { font-size:.9rem; color:var(--text-muted); margin-bottom:4px; }
    .stock-badge { padding:4px 10px; border-radius:30px; font-size:.8rem; display:inline-block; margin-top:6px; }
    .stock-ok   { background:#e8f0fe; color:#1a73e8; }
    .stock-low  { background:#fff3e0; color:#f57c00; }
    .stock-zero { background:#fde8e8; color:#d32f2f; }

    /* Cart */
    .cart-items { max-height:380px; overflow-y:auto; }
    .cart-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px dashed var(--border); gap:8px; }
    .total-section { border-top:2px solid var(--border); margin-top:14px; padding-top:18px; }
    .pill { background:var(--accent-soft); color:#0b5e38; padding:8px 18px; border-radius:40px; font-weight:700; font-size:.9rem; }
    .pill-warn { background:var(--orange-soft); color:#e65100; }

    /* Table */
    .table-wrapper { overflow-x:auto; border-radius:20px; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:right; padding:14px 12px; background:#f5edf1; color:#441c2e; font-weight:700; font-size:.9rem; white-space:nowrap; }
    td { padding:14px 12px; border-bottom:1px solid var(--border); vertical-align:top; font-size:.95rem; }
    tr:hover td { background:#fdf8fb; }

    /* Badges */
    .badge { background:#e4e7eb; padding:6px 14px; border-radius:30px; font-size:.85rem; display:inline-block; cursor:pointer; }
    .badge-success  { background:#d1fae5; color:#065f46; }
    .badge-warning  { background:#fff3cd; color:#856404; }
    .badge-danger   { background:#fde8e8; color:#b91c1c; }
    .badge-primary  { background:var(--primary-soft); color:var(--primary); }
    .badge-blue     { background:var(--blue-soft); color:var(--blue); }

    /* Modals */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.35); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:999; padding:16px; }
    .modal-card { background:white; width:520px; max-width:94%; border-radius:32px; padding:28px; box-shadow:0 30px 50px rgba(0,0,0,.2); max-height:90vh; overflow-y:auto; }
    .modal-wide { width:800px; }

    /* Toast */
    .toast { position:fixed; bottom:24px; left:24px; background:#1e1e2a; color:white; padding:14px 28px; border-radius:60px; font-weight:500; z-index:9999; display:none; box-shadow:0 10px 20px rgba(0,0,0,.2); }

    /* Tabs */
    .tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .tab { padding:10px 20px; border-radius:30px; background:#f0e8ec; color:var(--text-muted); font-weight:600; cursor:pointer; border:none; transition:var(--transition); }
    .tab.active { background:var(--primary); color:white; }

    /* Branch selector for admin */
    .branch-selector { background:white; border:2px solid var(--primary-soft); border-radius:20px; padding:12px 20px; margin-bottom:24px; display:flex; align-items:center; gap:12px; }
    .branch-selector select { border:none; font-weight:700; font-size:1.1rem; color:var(--primary); background:transparent; width:auto; }

    /* Misc */
    .hidden   { display:none !important; }
    .section  { display:none; }
    .section.active { display:block; }
    .form-row { margin-bottom:14px; }
    .form-row label { display:block; font-weight:600; margin-bottom:6px; font-size:.95rem; }
    .divider  { border:none; border-top:1px solid var(--border); margin:16px 0; }
    .alert    { padding:14px 18px; border-radius:16px; margin-bottom:16px; font-weight:500; }
    .alert-warning { background:var(--orange-soft); color:#e65100; }
    .alert-info    { background:var(--blue-soft);   color:var(--blue); }

    #qrScannerContainer { width:100%; max-width:400px; margin:0 auto; border-radius:20px; overflow:hidden; }
    #qrReader { width:100%; }

    @media (max-width:1100px) {
      .grid-4 { grid-template-columns:repeat(2,1fr); }
    }
    @media (max-width:1000px) {
      .sidebar { width:90px; padding:16px 6px; }
      .sidebar .logo-text,.sidebar .nav-item span,.user-badge span { display:none; }
      .nav-item { justify-content:center; }
      .main-content { max-width:calc(100% - 90px); padding:16px; }
      .pos-layout,.crm-layout { flex-direction:column; }
      .pos-cart-panel,.crm-cart-panel { width:100%; }
      .grid-3 { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:600px) {
      .grid-2,.grid-3 { grid-template-columns:1fr; }
      .main-content { padding:12px; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo-area">
      <i class="fas fa-candy-cane logo-icon"></i>
      <div class="logo-text">سكّر 33</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">نظام احترافي</div>
    </div>
    <div class="nav-menu" id="navMenu"></div>
    <div class="user-badge">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <i class="fas fa-user-circle" style="font-size:24px;"></i>
        <span id="whoami" style="font-weight:700;">زائر</span>
      </div>
      <div id="shiftStatus" style="font-size:12px;margin-bottom:8px;"></div>
      <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">
        <i class="fas fa-right-from-bracket"></i><span>خروج</span>
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content">

    <!-- Login Screen -->
    <div id="loginScreen" style="max-width:480px;margin:60px auto;">
      <div class="card" style="padding:36px;">
        <div style="text-align:center;margin-bottom:28px;">
          <i class="fas fa-candy-cane" style="font-size:52px;color:var(--primary);"></i>
          <div class="logo-text" style="font-size:32px;margin:8px 0;">سكّر 33</div>
          <div style="color:var(--text-muted);">تسجيل الدخول</div>
        </div>
        <div class="form-row">
          <label>القسم / الفرع</label>
          <select id="branchSelect"><option>جاري التحميل...</option></select>
        </div>
        <div class="form-row">
          <label>اسم المستخدم</label>
          <input id="usernameInput" type="text" placeholder="اسم المستخدم" autocomplete="username">
        </div>
        <div class="form-row">
          <label>كلمة المرور</label>
          <input id="passInput" type="password" placeholder="••••••••"
            onkeydown="if(event.key==='Enter') login()" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" style="width:100%;padding:16px;margin-top:8px;" onclick="login()">
          <i class="fas fa-sign-in-alt"></i> دخول
        </button>
        <div id="loginMsg" style="margin-top:14px;text-align:center;color:#b0003a;font-weight:600;"></div>
      </div>
    </div>

    <!-- App Sections -->
    <div id="appSections" class="hidden">
      <!-- Admin branch selector -->
      <div id="adminBranchBar" class="branch-selector hidden">
        <i class="fas fa-store" style="color:var(--primary);font-size:1.3rem;"></i>
        <span style="font-weight:600;">عرض الفرع:</span>
        <select id="adminBranchSelect" onchange="onAdminBranchChange()">
          <option value="">-- اختر الفرع --</option>
        </select>
      </div>

      <div id="sec-dashboard" class="section active"></div>
      <div id="sec-pos"       class="section"></div>
      <div id="sec-orders"    class="section"></div>
      <div id="sec-crm"       class="section"></div>
      <div id="sec-shifts"    class="section"></div>
      <div id="sec-stock"     class="section"></div>
      <div id="sec-products"  class="section"></div>
      <div id="sec-users"     class="section"></div>
      <div id="sec-reports"   class="section"></div>
      <div id="sec-expenses"  class="section"></div>
    </div>
  </div>
</div>

<!-- ═══════════ MODALS ═══════════ -->

<!-- Qty Modal -->
<div class="modal" id="qtyModal">
  <div class="modal-card">
    <h2 id="qtyTitle" style="margin-bottom:16px;">الكمية</h2>
    <input id="qtyInput" type="number" min="1" step="1" value="1" style="margin-bottom:10px;">
    <div id="qtyHint" style="margin-bottom:16px;color:var(--text-muted);font-size:.9rem;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeQty()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmQty()">تأكيد</button>
    </div>
  </div>
</div>

<!-- QR Modal -->
<div class="modal" id="qrModal">
  <div class="modal-card" style="text-align:center;">
    <h2><i class="fas fa-qrcode"></i> بون الطلب</h2>
    <div id="qrCodeContainer" style="margin:20px 0;min-height:260px;display:flex;justify-content:center;align-items:center;"></div>
    <div id="qrBonDetails" style="background:var(--bg);border-radius:16px;padding:14px;margin-bottom:16px;text-align:right;font-size:.9rem;"></div>
    <p style="font-weight:700;font-size:1.1rem;" id="qrOrderId"></p>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeQrModal()">إغلاق</button>
      <button class="btn btn-primary" style="flex:1" onclick="printQR()"><i class="fas fa-print"></i> طباعة</button>
    </div>
  </div>
</div>

<!-- QR Scanner Modal -->
<div class="modal" id="qrScannerModal">
  <div class="modal-card">
    <h2 style="text-align:center;margin-bottom:16px;"><i class="fas fa-camera"></i> مسح QR</h2>
    <div id="qrScannerContainer"><div id="qrReader"></div></div>
    <p style="text-align:center;margin:12px 0;color:var(--text-muted);">أو أدخل الكود يدوياً</p>
    <input type="text" id="manualQrInput" placeholder="كود الطلب" style="margin-bottom:12px;">
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeQrScanner()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="loadManualQR()">تحميل</button>
    </div>
  </div>
</div>

<!-- Shift Modal -->
<div class="modal" id="shiftModal">
  <div class="modal-card">
    <h2><i class="fas fa-clock"></i> إدارة الوردية</h2>
    <div id="shiftInfo" style="margin:16px 0;padding:14px;background:var(--bg);border-radius:16px;"></div>
    <div id="shiftActions"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-outline" style="width:100%;" onclick="closeShiftModal()">إغلاق</button>
    </div>
  </div>
</div>

<!-- Supervisor / Discount Modal -->
<div class="modal" id="supervisorModal">
  <div class="modal-card">
    <h2><i class="fas fa-user-shield"></i> صلاحية المشرف</h2>
    <p style="margin:16px 0;color:var(--text-muted);">أدخل كلمة مرور المشرف لتفعيل الخصم</p>
    <input id="superPassInput" type="password" placeholder="كلمة مرور المشرف">
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeSupervisorModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="verifySupervisorForDiscount()">تأكيد</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="modal" id="paymentModal">
  <div class="modal-card">
    <h2><i class="fas fa-credit-card"></i> تأكيد الدفع</h2>
    <div style="margin:16px 0;">
      <div class="form-row">
        <label>طريقة الدفع</label>
        <select id="paymentMethod">
          <option value="نقدي">💵 نقدي</option>
          <option value="فيزا">💳 فيزا</option>
          <option value="تحويل بنكي">🏦 تحويل بنكي</option>
          <option value="فودافون كاش">📱 فودافون كاش</option>
          <option value="إنستاباي">📲 إنستاباي</option>
          <option value="أقساط">📅 أقساط</option>
        </select>
      </div>
      <div class="form-row">
        <label>المبلغ المدفوع</label>
        <input type="number" id="paidAmount" placeholder="0.00" step="0.5">
      </div>
      <div class="form-row">
        <label>ملاحظات (اختياري)</label>
        <input type="text" id="paymentNotes" placeholder="ملاحظات...">
      </div>
      <div id="paymentSummary" style="background:var(--bg);border-radius:16px;padding:14px;font-weight:600;"></div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closePaymentModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:2" onclick="confirmPayment()">
        <i class="fas fa-check-circle"></i> تأكيد الدفع
      </button>
    </div>
  </div>
</div>

<!-- Customer Modal (للدليفري فقط) -->
<div class="modal" id="customerModal">
  <div class="modal-card">
    <h2><i class="fas fa-user"></i> بيانات العميل</h2>
    <div style="margin:16px 0;">
      <div class="form-row"><label>اسم العميل</label><input id="customerName" placeholder="الاسم"></div>
      <div class="form-row"><label>رقم الهاتف</label><input id="customerPhone" placeholder="01x..."></div>
      <div class="form-row"><label>العنوان</label><input id="customerAddress" placeholder="العنوان التفصيلي"></div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeCustomerModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmCustomerInfo()">متابعة</button>
    </div>
  </div>
</div>

<!-- Expense Modal (مشرف) -->
<div class="modal" id="expenseModal">
  <div class="modal-card">
    <h2><i class="fas fa-money-bill-wave"></i> إضافة مصروف / ترضية</h2>
    <div style="margin:16px 0;">
      <div class="form-row">
        <label>نوع المصروف</label>
        <select id="expenseType" onchange="toggleComplaintField()">
          <option value="مصروف عام">مصروف عام</option>
          <option value="ترضية عميل">ترضية عميل</option>
          <option value="فودافون كاش">فودافون كاش</option>
          <option value="نثريات">نثريات</option>
          <option value="أخرى">أخرى</option>
        </select>
      </div>
      <div class="form-row">
        <label>المبلغ</label>
        <input type="number" id="expenseAmount" placeholder="0.00" step="0.5">
      </div>
      <div class="form-row hidden" id="complaintRow">
        <label>رقم الشكوى</label>
        <input type="text" id="complaintId" placeholder="رقم الشكوى">
      </div>
      <div class="form-row">
        <label>ملاحظات</label>
        <input type="text" id="expenseNotes" placeholder="تفاصيل المصروف...">
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeExpenseModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:2" onclick="confirmExpense()">
        <i class="fas fa-save"></i> حفظ المصروف
      </button>
    </div>
  </div>
</div>

<!-- Product Edit Modal -->
<div class="modal" id="productModal">
  <div class="modal-card">
    <h2 id="productModalTitle"><i class="fas fa-tag"></i> إضافة منتج</h2>
    <div style="margin:16px 0;">
      <div class="form-row"><label>اسم الصنف</label><input id="prodName" placeholder="اسم الصنف"></div>
      <div class="form-row"><label>القسم / التصنيف</label><input id="prodCat" placeholder="كيك، شرقي، كحك..." list="catSuggestions">
        <datalist id="catSuggestions"></datalist>
      </div>

<div id="toast" class="toast"></div>
<script>
(function(){
'use strict';

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR_KLq4Wbq4f8q5ghfUJSz_-0PMtmDmVvMAUHq6x2Ud3cvEsMW2YtSEZBRWl3iBHvL4Q/exec';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let db = {
  products:[], users:[], stock:[], sales:[], crmOrders:[],
  qrOrders:[], shifts:[], expenses:[], returns:[],
  crmStatuses:['تم الاستلام','جاري التجهيز','خرج للتوصيل','مكتمل','ملغي']
};

let currentUser     = null;
let currentShift    = null;
let discountEnabled = false;
let currentQROrderId= null;
let html5QrScanner  = null;
let adminBranch     = '';
let customerData    = { name:'', phone:'', address:'' };

// POS state
let cart              = [];
let currentCat        = 'الكل';
let pendingProduct    = null;
let pendingEditIndex  = -1;
let pendingContext    = 'pos'; // 'pos' | 'crm'

// CRM cart state
let crmCart           = [];
let crmCurrentCat     = 'الكل';

// Edit state
let editingProductName   = '';
let editingUsername      = '';

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const money = n => (Number(n||0)).toFixed(2);
const esc   = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const jsq   = s => String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
const isWeight = p => String(p.unit||'').trim() === 'كيلو';
const pt    = () => currentUser?.pointType || '';
const isAdmin  = () => pt() === 'إدارة';
const isSupervisor = () => pt() === 'مشرف';
const isCashier    = () => pt() === 'كاشير';
const isDelivery   = () => pt() === 'دليفري';
const isSalesman   = () => pt() === 'مندوب_بيع' || pt() === 'فرع';
const isCRM        = () => pt() === 'خدمة العملاء';

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg||'';
  t.style.background = isError ? '#d32f2f' : '#1e1e2a';
  t.style.display = 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.style.display='none', 3500);
}

function stockFor(item, branch=null) {
  const b = branch || currentUser?.branch;
  if (!b) return 0;
  const row = db.stock.find(s => s.branch===b && s.item===item);
  return row ? row.qty : 0;
}

function todayDate() {
  return new Date().toISOString().slice(0,10).replace(/-/g,'/');
}

function nowStr() {
  return new Date().toLocaleString('ar-EG');
}

function getActiveBranch() {
  return isAdmin() || isCRM() ? (adminBranch || currentUser?.branch) : currentUser?.branch;
}

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
function jsonp(action, params={}) {
  return new Promise((resolve, reject) => {
    const base = SCRIPT_URL;
    if (!base || base==='https://script.google.com/macros/s/AKfycbzR_KLq4Wbq4f8q5ghfUJSz_-0PMtmDmVvMAUHq6x2Ud3cvEsMW2YtSEZBRWl3iBHvL4Q/exec') return reject(new Error('الرجاء تعيين SCRIPT_URL'));
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({action, callback:cb, ...params});
    const script = document.createElement('script');
    let finished = false;

    window[cb] = data => {
      if (finished) return;
      finished = true;
      try { delete window[cb]; } catch(e){}
      if (script.parentNode) script.parentNode.removeChild(script);
      if (data && data.ok===false) reject(new Error(data.error||'فشل الطلب'));
      else resolve(data);
    };
    script.onerror = () => {
      if (finished) return; finished=true;
      try { delete window[cb]; } catch(e){}
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('فشل الاتصال'));
    };
    script.src = base+(base.includes('?')?'&':'?')+qs.toString();
    document.body.appendChild(script);
    setTimeout(()=>{
      if (finished) return; finished=true;
      try { delete window[cb]; } catch(e){}
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('انتهت مهلة الاتصال'));
    }, 15000);
  });
}

function postForm(action, payload={}) {
  return new Promise((resolve, reject) => {
    const base = SCRIPT_URL;
    if (!base || base==='https://script.google.com/macros/s/AKfycbzR_KLq4Wbq4f8q5ghfUJSz_-0PMtmDmVvMAUHq6x2Ud3cvEsMW2YtSEZBRWl3iBHvL4Q/exec') return reject(new Error('الرجاء تعيين SCRIPT_URL'));
    const iframe = document.createElement('iframe');
    iframe.name = 'frm_'+Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    const form = document.createElement('form');
    form.method='POST'; form.action=base; form.target=iframe.name; form.style.display='none';
    const inp = document.createElement('input');
    inp.name='payload'; inp.value=JSON.stringify({action,...payload});
    form.appendChild(inp); document.body.appendChild(form);
    let done=false;
    const fin=()=>{
      if(done)return; done=true;
      setTimeout(()=>{
        if(form.parentNode) form.parentNode.removeChild(form);
        if(iframe.parentNode) iframe.parentNode.removeChild(iframe);
        resolve({ok:true});
      },200);
    };
    iframe.onload=()=>fin();
    form.submit();
    setTimeout(fin,3000);
  });
}

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
function normalizeData(res) {
  // users: الفرع | اسم المستخدم | pass | superPass | pointType | notes | active
  db.users = (res.users||[]).map(r=>({
    branch:String(r[0]||'').trim(),
    username:String(r[1]||'').trim(),
    pass:String(r[2]||'').trim(),
    superPass:String(r[3]||'').trim(),
    pointType:String(r[4]||'').trim(),
    notes:String(r[5]||'').trim(),
    active: r[6]===true || String(r[6]||'').toUpperCase()==='TRUE'
  }));

  db.products = (res.products||[]).map(r=>({
    name:String(r[0]||'').trim(), cat:String(r[1]||'').trim(),
    price:+r[2]||0, unit:String(r[3]||'قطعة').trim()
  }));

  db.stock = (res.stock||[]).map(r=>({
    branch:String(r[0]||'').trim(), item:String(r[1]||'').trim(),
    qty:+r[2]||0, lastUpdate:String(r[3]||'')
  }));

  // sales: كود | تاريخ | فرع | عميل | هاتف | عنوان | قناة | حالة | subtotal | discount | delivery | total | cashier | username | notes | shiftId | payMethod | paid | qrRef
  db.sales = (res.sales||[]).map(r=>({
    saleId:r[0], date:r[1], branch:r[2], customer:r[3], phone:r[4],
    address:r[5], channel:r[6], status:r[7],
    subtotal:+r[8]||0, discount:+r[9]||0, delivery:+r[10]||0, total:+r[11]||0,
    cashier:r[12], username:r[13], notes:r[14], shiftId:r[15],
    paymentMethod:r[16]||'نقدي', paidAmount:+r[17]||0, qrOrderId:r[18]
  }));

  db.crmOrders = (res.crmOrders||[]).map(r=>({
    id:r[0], createdAt:r[1], branch:r[2], customer:r[3], phone:r[4],
    address:r[5], items:r[6], total:+r[7]||0, notes:r[8], status:r[9], createdBy:r[10]
  }));

  // qrOrders: id | date | creator | salesmanName | branch | items_json | subtotal | discount | delivery | total | status | cashier | closedAt
  db.qrOrders = (res.qrOrders||[]).map(r=>{
    let items=[];
    try { items=JSON.parse(r[5]||'[]'); } catch(e){}
    return {
      id:r[0], date:r[1], creator:r[2], salesmanName:r[3], branch:r[4],
      items, subtotal:+r[6]||0, discount:+r[7]||0, delivery:+r[8]||0, total:+r[9]||0,
      status:r[10], cashier:r[11], closedAt:r[12]
    };
  });

  // shifts: id | branch | cashier | username | openTime | closeTime | totalSales | invoiceCount | status
  db.shifts = (res.shifts||[]).map(r=>({
    id:r[0], branch:r[1], cashier:r[2], username:r[3],
    openTime:r[4], closeTime:r[5], totalSales:+r[6]||0,
    invoiceCount:+r[7]||0, status:r[8]
  }));

  db.expenses = (res.expenses||[]).map(r=>({
    id:r[0], date:r[1], branch:r[2], username:r[3],
    type:r[4], amount:+r[5]||0, complaintId:r[6], notes:r[7], shiftId:r[8]
  }));

  db.returns = (res.returns||[]).map(r=>({
    id:r[0], date:r[1], branch:r[2], username:r[3],
    originalSaleId:r[4], items:r[5], amount:+r[6]||0, reason:r[7], shiftId:r[8]
  }));

  if (res.crmStatuses?.length) db.crmStatuses = res.crmStatuses;
}

async function refreshData(silent=false) {
  try {
    const res = await jsonp('getInitialData');
    normalizeData(res);
    if (currentUser) { loadCurrentShift(); renderAll(); }
    if (!silent) toast('تم تحديث البيانات ✓');
    return true;
  } catch(e) {
    if (!silent) toast(e.message, true);
    return false;
  }
}

async function boot() {
  try {
    document.getElementById('loginMsg').textContent = 'جاري الاتصال...';
    const res = await jsonp('getInitialData');
    normalizeData(res);
    fillLoginBranches();
    document.getElementById('loginMsg').textContent = '';
    restoreSession();
  } catch(e) {
    document.getElementById('branchSelect').innerHTML = '<option>❌ فشل التحميل</option>';
    document.getElementById('loginMsg').textContent = e.message;
  }
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
function fillLoginBranches() {
  const sel = document.getElementById('branchSelect');
  const branches = [...new Set(db.users.filter(u=>u.active).map(u=>u.branch))].sort();
  sel.innerHTML = '<option value="">-- اختر القسم / الفرع --</option>' +
    branches.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('');
}

function login() {
  const branch   = String(document.getElementById('branchSelect').value||'').trim();
  const username = String(document.getElementById('usernameInput').value||'').trim();
  const pass     = String(document.getElementById('passInput').value||'').trim();

  if (!branch)   return toast('اختر القسم / الفرع', true);
  if (!username) return toast('أدخل اسم المستخدم', true);
  if (!pass)     return toast('أدخل كلمة المرور', true);

  const user = db.users.find(u =>
    u.active &&
    u.branch === branch &&
    u.username === username &&
    (u.pass === pass || u.superPass === pass)
  );

  if (!user) return toast('بيانات الدخول غير صحيحة', true);

  currentUser = {...user};
  localStorage.setItem('SOKAR_USER', JSON.stringify(currentUser));
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appSections').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.remove('hidden');
  updateUIForUser();
}

function restoreSession() {
  try {
    const u = JSON.parse(localStorage.getItem('SOKAR_USER'));
    if (!u) return;
    const still = db.users.some(usr => usr.branch===u.branch && usr.username===u.username && usr.active);
    if (!still) { localStorage.removeItem('SOKAR_USER'); return; }
    currentUser = u;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appSections').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    updateUIForUser();
  } catch(e){}
}

function logout() {
  currentUser=null; localStorage.removeItem('SOKAR_USER'); location.reload();
}

// ═══════════════════════════════════════════
// UI / NAV
// ═══════════════════════════════════════════
function updateUIForUser() {
  document.getElementById('whoami').textContent = `${currentUser.username} · ${currentUser.branch}`;
  buildNav();
  loadCurrentShift();
  fillAdminBranchBar();
  const firstSection = getNavItems()[0]?.[0] || 'pos';
  showSection(firstSection);
}

function getNavItems() {
  const p = pt();
  if (p==='إدارة')        return [['dashboard','لوحة الأداء','chart-pie'],['shifts','الورديات','clock'],['reports','التقارير','chart-bar'],['products','المنتجات','tags'],['users','المستخدمون','user-cog'],['expenses','المصروفات','money-bill-wave']];
  if (p==='مشرف')         return [['pos','نقطة البيع','cash-register'],['stock','المخزون','warehouse'],['expenses','المصروفات','money-bill-wave'],['reports','التقارير','chart-bar']];
  if (p==='كاشير')        return [['pos','نقطة البيع','cash-register'],['reports','التقارير','chart-bar']];
  if (p==='مندوب_بيع')    return [['pos','نقطة البيع','cash-register'],['stock','المخزون','warehouse']];
  if (p==='دليفري')       return [['pos','نقطة البيع','cash-register'],['orders','الأوردرات','truck'],['stock','المخزون','warehouse']];
  if (p==='خدمة العملاء') return [['pos','المنتجات','tags'],['shifts','الورديات','clock'],['reports','التقارير','chart-bar'],['stock','المخزون','warehouse']];
  if (p==='فرع')          return [['pos','نقطة البيع','cash-register'],['reports','التقارير','chart-bar']];
  return [['pos','نقطة البيع','cash-register']];
}

function buildNav() {
  const nav = document.getElementById('navMenu');
  nav.innerHTML = getNavItems().map(([id,label,icon])=>
    `<button type="button" class="nav-item" data-sec="${id}" onclick="showSection('${id}')">
      <i class="fas fa-${icon}"></i><span>${label}</span>
    </button>`
  ).join('');
}

function fillAdminBranchBar() {
  const bar = document.getElementById('adminBranchBar');
  const sel = document.getElementById('adminBranchSelect');
  if (!isAdmin() && !isCRM()) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  const branches = [...new Set(db.users.filter(u=>u.active).map(u=>u.branch))].sort();
  sel.innerHTML = '<option value="">-- كل الفروع --</option>' +
    branches.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('');
  sel.value = adminBranch || '';
}

function onAdminBranchChange() {
  adminBranch = document.getElementById('adminBranchSelect').value;
  renderAll();
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const sec = document.getElementById('sec-'+id);
  if (sec) sec.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el=>
    el.classList.toggle('active', el.getAttribute('data-sec')===id)
  );
  const map = {
    dashboard: renderDashboard,
    pos:       renderPOS,
    orders:    renderOrders,
    crm:       renderCRM,
    shifts:    renderShifts,
    stock:     renderStock,
    products:  renderProductsManagement,
    users:     renderUsersManagement,
    reports:   renderReports,
    expenses:  renderExpenses
  };
  if (map[id]) map[id]();
}

function renderAll() {
  const active = document.querySelector('.section.active')?.id?.replace('sec-','') || 'pos';
  showSection(active);
}

// ═══════════════════════════════════════════
// SHIFT
// ═══════════════════════════════════════════
function loadCurrentShift() {
  if (!currentUser) return;
  currentShift = db.shifts.find(s =>
    s.branch===currentUser.branch &&
    (s.cashier===currentUser.username || s.username===currentUser.username) &&
    s.status==='مفتوحة'
  ) || null;
  updateShiftDisplay();
}

function updateShiftDisplay() {
  const el = document.getElementById('shiftStatus');
  if (!el) return;
  if (currentShift) {
    el.innerHTML = `<span style="color:#0f9d58;font-weight:700;">🟢 وردية مفتوحة</span><br>
      <small>${currentShift.openTime||''}</small><br>
      <small>إجمالي: ${money(currentShift.totalSales)} ج | فواتير: ${currentShift.invoiceCount||0}</small>`;
  } else {
    el.innerHTML = `<span style="color:#888;">⚪ لا توجد وردية</span>`;
  }
}

function showShiftModal() {
  const info    = document.getElementById('shiftInfo');
  const actions = document.getElementById('shiftActions');
  if (currentShift) {
    info.innerHTML = `
      <div><strong>رقم الوردية:</strong> ${esc(currentShift.id)}</div>
      <div><strong>فُتحت:</strong> ${esc(currentShift.openTime)}</div>
      <div><strong>إجمالي المبيعات:</strong> ${money(currentShift.totalSales)} ج.م</div>
      <div><strong>عدد الفواتير:</strong> ${currentShift.invoiceCount||0}</div>`;
    actions.innerHTML = `
      <div style="display:flex;gap:10px;">
        <button class="btn btn-danger" style="flex:1" onclick="doCloseShift()"><i class="fas fa-lock"></i> إغلاق الوردية</button>
        <button class="btn btn-outline" style="flex:1" onclick="doCancelShift()"><i class="fas fa-ban"></i> إلغاء</button>
      </div>`;
  } else {
    info.innerHTML = `<p style="color:var(--text-muted);text-align:center;">لا توجد وردية مفتوحة حالياً</p>`;
    actions.innerHTML = `
      <button class="btn btn-accent" style="width:100%" onclick="doOpenShift()">
        <i class="fas fa-play-circle"></i> فتح وردية جديدة
      </button>`;
  }
  document.getElementById('shiftModal').style.display='flex';
}

function closeShiftModal() { document.getElementById('shiftModal').style.display='none'; }

async function doOpenShift() {
  try {
    const res = await postForm('openShift',{branch:currentUser.branch, cashier:currentUser.username});
    await refreshData(true);
    loadCurrentShift();
    closeShiftModal();
    toast('تم فتح الوردية ✓');
    renderAll();
  } catch(e){ toast(e.message,true); }
}

async function doCloseShift() {
  if (!confirm('تأكيد إغلاق الوردية؟')) return;
  try {
    await postForm('closeShift',{shiftId:currentShift.id, branch:currentUser.branch});
    await refreshData(true);
    loadCurrentShift();
    closeShiftModal();
    toast('تم إغلاق الوردية ✓');
    renderAll();
  } catch(e){ toast(e.message,true); }
}

async function doCancelShift() {
  if (!confirm('تأكيد إلغاء الوردية؟')) return;
  try {
    await postForm('cancelShift',{shiftId:currentShift.id, branch:currentUser.branch});
    await refreshData(true);
    loadCurrentShift();
    closeShiftModal();
    toast('تم إلغاء الوردية');
    renderAll();
  } catch(e){ toast(e.message,true); }
}

// ═══════════════════════════════════════════
// POS
// ═══════════════════════════════════════════
function renderPOS() {
  const sec = document.getElementById('sec-pos');
  const showDelivery  = isDelivery() || isAdmin() || isSupervisor();
  const showDiscount  = isAdmin() || isSupervisor() || discountEnabled;
  const showCheckout  = isCashier() || isDelivery() || isSupervisor() || isAdmin();
  const showQRCreate  = isSalesman();
  const showQRScan    = isCashier() || isDelivery() || isSupervisor() || isAdmin();
  const showShiftBtn  = isCashier() || isSupervisor() || isAdmin();
  const isViewOnly    = isSalesman() || pt()==='فرع';

  // خدمة العملاء: واجهة عرض المنتجات بس
  const title = isCRM() ? 'قائمة المنتجات والأسعار' : `نقطة البيع · ${esc(currentUser.branch)}`;
  const titleIcon = isCRM() ? 'tags' : 'cash-register';

  sec.innerHTML = `
    <div class="top-bar">
      <div class="page-title"><i class="fas fa-${titleIcon}" style="color:var(--primary);"></i> ${title}</div>
      <div class="action-buttons">
        ${!isCRM() ? `<button class="btn btn-outline btn-sm" onclick="newSale()"><i class="fas fa-plus-circle"></i> فاتورة جديدة</button>` : ''}
        ${showQRCreate  ? `<button class="btn btn-primary btn-sm" onclick="createQROrder()"><i class="fas fa-qrcode"></i> إنشاء QR</button>` : ''}
        ${showQRScan    ? `<button class="btn btn-accent btn-sm" onclick="openQRScanner()"><i class="fas fa-camera"></i> مسح QR</button>` : ''}
        ${showShiftBtn  ? `<button class="btn btn-outline btn-sm" onclick="showShiftModal()"><i class="fas fa-clock"></i> الوردية</button>` : ''}
        ${isSupervisor()? `<button class="btn btn-orange btn-sm" onclick="showExpenseModal()"><i class="fas fa-money-bill-wave"></i> مصروف</button>` : ''}
        <button class="btn btn-outline btn-sm" onclick="refreshData()"><i class="fas fa-sync"></i></button>
      </div>
    </div>
    <div class="pos-layout">
      ${!isCRM() ? `
      <div class="pos-cart-panel">
        <div class="card">
          <div class="card-header">
            <span><i class="fas fa-shopping-basket"></i> السلة</span>
            <span class="pill ${currentShift?'':'pill-warn'}">${currentShift?'🟢 وردية مفتوحة':'⚪ لا وردية'}</span>
          </div>
          <div id="cartList" class="cart-items"></div>
          <div class="total-section">
            ${showDelivery ? `
            <div class="form-row">
              <label>رسوم التوصيل</label>
              <input id="deliveryFee" type="number" value="0" min="0" step="0.5" oninput="renderCart()">
            </div>` : ''}
            <div class="form-row">
              <label>خصم</label>
              <div style="display:flex;gap:6px;">
                <select id="discountType" style="width:85px;" onchange="renderCart()">
                  <option value="fixed">مبلغ</option>
                  <option value="percent">%</option>
                </select>
                <input id="discountVal" type="number" value="0" min="0" step="0.5"
                  oninput="renderCart()"
                  ${(!showDiscount && (isCashier()||isDelivery())) ? 'readonly onclick="requestDiscountSupervisor()"' : ''}>
              </div>
            </div>
            <hr class="divider">
            <div style="display:flex;justify-content:space-between;margin:8px 0;">
              <span>المجموع الفرعي</span><span id="subTotal">0.00</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:1.3rem;font-weight:800;">
              <span>الإجمالي</span><span id="grandTotal">0.00 ج.م</span>
            </div>
            <div style="display:flex;gap:8px;margin-top:18px;">
              <button class="btn btn-outline" style="flex:1" onclick="clearCart()"><i class="fas fa-trash"></i> مسح</button>
              ${showCheckout ? `
              <button class="btn btn-primary" style="flex:2" onclick="proceedToPayment()"
                ${!currentShift&&!isAdmin()?'disabled title="افتح وردية أولاً"':''}>
                <i class="fas fa-check-circle"></i> متابعة الدفع
              </button>` : ''}
            </div>
          </div>
        </div>
      </div>` : ''}
      <div class="pos-products-panel">
        <div class="card">
          <div class="card-header">
            <span><i class="fas fa-cubes"></i> المنتجات</span>
            <input type="text" id="searchInput" placeholder="🔍 بحث عن صنف..."
              style="width:200px;padding:10px;" oninput="filterProducts()">
          </div>
          <div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;" id="catsList"></div>
          <div id="productsGrid" class="product-grid"></div>
        </div>
      </div>
    </div>`;

  renderCats();
  renderProducts();
  if (!isCRM()) renderCart();
  updateShiftDisplay();
}

function renderCats() {
  const box = document.getElementById('catsList');
  if (!box) return;
  const cats = ['الكل', ...new Set(db.products.map(p=>p.cat).filter(Boolean))];
  const activeCat = pendingContext==='crm' ? crmCurrentCat : currentCat;
  box.innerHTML = cats.map(c=>
    `<span class="badge ${c===activeCat?'badge-success':''}" onclick="setCategory('${jsq(c)}')">${esc(c)}</span>`
  ).join('');
}

function setCategory(cat) {
  if (pendingContext==='crm') crmCurrentCat=cat;
  else currentCat=cat;
  renderCats(); renderProducts();
}

function filterProducts() { renderProducts(); }

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (!grid) return;
  const search = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
  const activeCat = pendingContext==='crm' ? crmCurrentCat : currentCat;
  const branch = getActiveBranch();

  let filtered = db.products.filter(p => activeCat==='الكل' || p.cat===activeCat);
  if (search) filtered = filtered.filter(p =>
    p.name.toLowerCase().includes(search) || p.cat.toLowerCase().includes(search)
  );

  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text-muted);">لا توجد منتجات مطابقة</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const st = stockFor(p.name, branch);
    const stClass = st<=0 ? 'stock-zero' : st<=5 ? 'stock-low' : 'stock-ok';
    const stLabel = st<=0 ? '❌ نفد' : st<=5 ? `⚠ ${st}` : `${st}`;
    const clickable = isCRM() ? '' : `onclick="askQty('${jsq(p.name)}')"`;
    return `<div class="product-card ${st<=0&&!isCRM()?'out-of-stock':''}" ${clickable}>
      <div class="product-name">${esc(p.name)}</div>
      <div class="product-meta">${money(p.price)} ج.م${isWeight(p)?'/كجم':''}</div>
      <div class="product-meta" style="font-size:.8rem;color:var(--text-muted);">${esc(p.cat)}</div>
      <span class="stock-badge ${stClass}">${stLabel}</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// CART
// ═══════════════════════════════════════════
function askQty(name, context='pos') {
  const p = db.products.find(x=>x.name===name);
  if (!p) return;
  pendingProduct  = p;
  pendingEditIndex= -1;
  pendingContext  = context;
  document.getElementById('qtyTitle').textContent = isWeight(p) ? `الوزن (جرام) · ${p.name}` : `الكمية · ${p.name}`;
  document.getElementById('qtyInput').value = isWeight(p) ? 500 : 1;
  document.getElementById('qtyInput').step  = isWeight(p) ? 50  : 1;
  document.getElementById('qtyInput').min   = isWeight(p) ? 50  : 1;
  document.getElementById('qtyHint').textContent = isWeight(p) ?
    `أدخل الوزن بالجرام | سعر الكيلو: ${money(p.price)} ج` :
    `أدخل عدد القطع | سعر القطعة: ${money(p.price)} ج`;
  document.getElementById('qtyModal').style.display='flex';
  setTimeout(()=>document.getElementById('qtyInput').focus(),100);
}

function closeQty() {
  document.getElementById('qtyModal').style.display='none';
  pendingProduct=null; pendingEditIndex=-1;
}

function confirmQty() {
  let qty = parseFloat(document.getElementById('qtyInput').value);
  if (isNaN(qty)||qty<=0) return toast('أدخل كمية صحيحة',true);
  if (!pendingProduct) return;

  const chargeQty = isWeight(pendingProduct) ? qty/1000 : qty;
  const total     = chargeQty * pendingProduct.price;
  const targetCart = pendingContext==='crm' ? crmCart : cart;

  if (pendingEditIndex>=0) {
    const item = targetCart[pendingEditIndex];
    if (item) { item.qty=qty; item.chargeQty=chargeQty; item.total=total; }
  } else {
    const existing = targetCart.find(i=>i.name===pendingProduct.name);
    if (existing) {
      existing.qty      += qty;
      existing.chargeQty+= chargeQty;
      existing.total     = existing.chargeQty * existing.price;
    } else {
      targetCart.push({name:pendingProduct.name, unit:pendingProduct.unit,
        price:pendingProduct.price, qty, chargeQty, total});
    }
  }

  closeQty();
  if (pendingContext==='crm') renderCRMCart();
  else renderCart();
}

function editCartItem(index, context='pos') {
  const targetCart = context==='crm' ? crmCart : cart;
  const item = targetCart[index];
  if (!item) return;
  const p = db.products.find(x=>x.name===item.name);
  if (!p) return;
  pendingProduct   = p;
  pendingEditIndex = index;
  pendingContext   = context;
  document.getElementById('qtyTitle').textContent = `تعديل · ${p.name}`;
  document.getElementById('qtyInput').value = item.qty;
  document.getElementById('qtyInput').step  = isWeight(p)?50:1;
  document.getElementById('qtyInput').min   = isWeight(p)?50:1;
  document.getElementById('qtyHint').textContent = isWeight(p)?'الوزن بالجرام':'الكمية';
  document.getElementById('qtyModal').style.display='flex';
}

function removeFromCart(index, context='pos') {
  if (context==='crm') crmCart.splice(index,1);
  else cart.splice(index,1);
  if (context==='crm') renderCRMCart(); else renderCart();
}

function renderCart() {
  const box = document.getElementById('cartList');
  if (!box) return;

  if (!cart.length) {
    box.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);">السلة فارغة</div>';
  } else {
    box.innerHTML = cart.map((i,idx)=>`
      <div class="cart-row">
        <div style="flex:1;">
          <strong>${esc(i.name)}</strong>
          <div class="product-meta">${isWeight(i)?i.qty+' جم':i.qty} × ${money(i.price)} ج</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <strong>${money(i.total)} ج</strong>
          <i class="fas fa-edit" style="cursor:pointer;color:var(--blue);" onclick="editCartItem(${idx})"></i>
          <i class="fas fa-trash" style="cursor:pointer;color:#d32f2f;" onclick="removeFromCart(${idx})"></i>
        </div>
      </div>`).join('');
  }

  const sub      = cart.reduce((a,b)=>a+b.total,0);
  const fee      = parseFloat(document.getElementById('deliveryFee')?.value)||0;
  const discType = document.getElementById('discountType')?.value||'fixed';
  let   disc     = parseFloat(document.getElementById('discountVal')?.value)||0;
  if (discType==='percent') disc = sub*(disc/100);
  const total = Math.max(0, sub+fee-disc);

  const subEl   = document.getElementById('subTotal');
  const grandEl = document.getElementById('grandTotal');
  if (subEl)   subEl.textContent   = money(sub);
  if (grandEl) grandEl.textContent = money(total)+' ج.م';
}

function clearCart() {
  cart=[]; currentQROrderId=null; discountEnabled=false;
  const d1=document.getElementById('deliveryFee'); if(d1) d1.value=0;
  const d2=document.getElementById('discountVal'); if(d2) d2.value=0;
  renderCart(); toast('تم مسح السلة');
}

function newSale() {
  cart=[]; currentQROrderId=null; discountEnabled=false;
  const d1=document.getElementById('deliveryFee'); if(d1) d1.value=0;
  const d2=document.getElementById('discountVal'); if(d2) d2.value=0;
  renderCart(); toast('فاتورة جديدة ✓');
}

function requestDiscountSupervisor() {
  document.getElementById('superPassInput').value='';
  document.getElementById('supervisorModal').style.display='flex';
}
function closeSupervisorModal() { document.getElementById('supervisorModal').style.display='none'; }

function verifySupervisorForDiscount() {
  const pass = document.getElementById('superPassInput').value.trim();
  const supervisor = db.users.find(u=>
    (u.pointType==='مشرف'||u.pointType==='إدارة') &&
    u.branch===currentUser.branch &&
    (u.pass===pass||u.superPass===pass)
  );
  if (!supervisor) return toast('كلمة المرور غير صحيحة',true);
  discountEnabled=true;
  closeSupervisorModal();
  renderPOS();
  toast('تم تفعيل الخصم ✓');
}

// QR
// ═══════════════════════════════════════════
async function createQROrder() {
  if (!cart.length) return toast('السلة فارغة',true);
  const sub      = cart.reduce((a,b)=>a+b.total,0);
  const fee      = parseFloat(document.getElementById('deliveryFee')?.value)||0;
  const discType = document.getElementById('discountType')?.value||'fixed';
  let   disc     = parseFloat(document.getElementById('discountVal')?.value)||0;
  if (discType==='percent') disc=sub*(disc/100);
  const total = Math.max(0,sub+fee-disc);

  const order = {
    branch:      currentUser.branch,
    creator:     currentUser.username,
    salesmanName:currentUser.username,
    items:       cart.map(i=>({name:i.name,qty:i.qty,price:i.price,total:i.total})),
    subtotal:sub, delivery:fee, discount:disc, total
  };

  try {
    const res = await postForm('createQROrder',{order});
    const orderId = res?.orderId||res?.id||null;
    if (!orderId) return toast('فشل إنشاء QR',true);
    showQRModal(orderId, order);
    toast('تم إنشاء QR ✓');
  } catch(e){ toast(e.message||'فشل إنشاء QR',true); }
}

function showQRModal(orderId, orderData=null) {
  document.getElementById('qrOrderId').textContent = orderId;
  const container = document.getElementById('qrCodeContainer');
  container.innerHTML='';

  // تفاصيل البون
  const details = document.getElementById('qrBonDetails');
  if (orderData) {
    details.innerHTML = `
      <div style="margin-bottom:6px;"><strong>🧑 المندوب:</strong> ${esc(currentUser?.username||'')}</div>
      <div style="margin-bottom:6px;"><strong>📦 الأصناف:</strong></div>
      ${(orderData.items||[]).map(i=>`<div style="padding:2px 0;">• ${esc(i.name)} × ${i.qty} = ${money(i.total)} ج</div>`).join('')}
      <hr style="margin:8px 0;">
      <div><strong>الإجمالي:</strong> ${money(orderData.total)} ج.م</div>`;
  } else { details.innerHTML=''; }

  QRCode.toCanvas(document.createElement('canvas'), orderId, {width:240}, (err,canvas)=>{
    if (err) { container.innerHTML='<p style="color:red;">فشل إنشاء QR</p>'; return; }
    container.appendChild(canvas);
    document.getElementById('qrModal').style.display='flex';
  });
}

function closeQrModal() { document.getElementById('qrModal').style.display='none'; }

function printQR() {
  const canvas = document.querySelector('#qrCodeContainer canvas');
  const details = document.getElementById('qrBonDetails').innerHTML;
  const orderId = document.getElementById('qrOrderId').textContent;
  if (!canvas) return;
  const win = window.open('');
  win.document.write(`
    <html dir="rtl"><head><title>بون QR - ${orderId}</title>
    <style>body{font-family:Tahoma;padding:20px;max-width:400px;margin:auto;direction:rtl;}
    h3{color:#b81b5c;} .details{font-size:14px;line-height:1.8;}</style></head>
    <body>
      <h3>🍬 سكّر 33</h3>
      <div class="details">${details}</div>
      <div style="text-align:center;margin:16px 0;">
        <img src="${canvas.toDataURL()}">
        <p style="font-weight:bold;font-size:16px;">${orderId}</p>
      </div>
      <p style="font-size:11px;color:#888;text-align:center;">⚠ كل مندوب مسؤول عن بوناته الشخصية</p>
    </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),300);
}

function openQRScanner() {
  document.getElementById('qrScannerModal').style.display='flex';
  document.getElementById('manualQrInput').value='';
  if (!html5QrScanner) html5QrScanner = new Html5Qrcode('qrReader');
  html5QrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},
    decodedText=>{ loadQROrder(decodedText); }, ()=>{}
  ).catch(()=>toast('فشل تشغيل الكاميرا',true));
}

function closeQrScanner() {
  if (html5QrScanner) html5QrScanner.stop().catch(()=>{});
  document.getElementById('qrScannerModal').style.display='none';
}

function loadManualQR() {
  const code = document.getElementById('manualQrInput').value.trim();
  if (!code) return toast('أدخل كود الطلب',true);
  loadQROrder(code);
}

async function loadQROrder(orderId) {
  try {
    const res = await jsonp('getQROrder',{orderId});
    if (!res.order) return toast('الطلب غير موجود',true);
    const order = res.order;
    if (order.status==='مكتمل') return toast('هذا الطلب مكتمل بالفعل',true);
    cart = order.items.map(i=>{
      const p = db.products.find(pp=>pp.name===i.name)||{unit:'قطعة'};
      return {name:i.name, unit:p.unit, price:i.price, qty:i.qty,
        chargeQty:isWeight(p)?(i.qty/1000):i.qty, total:i.total};
    });
    currentQROrderId=orderId;
    closeQrScanner();
    renderPOS();
    const d1=document.getElementById('deliveryFee'); if(d1) d1.value=order.delivery||0;
    const d2=document.getElementById('discountVal'); if(d2) d2.value=order.discount||0;
    renderCart();
    toast(`✓ تم تحميل الطلب ${orderId} | المندوب: ${order.salesmanName||''}`);
  } catch(e){ toast(e.message,true); }
}

// PAYMENT
// ═══════════════════════════════════════════
function proceedToPayment() {
  if (!cart.length) return toast('السلة فارغة',true);
  if (!currentShift && !isAdmin()) return toast('الرجاء فتح وردية أولاً',true);

  // الدليفري بس يحتاج بيانات عميل
  if (isDelivery()) {
    openCustomerModal(true);
  } else {
    openPaymentModal();
  }
}

function openCustomerModal(required=false) {
  document.getElementById('customerName').value    = customerData.name||'';
  document.getElementById('customerPhone').value   = customerData.phone||'';
  document.getElementById('customerAddress').value = customerData.address||'';
  document.getElementById('customerModal').style.display='flex';
}

function closeCustomerModal() { document.getElementById('customerModal').style.display='none'; }

function confirmCustomerInfo() {
  customerData.name    = document.getElementById('customerName').value.trim();
  customerData.phone   = document.getElementById('customerPhone').value.trim();
  customerData.address = document.getElementById('customerAddress').value.trim();
  closeCustomerModal();
  openPaymentModal();
}

function openPaymentModal() {
  const sub      = cart.reduce((a,b)=>a+b.total,0);
  const fee      = parseFloat(document.getElementById('deliveryFee')?.value)||0;
  const discType = document.getElementById('discountType')?.value||'fixed';
  let   disc     = parseFloat(document.getElementById('discountVal')?.value)||0;
  if (discType==='percent') disc=sub*(disc/100);
  const total = Math.max(0,sub+fee-disc);

  document.getElementById('paidAmount').value = money(total);
  document.getElementById('paymentNotes').value='';
  document.getElementById('paymentSummary').innerHTML=`
    <div style="display:flex;justify-content:space-between;"><span>المجموع:</span><span>${money(sub)} ج</span></div>
    ${fee>0?`<div style="display:flex;justify-content:space-between;"><span>توصيل:</span><span>${money(fee)} ج</span></div>`:''}
    ${disc>0?`<div style="display:flex;justify-content:space-between;color:#0f9d58;"><span>خصم:</span><span>-${money(disc)} ج</span></div>`:''}
    <div style="display:flex;justify-content:space-between;font-size:1.2rem;font-weight:800;border-top:2px solid var(--border);margin-top:8px;padding-top:8px;">
      <span>الإجمالي:</span><span style="color:var(--primary);">${money(total)} ج.م</span>
    </div>`;
  document.getElementById('paymentModal').style.display='flex';
}

function closePaymentModal() { document.getElementById('paymentModal').style.display='none'; }

async function confirmPayment() {
  const payMethod  = document.getElementById('paymentMethod').value;
  const paidAmount = parseFloat(document.getElementById('paidAmount').value)||0;
  const notes      = document.getElementById('paymentNotes').value.trim();

  const sub      = cart.reduce((a,b)=>a+b.total,0);
  const fee      = parseFloat(document.getElementById('deliveryFee')?.value)||0;
  const discType = document.getElementById('discountType')?.value||'fixed';
  let   disc     = parseFloat(document.getElementById('discountVal')?.value)||0;
  if (discType==='percent') disc=sub*(disc/100);
  const total = Math.max(0,sub+fee-disc);

  const saleId = 'SALE-'+Date.now();
  const order = {
    saleId,
    date:     todayDate(),
    branch:   currentUser.branch,
    customer: customerData.name||'',
    phone:    customerData.phone||'',
    address:  customerData.address||'',
    channel:  currentQROrderId ? 'QR' : 'مباشر',
    status:   'مكتمل',
    subtotal: sub, discount:disc, delivery:fee, total,
    cashier:  currentUser.branch,
    username: currentUser.username,
    notes,
    shiftId:  currentShift?.id||'',
    paymentMethod: payMethod,
    paidAmount,
    qrOrderId: currentQROrderId||''
  };

  try {
    await postForm('saveOrder',{order});
    closePaymentModal();
    toast(`✓ تم حفظ الفاتورة ${saleId} | ${money(total)} ج.م`);
    newSale();
    customerData={name:'',phone:'',address:''};
    await refreshData(true);
    loadCurrentShift();
    updateShiftDisplay();
  } catch(e){ toast(e.message,true); }
}

// DASHBOARD (إدارة)
// ═══════════════════════════════════════════
function renderDashboard() {
  const sec = document.getElementById('sec-dashboard');
  const branch = adminBranch || '';
  const today  = todayDate();

  // فلترة بيانات اليوم
  const todaySales = db.sales.filter(s =>
    String(s.date||'').startsWith(today) && (!branch || s.branch===branch)
  );
  const openShifts = db.shifts.filter(s =>
    s.status==='مفتوحة' && (!branch || s.branch===branch)
  );
  const todayReturns = db.returns.filter(r =>
    String(r.date||'').startsWith(today) && (!branch || r.branch===branch)
  );

  const totalSales    = todaySales.reduce((a,b)=>a+b.total,0);
  const invoiceCount  = todaySales.length;
  const returnCount   = todayReturns.length;
  const returnAmount  = todayReturns.reduce((a,b)=>a+b.amount,0);

  // مبيعات الوردية المفتوحة
  const openShiftSales = openShifts.reduce((a,b)=>a+(b.totalSales||0),0);

function filterShifts() {
  const statusFilter = document.getElementById('shiftStatusFilter')?.value||'';
  const dateFilter   = document.getElementById('shiftDateFilter')?.value||'';
  const branch = isAdmin()||isCRM() ? (adminBranch||'') : currentUser.branch;

  let shifts = [...db.shifts].reverse();
  if (branch)       shifts = shifts.filter(s=>s.branch===branch);
  if (statusFilter) shifts = shifts.filter(s=>s.status===statusFilter);
  if (dateFilter)   shifts = shifts.filter(s=>String(s.openTime||'').startsWith(dateFilter));

  document.getElementById('shiftsTableContainer').innerHTML = renderShiftsTable(shifts);
}

function showShiftDetails(shiftId) {
  const shift  = db.shifts.find(s=>s.id===shiftId);
  if (!shift) return;
  const invoices = db.sales.filter(s=>s.shiftId===shiftId);
  const expenses = db.expenses.filter(e=>e.shiftId===shiftId);

  const totalSales    = invoices.reduce((a,b)=>a+b.total,0);
  const totalExpenses = expenses.reduce((a,b)=>a+b.amount,0);
  const netSales      = totalSales - totalExpenses;

  // تجميع حسب طريقة الدفع
  const byMethod = {};
  invoices.forEach(i=>{
    const m = i.paymentMethod||'نقدي';
    byMethod[m] = (byMethod[m]||0) + i.total;
  });

  const win = window.open('','_blank','width=700,height=800');
  win.document.write(`
    <html dir="rtl"><head><title>تفاصيل الوردية ${shiftId}</title>
    <style>
      body{font-family:Tahoma;padding:20px;direction:rtl;color:#1e1e2a;}

      .section-title{font-size:1.1rem;font-weight:700;color:#b81b5c;margin:16px 0 8px;}
    </style></head>
    <body>
      <h2>🕐 تفاصيل الوردية</h2>
      <div><strong>معرف:</strong> ${esc(shiftId)}</div>
      <div><strong>الفرع:</strong> ${esc(shift.branch)}</div>
      <div><strong>الكاشير:</strong> ${esc(shift.username||shift.cashier)}</div>
      <div><strong>فُتحت:</strong> ${esc(shift.openTime||'')} | <strong>أُغلقت:</strong> ${esc(shift.closeTime||'-')}</div>
      <div><strong>الحالة:</strong> ${esc(shift.status)}</div>
      <hr>
      <div>
        <span class="kpi">💰 إجمالي المبيعات: ${money(totalSales)} ج</span>
        <span class="kpi">🧾 عدد الفواتير: ${invoices.length}</span>
        <span class="kpi">💸 المصروفات: ${money(totalExpenses)} ج</span>
        <span class="kpi">✅ الصافي: ${money(netSales)} ج</span>

      <div class="section-title">💳 المبيعات حسب طريقة الدفع</div>
      <table><thead><tr><th>الطريقة</th><th>الإجمالي</th></tr></thead><tbody>
        ${Object.entries(byMethod).map(([m,v])=>`<tr><td>${esc(m)}</td><td><strong>${money(v)} ج</strong></td></tr>`).join('')}
      </tbody></table>

      <div class="section-title">🧾 الفواتير (${invoices.length})</div>
      <table><thead><tr><th>كود</th><th>الوقت</th><th>طريقة الدفع</th><th>الإجمالي</th></tr></thead><tbody>
        ${invoices.map(i=>`<tr>
          <td>${esc(i.saleId)}</td>
          <td>${esc(i.date)}</td>
          <td>${esc(i.paymentMethod)}</td>
          <td><strong>${money(i.total)} ج</strong></td>
        </tr>`).join('')||'<tr><td colspan="4" style="text-align:center;">لا فواتير</td></tr>'}
      </tbody></table>

      ${expenses.length ? `

      <table><thead><tr><th>النوع</th><th>المبلغ</th><th>رقم الشكوى</th><th>ملاحظات</th></tr></thead><tbody>
        ${expenses.map(e=>`<tr>
          <td>${esc(e.type)}</td>

  win.document.close();

function switchReportTab(tab, el) {
  document.querySelectorAll('#reportTabs .tab').forEach(t=>t.classList.remove('active'));
  if (el) el.classList.add('active');
  const container = document.getElementById('reportContent');
  const branch = isAdmin()||isCRM() ? (adminBranch||'') : currentUser.branch;

  if (tab==='general')  renderGeneralReport(container, branch);
  if (tab==='byItem')   renderItemReport(container, branch);
  if (tab==='byShift')  renderShiftReport(container, branch);
  if (tab==='byBranch') renderBranchReport(container);
}

function getFilteredSales(branch, period) {
  const now  = new Date();
  const today = now.toISOString().slice(0,10);
  let filtered = branch ? db.sales.filter(s=>s.branch===branch) : [...db.sales];
  if (period==='يومي')    filtered = filtered.filter(s=>String(s.date||'').startsWith(today));
  if (period==='أسبوعي') {
    const weekAgo = new Date(now - 7*24*3600*1000).toISOString().slice(0,10);
    filtered = filtered.filter(s=>String(s.date||'')>=weekAgo);
  }
  if (period==='شهري') {
    const monthStart = today.slice(0,7);
    filtered = filtered.filter(s=>String(s.date||'').startsWith(monthStart));
  }
  return filtered;
}

function renderGeneralReport(container, branch) {
  const periods = ['يومي','أسبوعي','شهري'];
  const rows = periods.map(p=>{
    const sales = getFilteredSales(branch, p);
    const total   = sales.reduce((a,b)=>a+b.total,0);
    const returns = db.returns.filter(r=>(!branch||r.branch===branch));
    const retAmt  = returns.reduce((a,b)=>a+b.amount,0);
    return `<tr>
      <td><strong>${p}</strong></td>
      <td>${sales.length}</td>
      <td><strong>${money(total)} ج</strong></td>
      <td>${money(total/Math.max(sales.length,1))} ج</td>
    </tr>`;
  });

  container.innerHTML = `
    <div class="card">
      <div class="card-header"><span>📊 التقرير العام ${branch?'· '+esc(branch):''}</span></div>
      <div class="table-wrapper"><table>
        <thead><tr><th>الفترة</th><th>عدد الفواتير</th><th>إجمالي المبيعات</th><th>متوسط الفاتورة</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table></div>
    </div>

    <div class="card" style="margin-top:20px;">
      <div class="card-header"><span>💳 مبيعات حسب طريقة الدفع (اليوم)</span></div>
      ${renderPaymentMethodTable(branch)}
    </div>`;
}

function renderPaymentMethodTable(branch) {
  const today = new Date().toISOString().slice(0,10);
  let sales = db.sales.filter(s=>String(s.date||'').startsWith(today));
  if (branch) sales = sales.filter(s=>s.branch===branch);
  const byMethod = {};
  sales.forEach(s=>{ const m=s.paymentMethod||'نقدي'; byMethod[m]=(byMethod[m]||0)+s.total; });
  if (!Object.keys(byMethod).length) return '<p style="text-align:center;padding:16px;color:var(--text-muted);">لا بيانات اليوم</p>';
  return `<div class="table-wrapper"><table>
    <thead><tr><th>طريقة الدفع</th><th>الإجمالي</th></tr></thead>
    <tbody>${Object.entries(byMethod).map(([m,v])=>`<tr><td>${esc(m)}</td><td><strong>${money(v)} ج</strong></td></tr>`).join('')}</tbody>
  </table></div>`;
}

function renderItemReport(container, branch) {
  container.innerHTML = `
    <div class="card">
      <div class="card-header">
        <span>🏷 مبيعات حسب الصنف</span>
        <div style="display:flex;gap:10px;">
          <select id="itemReportPeriod" onchange="updateItemReport()" style="width:auto;">
            <option value="يومي">يومي</option>
            <option value="أسبوعي">أسبوعي</option>
            <option value="شهري">شهري</option>
          </select>
        </div>
      </div>
      <div id="itemReportTable"></div>
    </div>`;
  updateItemReport();
}

function updateItemReport() {
  const period = document.getElementById('itemReportPeriod')?.value||'يومي';
  const branch = isAdmin()||isCRM() ? (adminBranch||'') : currentUser.branch;
  const sales  = getFilteredSales(branch, period);

  // استخراج الأصناف من الملاحظات أو QR
  const itemStats = {};
  sales.forEach(s=>{
    const qr = db.qrOrders.find(q=>q.id===s.qrOrderId);
    const items = qr ? qr.items : parseNotesItems(s.notes||'');
    items.forEach(i=>{
      if (!i.name) return;
      if (!itemStats[i.name]) itemStats[i.name]={count:0,qty:0,total:0};
      itemStats[i.name].count++;
      itemStats[i.name].qty  += Number(i.qty||0);
      itemStats[i.name].total+= Number(i.total||0);
    });
  });

  const sorted = Object.entries(itemStats).sort((a,b)=>b[1].total-a[1].total);
  const html = sorted.length ? `
    <div class="table-wrapper"><table>
      <thead><tr><th>الصنف</th><th>عدد الطلبات</th><th>الكمية</th><th>الإجمالي</th></tr></thead>
      <tbody>${sorted.map(([name,s])=>`<tr>
        <td><strong>${esc(name)}</strong></td>
        <td>${s.count}</td>
        <td>${s.qty.toFixed(2)}</td>
        <td><strong>${money(s.total)} ج</strong></td>
      </tr>`).join('')}</tbody>
    </table></div>` :
    '<p style="text-align:center;padding:20px;color:var(--text-muted);">لا بيانات متاحة</p>';

  const el = document.getElementById('itemReportTable');
  if (el) el.innerHTML = html;
}

function parseNotesItems(notes) {
  const out = [];
  String(notes||'').split('+').forEach(seg=>{
    const m = seg.trim().match(/^(.+?)\(([\d.]+)\)$/);
    if (m) out.push({name:m[1].trim(), qty:Number(m[2]||0)});
  });
  return out;
}

function updateShiftReport() {
  const date   = document.getElementById('shiftReportDate')?.value||'';
  const type   = document.getElementById('shiftReportType')?.value||'';
  const branch = isAdmin()||isCRM() ? (adminBranch||'') : currentUser.branch;

  let shifts = [...db.shifts];
  if (branch) shifts = shifts.filter(s=>s.branch===branch);
  if (date)   shifts = shifts.filter(s=>String(s.openTime||'').startsWith(date));

  // تحديد الوردية (صباحي/مسائي بناءً على وقت الفتح)
  if (type==='صباحي') shifts = shifts.filter(s=>{
    const h = parseInt((s.openTime||'00:00').split(' ')[1]?.split(':')[0]||'0');
    return h>=6 && h<14;
  });
  if (type==='مسائي') shifts = shifts.filter(s=>{
    const h = parseInt((s.openTime||'00:00').split(' ')[1]?.split(':')[0]||'0');
    return h>=14;
  });

  const html = shifts.length ? `
    <div class="table-wrapper"><table>
      <thead><tr>
        <th>الفرع</th><th>الكاشير</th><th>فُتحت</th>
        <th>أُغلقت</th><th>المبيعات</th><th>الفواتير</th><th>الحالة</th><th></th>
      </tr></thead>
      <tbody>${shifts.map(s=>`<tr>
        <td>${esc(s.branch)}</td>
        <td>${esc(s.username||s.cashier)}</td>
        <td style="font-size:.85rem;">${esc(s.openTime||'')}</td>
        <td style="font-size:.85rem;">${esc(s.closeTime||'-')}</td>

}

function renderBranchReport(container) {
  const today  = new Date().toISOString().slice(0,10);
  const branches = [...new Set(db.users.filter(u=>u.active).map(u=>u.branch))].sort();

  const rows = branches.map(b=>{
    const sales = db.sales.filter(s=>s.branch===b && String(s.date||'').startsWith(today));
    const total = sales.reduce((a,s)=>a+s.total,0);
    const openSh = db.shifts.find(s=>s.branch===b && s.status==='مفتوحة');
    return `<tr>
      <td><strong>${esc(b)}</strong></td>
      <td>${sales.length}</td>
      <td><strong>${money(total)} ج</strong></td>
      <td>${money(total/Math.max(sales.length,1))} ج</td>
      <td><span class="badge ${openSh?'badge-success':'badge-danger'}">${openSh?'مفتوحة':'مغلقة'}</span></td>
    </tr>`;
  });

  container.innerHTML = `
    <div class="card">
      <div class="card-header"><span>🏪 مقارنة الفروع (اليوم)</span></div>
      <div class="table-wrapper"><table>
        <thead><tr>
          <th>الفرع</th><th>عدد الفواتير</th><th>إجمالي المبيعات</th>
          <th>متوسط الفاتورة</th><th>حالة الوردية</th>
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table></div>
    </div>`;
}
