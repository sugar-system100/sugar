<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سكر V16 | م/ محمود سلامه</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root { --primary: #c2185b; --hover: #ffeb3b; --success: #2e7d32; --bg: #f5f5f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--hover); color: #333; }
        .btn-save { background: var(--success) !important; color: white !important; box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 14px; border: none; border-radius: 10px; background: #eee; font-weight: bold; cursor: pointer; }
        .tabs button.active { background: var(--primary); color: white; }
        .card { padding: 25px 15px; border-radius: 15px; background: var(--primary); color: white; text-align: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .card:hover { background: var(--hover); color: #333; }
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff; border-bottom: 1px solid #eee; border-radius: 10px; margin-bottom: 5px; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input, select { padding: 15px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 16px; margin: 5px 0; }
        @media print { .no-print { display: none !important; } #printZone { display: block !important; } }
    </style>
</head>
<body>

<div id="loader"><h2>جاري تجهيز سكر V16...</h2><p>تطوير م/ محمود سلامه</p></div>

<div id="loginPage" class="container" style="margin-top: 50px; text-align: center;">
    <h1 style="color:var(--primary)">نظام سكر 🍬</h1>
    <p>تطوير مهندس محمود سلامه</p>
    <select id="userSelect"><option value="">--- جاري تحميل الفروع ---</option></select>
    <input type="password" id="userPass" placeholder="كلمة المرور">
    <button class="btn btn-primary" onclick="handleLogin()">دخول النظام</button>
</div>

<div id="mainApp" style="display: none;">
    <div class="container no-print">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="syncData()" style="padding:8px 15px; border-radius:8px; border:none; background:#0288d1; color:white;">🔄 مزامنة</button>
            <h3 id="branchInfo" style="color:var(--primary); margin:0;"></h3>
            <button onclick="logout()" style="padding:8px 15px; border-radius:8px; border:none;">خروج</button>
        </div>

        <div class="tabs">
            <button id="t-pos" class="active" onclick="switchTab('pos')">🛒 كاشير</button>
            <button id="t-stock" onclick="switchTab('stock')">📦 المخزون</button>
            <button id="t-admin" style="display:none" onclick="switchTab('admin')">📊 الإدارة</button>
        </div>

        <div id="s-pos">
            <input type="text" id="pSearch" placeholder="🔍 ابحث عن صنف..." oninput="filterProducts(this.value)">
            <div id="catGrid" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-top:10px;"></div>
            <div id="prodGrid" style="display:none; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-top:10px;"></div>
            <button id="btnBack" class="btn" onclick="showCats()" style="display:none; background:#999; color:white;">🔙 عودة للأقسام</button>
            <div id="cartArea" style="display:none; margin-top:20px;">
                <div id="cartItems"></div>
                <h2 style="text-align:left;">الإجمالي: <span id="finalTotal">0</span> ج.م</h2>
                <button class="btn btn-save" onclick="submitOrder()">تأكيد وطباعة ✅</button>
            </div>
        </div>

        <div id="s-stock" style="display:none">
            <div id="stockList"></div>
            <button class="btn btn-save" style="margin-top:20px;" onclick="saveBulkStock()">💾 حفظ التعديلات والمزامنة</button>
        </div>

        <div id="s-admin" style="display:none">
            <div style="background:#e3f2fd; padding:15px; border-radius:15px;">
                <h3>⚙️ لوحة الإدارة العامة</h3>
                <p>مرحباً يا هندسة، هنا تظهر تقارير مبيعات كل الفروع.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const API ="https://script.google.com/macros/s/AKfycbxoKbz5zzO4MP452ZbtnULk9z0b4PwuYQMaAu0ZqFhYf9qPglRficwjZsgonFXdf2ZSQQ/exec"; 
    let db = { products: [], users: [], stock: [] };
    let cart = []; let userObj = null;

    async function syncData() {
        document.getElementById("loader").style.display = "flex";
        try {
            const r = await fetch(API + "?action=getInitialData");
            const res = await r.json();
            db.products = res.products.map(r => ({ name: r[0], cat: r[1], price: r[2], type: r[3] }));
            db.users = res.users; // تم جلبها منظمة من السكريبت
            db.stock = res.stock.map(r => ({ branch: r[0], item: r[1], qty: r[2] }));

            const sel = document.getElementById("userSelect");
            sel.innerHTML = '<option value="">--- اختر المستخدم ---</option><option value="الإدارة">👑 الإدارة العامة</option>';
            db.users.forEach(u => sel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`);
            
            if(userObj) { showCats(); renderStock(); }
            document.getElementById("loader").style.display = "none";
        } catch(e) { alert("خطأ في الاتصال!"); }
    }

    function handleLogin() {
        const u = document.getElementById("userSelect").value;
        const p = document.getElementById("userPass").value.trim();
        
        if(u === "الإدارة" && p === "0000") {
            userObj = { branch: "الإدارة", role: "مشرف", superPass: "0000" };
            loginOK(); return;
        }

        // البحث بذكاء: يقبل الباسورد سواء كان بائع أو مشرف
        const user = db.users.find(x => x.branch === u && (x.pass === p || x.superPass === p));
        
        if(user) { 
            userObj = user; 
            // تحديد الدور بناءً على الباسورد المستخدم
            if (user.superPass === p) userObj.role = "مشرف";
            loginOK(); 
        } 
        else alert("خطأ: كلمة المرور غير مطابقة للسجلات!");
    }

    function loginOK() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("branchInfo").innerText = "فرع: " + userObj.branch + " (" + userObj.role + ")";
        if(userObj.role === "مشرف" || userObj.branch === "الإدارة") document.getElementById("t-admin").style.display = "block";
        showCats(); renderStock();
    }

    // (بقية الدوال: المخزون، الكاشير، الطباعة - نسخة مستقرة V16)
    function renderStock() {
        const box = document.getElementById("stockList"); box.innerHTML = "<h3>أرصدة فرع: " + userObj.branch + "</h3>";
        db.products.forEach(p => {
            const currentQty = db.stock.filter(s => s.item === p.name && s.branch === userObj.branch).reduce((acc, curr) => acc + parseFloat(curr.qty || 0), 0);
            box.innerHTML += `<div class="stock-item"><div><strong>${p.name}</strong><br><small>الرصيد: ${currentQty}</small></div><input type="number" class="qty-input" data-item="${p.name}" placeholder="0"></div>`;
        });
    }

    async function saveBulkStock() {
        const updates = Array.from(document.querySelectorAll('.qty-input')).filter(i => i.value != "").map(i => ({ item: i.dataset.item, qty: i.value }));
        if(!updates.length) return alert("ادخل كميات");
        document.getElementById("loader").style.display = "flex";
        await fetch(API, {method: "POST", body: JSON.stringify({action: "bulkStockUpdate", branch: userObj.branch, updates: updates})});
        alert("تم الحفظ ✅"); syncData();
    }

    function filterProducts(q) {
        if(!q) { showCats(); return; }
        document.getElementById("catGrid").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        const grid = document.getElementById("prodGrid"); grid.style.display = "grid"; grid.innerHTML = "";
        db.products.filter(p => p.name.includes(q)).forEach(p => {
            const d = document.createElement("div"); d.className = "card"; d.innerHTML = `${p.name}<br>${p.price}ج`; d.onclick = () => addToCart(p); grid.appendChild(d);
        });
    }

    function showCats() {
        document.getElementById("prodGrid").style.display = "none";
        document.getElementById("btnBack").style.display = "none";
        const grid = document.getElementById("catGrid"); grid.style.display = "grid"; grid.innerHTML = "";
        const cats = [...new Set(db.products.map(p => p.cat))];
        cats.forEach(c => {
            const d = document.createElement("div"); d.className = "card"; d.innerText = c; d.onclick = () => showProds(c); grid.appendChild(d);
        });
    }

    function showProds(cat) {
        document.getElementById("catGrid").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        const grid = document.getElementById("prodGrid"); grid.style.display = "grid"; grid.innerHTML = "";
        db.products.filter(p => p.cat === cat).forEach(p => {
            const d = document.createElement("div"); d.className = "card"; d.innerHTML = `${p.name}<br>${p.price}ج`; d.onclick = () => addToCart(p); grid.appendChild(d);
        });
    }

    function addToCart(p) {
        let q = prompt(`كمية ${p.name}:`, "1"); if(!q) return;
        cart.push({name: p.name, qty: q, total: (p.price * q)}); renderCart();
    }

    function renderCart() {
        document.getElementById("cartArea").style.display = cart.length ? "block" : "none";
        const items = document.getElementById("cartItems"); items.innerHTML = "";
        let t = 0; cart.forEach(i => { t += i.total; items.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;"><span>${i.name} (${i.qty})</span><span>${i.total} ج.م</span></div>`; });
        document.getElementById("finalTotal").innerText = t.toFixed(2);
    }

    async function submitOrder() {
        document.getElementById("loader").style.display = "flex";
        const inv = "INV-" + Date.now().toString().slice(-6);
        await fetch(API, {method: "POST", body: JSON.stringify({action: "saveOrder", order: { date: new Date().toLocaleDateString('ar-EG'), branch: userObj.branch, details: cart.map(i=>`${i.name}(${i.qty})`).join("+"), total: document.getElementById("finalTotal").innerText, invoice: inv, isoDate: new Date().toISOString() }})});
        location.reload();
    }

    function switchTab(t) {
        ["pos", "stock", "admin"].forEach(s => document.getElementById("s-"+s).style.display = "none");
        ["t-pos", "t-stock", "t-admin"].forEach(s => document.getElementById(s).classList.remove("active"));
        document.getElementById("s-"+t).style.display = "block";
        document.getElementById("t-"+t).classList.add("active");
    }

    function logout() { localStorage.clear(); location.reload(); }
    window.onload = syncData;
</script>
</body>
</html>
