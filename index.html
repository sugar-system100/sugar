<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام سكر الإداري V14 | م/ محمود سلامه</title>
    <style>
        :root { --primary: #c2185b; --hover: #ffeb3b; --admin: #0288d1; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--primary); }
        
        /* أزرار التاتش */
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--hover); color: #333; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; border: none; border-radius: 12px; background: #eee; font-weight: bold; cursor: pointer; }
        .tabs button.active { background: var(--primary); color: white; }

        /* البطاقات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .card { padding: 25px 15px; border-radius: 15px; background: var(--primary); color: white; text-align: center; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .card:hover { background: var(--hover); color: #333; }

        /* الجداول والتقارير */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: var(--primary); }
        .report-card { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input, select { padding: 15px; border-radius: 12px; border: 2px solid #eee; width: 100%; box-sizing: border-box; font-size: 16px; margin: 5px 0; }
    </style>
</head>
<body>

<div id="loader"><h2>جاري تحميل مركز البيانات...</h2><p>تطوير م/ محمود سلامه</p></div>

<div id="loginPage" class="container" style="margin-top: 50px; text-align: center;">
    <h1 style="color:var(--primary)">نظام سكر 🍬</h1>
    <select id="userSelect"><option value="">--- جاري تحميل الفروع ---</option></select>
    <input type="password" id="userPass" placeholder="كلمة المرور">
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">دخول النظام</button>
</div>

<div id="mainApp" style="display: none;">
    <div class="container no-print">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button class="btn" style="background:#0288d1; color:white;" onclick="syncData()">🔄 تحديث البيانات</button>
            <h3 id="branchInfo" style="color:var(--primary); margin:0;"></h3>
            <button class="btn" style="background:#eee" onclick="logout()">خروج</button>
        </div>

        <div class="tabs">
            <button id="t-pos" class="active" onclick="switchTab('pos')">🛒 الكاشير</button>
            <button id="t-stock" onclick="switchTab('stock')">📦 المخزون</button>
            <button id="t-admin" style="display:none" onclick="switchTab('admin')">📊 الإدارة والتقارير</button>
        </div>

        <div id="s-pos">
            <input type="text" id="pSearch" placeholder="🔍 ابحث عن صنف..." oninput="filterProducts(this.value)">
            <div id="catGrid" class="grid" style="margin-top:10px;"></div>
            <div id="prodGrid" class="grid" style="display:none; margin-top:10px;"></div>
            <button id="btnBack" class="btn" onclick="showCats()" style="display:none; width:100%; margin:10px 0; background:#999; color:white;">🔙 عودة</button>
            <div id="cartArea" style="display:none; margin-top:20px; border-top:2px solid #eee; padding-top:20px;">
                <div id="cartItems"></div>
                <h2 style="text-align:left; color:var(--primary)">الإجمالي: <span id="finalTotal">0</span> ج.م</h2>
                <button class="btn btn-primary" style="background:var(--success); width:100%;" onclick="submitOrder()">تأكيد وطباعة ✅</button>
            </div>
        </div>

        <div id="s-stock" style="display:none">
            <div class="report-card">
                <label>📍 عرض مخزون فرع:</label>
                <select id="stockBranchSelect" onchange="renderStock(this.value)"></select>
            </div>
            <div id="stockList"></div>
            <button id="saveStockBtn" class="btn btn-primary" style="width:100%; margin-top:20px; background:var(--success);" onclick="saveBulkStock()">💾 حفظ التعديلات للمخزون</button>
        </div>

        <div id="s-admin" style="display:none">
            <div class="report-card">
                <h3>🔍 فلتر التقارير التفصيلية</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="date" id="reportDate" onchange="generateReport()">
                    <select id="reportBranch" onchange="generateReport()"><option value="الكل">كل الفروع</option></select>
                </div>
            </div>

            <div class="report-card" style="background:var(--primary); color:white;">
                <h4>إجمالي مبيعات اليوم المختارة:</h4>
                <h2 id="totalSalesVal">0 ج.م</h2>
            </div>

            <div class="report-card">
                <h4>📜 تفاصيل فواتير اليوم</h4>
                <div style="overflow-x:auto;">
                    <table id="salesReportTable">
                        <thead><tr><th>التوقيت</th><th>الفرع</th><th>الأصناف</th><th>الإجمالي</th><th>الفاتورة</th></tr></thead>
                        <tbody id="salesReportBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxCUMSdoFcAZK5f1DbWZAzUHdKd3rd1HCaEOGuJZ6NF0-oG9ZxGG7SIIM6uOy_9piTj/exec"; 
    let db = { products: [], users: [], stock: [], sales: [] };
    let cart = []; let userObj = null;

    async function syncData() {
        document.getElementById("loader").style.display = "flex";
        try {
            const r = await fetch(API + "?action=getInitialData");
            const res = await r.json();
            db.products = res.products.map(r => ({ name: r[0], cat: r[1], price: r[2], type: r[3] }));
            db.users = res.users.map(r => ({ branch: r[0], pass: r[1], superPass: r[2], role: r[3] }));
            db.stock = res.stock.map(r => ({ branch: r[0], item: r[1], qty: r[2] }));
            db.sales = res.sales.map(r => ({ date: r[0], branch: r[1], details: r[2], total: r[3], inv: r[4], time: r[5] }));
            
            renderSelections();
            if(userObj) { renderStock(document.getElementById("stockBranchSelect").value); generateReport(); }
            document.getElementById("loader").style.display = "none";
        } catch(e) { alert("خطأ في جلب البيانات!"); }
    }

    function renderSelections() {
        const uSel = document.getElementById("userSelect");
        const sSel = document.getElementById("stockBranchSelect");
        const rSel = document.getElementById("reportBranch");
        
        uSel.innerHTML = '<option value="">--- اختر الفرع ---</option><option value="الإدارة">👑 الإدارة العامة</option>';
        sSel.innerHTML = '';
        rSel.innerHTML = '<option value="الكل">كل الفروع</option>';

        db.users.forEach(u => {
            uSel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`;
            sSel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`;
            rSel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`;
        });
    }

    function handleLogin() {
        const u = document.getElementById("userSelect").value;
        const p = document.getElementById("userPass").value;
        if(u === "الإدارة" && p === "0000") { userObj = { branch: "الإدارة", role: "مشرف" }; loginOK(); return; }
        const user = db.users.find(x => x.branch === u && x.pass === p);
        if(user) { userObj = user; loginOK(); } else alert("خطأ!");
    }

    function loginOK() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("branchInfo").innerText = "المستخدم: " + userObj.branch;
        document.getElementById("stockBranchSelect").value = userObj.branch;
        if(userObj.branch !== "الإدارة") document.getElementById("stockBranchSelect").disabled = true;
        
        if(userObj.role === "مشرف" || userObj.branch === "الإدارة") {
            document.getElementById("t-admin").style.display = "block";
            document.getElementById("reportDate").valueAsDate = new Date();
        }
        showCats(); renderStock(userObj.branch);
    }

    // --- نظام المخزون المطور ---
    function renderStock(branchName) {
        const box = document.getElementById("stockList"); box.innerHTML = "";
        db.products.forEach(p => {
            const currentQty = db.stock.filter(s => s.item === p.name && s.branch === branchName)
                                      .reduce((acc, curr) => acc + parseFloat(curr.qty || 0), 0);
            box.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#fff; border-bottom:1px solid #eee; border-radius:12px; margin-bottom:5px;">
                    <div><strong>${p.name}</strong><br><small>الرصيد: <span style="color:var(--primary); font-weight:bold;">${currentQty}</span></small></div>
                    <input type="number" class="qty-input" data-item="${p.name}" placeholder="0" style="width:70px; text-align:center;">
                </div>`;
        });
    }

    async function saveBulkStock() {
        const branch = document.getElementById("stockBranchSelect").value;
        const updates = Array.from(document.querySelectorAll('.qty-input')).filter(i => i.value != "").map(i => ({ item: i.dataset.item, qty: i.value }));
        if(!updates.length) return alert("ادخل كميات");
        document.getElementById("loader").style.display = "flex";
        await fetch(API, {method: "POST", body: JSON.stringify({action: "bulkStockUpdate", branch: branch, updates: updates})});
        alert("تم تحديث مخزون " + branch + " بنجاح ✅");
        syncData();
    }

    // --- نظام التقارير التفصيلية ---
    function generateReport() {
        const date = new Date(document.getElementById("reportDate").value).toLocaleDateString('ar-EG');
        const branch = document.getElementById("reportBranch").value;
        const body = document.getElementById("salesReportBody"); body.innerHTML = "";
        let total = 0;

        db.sales.forEach(s => {
            const matchesDate = s.date === date;
            const matchesBranch = branch === "الكل" || s.branch === branch;
            if(matchesDate && matchesBranch) {
                total += parseFloat(s.total);
                const timeStr = s.time ? new Date(s.time).toLocaleTimeString('ar-EG') : "--";
                body.innerHTML += `<tr><td>${timeStr}</td><td>${s.branch}</td><td>${s.details}</td><td>${s.total}</td><td>${s.inv}</td></tr>`;
            }
        });
        document.getElementById("totalSalesVal").innerText = total.toFixed(2) + " ج.م";
    }

    // (بقية الدوال: الكاشير، الطباعة، التبديل - نفس القوة السابقة)
    function switchTab(t) {
        ["pos", "stock", "admin"].forEach(s => document.getElementById("s-"+s).style.display = "none");
        ["t-pos", "t-stock", "t-admin"].forEach(s => document.getElementById(s).classList.remove("active"));
        document.getElementById("s-"+t).style.display = "block";
        document.getElementById("t-"+t).classList.add("active");
        if(t === 'admin') generateReport();
    }

    function logout() { localStorage.clear(); location.reload(); }
    window.onload = syncData;
</script>
</body>
</html>
