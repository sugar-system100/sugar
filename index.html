  "use strict";

    returns: [],

    t.textContent = msg;
    t.style.background = isError ? "#d32f2f" : "#1e1e2a";
    t.style.display = "block";
    clearTimeout(window.toastTimer);
    window.toastTimer = setTimeout(() => {
      t.style.display = "none";

  };

  const esc = s => String(s ?? "").replace(/[&<>\"']/g, c => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;"

    // المنتجات

  db.products = (res.products || []).map(r => ({

      qty: Number(r[2] || 0),

    // المبيعات
    db.sales = (res.sales || []).map(r => ({
      saleId: r[0],
      date: r[1],
      branch: r[2],
      customer: r[3],
      phone: r[4],
      address: r[5],
      channel: r[6],
      status: r[7],
      subtotal: Number(r[8] || 0),
      discount: Number(r[9] || 0),
      delivery: Number(r[10] || 0),
      total: Number(r[11] || 0),
      cashier: r[12],
      username: r[13],
      notes: r[14],

      qrOrderId: r[18]
    }));

    // أوامر CRM
    db.crmOrders = (res.crmOrders || []).map(r => ({
      id: r[0],
      createdAt: r[1],
      branch: r[2],
      customer: r[3],
      phone: r[4],

      notes: r[8],
      status: r[9],
      createdBy: r[10],

    // طلبات QR
    db.qrOrders = (res.qrOrders || []).map(r => {
      let items;
      try {

        date: r[1],

        cashier: r[11],

      };
    });

    // الورديات
    db.shifts = (res.shifts || []).map(r => ({
      id: r[0],
      branch: r[1],
      cashier: r[2],
      openedBy: r[3],

    db.expenses = (res.expenses || []).map(r => ({
      id: r[0],
      date: r[1],
      branch: r[2],
      username: r[3],
      type: r[4],
      amount: Number(r[5] || 0),
      complaintId: r[6],
      notes: r[7],
      shiftId: r[8]
    }));

    // المرتجعات
    db.returns = (res.returns || []).map(r => ({
      id: r[0],
      date: r[1],
      branch: r[2],
      username: r[3],

    db.deliveryZones = (res.deliveryZones || []).map(r => ({

    }));

    // جدول العملاء
    db.customers = (res.customers || []).map(r => ({

      address: String(r[2] || "").trim(),
      ordersCount: Number(r[3] || 0),
      complaintsCount: Number(r[4] || 0),
      notes: String(r[5] || "").trim()
    }));

    // جدول الشكاوى
    db.complaints = (res.complaints || []).map(r => ({
      id: String(r[0] || "").trim(),
      date: String(r[1] || "").trim(),
      phone: String(r[2] || "").trim(),
      name: String(r[3] || "").trim(),
      orderId: String(r[4] || "").trim(),
      branch: String(r[5] || "").trim(),
      source: String(r[6] || "").trim(),
      type: String(r[7] || "").trim(),
      details: String(r[8] || "").trim(),
      status: String(r[9] || "").trim(),
      handler: String(r[10] || "").trim(),
      notes: String(r[11] || "").trim()
    }));
  }
function renderCRM() {

// ملء فروع CRM (مع ربط المناطق)
function fillCrmBranchSelect() {
  const el = document.getElementById('crmBranchSelect');
  if (!el) return;

  const branches = db.users.filter(u =>
    ['crm', 'admin', 'owner', 'supervisor', 'cashier', 'delivery'].includes(u.pointType) &&
    u.active
  );

  const unique = [...new Map(branches.map(x => [x.branch, x])).values()];

  el.innerHTML = [
    '<option value="">اختر الفرع</option>',
    ...unique.map(u => `<option value="${esc(u.branch)}">${esc(u.branch)}</option>`)
  ].join('');

  // ربط تغيير الفرع بتعبئة المناطق
  el.onchange = function() {
    const branch = this.value.trim();
    fillCrmZonesForBranch(branch);
  };
}

// ملء قائمة المناطق حسب الفرع
function fillCrmZonesForBranch(branch) {
  const zoneSelect = document.getElementById('crmZoneSelect');
  if (!zoneSelect) return;

  if (!branch) {
    zoneSelect.innerHTML = '<option value="">اختر المنطقة / أقرب وصف</option>';
    return;
  }

  const zones = db.deliveryZones.filter(z => z.branch === branch);
  if (!zones.length) {
    zoneSelect.innerHTML = '<option value="">لا توجد مناطق مسجّلة لهذا الفرع</option>';
    return;
  }

  zoneSelect.innerHTML = [
    '<option value="">اختر المنطقة / أقرب وصف</option>',
    ...zones.map((z, idx) =>
      `<option value="${idx}">${esc(z.address)} - ${money(z.fee)}</option>`
    )
  ].join('');
}

// عند اختيار منطقة: تعبئة رسوم التوصيل
function onCrmZoneChange() {
  const branch = document.getElementById('crmBranchSelect')?.value?.trim();
  const zoneSelect = document.getElementById('crmZoneSelect');
  const feeInput = document.getElementById('crmDeliveryFee');
  if (!branch || !zoneSelect || !feeInput) return;

  const index = zoneSelect.value;
  if (index === '') {
    feeInput.value = '';
    return;
  }

  const zones = db.deliveryZones.filter(z => z.branch === branch);
  const selected = zones[Number(index)];
  if (!selected) {
    feeInput.value = '';
    return;
  }

  feeInput.value = selected.fee || 0;
}

// البحث التلقائي عن العميل برقم الهاتف
function onCrmPhoneBlur() {
  const phone = document.getElementById('crmPhone')?.value?.trim();
  if (!phone) return;

  const c = db.customers.find(cu => cu.phone === phone);
  if (!c) return;

  document.getElementById('crmCustomer').value = c.name || '';
  document.getElementById('crmAddress').value = c.address || '';

  let msg = `عميل مسجّل: ${c.name}`;
  if (c.ordersCount) msg += ` | طلبات: ${c.ordersCount}`;
  if (c.complaintsCount) msg += ` | شكاوى: ${c.complaintsCount}`;
  toast(msg, false);
}

// حفظ طلب CRM (مع الرسوم والمنطقة وبيانات العميل)
async function saveCrmOrderFromCart() {
  const branch = document.getElementById('crmBranchSelect')?.value?.trim();
  const customer = document.getElementById('crmCustomer')?.value?.trim();
  const phone = document.getElementById('crmPhone')?.value?.trim();
  const address = document.getElementById('crmAddress')?.value?.trim();
  const notes = document.getElementById('crmNotes')?.value?.trim();
  const deliveryFee = parseFloat(document.getElementById('crmDeliveryFee')?.value || '0') || 0;

  const zoneSelect = document.getElementById('crmZoneSelect');
  const zoneLabel = zoneSelect && zoneSelect.options[zoneSelect.selectedIndex]
    ? zoneSelect.options[zoneSelect.selectedIndex].text
    : '';

  const total = crmCart.reduce((a, b) => a + b.total, 0);

  if (!branch) return toast('اختر الفرع', true);
  if (!crmCart.length) return toast('أضف صنف واحد على الأقل', true);

  const order = {
    branch,
    customer,
    phone,
    address,
    items: crmCart.map(i => `${i.name} x ${i.qty}`).join(' | '),
    itemsJson: crmCart,
    total,
    notes,
    createdBy: currentUser.branch,
    status: 'جديد',
    deliveryFee,
    deliveryZone: zoneLabel
  };

  try {
    const res = await postForm('saveCrmOrder', { order });
    toast('تم حفظ طلب CRM', false);
    crmCart = [];
    renderCRM();
    await refreshData(true);
    renderCRM();
  } catch (e) {
    toast(e.message, true);
  }
}

// استيراد العملاء من شيت IMPORT_CUSTOMERS
async function importCustomersClick() {
  if (!confirm('هل تريد استيراد/تحديث بيانات العملاء من ورقة IMPORT_CUSTOMERS؟')) return;
  try {
    const res = await postForm('importCustomersFromSheet', {});
    if (!res || res.ok !== true) {
      return toast(res?.error || 'حدث خطأ أثناء الاستيراد', true);
    }
    toast('تم استيراد بيانات العملاء بنجاح', false);
    await refreshData(true);
    toast('تم تحديث قاعدة العملاء', false);
  } catch (e) {
    toast(e.message, true);
  }
}

// دالة فتح مودال الشكوى
function openComplaintModal(phone = '', name = '', orderId = '') {
  document.getElementById('complaintPhone').value = phone;
  document.getElementById('complaintName').value = name;
  document.getElementById('complaintOrderId').value = orderId;
  document.getElementById('complaintType').value = '';
  document.getElementById('complaintDetails').value = '';
  
  const modal = document.getElementById('complaintModal');
  if (!modal) {
    document.body.insertAdjacentHTML('beforeend', complaintModalHTML);
  }
  document.getElementById('complaintModal').style.display = 'flex';
}

// إغلاق مودال الشكوى
function closeComplaintModal() {
  document.getElementById('complaintModal').style.display = 'none';
}

// حفظ الشكوى
async function saveComplaint() {
  const phone = document.getElementById('complaintPhone')?.value?.trim();
  const name = document.getElementById('complaintName')?.value?.trim();
  const orderId = document.getElementById('complaintOrderId')?.value?.trim();
  const type = document.getElementById('complaintType')?.value?.trim();
  const details = document.getElementById('complaintDetails')?.value?.trim();

  if (!phone) return toast('رقم الموبايل مطلوب', true);
  if (!details) return toast('وصف الشكوى مطلوب', true);
  if (!type) return toast('نوع الشكوى مطلوب', true);

  const payload = {
    phone,
    name,
    orderId,
    branch: currentUser.branch,
    source: currentUser.pointType, // crm أو delivery
    type,
    details
  };

  try {
    const res = await postForm('saveComplaint', { complaint: payload });
    if (!res || res.ok !== true) {
      return toast(res?.error || 'حدث خطأ في حفظ الشكوى', true);
    }
    toast(`تم تسجيل الشكوى #${res.complaintId}`, false);
    closeComplaintModal();
    await refreshData(true); // تحديث db.complaints وdb.customers
  } catch (e) {
    toast(e.message, true);
  }
}

// دالة لفتح شكوى من أي أوردر CRM (يمكن استخدامها في جدول CRM)
function openComplaintFromOrder(order) {
  openComplaintModal(order.phone, order.customer, order.id);
}

// دالة عرض سجل الشكاوى لعميل معيّن (اختيارية)
function showCustomerComplaints(phone) {
  const customerComplaints = db.complaints.filter(c => c.phone === phone);
  if (!customerComplaints.length) {
    toast('لا توجد شكاوى لهذا العميل', false);
    return;
  }

  let msg = `الشكاوى (${customerComplaints.length}):\n`;
  customerComplaints.slice(0, 3).forEach((c, idx) => {
    msg += `${idx + 1}. ${c.type}: ${c.details.substring(0, 50)}... (${c.status})\n`;
  });
  if (customerComplaints.length > 3) msg += `\n... و${customerComplaints.length - 3} شكوى أخرى`;

  alert(msg);
}
// دوال CRM القديمة مع تعديلات بسيطة للتوافق
function renderCrmCats() {
  const box = document.getElementById('crmCatsList');
  if (!box) return;
  const cats = [...new Set(db.products.map(p => p.cat).filter(Boolean))];
  box.innerHTML = cats.map(c =>
    `<span class="badge${crmCurrentCat === c ? ' badge-success' : ''}" onclick="setCrmCategory('${jsq(c)}')">${esc(c)}</span>`
  ).join('');
}

function setCrmCategory(cat) {
  crmCurrentCat = cat;
  renderCrmCats();
  renderCrmProducts();
}

function renderCrmProducts() {
  const grid = document.getElementById('crmProductsGrid');
  if (!grid) return;
  const searchTerm = document.getElementById('crmSearchInput')?.value?.trim();
  let filtered = db.products.filter(p =>
    !crmCurrentCat || p.cat === crmCurrentCat
  );
  if (searchTerm) {
    filtered = filtered.filter(p =>
      p.name.includes(searchTerm) || p.cat.includes(searchTerm)
    );
  }
  grid.innerHTML = filtered.map(p => {
    const st = stockFor(p.name, currentUser?.branch);
    return `
      <div class="product-card" onclick="crmAskQty('${jsq(p.name)}')">
        <div class="product-name">${esc(p.name)}</div>
        <div class="product-meta">${money(p.price)}${isWeight(p) ? '<div>g</div>' : ''}</div>
      </div>
    `;
  }).join('');
  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1 / -1; text-align:center; padding:20px;">لا توجد نتائج</div>';
  }
}

function crmAskQty(name) {
  const p = db.products.find(x => x.name === name);
  if (!p) return;
  crmPendingProduct = p;
  crmPendingEditIndex = -1;
  pendingProduct = p;
  pendingEditIndex = -1;
  document.getElementById('qtyTitle').textContent = isWeight(p) ? 'كجم - ' + p.name : p.name;
  document.getElementById('qtyInput').value = isWeight(p) ? 1000 : 1;
  document.getElementById('qtyInput').step = isWeight(p) ? 50 : 1;
  document.getElementById('qtyInput').min = isWeight(p) ? 50 : 1;
  document.getElementById('qtyHint').textContent = isWeight(p) ? 'الكمية بالجرام (g)' : 'الكمية بالقطعة (pcs)';
  document.getElementById('qtyModal').style.display = 'flex';
}

function renderCrmCart() {
  const box = document.getElementById('crmCartList');
  if (!box) return;
  if (!crmCart.length) {
    box.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-muted);">لا توجد منتجات</div>';
  } else {
    box.innerHTML = crmCart.map((i, idx) => `
      <div class="cart-row">
        <div style="flex:1">
          <strong>${esc(i.name)}</strong>
        </div>
        <div class="product-meta">
          ${isWeight(i) ? i.qty + 'g' : i.qty + ' قطعة'}
          ${money(i.price)}
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <strong>${money(i.total)}</strong>
          <div class="cart-row-actions">
            <i class="fas fa-trash" style="cursor:pointer; color:#d32f2f;" onclick="crmRemoveItem(${idx})" title="حذف"></i>
          </div>
        </div>
      </div>
    `).join('');
  }
  const total = crmCart.reduce((a, b) => a + b.total, 0);
  document.getElementById('crmGrandTotal').textContent = money(total);
}

function crmRemoveItem(index) {
  crmCart.splice(index, 1);
  renderCrmCart();
}

// ربط الشكاوى في جدول CRM
function renderCrmTable() {
  const body = document.getElementById('crmTable');
  if (!body) return;
  let rows = db.crmOrders;
  if (currentUser.pointType !== 'admin') {
    rows = rows.filter(r => r.branch === currentUser.branch);
  }
  body.innerHTML = rows.slice(-20).reverse().map(r => {
    const canBranchUpdate = ['admin', 'owner', 'supervisor', 'cashier', 'delivery'].includes(currentUser.pointType) && r.branch === currentUser.branch;
    const statusControl = canBranchUpdate ? `
      <select onchange="updateCrmOrderStatus('${jsq(r.id)}', this.value)">
        <option value="جديد" ${r.status === 'جديد' ? 'selected' : ''}>جديد</option>
        <option value="تحت التنفيذ" ${r.status === 'تحت التنفيذ' ? 'selected' : ''}>تحت التنفيذ</option>
        <option value="مكتمل" ${r.status === 'مكتمل' ? 'selected' : ''}>مكتمل</option>
        <option value="ملغي" ${r.status === 'ملغي' ? 'selected' : ''}>ملغي</option>
      </select>
    ` : esc(r.status);
    return `
      <tr>
        <td>${esc(r.id)}</td>
        <td>${esc(r.branch)}</td>
        <td>${esc(r.customer)}<br><small>${esc(r.phone)}</small></td>
        <td>${money(r.total)}<br><small>${r.deliveryFee ? 'توصيل: ' + money(r.deliveryFee) : ''}</small></td>
        <td>${statusControl}</td>
        <td>
          <button class="btn btn-outline btn-icon" onclick="openComplaintFromOrder({id: '${r.id}', phone: '${r.phone}', customer: '${r.customer}'})" title="فتح شكوى">
            <i class="fas fa-exclamation-triangle"></i>
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

async function updateCrmOrderStatus(id, status) {
  try {
    await postForm('updateCrmOrderStatus', { id, status });
    await refreshData(true);
    renderCrmTable();
    toast('تم تحديث حالة الأوردر', false);
  } catch (e) {
    toast(e.message, true);
  }
// نهاية السكربت
</script>
</body>
</html>
