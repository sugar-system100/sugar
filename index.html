<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سُكّر 33</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    :root{
      --primary:#b81b5c; --primary-dark:#8a1240; --soft:#fff0f5; --bg:#fff9f5;
      --surface:#fff; --border:#efd9e2; --text:#3e2723; --muted:#7a5d56;
      --shadow:0 8px 24px rgba(0,0,0,.07); --radius:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Cairo,Segoe UI,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}
    .app{display:flex;min-height:100vh}
    .sidebar{width:260px;background:#fff;border-left:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
    .brand{font-size:32px;font-weight:800;color:var(--primary);text-align:center}
    .sub{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
    .nav{margin-top:20px;display:flex;flex-direction:column;gap:8px}
    .nav button{border:none;background:#fff;padding:14px 16px;border-radius:14px;cursor:pointer;text-align:right;font-weight:700}
    .nav button.active,.nav button:hover{background:var(--soft);color:var(--primary)}
    .main{flex:1;padding:22px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
    .grid{display:grid;gap:16px}
    .grid-3{grid-template-columns:220px 1fr 370px}
    .grid-2{grid-template-columns:360px 1fr}
    .products{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
    .product,.branchCard{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer}
    .product:hover,.branchCard:hover{background:var(--soft)}
    .muted{color:var(--muted)}
    .btn{border:none;border-radius:14px;padding:11px 14px;font-weight:700;cursor:pointer}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-outline{background:#fff;border:2px solid var(--border);color:var(--text)}
    .btn-danger{background:#d32f2f;color:#fff}
    .btn-block{width:100%}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    input,select,textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:14px;font-family:inherit}
    table{width:100%;border-collapse:collapse;background:#fff}
    th,td{padding:12px;border-bottom:1px solid var(--border);text-align:right}
    th{background:var(--soft);color:var(--primary-dark)}
    .tableWrap{overflow:auto;border:1px solid var(--border);border-radius:16px;background:#fff}
    .cartItem{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border)}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#ffe5ef;color:var(--primary);font-size:12px}
    .toast{position:fixed;left:20px;bottom:20px;background:#2d2521;color:#fff;padding:14px 18px;border-radius:999px;display:none;z-index:9999}
    .toast.show{display:block}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:20px;z-index:999}
    .modal.active{display:flex}
    .modalCard{width:min(560px,100%);background:#fff;border-radius:24px;padding:22px;box-shadow:0 30px 60px rgba(0,0,0,.2)}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .loginBox{width:min(420px,100%);background:#fff;border:1px solid var(--border);border-radius:28px;padding:30px;box-shadow:var(--shadow)}
    .title{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:14px}
    .cats{display:flex;flex-direction:column;gap:8px}
    .catBtn{padding:10px 12px;border-radius:12px;background:#fff;border:1px solid var(--border);cursor:pointer;text-align:right}
    .catBtn.active{background:var(--soft);border-color:var(--primary);color:var(--primary)}
    .rightTotal{font-size:24px;font-weight:800;color:var(--primary)}
    .note{font-size:12px;color:var(--muted)}
    .newRow{background:#fff7cc}
    .navBadge{background:#d32f2f;color:#fff;border-radius:999px;padding:2px 8px;font-size:11px;margin-inline-start:6px}
    @media(max-width:1100px){.grid-3,.grid-2{grid-template-columns:1fr}.sidebar{width:220px}}
    @media(max-width:800px){.app{display:block}.sidebar{width:auto}.main{padding:12px}}
  </style>
</head>
<body>

<div id="loginScreen" class="login">
  <div class="loginBox">
    <div class="brand">سُكّر 33</div>
    <div class="sub">برمجة م/ محمود سلامة</div>
    <div style="margin-top:18px" class="grid">
      <div>
        <label>نوع المستخدم</label>
        <select id="pointTypeSelect"></select>
      </div>
      <div>
        <label>اسم المستخدم</label>
        <select id="usernameSelect"></select>
      </div>
      <div>
        <label>كلمة المرور</label>
        <input id="passInput" type="password" />
      </div>
      <button class="btn btn-primary btn-block" onclick="login()"><i class="fas fa-sign-in-alt"></i> دخول</button>
      <div id="loginMsg" class="muted"></div>
    </div>
  </div>
</div>

<div id="appScreen" class="app hidden">
  <aside class="sidebar">
    <div class="brand">سُكّر 33</div>
    <div class="sub">برمجة م/ محمود سلامة</div>
    <div style="margin-top:18px" id="whoami"></div>
    <div class="muted" id="shiftStatus" style="margin-top:4px"></div>
    <div class="nav" id="nav"></div>
    <button class="btn btn-outline btn-block" style="margin-top:18px" onclick="logout()">تسجيل خروج</button>
  </aside>
  <main class="main">
    <div id="content"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<div class="modal" id="qtyModal">
  <div class="modalCard">
    <div class="title" id="qtyTitle">الكمية</div>
    <input id="qtyInput" type="number" min="1" step="1">
    <textarea id="itemNote" rows="2" placeholder="ملاحظة على الصنف" style="margin-top:12px"></textarea>
    <div class="note" id="qtyHint" style="margin-top:10px"></div>
    <div class="row" style="margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('qtyModal')">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmQty()">تأكيد</button>
    </div>
  </div>
</div>

<div class="modal" id="customerModal">
  <div class="modalCard">
    <div class="title">بيانات العميل</div>
    <input id="customerName" placeholder="اسم العميل">
    <input id="customerPhone" placeholder="رقم الهاتف" style="margin-top:10px" onblur="loadCustomerData()">
    <div style="position:relative;margin-top:10px">
      <input id="customerAddress" placeholder="العنوان" oninput="searchAddress()">
      <div id="addressSuggestions" class="hidden" style="position:absolute;right:0;left:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:12px;z-index:20;max-height:180px;overflow:auto"></div>
    </div>
    <div id="customerLoyaltyInfo" class="note" style="margin-top:12px"></div>
    <div class="row" style="margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('customerModal')">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmCustomerInfo()">متابعة للدفع</button>
    </div>
  </div>
</div>

<div class="modal" id="paymentModal">
  <div class="modalCard">
    <div class="title">إتمام الدفع</div>
    <select id="paymentMethod">
      <option value="نقدي">نقدي</option>
      <option value="آجل">آجل</option>
      <option value="هدية">هدية</option>
      <option value="إنستاباي">إنستاباي</option>
      <option value="فودافون كاش">فودافون كاش</option>
      <option value="فيزا">فيزا</option>
      <option value="أقساط">أقساط</option>
      <option value="نقاط_ولاء">نقاط ولاء</option>
    </select>
    <input id="paidAmount" type="number" step="0.01" placeholder="المبلغ المدفوع" style="margin-top:10px">
    <input id="paymentNotes" placeholder="ملاحظات" style="margin-top:10px">
    <div id="loyaltyBox" class="card hidden" style="margin-top:12px;padding:12px">
      النقاط المتاحة: <strong id="availablePoints">0</strong>
      <input id="redeemPoints" type="number" placeholder="عدد النقاط المراد استبدالها" style="margin-top:10px">
    </div>
    <div class="row" style="margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('paymentModal')">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmPayment()">تأكيد الدفع</button>
    </div>
  </div>
</div>

<div class="modal" id="supervisorModal">
  <div class="modalCard">
    <div class="title">اعتماد الخصم</div>
    <input id="superPassInput" type="password" placeholder="كلمة مرور المشرف">
    <div class="row" style="margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('supervisorModal')">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="verifySupervisor()">تأكيد</button>
    </div>
  </div>
</div>

<div class="modal" id="shiftCashModal">
  <div class="modalCard">
    <div class="title">إغلاق الوردية</div>
    <div class="card" style="text-align:center;margin-bottom:12px">
      المتوقع في الخزنة
      <div class="rightTotal" id="expectedCash">0.00</div>
    </div>
    <input id="actualCash" type="number" step="0.01" placeholder="الموجود فعلياً">
    <div class="row" style="margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('shiftCashModal')">إلغاء</button>
      <button class="btn btn-danger" style="flex:1" onclick="saveShiftCash()">تأكيد وإغلاق</button>
    </div>
  </div>
</div>

<div class="modal" id="qrModal">
  <div class="modalCard" style="text-align:center">
    <div class="title">QR الطلب</div>
    <div id="qrCodeContainer"></div>
    <div id="qrOrderId" style="margin-top:12px;font-weight:800;color:var(--primary)"></div>
    <button class="btn btn-outline" style="margin-top:14px" onclick="closeModal('qrModal')">إغلاق</button>
  </div>
</div>

<div class="modal" id="userModal">
  <div class="modalCard">
    <div class="title">تحرير مستخدم</div>
    <input id="editBranch" placeholder="الفرع">
    <input id="editUsername" placeholder="اسم المستخدم" style="margin-top:10px">
    <input id="editPass" placeholder="كلمة المرور الجديدة - اختياري" style="margin-top:10px">
    <input id="editSuperPass" placeholder="سوبر باس جديد - اختياري" style="margin-top:10px">
    <select id="editPointType" style="margin-top:10px">
      <option>مندوب_بيع</option>
      <option>كاشير</option>
      <option>دليفري</option>
      <option>خدمة العملاء</option>
      <option>مدير_فرع</option>
      <option>إدارة</option>
    </select>
    <input id="editPhone" placeholder="الهاتف" style="margin-top:10px">
    <input id="editAddress" placeholder="العنوان" style="margin-top:10px">
    <input id="editCenter" placeholder="المركز" style="margin-top:10px">
    <input id="editGovernorate" placeholder="المحافظة" style="margin-top:10px">
    <input id="editSalaf" placeholder="السلف" style="margin-top:10px">
    <label style="display:block;margin-top:12px"><input id="editActive" type="checkbox" checked> نشط</label>
    <div class="row" style="margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('userModal')">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveUserChanges()">حفظ</button>
    </div>
  </div>
</div>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwgsnhpdyRMFv_yJ-wxOpOd-Y8auaw4CzpvHoXWX8ltiDagM6GNztoAVobHAxkjuW4wrA/exec';

const State = {
  db: {products:[], users:[], stock:[], sales:[], crmOrders:[], shifts:[], complaints:[], customers:[], loyalty:[], forecast:[], parkedOrders:[], expenses:[], returns:[]},
  currentUser: null,
  currentCat: 'الكل',
  crmCurrentCat: 'الكل',
  cart: [],
  crmCart: [],
  pendingProduct: null,
  pendingEditIndex: -1,
  currentShift: null,
  currentQROrderId: '',
  discountEnabled: false,
  customerData: {name:'', phone:'', address:''},
  loginUsers: [],
  selectedBranch: '',
  deliveryNewCount: 0,
  lastReceiptHtml: '',
  thermalPort: null,
  editOriginalUsername: '',
  deliveryPollingInterval: null
};

const money = n => (Number(n || 0)).toFixed(2);
const esc = s => String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const isWeight = p => String(p.unit || '').trim() === 'كيلو';

function toast(msg, type='info'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#d32f2f' : type === 'success' ? '#2e7d32' : '#2d2521';
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 3500);
}

function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

function server(fn, ...args){
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(err => reject(new Error(err && err.message ? err.message : 'خطأ في الخادم')))
      [fn](...args);
  });
}

async function boot(){
  try{
    const res = await server('getLoginUsers');
    State.loginUsers = res.users || [];
    loadLoginOptions();
  }catch(e){
    document.getElementById('loginMsg').textContent = e.message;
  }
}

function loadLoginOptions(){
  const typeSel = document.getElementById('pointTypeSelect');
  const userSel = document.getElementById('usernameSelect');
  const types = [...new Set(State.loginUsers.filter(u => u.active).map(u => u.pointType))];
  typeSel.innerHTML = `<option value="">اختر نوع المستخدم</option>` + types.map(t => `<option>${esc(t)}</option>`).join('');
  userSel.innerHTML = `<option value="">اختر اسم المستخدم</option>`;

  typeSel.onchange = () => {
    const pt = typeSel.value;
    const list = State.loginUsers.filter(u => u.active && u.pointType === pt);
    userSel.innerHTML = `<option value="">اختر اسم المستخدم</option>` + list.map(u => `<option value="${esc(u.username)}">${esc(u.username)} - ${esc(u.branch)}</option>`).join('');
  };
}

async function login(){
  const pt = document.getElementById('pointTypeSelect').value;
  const username = document.getElementById('usernameSelect').value;
  const pw = document.getElementById('passInput').value;
  if(!pt || !username || !pw) return toast('املأ كل الحقول', 'error');

  try{
    const res = await server('authenticateUser', pt, username, pw);
    if(!res.ok) return toast(res.error || 'فشل الدخول', 'error');
    State.currentUser = res.user;
    localStorage.setItem('S33_USER', JSON.stringify(res.user));
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('whoami').innerHTML = `<strong>${esc(res.user.username)}</strong><br><span class="muted">${esc(res.user.branch)} - ${esc(res.user.pointType)}</span>`;
    await refreshData();
    buildNav();
    showSection(res.user.pointType === 'خدمة العملاء' ? 'crm' : res.user.pointType === 'دليفري' ? 'delivery' : 'pos');
    if(res.user.pointType === 'دليفري') startDeliveryPolling();
    toast('تم تسجيل الدخول', 'success');
  }catch(e){
    toast(e.message, 'error');
  }
}

function logout(){
  localStorage.removeItem('S33_USER');
  if(State.deliveryPollingInterval) clearInterval(State.deliveryPollingInterval);
  location.reload();
}

async function restoreSession(){
  const raw = localStorage.getItem('S33_USER');
  if(!raw) return;
  try{
    State.currentUser = JSON.parse(raw);
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('whoami').innerHTML = `<strong>${esc(State.currentUser.username)}</strong><br><span class="muted">${esc(State.currentUser.branch)} - ${esc(State.currentUser.pointType)}</span>`;
    await refreshData();
    buildNav();
    showSection(State.currentUser.pointType === 'خدمة العملاء' ? 'crm' : State.currentUser.pointType === 'دليفري' ? 'delivery' : 'pos');
    if(State.currentUser.pointType === 'دليفري') startDeliveryPolling();
  }catch(e){}
}

async function refreshData(){
  if(!State.currentUser) return;
  const res = await server('getInitialDataForUser', State.currentUser.pointType, State.currentUser.branch, State.currentUser.username);
  State.db = {...State.db, ...res};
  loadCurrentShift();
}

function loadCurrentShift(){
  State.currentShift = (State.db.shifts || []).find(s => s.branch === State.currentUser.branch && s.cashier === State.currentUser.username && s.status === 'مفتوحة') || null;
  document.getElementById('shiftStatus').textContent = State.currentShift ? 'وردية مفتوحة' : 'لا توجد وردية';
}

function buildNav(){
  const pt = State.currentUser.pointType;
  let items = [];
  if(pt === 'مندوب_بيع') items = [['pos','نقطة البيع']];
  else if(pt === 'كاشير') items = [['pos','نقطة البيع'],['stock','المخزون'],['reports','التقارير'],['expenses','المصروفات'],['returns','المرتجعات'],['loyalty','الولاء'],['search','بحث']];
  else if(pt === 'دليفري') items = [['delivery','التوصيل'],['pos','نقطة البيع'],['search','بحث']];
  else if(pt === 'خدمة العملاء') items = [['crm','CRM'],['complaints','الشكاوى'],['stock','المخزون'],['reports','المبيعات'],['shifts','الورديات']];
  else if(pt === 'مدير_فرع') items = [['pos','نقطة البيع'],['reports','التقارير'],['forecast','التوقعات'],['loyalty','الولاء'],['stock','المخزون']];
  else if(pt === 'إدارة') items = [['admin','مراقبة الفروع'],['users','المستخدمون'],['products','المنتجات'],['crm','CRM'],['delivery','التوصيل'],['reports','التقارير'],['forecast','التوقعات'],['complaints','الشكاوى'],['stock','المخزون'],['expenses','المصروفات'],['returns','المرتجعات'],['loyalty','الولاء'],['search','بحث']];

  document.getElementById('nav').innerHTML = items.map(([id,label]) =>
    `<button id="nav-${id}" onclick="showSection('${id}')">${esc(label)}${id==='delivery'?`<span id="deliveryBadge" class="navBadge hidden">0</span>`:''}</button>`
  ).join('');
}

function setActiveNav(id){
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + id);
  if(btn) btn.classList.add('active');
}

function showSection(id){
  setActiveNav(id);
  const map = {
    pos: renderPOS,
    crm: renderCRM,
    delivery: renderDelivery,
    stock: renderStock,
    reports: renderReports,
    search: renderSearch,
    complaints: renderComplaints,
    loyalty: renderLoyalty,
    forecast: renderForecast,
    expenses: renderExpenses,
    returns: renderReturns,
    users: renderUsers,
    products: renderProductsManagement,
    admin: renderAdmin
  };
  (map[id] || renderPOS)();
}

// ================= POS =================
function renderPOS(){
  const cats = ['الكل', ...new Set((State.db.products || []).map(p => p.cat).filter(Boolean))];
  document.getElementById('content').innerHTML = `
    <div class="grid grid-3">
      <div class="card">
        <div class="title">الأقسام</div>
        <div class="cats">
          ${cats.map(c => `<button class="catBtn ${State.currentCat===c?'active':''}" onclick="setCategory('${esc(c)}')">${esc(c)}</button>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <div class="title">المنتجات</div>
          <input id="searchInput" placeholder="بحث..." style="max-width:260px" oninput="renderProductsGrid()">
        </div>
        <div id="productsGrid" class="products"></div>
      </div>
      <div class="card" id="cartPanel"></div>
    </div>
  `;
  renderProductsGrid();
  renderCart();
}

function setCategory(c){ State.currentCat = c; renderPOS(); }

function renderProductsGrid(){
  const q = (document.getElementById('searchInput')?.value || '').trim();
  let list = State.db.products || [];
  if(State.currentCat !== 'الكل') list = list.filter(p => p.cat === State.currentCat);
  if(q) list = list.filter(p => p.name.includes(q));
  document.getElementById('productsGrid').innerHTML = list.map(p => {
    const st = (State.db.stock || []).find(s => s.branch === State.currentUser.branch && s.item === p.name);
    return `<div class="product" onclick="askQty('${esc(p.name)}')">
      <div style="font-weight:700">${esc(p.name)}</div>
      <div class="muted">${esc(p.cat || '')}</div>
      <div style="margin-top:8px;color:var(--primary);font-weight:800">${money(p.price)} ج${isWeight(p)?'/كجم':''}</div>
      <div class="note" style="margin-top:6px">رصيد: ${money(st ? st.qty : 0)}</div>
    </div>`;
  }).join('') || `<div class="muted">لا توجد منتجات</div>`;
}

function askQty(name){
  const p = (State.db.products || []).find(x => x.name === name);
  if(!p) return;
  State.pendingProduct = p;
  State.pendingEditIndex = -1;
  document.getElementById('qtyTitle').textContent = p.name;
  document.getElementById('qtyInput').value = isWeight(p) ? 1000 : 1;
  document.getElementById('qtyInput').step = isWeight(p) ? 50 : 1;
  document.getElementById('qtyInput').min = isWeight(p) ? 50 : 1;
  document.getElementById('itemNote').value = '';
  document.getElementById('qtyHint').textContent = isWeight(p) ? 'أدخل الوزن بالجرام - 1000 جرام = 1 كجم' : '';
  openModal('qtyModal');
}

function confirmQty(){
  const q = parseFloat(document.getElementById('qtyInput').value || 0);
  if(!State.pendingProduct || q <= 0) return;
  const note = document.getElementById('itemNote').value.trim();
  const chargeQty = isWeight(State.pendingProduct) ? q / 1000 : q;
  const total = chargeQty * Number(State.pendingProduct.price || 0);

  if(State.pendingEditIndex >= 0){
    const it = State.cart[State.pendingEditIndex];
    it.qty = q; it.chargeQty = chargeQty; it.total = total; it.note = note;
  }else{
    State.cart.push({
      name: State.pendingProduct.name,
      unit: State.pendingProduct.unit,
      price: Number(State.pendingProduct.price || 0),
      qty: q,
      chargeQty,
      total,
      note
    });
  }
  closeModal('qtyModal');
  renderCart();
}

function editCart(idx){
  const it = State.cart[idx];
  const p = (State.db.products || []).find(x => x.name === it.name);
  if(!p) return;
  State.pendingProduct = p;
  State.pendingEditIndex = idx;
  document.getElementById('qtyTitle').textContent = 'تعديل ' + p.name;
  document.getElementById('qtyInput').value = it.qty;
  document.getElementById('itemNote').value = it.note || '';
  document.getElementById('qtyHint').textContent = isWeight(p) ? 'أدخل الوزن بالجرام' : '';
  openModal('qtyModal');
}

function removeFromCart(idx){ State.cart.splice(idx,1); renderCart(); }

function clearCart(){
  State.cart = [];
  State.currentQROrderId = '';
  State.discountEnabled = false;
  renderCart();
}

function renderCart(){
  const sub = State.cart.reduce((a,b) => a + Number(b.total || 0), 0);
  const feeInput = document.getElementById('deliveryFee');
  const discountInput = document.getElementById('discountVal');
  const fee = Number(feeInput ? feeInput.value : 0) || 0;
  const disc = Number(discountInput ? discountInput.value : 0) || 0;
  const total = Math.max(0, sub + fee - disc);
  const discountLocked = !State.discountEnabled && ['كاشير','دليفري'].includes(State.currentUser.pointType);

  document.getElementById('cartPanel').innerHTML = `
    <div class="row" style="justify-content:space-between">
      <div class="title">السلة</div>
      <div class="badge">${State.cart.length} صنف</div>
    </div>
    <div style="max-height:340px;overflow:auto;margin-top:10px">
      ${State.cart.map((i,idx) => `
        <div class="cartItem">
          <div>
            <div style="font-weight:700">${esc(i.name)}</div>
            <div class="note">${esc(String(i.qty))} × ${money(i.price)} ${i.note ? ' - ' + esc(i.note) : ''}</div>
          </div>
          <div style="text-align:left">
            <div style="font-weight:700">${money(i.total)} ج</div>
            <div class="row">
              <button class="btn btn-outline" style="padding:6px 8px" onclick="editCart(${idx})">تعديل</button>
              <button class="btn btn-outline" style="padding:6px 8px" onclick="removeFromCart(${idx})">حذف</button>
            </div>
          </div>
        </div>`).join('') || `<div class="muted">السلة فارغة</div>`}
    </div>
    <div style="margin-top:12px">
      <div class="row">
        <input id="deliveryFee" type="number" step="0.5" value="${fee}" placeholder="رسوم التوصيل" oninput="renderCart()">
        <input id="discountVal" type="number" step="0.5" value="${disc}" placeholder="الخصم" oninput="renderCart()" ${discountLocked ? 'readonly onclick="requestDiscountSupervisor()" style="background:#fff7dc;cursor:pointer"' : ''}>
      </div>
      <div style="margin-top:12px" class="row"><span>المجموع</span><strong>${money(sub)} ج</strong></div>
      <div class="row" style="justify-content:space-between;margin-top:10px"><span>الإجمالي</span><span class="rightTotal">${money(total)}</span></div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-outline" onclick="clearCart()">مسح</button>
        <button class="btn btn-outline" onclick="parkCurrentOrder()">تعليق</button>
        <button class="btn btn-outline" onclick="loadParkedOrders()">المعلقة</button>
        ${State.currentUser.pointType === 'مندوب_بيع' ? `<button class="btn btn-primary" onclick="createQROrder()">QR</button>` : ''}
        ${['كاشير','دليفري','مندوب_بيع'].includes(State.currentUser.pointType) ? `<button class="btn btn-outline" onclick="loadQROrderPrompt()">تحميل QR</button>` : ''}
      </div>
      <div class="row" style="margin-top:10px">
        ${['كاشير','دليفري'].includes(State.currentUser.pointType) ? `<button class="btn btn-outline" onclick="showShiftTools()">الوردية</button>` : ''}
        <button class="btn btn-outline" onclick="connectThermalPrinter()">الطابعة</button>
        ${State.currentUser.pointType !== 'مندوب_بيع' ? `<button class="btn btn-primary" style="flex:1" onclick="proceedToPayment()" ${!State.currentShift && ['كاشير','دليفري'].includes(State.currentUser.pointType) ? 'disabled' : ''}>الدفع</button>` : ''}
      </div>
    </div>
  `;
}

function proceedToPayment(){
  if(!State.cart.length) return toast('السلة فارغة','error');
  if(!State.currentShift && ['كاشير','دليفري'].includes(State.currentUser.pointType)) return toast('افتح وردية أولاً','error');
  document.getElementById('customerName').value = State.customerData.name || '';
  document.getElementById('customerPhone').value = State.customerData.phone || '';
  document.getElementById('customerAddress').value = State.customerData.address || '';
  document.getElementById('customerLoyaltyInfo').textContent = '';
  openModal('customerModal');
}

async function loadCustomerData(){
  const phone = document.getElementById('customerPhone').value.trim();
  if(!phone) return;
  try{
    const res = await server('getCustomerByPhone', phone);
    if(res.customer){
      if(!document.getElementById('customerName').value) document.getElementById('customerName').value = res.customer.name || '';
      if(!document.getElementById('customerAddress').value) document.getElementById('customerAddress').value = res.customer.address || '';
    }
    document.getElementById('customerLoyaltyInfo').innerHTML = `النقاط الحالية: <strong>${res.points || 0}</strong>`;
    document.getElementById('availablePoints').textContent = res.points || 0;
  }catch(e){}
}

async function searchAddress(){
  const val = document.getElementById('customerAddress').value.trim();
  const box = document.getElementById('addressSuggestions');
  if(val.length < 2){ box.classList.add('hidden'); return; }
  const res = await server('getDeliveryZones', State.currentUser.branch, val);
  if(!(res.zones || []).length){ box.classList.add('hidden'); return; }
  box.innerHTML = res.zones.map(z => `<div style="padding:10px;cursor:pointer;border-bottom:1px solid #eee" onclick="selectAddress('${esc(z.area)}', ${Number(z.price||0)})">${esc(z.area)} - <strong>${money(z.price)} ج</strong></div>`).join('');
  box.classList.remove('hidden');
}

function selectAddress(area, price){
  document.getElementById('customerAddress').value = area;
  document.getElementById('addressSuggestions').classList.add('hidden');
  const feeInput = document.getElementById('deliveryFee');
  if(feeInput){ feeInput.value = price; renderCart(); }
}

function confirmCustomerInfo(){
  State.customerData = {
    name: document.getElementById('customerName').value.trim(),
    phone: document.getElementById('customerPhone').value.trim(),
    address: document.getElementById('customerAddress').value.trim()
  };
  closeModal('customerModal');
  const sub = State.cart.reduce((a,b) => a + Number(b.total || 0), 0);
  const fee = Number(document.getElementById('deliveryFee')?.value || 0);
  const disc = Number(document.getElementById('discountVal')?.value || 0);
  document.getElementById('paidAmount').value = Math.max(0, sub + fee - disc).toFixed(2);
  document.getElementById('loyaltyBox').classList.toggle('hidden', !State.customerData.phone);

}

function requestDiscountSupervisor(){ openModal('supervisorModal'); }

async function verifySupervisor(){
  const pass = document.getElementById('superPassInput').value;
  if(!pass) return toast('أدخل كلمة مرور المشرف', 'error');
  const res = await server('verifySupervisor', State.currentUser.branch, pass);
  if(!res.ok) return toast('السوبر باس غير صحيح', 'error');
  State.discountEnabled = true;
  closeModal('supervisorModal');
  renderCart();
  setTimeout(() => {
    const inp = document.getElementById('discountVal');
    if(inp){ inp.readOnly = false; inp.focus(); }
  }, 50);

}

async function confirmPayment(){
  const method = document.getElementById('paymentMethod').value;
  const paid = Number(document.getElementById('paidAmount').value || 0);
  const notes = document.getElementById('paymentNotes').value.trim();
  const sub = State.cart.reduce((a,b) => a + Number(b.total || 0), 0);
  const delivery = Number(document.getElementById('deliveryFee')?.value || 0);
  const discount = Number(document.getElementById('discountVal')?.value || 0);
  const redeemedPoints = method === 'نقاط_ولاء' ? Number(document.getElementById('redeemPoints').value || 0) : 0;

  const order = {
    saleId: 'SALE-' + Date.now().toString(36).toUpperCase(),
    date: new Date().toISOString().slice(0,10),
    branch: State.currentUser.branch,
    customer: State.customerData.name || 'عميل نقدي',
    phone: State.customerData.phone || '',
    address: State.customerData.address || '',
    channel: State.currentQROrderId ? 'QR' : 'نقطة بيع',
    status: 'مكتمل',
    subtotal: sub,
    discount,
    delivery,
    total: Math.max(0, sub + delivery - discount),
    cashier: State.currentUser.username,
    username: State.currentUser.username,
    notes,
    shiftId: State.currentShift ? State.currentShift.id : '',
    paymentMethod: method,
    paidAmount: paid,
    qrOrderId: State.currentQROrderId || '',
    itemsJson: JSON.stringify(State.cart.map(i => ({
      name: i.name,
      qty: i.qty,
      chargeQty: i.chargeQty,
      price: i.price,
      total: i.total,
      unit: i.unit || '',
      note: i.note || ''
    }))),
    redeemedPoints
  };

  try{
    const res = await server('saveOrder', order);
    if(!res.ok) return toast(res.error || 'فشل الحفظ', 'error');
    closeModal('paymentModal');
    printReceipt(order);
    await printThermal(order);
    clearCart();
    await refreshData();
    renderPOS();
    toast('تم إتمام البيع', 'success');
  }catch(e){
    toast(e.message, 'error');
  }
}

function printReceipt(order){
  const itemsHtml = State.cart.map(i => `<div style="display:flex;justify-content:space-between;padding:4px 0"><span>${esc(i.name)} ${i.note ? '(' + esc(i.note) + ')' : ''}</span><span>${esc(String(i.qty))} × ${money(i.price)} = ${money(i.total)}</span></div>`).join('');
  const html = `
    <html dir="rtl"><head><meta charset="UTF-8"><title>${esc(order.saleId)}</title>
    <style>body{font-family:Cairo,Segoe UI,sans-serif;padding:16px;max-width:390px;margin:auto} .h{text-align:center;border-bottom:2px solid #b81b5c;padding-bottom:10px;margin-bottom:10px} .t{font-size:23px;font-weight:800;color:#b81b5c} .r{display:flex;justify-content:space-between;padding:4px 0} .sum{font-size:24px;font-weight:800;color:#b81b5c;text-align:center;margin-top:12px}</style>
    </head><body>
      <div class="h"><div class="t">سُكّر 33</div><div>برمجة م/ محمود سلامة</div><div>${esc(order.date)}</div></div>
      <div class="r"><strong>الفرع</strong><span>${esc(order.branch)}</span></div>
      <div class="r"><strong>العميل</strong><span>${esc(order.customer)}</span></div>
      ${order.phone ? `<div class="r"><strong>الهاتف</strong><span>${esc(order.phone)}</span></div>` : ''}
      ${order.address ? `<div class="r"><strong>العنوان</strong><span>${esc(order.address)}</span></div>` : ''}
      <hr>${itemsHtml}<hr>
      ${order.discount > 0 ? `<div class="r"><strong>الخصم</strong><span>${money(order.discount)} ج</span></div>` : ''}
      ${order.delivery > 0 ? `<div class="r"><strong>التوصيل</strong><span>${money(order.delivery)} ج</span></div>` : ''}
      <div class="sum">الإجمالي ${money(order.total)} ج</div>
      <div style="text-align:center;margin-top:10px">${esc(order.paymentMethod)}</div>
      <div style="text-align:center;margin-top:10px;font-size:12px">${esc(order.saleId)}</div>
    </body></html>`;
  State.lastReceiptHtml = html;
  const w = window.open('', '_blank', 'width=420,height=700');
  if(!w) return;
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 400);
}

async function connectThermalPrinter(){
  if(!('serial' in navigator)) return toast('المتصفح لا يدعم Web Serial', 'error');
  try{
    State.thermalPort = await navigator.serial.requestPort();
    await State.thermalPort.open({ baudRate: 9600 });
    toast('تم الاتصال بالطابعة', 'success');
  }catch(e){
    toast(e.message, 'error');
  }
}

async function printThermal(order){
  if(!State.thermalPort) return;
  try{
    const writer = State.thermalPort.writable.getWriter();
    const lines = [
      'سُكّر 33',
      'برمجة م/ محمود سلامة',
      order.date,
      '------------------------------',
      'العميل: ' + order.customer,
      order.phone ? 'الهاتف: ' + order.phone : '',
      order.address ? 'العنوان: ' + order.address : '',
      '------------------------------',
      ...State.cart.map(i => `${i.name} ${i.qty} x ${money(i.price)} = ${money(i.total)}`),
      '------------------------------',
      order.discount > 0 ? `خصم: ${money(order.discount)}` : '',
      order.delivery > 0 ? `توصيل: ${money(order.delivery)}` : '',
      `الإجمالي: ${money(order.total)}`,
      order.paymentMethod,
      order.saleId,
      '',
      '',
      ''
    ].filter(Boolean).join('\n');
    await writer.write(new TextEncoder().encode(lines));
    writer.releaseLock();
  }catch(e){}
}

// ================= QR =================
async function createQROrder(){
  if(!State.cart.length) return toast('السلة فارغة', 'error');
  const subtotal = State.cart.reduce((a,b) => a + Number(b.total || 0), 0);
  const discount = Number(document.getElementById('discountVal')?.value || 0);
  const delivery = Number(document.getElementById('deliveryFee')?.value || 0);
  const total = Math.max(0, subtotal + delivery - discount);
  const res = await server('createQROrder', {
    creator: State.currentUser.username,
    salesmanName: State.currentUser.username,
    branch: State.currentUser.branch,
    items: State.cart,
    subtotal,
    discount,
    delivery,
    total
  });
  if(!res.ok) return toast(res.error || 'فشل إنشاء QR','error');
  document.getElementById('qrOrderId').textContent = res.orderId;
  const holder = document.getElementById('qrCodeContainer');
  holder.innerHTML = '';
  QRCode.toCanvas(document.createElement('canvas'), res.orderId, {width:240, margin:2}, (err, canvas) => {
    if(!err) holder.appendChild(canvas);
  });
  openModal('qrModal');
}

async function loadQROrderPrompt(){
  const code = prompt('أدخل كود QR');
  if(!code) return;
  const res = await server('getQROrder', code);
  if(!res.order) return toast('الطلب غير موجود','error');
  State.cart = (res.order.items || []).map(i => ({
    ...i,
    chargeQty: i.chargeQty != null ? i.chargeQty : i.qty,
    total: Number(i.total || ((i.price || 0) * (i.chargeQty != null ? i.chargeQty : i.qty || 0)))
  }));
  State.currentQROrderId = code;
  showSection('pos');
  setTimeout(() => {
    const fee = document.getElementById('deliveryFee');
    const disc = document.getElementById('discountVal');
    if(fee) fee.value = res.order.delivery || 0;
    if(disc) disc.value = res.order.discount || 0;
    renderCart();
  }, 50);
  toast('تم تحميل طلب QR', 'success');
}

async function openShift(){

async function showShiftCashReport(){

async function parkCurrentOrder(){
  if(!State.cart.length) return toast('السلة فارغة','error');
  const res = await server('parkOrder', {
    branch: State.currentUser.branch,
    cashier: State.currentUser.username,
    cart: State.cart,
    customerData: State.customerData
  });
  if(!res.ok) return toast(res.error || 'فشل التعليق', 'error');

async function loadParkedOrders(){
  const res = await server('getParkedOrders', State.currentUser.branch, State.currentUser.username);
  const list = res.orders || [];
  if(!list.length) return toast('لا توجد فواتير معلقة');
  const msg = list.map((o,i) => `${i+1}) ${o.id}`).join('\n');
  const chosen = prompt(`الفواتير المعلقة:\n${msg}\n\nأدخل الكود المطلوب استرجاعه`);
  if(!chosen) return;
  const target = list.find(o => o.id === chosen.trim());
  if(!target) return toast('الكود غير موجود','error');
  State.cart = target.data.cart || [];
  State.customerData = target.data.customerData || {name:'',phone:'',address:''};
  await server('deleteParkedOrder', target.id);
  renderCart();
  toast('تم استرجاع الفاتورة', 'success');
}

function renderCrmProducts(){
  const q = (document.getElementById('crmSearch')?.value || '').trim();

  if(State.crmCurrentCat !== 'الكل') list = list.filter(p => p.cat === State.crmCurrentCat);
  if(q) list = list.filter(p => p.name.includes(q));
  document.getElementById('crmProducts').innerHTML = list.map(p => `<div class="product" onclick="crmAddItem('${esc(p.name)}')"><div style="font-weight:700">${esc(p.name)}</div><div class="muted">${esc(p.cat)}</div><div style="color:var(--primary);font-weight:800;margin-top:8px">${money(p.price)} ج</div></div>`).join('');

function crmAddItem(name){
  const p = (State.db.products || []).find(x => x.name === name);
  if(!p) return;
  const ex = State.crmCart.find(i => i.name === name);
  if(ex){ ex.qty += 1; ex.total = ex.qty * ex.price; }
  else State.crmCart.push({name:p.name, qty:1, price:Number(p.price || 0), total:Number(p.price || 0)});
  renderCrmCart();
}

function renderCrmCart(){
  const total = State.crmCart.reduce((a,b) => a + Number(b.total || 0), 0);
  document.getElementById('crmTotal').textContent = money(total);
  document.getElementById('crmCartList').innerHTML = State.crmCart.map((i,idx) => `
    <div class="cartItem">
      <div>${esc(i.name)} × ${i.qty}</div>
      <div>${money(i.total)} ج <button class="btn btn-outline" style="padding:5px 8px" onclick="State.crmCart.splice(${idx},1);renderCrmCart()">حذف</button></div>
    </div>`).join('') || `<div class="muted">السلة فارغة</div>`;
}

function crmDeliveryUsersChanged(){
  const branch = document.getElementById('crmBranch')?.value || '';
  const sel = document.getElementById('crmDeliveryUser');
  const all = window._crmAllDeliveryUsers || [];
  const list = branch ? all.filter(u => u.branch === branch) : [];
  sel.innerHTML = `<option value="">تعيين تلقائي للدليفري</option>` + list.map(u => `<option value="${esc(u.username)}">${esc(u.username)}</option>`).join('');
}

async function crmSearchAddress(){
  const branch = document.getElementById('crmBranch').value;
  const val = document.getElementById('crmAddress').value.trim();
  const box = document.getElementById('crmAddressSuggestions');
  if(!branch || val.length < 2){ box.classList.add('hidden'); return; }
  const res = await server('getDeliveryZones', branch, val);
  if(!(res.zones || []).length){ box.classList.add('hidden'); return; }
  box.innerHTML = res.zones.map(z => `<div style="padding:10px;cursor:pointer;border-bottom:1px solid #eee" onclick="selectCrmAddress('${esc(z.area)}')">${esc(z.area)} - <strong>${money(z.price)} ج</strong></div>`).join('');
  box.classList.remove('hidden');
}

function selectCrmAddress(addr){
  document.getElementById('crmAddress').value = addr;
  document.getElementById('crmAddressSuggestions').classList.add('hidden');
}

async function saveCrmOrderFromCart(){
  const branch = document.getElementById('crmBranch').value;
  if(!branch) return toast('اختر فرع التوصيل', 'error');
  if(!State.crmCart.length) return toast('أضف أصناف للطلب', 'error');

  const order = {
    branch,
    customer: document.getElementById('crmCustomer').value.trim() || 'عميل',
    phone: document.getElementById('crmPhone').value.trim(),
    address: document.getElementById('crmAddress').value.trim(),
    itemsJson: JSON.stringify(State.crmCart),
    total: State.crmCart.reduce((a,b) => a + Number(b.total || 0), 0),
    notes: document.getElementById('crmNotes').value.trim(),
    createdBy: State.currentUser.username,
    assignedTo: document.getElementById('crmDeliveryUser').value.trim()
  };

  const res = await server('saveCrmOrder', order);
  if(!res.ok) return toast(res.error || 'فشل الحفظ', 'error');
  State.crmCart = [];
  await refreshData();
  renderCRM();
  toast('تم إرسال الطلب للدليفري', 'success');
}
