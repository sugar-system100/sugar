<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>سكّر 33 · نظام مبيعات متكامل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  <style>
    :root {
      --primary: #b81b5c;
      --primary-light: #e84a8a;
      --primary-soft: #fce4f0;
      --accent: #0f9d58;
      --accent-soft: #e6f4ea;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --bg: #f9f6f8;
      --surface: #ffffff;
      --border: #e9dee5;
      --text: #1e1e2a;
      --text-muted: #6b5e66;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
      --radius-card: 24px;
      --radius-btn: 16px;
      --transition: all 0.2s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tahoma', sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.5; }
    button, input, select, textarea { font-size: 1rem; border-radius: 14px; }
    button { cursor: pointer; background: none; border: none; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition); }
    input, select, textarea { border: 1.5px solid var(--border); padding: 12px 16px; background: var(--surface); outline: none; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(184, 27, 92, 0.08); }

    .app-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--surface); border-left: 1px solid var(--border); padding: 24px 12px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; box-shadow: var(--shadow); }
    .logo-area { padding: 8px 16px 24px; text-align: center; border-bottom: 2px solid var(--primary-soft); }
    .logo-icon { font-size: 40px; color: var(--primary); }
    .logo-text { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--primary), #d63384); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-menu { flex: 1; margin: 20px 0; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; margin: 6px 0; border-radius: 18px; color: var(--text-muted); font-weight: 600; cursor: pointer; width: 100%; text-align: right; transition: var(--transition); }
    .nav-item i { width: 24px; font-size: 1.3rem; }
    .nav-item:hover { background: var(--primary-soft); color: var(--primary); }
    .nav-item.active { background: var(--primary); color: white; box-shadow: 0 8px 14px -6px rgba(184, 27, 92, 0.3); }
    .user-badge { margin-top: auto; background: var(--blue-soft); padding: 16px; border-radius: 22px; }
    .logout-btn { width: 100%; margin-top: 10px; background: #fff; border: 1px solid var(--border); padding: 10px 14px; border-radius: 14px; }

    .main-content { flex: 1; padding: 24px 32px; max-width: calc(100% - 260px); }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; flex-wrap: wrap; }
    .page-title { font-size: 28px; font-weight: 700; color: #2c1b24; display: flex; align-items: center; gap: 10px; }
    .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { padding: 14px 22px; border-radius: 40px; font-weight: 700; box-shadow: var(--shadow); border: 1px solid transparent; transition: var(--transition); font-size: 1rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #9f1650; transform: scale(0.98); }
    .btn-accent { background: var(--accent); color: white; }
    .btn-outline { background: white; border-color: var(--border); color: var(--text); }
    .btn-outline:hover { background: #f5f0f2; }
    .btn-danger { background: #d32f2f; color: white; }
    .btn-icon { padding: 10px 14px; }

    .pos-layout, .crm-layout { display: flex; gap: 20px; }
    .pos-cart-panel, .crm-cart-panel { width: 340px; flex-shrink: 0; }
    .pos-products-panel, .crm-products-panel { flex: 1; min-width: 0; }

    .card { background: var(--surface); border-radius: var(--radius-card); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-weight: 700; font-size: 1.2rem; gap: 12px; flex-wrap: wrap; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; max-height: 68vh; overflow-y: auto; padding: 8px 4px; }
    .product-card { background: #fdfbfc; border: 2px solid var(--border); border-radius: 24px; padding: 20px 12px; text-align: center; cursor: pointer; transition: var(--transition); }
    .product-card:hover { background: var(--primary-soft); border-color: var(--primary); transform: translateY(-4px); }
    .product-name { font-weight: 800; margin-bottom: 8px; font-size: 1.1rem; }
    .product-meta { font-size: .95rem; color: var(--text-muted); margin-bottom: 6px; }
    .stock-badge { background: #e8f0fe; padding: 4px 10px; border-radius: 30px; font-size: .85rem; display: inline-block; margin-top: 8px; }

    .cart-items { max-height: 420px; overflow-y: auto; }
    .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px dashed var(--border); gap: 10px; }
    .cart-row-actions { display: flex; gap: 10px; }
    .total-section { border-top: 2px solid var(--border); margin-top: 16px; padding-top: 20px; }
    .pill { background: var(--accent-soft); color: #0b5e38; padding: 10px 20px; border-radius: 40px; font-weight: 700; font-size: .95rem; }

    .table-wrapper { overflow-x: auto; border-radius: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: right; padding: 16px 14px; background: #f5edf1; color: #441c2e; font-weight: 700; font-size: .95rem; white-space: nowrap; }
    td { padding: 16px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }

    .badge { background: #e4e7eb; padding: 8px 16px; border-radius: 30px; font-size: .9rem; display: inline-block; cursor: pointer; }
    .badge-success { background: #d1fae5; color: #065f46; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.3); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 999; padding: 16px; }
    .modal-card { background: white; width: 500px; max-width: 94%; border-radius: 32px; padding: 28px; box-shadow: 0 30px 50px rgba(0,0,0,.2); }
    .toast { position: fixed; bottom: 24px; left: 24px; background: #1e1e2a; color: white; padding: 14px 28px; border-radius: 60px; font-weight: 500; z-index: 9999; display: none; box-shadow: 0 10px 20px rgba(0,0,0,.2); }
    .hidden { display: none !important; }
    .section { display: none; }
    .section.active { display: block; }
    #qrScannerContainer { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 20px; overflow: hidden; }
    #qrReader { width: 100%; }
    .suggestions-box { border: 1px solid var(--border); border-radius: 16px; max-height: 200px; overflow-y: auto; background: white; position: absolute; z-index: 1000; width: calc(100% - 32px); box-shadow: var(--shadow); }
    .suggestion-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
    .suggestion-item:hover { background: var(--primary-soft); }

    @media (max-width: 1000px) {
      .sidebar { width: 90px; padding: 16px 6px; }
      .sidebar .logo-text, .sidebar .nav-item span, .user-badge span { display: none; }
      .nav-item { justify-content: center; }
      .main-content { max-width: calc(100% - 90px); padding: 16px; }
      .pos-layout, .crm-layout { flex-direction: column; }
      .pos-cart-panel, .crm-cart-panel { width: 100%; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="sidebar">
    <div class="logo-area">
      <i class="fas fa-candy-cane logo-icon"></i>
      <div class="logo-text">سكّر 33</div>
      <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">نظام متكامل</div>
    </div>
    <div class="nav-menu" id="navMenu"></div>
    <div class="user-badge">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
        <i class="fas fa-user-circle" style="font-size:24px;"></i>
        <span id="whoami" style="font-weight:700;">زائر</span>
      </div>
      <div id="shiftStatus" style="font-size:13px; margin-bottom:8px;"></div>
      <button class="logout-btn hidden" id="logoutBtn" onclick="logout()"><i class="fas fa-right-from-bracket"></i><span>تسجيل خروج</span></button>
    </div>
  </div>

  <div class="main-content">
    <div id="loginScreen" style="max-width:500px; margin:80px auto;">
      <div class="card" style="padding:32px;">
        <div style="text-align:center; margin-bottom:30px;">
          <i class="fas fa-lock" style="font-size:48px; color:var(--primary);"></i>
          <h2 style="margin:12px 0">تسجيل الدخول</h2>
        </div>
        <div style="margin-bottom:20px">
          <label>نوع المستخدم</label>
          <select id="pointTypeSelect" style="margin-top:6px;"><option value="">جاري التحميل...</option></select>
        </div>
        <div style="margin-bottom:20px">
          <label>الفرع / المستخدم</label>
          <select id="branchSelect" style="margin-top:6px;"><option value="">اختر نوع المستخدم أولاً</option></select>
        </div>
        <div style="margin-bottom:24px">
          <label>كلمة المرور</label>
          <input id="passInput" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
        </div>
        <button class="btn btn-primary" style="width:100%; padding:16px;" onclick="login()"><i class="fas fa-sign-in-alt"></i> دخول</button>
        <div id="loginMsg" style="margin-top:16px; text-align:center; color:#b0003a;"></div>
      </div>
    </div>

    <div id="appSections" class="hidden">
      <div id="sec-pos" class="section"></div>
      <div id="sec-crm" class="section"></div>
      <div id="sec-delivery" class="section"></div>
      <div id="sec-search" class="section"></div>
      <div id="sec-stock" class="section"></div>
      <div id="sec-products" class="section"></div>
      <div id="sec-users" class="section"></div>
      <div id="sec-reports" class="section"></div>
      <div id="sec-complaints" class="section"></div>
    </div>
  </div>
</div>

<!-- مودالات -->
<div class="modal" id="qtyModal"><div class="modal-card"><h2 id="qtyTitle">الكمية</h2><input id="qtyInput" type="number" min="0.05" step="0.05" value="1"><div id="qtyHint"></div><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeQty()">إلغاء</button><button class="btn btn-primary" onclick="confirmQty()">تأكيد</button></div></div></div>
<div class="modal" id="qrModal"><div class="modal-card"><h2><i class="fas fa-qrcode"></i> رمز الطلب</h2><div id="qrCodeContainer"></div><p id="qrOrderId"></p><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeQrModal()">إلغاء</button><button class="btn btn-primary" onclick="printQR()">طباعة</button></div></div></div>
<div class="modal" id="qrScannerModal"><div class="modal-card"><h2>مسح QR</h2><div id="qrReader"></div><input id="manualQrInput" placeholder="أدخل كود الطلب"><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeQrScanner()">إلغاء</button><button class="btn btn-primary" onclick="loadManualQR()">تحميل</button></div></div></div>
<div class="modal" id="shiftModal"><div class="modal-card"><h2>إدارة الوردية</h2><div id="shiftInfo"></div><div id="shiftActions"></div><button class="btn btn-outline" onclick="closeShiftModal()">إغلاق</button></div></div>
<div class="modal" id="supervisorModal"><div class="modal-card"><h2>صلاحية المشرف</h2><input id="superPassInput" type="password"><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeSupervisorModal()">إلغاء</button><button class="btn btn-primary" onclick="verifySupervisorForDiscount()">تأكيد</button></div></div></div>
<div class="modal" id="paymentModal"><div class="modal-card"><h2>طريقة الدفع</h2><select id="paymentMethod"><option value="نقدي">نقدي</option><option value="فيزا">فيزا</option><option value="تحويل بنكي">تحويل بنكي</option><option value="فودافون كاش">فودافون كاش</option><option value="إنستاباي">إنستاباي</option><option value="أقساط">أقساط</option></select><input id="paidAmount" type="number" placeholder="المبلغ المدفوع"><input id="paymentNotes" placeholder="ملاحظات"><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closePaymentModal()">إلغاء</button><button class="btn btn-primary" onclick="confirmPayment()">تأكيد</button></div></div></div>
<div class="modal" id="customerModal"><div class="modal-card"><h2>بيانات العميل</h2><input id="customerName" placeholder="الاسم"><input id="customerPhone" placeholder="الهاتف"><input id="customerAddress" placeholder="العنوان"><div id="addressSuggestions" class="suggestions-box hidden"></div><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeCustomerModal()">إلغاء</button><button class="btn btn-primary" onclick="confirmCustomerInfo()">متابعة</button></div></div></div>
<div class="modal" id="complaintModal"><div class="modal-card"><h2>إضافة شكوى</h2><input id="complaintPhone" placeholder="رقم هاتف العميل"><input id="complaintName" placeholder="اسم العميل"><select id="complaintType"><option value="تأخر توصيل">تأخر توصيل</option><option value="منتج تالف">منتج تالف</option><option value="خطأ في الفاتورة">خطأ في الفاتورة</option><option value="سلوك الموظف">سلوك الموظف</option><option value="أخرى">أخرى</option></select><textarea id="complaintDesc" placeholder="وصف الشكوى"></textarea><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeComplaintModal()">إلغاء</button><button class="btn btn-primary" onclick="saveComplaint()">حفظ</button></div></div></div>

<div id="toast" class="toast"></div>

<script>
// ======================== التكوين الأساسي ========================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5m3tFmdYNfUoqDe0iKti_tY5czsL-mG2VtCLJkwcPyS_sfck8iIZUenZ_uC2fReArgA/exec';

let db = { products: [], users: [], stock: [], sales: [], crmOrders: [], shifts: [], complaints: [], customers: [] };
let currentUser = null, currentCat = 'الكل', cart = [], pendingProduct = null, pendingEditIndex = -1, currentShift = null, discountEnabled = false, currentQROrderId = null, html5QrScanner = null, customerData = { name:'', phone:'', address:'' };
let crmCart = [], crmCurrentCat = 'الكل', crmPendingProduct = null, crmPendingEditIndex = -1;
let deliveryOrdersRefreshInterval = null;

const money = n => (Number(n || 0)).toFixed(2);
const toast = (msg, isError = false) => { const t = document.getElementById('toast'); t.textContent = msg; t.style.background = isError ? '#d32f2f' : '#1e1e2a'; t.style.display = 'block'; clearTimeout(window.toastTimer); window.toastTimer = setTimeout(() => t.style.display = 'none', 3500); };
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const jsq = s => String(s ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
const isWeight = p => String(p.unit || '').trim() === 'كيلو';

function jsonp(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({ action, callback: cb, ...params });
    const script = document.createElement('script');
    let finished = false;
    window[cb] = data => { if (finished) return; finished = true; try { delete window[cb]; } catch(e){} if (script.parentNode) script.parentNode.removeChild(script); if (data && data.ok === false) reject(new Error(data.error || 'فشل الطلب')); else resolve(data); };
    script.onerror = () => { if (finished) return; finished = true; try { delete window[cb]; } catch(e){} if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('فشل الاتصال')); };
    script.src = SCRIPT_URL + (SCRIPT_URL.includes('?') ? '&' : '?') + qs.toString();
    document.body.appendChild(script);
    setTimeout(() => { if (!finished) { finished = true; reject(new Error('انتهت المهلة')); } }, 15000);
  });
}

function postForm(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const iframe = document.createElement('iframe');
    iframe.name = 'frm_' + Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = iframe.name;
    form.style.display = 'none';
    const inp = document.createElement('input');
    inp.name = 'payload';
    inp.value = JSON.stringify({ action, ...payload });
    form.appendChild(inp);
    document.body.appendChild(form);
    let done = false;
    const fin = () => { if (!done) { done = true; setTimeout(() => { if (form.parentNode) form.parentNode.removeChild(form); if (iframe.parentNode) iframe.parentNode.removeChild(iframe); resolve({ ok: true }); }, 200); } };
    iframe.onload = () => fin();
    form.submit();
    setTimeout(fin, 5000);
  });
}

// ======================== تحميل البيانات الأولية لشاشة الدخول ========================
async function loadInitialDataForLogin() {
  const msgDiv = document.getElementById('loginMsg');
  msgDiv.textContent = 'جاري تحميل البيانات...';
  try {
    const res = await jsonp('getInitialData', { userType: '', branch: '', username: '' });
    if (res.ok) {
      db.products = res.products || [];
      db.users = res.users || [];
      db.stock = res.stock || [];
      db.sales = res.sales || [];
      db.crmOrders = res.crmOrders || [];
      db.shifts = res.shifts || [];
      db.complaints = res.complaints || [];
      db.customers = res.customers || [];
      const types = [...new Set(db.users.filter(u => u.active === true).map(u => u.pointType))];
      const typeSelect = document.getElementById('pointTypeSelect');
      typeSelect.innerHTML = '<option value="">اختر نوع المستخدم</option>' + types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
      msgDiv.textContent = '';
      typeSelect.onchange = fillBranchesByType;
      restoreSession();
    } else {
      msgDiv.textContent = res.error || 'فشل تحميل البيانات';
    }
  } catch (e) {
    console.error(e);
    msgDiv.textContent = e.message || 'خطأ في الاتصال بالخادم';
  }
}

function fillBranchesByType() {
  const type = document.getElementById('pointTypeSelect').value;
  const sel = document.getElementById('branchSelect');
  if (!type) { sel.innerHTML = '<option value="">اختر نوع المستخدم أولاً</option>'; return; }
  const branches = [...new Set(db.users.filter(u => u.active === true && u.pointType === type).map(u => u.branch))];
  sel.innerHTML = '<option value="">اختر الفرع / المستخدم</option>' + branches.map(b => `<option value="${esc(b)}">${esc(b)}</option>`).join('');
}

async function login() {
  const pointType = document.getElementById('pointTypeSelect').value;
  const branch = document.getElementById('branchSelect').value;
  const pass = document.getElementById('passInput').value;
  if (!pointType || !branch || !pass) return toast('املأ جميع الحقول', true);
  const user = db.users.find(u => u.active && u.pointType === pointType && u.branch === branch && (u.pass === pass || u.superPass === pass));
  if (!user) return toast('بيانات الدخول غير صحيحة', true);
  currentUser = { branch, pointType, pass, superPass: user.superPass, username: branch };
  localStorage.setItem('SOKAR_USER', JSON.stringify(currentUser));
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appSections').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.remove('hidden');
  document.getElementById('whoami').textContent = `${currentUser.branch} (${currentUser.pointType})`;
  await refreshData();
  buildNav();
  if (currentUser.pointType === 'خدمة العملاء') showSection('crm');
  else if (currentUser.pointType === 'دليفري') showSection('delivery');
  else showSection('pos');
  if (currentUser.pointType === 'دليفري') startDeliveryOrdersPolling();
}

function logout() { if (deliveryOrdersRefreshInterval) clearInterval(deliveryOrdersRefreshInterval); localStorage.removeItem('SOKAR_USER'); location.reload(); }

function restoreSession() {
  try {
    const u = JSON.parse(localStorage.getItem('SOKAR_USER'));
    if (u && db.users.some(usr => usr.branch === u.branch && usr.pointType === u.pointType && usr.active)) {
      currentUser = u;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('appSections').classList.remove('hidden');
      document.getElementById('logoutBtn').classList.remove('hidden');
      document.getElementById('whoami').textContent = `${currentUser.branch} (${currentUser.pointType})`;
      refreshData().then(() => { buildNav(); showSection(currentUser.pointType === 'دليفري' ? 'delivery' : (currentUser.pointType === 'خدمة العملاء' ? 'crm' : 'pos')); if (currentUser.pointType === 'دليفري') startDeliveryOrdersPolling(); });
    } else localStorage.removeItem('SOKAR_USER');
  } catch(e) {}
}

async function refreshData() {
  if (!currentUser) return;
  try {
    const res = await jsonp('getInitialData', { userType: currentUser.pointType, branch: currentUser.branch, username: currentUser.branch });
    if (res.ok) {
      db.products = res.products || [];
      db.users = res.users || [];
      db.stock = res.stock || [];
      db.sales = res.sales || [];
      db.crmOrders = res.crmOrders || [];
      db.shifts = res.shifts || [];
      db.complaints = res.complaints || [];
      db.customers = res.customers || [];
      loadCurrentShift();
      renderAll();
    }
  } catch(e) { toast(e.message, true); }
}

function buildNav() {
  const nav = document.getElementById('navMenu');
  const pt = currentUser?.pointType || '';
  let items = [];
  if (pt === 'مندوب_بيع') items = [['pos','نقطة البيع','cash-register']];

function askQty(name) {
  const p = db.products.find(x => x.name === name);
  if (!p) return;
  pendingProduct = p; pendingEditIndex = -1;
  document.getElementById('qtyTitle').innerHTML = isWeight(p) ? `الوزن (جرام) - ${p.name}` : `الكمية - ${p.name}`;
  document.getElementById('qtyInput').value = isWeight(p) ? 1000 : 1;

function closeQty() { document.getElementById('qtyModal').style.display = 'none'; pendingProduct = null; pendingEditIndex = -1; crmPendingProduct = null; crmPendingEditIndex = -1; }
function confirmQty() {
  let qty = parseFloat(document.getElementById('qtyInput').value);
  if (isNaN(qty) || qty <= 0) return;
  if (!pendingProduct) return;
  const chargeQty = isWeight(pendingProduct) ? qty / 1000 : qty;
  const total = chargeQty * pendingProduct.price;
  if (pendingEditIndex >= 0) {
    const item = cart[pendingEditIndex];
    if (item) { item.qty = qty; item.chargeQty = chargeQty; item.total = total; }
  } else {
    const existing = cart.find(i => i.name === pendingProduct.name);
    if (existing) { existing.qty += qty; existing.chargeQty += chargeQty; existing.total = existing.chargeQty * existing.price; }
    else cart.push({ name: pendingProduct.name, unit: pendingProduct.unit, price: pendingProduct.price, qty, chargeQty, total });
  }
  closeQty(); renderCart();
}
function editCartItem(idx) { const item = cart[idx]; const p = db.products.find(x => x.name === item.name); if(p){ pendingProduct=p; pendingEditIndex=idx; document.getElementById('qtyTitle').innerHTML=`تعديل - ${p.name}`; document.getElementById('qtyInput').value=item.qty; document.getElementById('qtyModal').style.display='flex'; } }

  if(currentUser.pointType !== 'دليفري' && currentUser.pointType !== 'إدارة') return;
  try {
    const res = await jsonp('getDeliveryOrders', { username: currentUser.branch, branch: currentUser.branch });
    const orders = res.orders || [];
    const tbody = document.getElementById('deliveryTable');
    if(!tbody) return;
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td>${esc(o.id)}</td><td>${o.date}</td><td>${esc(o.customer)}</td><td>${esc(o.phone)}</td><td>${esc(o.address)}</td><td>${money(o.total)}</td><td>${esc(o.status)}</td>
        <td>${o.status === 'جديد' ? `<button class="btn btn-primary btn-icon" onclick="takeOrder('${o.id}')"><i class="fas fa-hand-holding"></i> استلام</button>` : ''}</td>
      </tr>`).join('');
  } catch(e) { toast(e.message, true); }
}
async function takeOrder(orderId) {
  try {
    const res = await postForm('takeOrderByDelivery', { orderId, username: currentUser.branch });
    if(res.ok && res.cart) {
      cart = res.cart.map(i => ({ ...i, chargeQty: i.qty, total: i.price * i.qty }));
      customerData = res.customerInfo;
      currentQROrderId = res.orderId;
      toast('تم استلام الطلب، انتقل إلى نقطة البيع لإتمامه');
      showSection('pos');
      renderPOS();
      setTimeout(() => { if(document.getElementById('deliveryFee')) document.getElementById('deliveryFee').value = 0; renderCart(); }, 500);
    } else toast('فشل استلام الطلب', true);
  } catch(e) { toast(e.message, true); }
}
function startDeliveryOrdersPolling() { if(deliveryOrdersRefreshInterval) clearInterval(deliveryOrdersRefreshInterval); deliveryOrdersRefreshInterval = setInterval(() => { if(currentUser?.pointType === 'دليفري' && document.getElementById('sec-delivery').classList.contains('active')) loadDeliveryOrders(); }, 30000); }

// ======================== البحث في الفواتير ========================
function renderSearch() {
  document.getElementById('sec-search').innerHTML = `
    <div class="top-bar"><div class="page-title"><i class="fas fa-search"></i> البحث في الفواتير</div></div>
    <div class="card"><div><input type="text" id="searchQuery" placeholder="رقم الفاتورة أو رقم العميل"><input type="date" id="searchFrom"><input type="date" id="searchTo"><button class="btn btn-primary" onclick="doSearch()">بحث</button></div><div id="searchResults"></div></div>`;
}
async function doSearch() {
  const query = document.getElementById('searchQuery').value.trim();
  const fromDate = document.getElementById('searchFrom').value;
  const toDate = document.getElementById('searchTo').value;
  try {
    const res = await jsonp('searchInvoices', { query, branch: currentUser.branch, fromDate, toDate });
    const sales = res.sales || [];
    const container = document.getElementById('searchResults');
    if(!sales.length) { container.innerHTML = '<p>لا توجد نتائج</p>'; return; }
    container.innerHTML = `<table><thead><tr><th>الكود</th><th>التاريخ</th><th>الفرع</th><th>العميل</th><th>الإجمالي</th><th></th></tr></thead><tbody>${sales.map(s => `<tr><td>${esc(s.saleId)}</td><td>${s.date}</td><td>${esc(s.branch)}</td><td>${esc(s.customer)}</td><td>${money(s.total)}</td><td><button class="btn btn-outline" onclick="viewInvoice('${s.saleId}')">عرض</button></td>`).join('')}</tbody></table>`;
  } catch(e) { toast(e.message, true); }
}
async function viewInvoice(saleId) {
  try {
    const res = await jsonp('getSaleById', { saleId });
    if(!res.sale) return toast('الفاتورة غير موجودة', true);
    const sale = res.sale;
    const itemsHtml = (sale.items || []).map(i => `<div>${i.name} x ${i.qty} = ${money(i.total)}</div>`).join('');
    const printWin = window.open('', '_blank');
    printWin.document.write(`<html><head><title>فاتورة ${sale.saleId}</title><style>body{font-family:sans-serif;padding:20px;direction:rtl;}</style></head><body><h2>سكّر 33</h2><p>الفرع: ${sale.branch}</p><p>التاريخ: ${sale.date}</p><p>العميل: ${sale.customer}</p><p>الهاتف: ${sale.phone}</p><p>العنوان: ${sale.address}</p><hr/>${itemsHtml}<hr/><h3>الإجمالي: ${money(sale.total)} ج.م</h3><p>طريقة الدفع: ${sale.paymentMethod}</p><p>شكراً لتسوقكم</p></body></html>`);
    printWin.document.close(); printWin.print();
  } catch(e) { toast(e.message, true); }
}

// ======================== باقي الشاشات ========================
function renderStock() { document.getElementById('sec-stock').innerHTML = `<div class="card"><div class="table-wrapper"><tr><thead><tr><th>الصنف</th><th>الرصيد</th></tr></thead><tbody>${db.stock.filter(s=>s.branch===currentUser.branch).map(s=>`<tr><td>${esc(s.item)}</td><td>${s.qty}</td></tr>`).join('')}</tbody></table></div></div>`; }
function renderProductsManagement() { document.getElementById('sec-products').innerHTML = `<div class="card"><div class="table-wrapper"><table><thead><tr><th>الاسم</th><th>القسم</th><th>السعر</th><th>الوحدة</th></tr></thead><tbody>${db.products.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.cat)}</td><td>${money(p.price)}</td><td>${esc(p.unit)}</td></tr>`).join('')}</tbody></table></div></div>`; }
function renderUsersManagement() { document.getElementById('sec-users').innerHTML = `<div class="card"><div class="table-wrapper"><table><thead><tr><th>الفرع</th><th>اسم المستخدم</th><th>النوع</th><th>نشط</th></tr></thead><tbody>${db.users.map(u=>`<tr><td>${esc(u.branch)}</td><td>${esc(u.username)}</td><td>${esc(u.pointType)}</td><td>${u.active?'✅':'❌'}</td></tr>`).join('')}</tbody></table></div></div>`; }
function renderReports() { document.getElementById('sec-reports').innerHTML = `<div class="card"><div class="table-wrapper"><table><thead><tr><th>الكود</th><th>التاريخ</th><th>العميل</th><th>الإجمالي</th><th>الكاشير</th></tr></thead><tbody>${db.sales.filter(s=>s.branch===currentUser.branch).slice(0,50).map(s=>`<tr><td>${esc(s.saleId)}</td><td>${s.date}</td><td>${esc(s.customer)}</td><td>${money(s.total)}</td><td>${esc(s.cashier)}</td></tr>`).join('')}</tbody></table></div></div>`; }
function renderComplaints() { document.getElementById('sec-complaints').innerHTML = `<div class="top-bar"><button class="btn btn-primary" onclick="openComplaintModal()"><i class="fas fa-plus"></i> شكوى جديدة</button></div><div class="card"><div id="complaintsList"></div></div>`; loadComplaints(); }
async function loadComplaints() { try { const res = await jsonp('getInitialData', { userType: currentUser.pointType, branch: currentUser.branch, username: currentUser.branch }); const complaints = res.complaints || []; document.getElementById('complaintsList').innerHTML = `<div class="table-wrapper"><table><thead><tr><th>التاريخ</th><th>العميل</th><th>النوع</th><th>الحالة</th></tr></thead><tbody>${complaints.map(c=>`<tr><td>${c.date}</td><td>${esc(c.customerName)}</td><td>${esc(c.type)}</td><td>${esc(c.status)}</td></tr>`).join('')}</tbody></table></div>`; } catch(e){} }
function openComplaintModal() { document.getElementById('complaintModal').style.display = 'flex'; }
function closeComplaintModal() { document.getElementById('complaintModal').style.display = 'none'; }
async function saveComplaint() {
  const phone = document.getElementById('complaintPhone').value.trim();
  const name = document.getElementById('complaintName').value.trim();
  const type = document.getElementById('complaintType').value;
  const desc = document.getElementById('complaintDesc').value.trim();
  if(!phone || !desc) return toast('رقم الهاتف ووصف الشكوى مطلوبان', true);
  try {
    await postForm('saveComplaint', { complaint: { phone, customerName: name, branch: currentUser.branch, type, description: desc, handledBy: currentUser.branch, notes: '' } });
    toast('تم حفظ الشكوى');
    closeComplaintModal();
    await refreshData();
    renderComplaints();
  } catch(e) { toast(e.message, true); }
}

// ======================== الورديات ========================
function loadCurrentShift() { currentShift = db.shifts.find(s => s.branch === currentUser.branch && s.cashier === currentUser.branch && s.status === 'مفتوحة') || null; updateShiftDisplay(); }
function updateShiftDisplay() { const el = document.getElementById('shiftStatus'); if(el) el.textContent = currentShift ? `وردية مفتوحة: ${currentShift.openTime}` : 'لا توجد وردية مفتوحة'; }
function showShiftModal() { const modal = document.getElementById('shiftModal'); const info = document.getElementById('shiftInfo'); const actions = document.getElementById('shiftActions'); info.innerHTML = currentShift ? `<div>الحالة: مفتوحة</div><div>وقت الفتح: ${currentShift.openTime}</div>` : `<div>لا توجد وردية مفتوحة</div>`; actions.innerHTML = currentShift ? `<div style="display:flex; gap:10px;"><button class="btn btn-danger" onclick="closeShiftConfirmed()">إغلاق الوردية</button><button class="btn btn-outline" onclick="cancelShiftConfirmed()">إلغاء الوردية</button></div>` : `<button class="btn btn-primary" onclick="openShiftConfirmed()">فتح وردية</button>`; modal.style.display = 'flex'; }
function closeShiftModal() { document.getElementById('shiftModal').style.display = 'none'; }
async function openShiftConfirmed() { await postForm('openShift', { branch: currentUser.branch, cashier: currentUser.branch }); await refreshData(); closeShiftModal(); toast('تم فتح الوردية'); }
async function closeShiftConfirmed() { await postForm('closeShift', { shiftId: currentShift.id, branch: currentUser.branch }); await refreshData(); closeShiftModal(); toast('تم إغلاق الوردية'); }
async function cancelShiftConfirmed() { await postForm('cancelShift', { shiftId: currentShift.id, branch: currentUser.branch }); await refreshData(); closeShiftModal(); toast('تم إلغاء الوردية'); }

// ======================== دوال QR ========================
async function createQROrder() {
  if(!cart.length) return toast('السلة فارغة', true);
  const sub = cart.reduce((a,b)=>a+b.total,0);
  const fee = parseFloat(document.getElementById('deliveryFee')?.value)||0;
  const discType = document.getElementById('discountType')?.value;
  let disc = parseFloat(document.getElementById('discountVal')?.value)||0;
  if(discType==='percent') disc = sub*disc/100;
  const total = Math.max(0, sub+fee-disc);
  try {
    const res = await postForm('createQROrder', { order: { branch: currentUser.branch, creator: currentUser.branch, items: cart.map(i=>({ name:i.name, qty:i.qty, price:i.price, total:i.total })), subtotal: sub, discount: disc, delivery: fee, total } });
    const orderId = res?.orderId;
    if(!orderId) return toast('فشل إنشاء QR', true);
    document.getElementById('qrOrderId').innerText = orderId;
    const container = document.getElementById('qrCodeContainer');
    container.innerHTML = '';
    QRCode.toCanvas(document.createElement('canvas'), orderId, { width: 260 }, (err, canvas) => { if(err) container.innerHTML = '<p style="color:red;">فشل إنشاء QR</p>'; else { container.appendChild(canvas); document.getElementById('qrModal').style.display = 'flex'; } });
    toast('تم إنشاء QR بنجاح');
  } catch(e) { toast(e.message, true); }
}
function closeQrModal() { document.getElementById('qrModal').style.display = 'none'; }
function printQR() { const canvas = document.querySelector('#qrCodeContainer canvas'); if(!canvas) return; const win = window.open(''); win.document.write(`<html><head><title>QR</title></head><body style="display:flex;justify-content:center;align-items:center;height:100vh">${'<img src="' + canvas.toDataURL() + '">'} </body></html>`); win.document.close(); win.print(); }
function openQRScanner() { document.getElementById('qrScannerModal').style.display = 'flex'; document.getElementById('manualQrInput').value = ''; if(!html5QrScanner) html5QrScanner = new Html5Qrcode("qrReader"); html5QrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, (decodedText) => { loadQROrder(decodedText); }, () => {}).catch(() => toast('فشل تشغيل الكاميرا', true)); }
function closeQrScanner() { if(html5QrScanner) html5QrScanner.stop().catch(()=>{}); document.getElementById('qrScannerModal').style.display = 'none'; }
async function loadManualQR() { const code = document.getElementById('manualQrInput').value.trim(); if(!code) return toast('أدخل كود الطلب', true); loadQROrder(code); }
async function loadQROrder(orderId) {
  try {
    const res = await jsonp('getQROrder', { orderId });
    if(!res.order) return toast('الطلب غير موجود', true);
    const order = res.order;
    cart = order.items.map(i => { const p = db.products.find(pp => pp.name === i.name) || { unit:'قطعة' }; return { name:i.name, unit:p.unit, price:i.price, qty:i.qty, chargeQty:isWeight(p) ? (i.qty / 1000) : i.qty, total:i.total }; });
    currentQROrderId = orderId;
    closeQrScanner();
    renderPOS();
    if(document.getElementById('deliveryFee')) document.getElementById('deliveryFee').value = order.delivery || 0;
    if(document.getElementById('discountVal')) document.getElementById('discountVal').value = order.discount || 0;
    renderCart();
    toast(`تم تحميل الطلب ${orderId}`);
  } catch(e) { toast(e.message, true); }
}
