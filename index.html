<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نظام سكر للمبيعات | م/ محمود سلامه</title>
    <style>
        :root { --primary: #c2185b; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        input, select { padding: 12px; width: 100%; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
        .card { padding: 20px; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cat-card { background: var(--primary); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        @media print { .no-print { display: none !important; } #printZone { display: block !important; } }
    </style>
</head>
<body>

<div id="loader"><h2>جاري تحميل بيانات سكر...</h2><p>تطوير م/ محمود سلامه</p></div>

<div id="loginPage" class="container" style="margin-top: 50px;">
    <h1 style="color:var(--primary)">نظام سكر 🍬</h1>
    <p>بإشراف م/ محمود سلامه</p>
    <select id="userSelect"><option value="">--- اختر الفرع الصحيح ---</option></select>
    <input type="password" id="userPass" placeholder="كلمة المرور">
    <button class="btn" onclick="handleLogin()">دخول النظام</button>
</div>

<div id="mainApp" style="display: none;">
    <div class="container no-print">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom:10px;">
            <h3 id="branchInfo" style="color:var(--primary); margin:0;"></h3>
            <button onclick="location.reload()">خروج</button>
        </div>

        <div id="s-pos">
            <div id="catGrid" class="grid"></div>
            <div id="prodGrid" class="grid" style="display:none"></div>
            <button id="btnBack" class="btn" onclick="showCats()" style="display:none; background:#777;">🔙 العودة للأقسام</button>
            
            <table id="cartTable" style="display:none">
                <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>حذف</th></tr></thead>
                <tbody id="cartBody"></tbody>
            </table>
            <div id="finalArea" style="display:none; margin-top:20px;">
                <h2 style="color:var(--primary)">الإجمالي: <span id="finalTotal">0</span> ج.م</h2>
                <button class="btn" style="background:green" onclick="submitOrder()">تأكيد وطباعة ✅</button>
            </div>
        </div>
        <p style="font-size:12px; margin-top:30px; color:#999">تطوير م/ محمود سلامه © 2026</p>
    </div>

    <div id="printZone" style="display:none; padding:20px; border:1px solid #000; width:280px; margin:0 auto; text-align:center;">
        <h2>برنامج سكر 🍬</h2><hr>
        <p id="p-branch"></p><p id="p-inv"></p>
        <div id="p-items" style="text-align:right;"></div><hr>
        <h3 id="p-total"></h3>
        <p style="font-size:10px;">تطوير م/ محمود سلامه</p>
        <button class="no-print btn" onclick="location.reload()">أوردر جديد</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwLfTCidA3Ils8UcmWeQ3oBGjxAHtpFcNkooJZ0LITOe-F0XJW6HFihsFBq6U3tx4JW1g/exec"; 
    let db = { products: [], users: [], stock: [] };
    let cart = []; let currentBranch = ""; let superPass = "";

    async function init() {
        try {
            const r = await fetch(API + "?action=getInitialData");
            db = await r.json();
            const sel = document.getElementById("userSelect");
            sel.innerHTML = '<option value="">--- اختر الفرع ---</option>';
            if(db.users && db.users.length > 0) {
                db.users.forEach(u => sel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`);
            } else {
                sel.innerHTML = '<option value="">❌ تأكد من شيت المستخدمين</option>';
            }
            document.getElementById("loader").style.display = "none";
        } catch(e) { alert("تأكد من نشر السكريبت (Anyone)"); }
    }

    function handleLogin() {
        const u = document.getElementById("userSelect").value;
        const p = document.getElementById("userPass").value;
        const user = db.users.find(x => x.branch === u && x.pass === p);
        if(user) { 
            currentBranch = u; 
            superPass = user.superPass;
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("branchInfo").innerText = "فرع: " + currentBranch;
            showCats();
        } else alert("خطأ في البيانات");
    }

    function showCats() {
        document.getElementById("btnBack").style.display = "none";
        document.getElementById("prodGrid").style.display = "none";
        const grid = document.getElementById("catGrid"); grid.innerHTML = ""; grid.style.display = "grid";
        const cats = [...new Set(db.products.map(p => p.cat))];
        cats.forEach(c => {
            const d = document.createElement("div"); d.className = "card cat-card"; d.innerText = c;
            d.onclick = () => showProds(c); grid.appendChild(d);
        });
    }

    function showProds(cat) {
        document.getElementById("catGrid").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        const grid = document.getElementById("prodGrid"); grid.innerHTML = ""; grid.style.display = "grid";
        db.products.filter(p => p.cat === cat).forEach(p => {
            const d = document.createElement("div"); d.className = "card";
            d.innerHTML = `${p.name}<br><small>${p.price}ج</small>`;
            d.onclick = () => addToCart(p); grid.appendChild(d);
        });
    }

    function addToCart(p) {
        let q = prompt(`كمية ${p.name}:`, p.type=="weight"?"500":"1");
        if(!q || isNaN(q)) return;
        let pr = p.type=="weight" ? (p.price/1000*q) : (p.price*q);
        cart.push({name: p.name, qty: q, total: pr});
        renderCart();
    }

    function renderCart() {
        const b = document.getElementById("cartBody"); b.innerHTML = ""; let t = 0;
        cart.forEach((i, idx) => {
            t += i.total;
            b.innerHTML += `<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.total}ج</td><td onclick="removeCart(${idx})" style="color:red;cursor:pointer">❌</td></tr>`;
        });
        document.getElementById("cartTable").style.display = cart.length ? "table" : "none";
        document.getElementById("finalArea").style.display = cart.length ? "block" : "none";
        document.getElementById("finalTotal").innerText = t.toFixed(2);
    }

    function removeCart(idx) {
        if(prompt("باسورد المشرف للمسح:") === superPass) { cart.splice(idx,1); renderCart(); }
        else alert("خطأ!");
    }

    async function submitOrder() {
        const inv = "INV-"+Math.floor(Math.random()*900000);
        const total = document.getElementById("finalTotal").innerText;
        await fetch(API, {method: "POST", body: JSON.stringify({action: "saveOrder", order: { date: new Date().toLocaleDateString('ar-EG'), branch: currentBranch, details: cart.map(i=>`${i.name}(${i.qty})`).join("+"), total: total, invoice: inv, isoDate: new Date().toISOString() }})});
        document.getElementById("p-branch").innerText = "فرع: " + currentBranch;
        document.getElementById("p-inv").innerText = "فاتورة: " + inv;
        document.getElementById("p-items").innerHTML = cart.map(i=>`<div>${i.name} x ${i.qty} = ${i.total}ج</div>`).join("");
        document.getElementById("p-total").innerText = "الإجمالي: " + total + " ج.م";
        document.getElementById("mainApp").style.display = "none";
        document.getElementById("printZone").style.display = "block";
        window.print();
    }

    window.onload = init;
</script>
</body>
</html>
