function renderOrders() {
  const sec = document.getElementById('sec-orders');
  if (!sec) return;

  const branch = isDelivery() ? currentUser.branch :
                 (isAdmin()||isCRM()) ? (adminBranch||'') : currentUser.branch;

  let orders = [...db.crmOrders].reverse();
  if (branch) orders = orders.filter(o=>o.branch===branch||!branch);

  const pending = orders.filter(o=>!['مكتمل','ملغي'].includes(o.status));

  sec.innerHTML = `
    <div class="top-bar">
      <div class="page-title"><i class="fas fa-truck" style="color:var(--primary);"></i>
        الأوردرات ${pending.length ? `<span class="badge badge-warning" style="font-size:1rem;">${pending.length} جديد</span>` : ''}
      </div>
      <div class="action-buttons">
        ${isCRM() ? `<button class="btn btn-primary btn-sm" onclick="showNewOrderModal()">
          <i class="fas fa-plus"></i> طلب جديد
        </button>` : ''}
        <button class="btn btn-outline btn-sm" onclick="refreshData()"><i class="fas fa-sync"></i></button>
      </div>
    </div>

    <!-- فلتر الحالة -->
    <div class="tabs" id="orderStatusTabs">
      <button class="tab active" onclick="filterOrdersByStatus('',this)">الكل (${orders.length})</button>
      ${db.crmStatuses.map(s=>{
        const cnt = orders.filter(o=>o.status===s).length;
        return `<button class="tab" onclick="filterOrdersByStatus('${jsq(s)}',this)">${esc(s)} (${cnt})</button>`;
      }).join('')}
    </div>

    <div id="ordersContainer">
      ${renderOrdersGrid(orders)}
    </div>`;
}

function filterOrdersByStatus(status, el) {
  document.querySelectorAll('#orderStatusTabs .tab').forEach(t=>t.classList.remove('active'));
  if (el) el.classList.add('active');

  const branch = isDelivery() ? currentUser.branch :
                 (isAdmin()||isCRM()) ? (adminBranch||'') : currentUser.branch;
  let orders = [...db.crmOrders].reverse();
  if (branch) orders = orders.filter(o=>o.branch===branch||!branch);
  if (status) orders = orders.filter(o=>o.status===status);

  document.getElementById('ordersContainer').innerHTML = renderOrdersGrid(orders);
}

function renderOrdersGrid(orders) {
  if (!orders.length) return '<p style="text-align:center;padding:30px;color:var(--text-muted);">لا توجد طلبات</p>';

  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:16px;">
    ${orders.map(o=>{
      const statusColor = o.status==='مكتمل' ? 'badge-success' :
                          o.status==='ملغي'   ? 'badge-danger'  :
                          o.status==='خرج للتوصيل' ? 'badge-blue' : 'badge-warning';
      const canEdit = isDelivery() || isCRM() || isAdmin();
      return `<div class="card" style="border-right:4px solid var(--primary);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-weight:700;font-size:.85rem;">${esc(o.id)}</span>
          <span class="badge ${statusColor}">${esc(o.status)}</span>
        </div>
        <div style="margin-bottom:8px;">
          <div>👤 <strong>${esc(o.customer||'-')}</strong></div>
          <div>📞 ${esc(o.phone||'-')}</div>
          <div>📍 ${esc(o.address||'-')}</div>
        </div>
        <div style="background:var(--bg);border-radius:12px;padding:10px;margin-bottom:10px;font-size:.9rem;">
          ${esc(o.items||'')}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <strong style="color:var(--primary);font-size:1.1rem;">${money(o.total)} ج.م</strong>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${canEdit ? `<button class="btn btn-outline btn-sm" onclick="editOrder('${jsq(o.id)}')">
              <i class="fas fa-edit"></i>
            </button>` : ''}
            <select class="btn btn-outline btn-sm" style="padding:6px;border-radius:10px;"
              onchange="updateOrderStatus('${jsq(o.id)}',this.value)">
              ${db.crmStatuses.map(s=>
                `<option value="${esc(s)}" ${s===o.status?'selected':''}>${esc(s)}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div style="font-size:.8rem;color:var(--text-muted);margin-top:8px;">
          ${esc(o.createdAt||'')} · ${esc(o.createdBy||'')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function updateOrderStatus(id, status) {
  try {
    await postForm('updateCrmOrderStatus',{id,status});
    await refreshData(true);
    renderOrders();
    toast(`✓ تم تحديث حالة الطلب`);
  } catch(e){ toast(e.message,true); }
}

function editOrder(id) {
  const o = db.crmOrders.find(x=>x.id===id);
  if (!o) return;

  // فتح modal للتعديل
  const modal = document.getElementById('customerModal');
  document.getElementById('customerName').value    = o.customer||'';
  document.getElementById('customerPhone').value   = o.phone||'';
  document.getElementById('customerAddress').value = o.address||'';
  modal.style.display='flex';

  // override confirmCustomerInfo
  window._editOrderId = id;
  document.querySelector('#customerModal .btn-primary').onclick = async function() {
    const updated = {
      ...o,
      customer: document.getElementById('customerName').value.trim(),
      phone:    document.getElementById('customerPhone').value.trim(),
      address:  document.getElementById('customerAddress').value.trim()
    };
    // Re-save (update by re-posting)
    try {
      await postForm('updateCrmOrderStatus',{id:o.id, status:o.status});
      closeCustomerModal();
      toast('تم تحديث بيانات الطلب ✓');
      document.querySelector('#customerModal .btn-primary').onclick = confirmCustomerInfo;
    } catch(e){ toast(e.message,true); }
  };
}

function showNewOrderModal() {
  // فتح نموذج طلب جديد بسيط
  const branch = adminBranch || currentUser.branch;
  const items  = prompt('الأصناف المطلوبة (مثال: كيكة شوكولاتة × 1، بسبوسة × 2)');
  if (!items) return;
  const customer = prompt('اسم العميل');
  const phone    = prompt('رقم الهاتف');
  const address  = prompt('العنوان');
  const total    = parseFloat(prompt('الإجمالي (ج.م)')||'0');

  postForm('saveCrmOrder',{order:{
    branch, customer, phone, address, items, total,
    notes:'', status:'تم الاستلام', createdBy:currentUser.username

function renderStock() {
  const sec = document.getElementById('sec-stock');
  const canEdit = isSupervisor() || isAdmin();
  const isReadOnly = isSalesman() || pt()==='فرع';

  // خدمة العملاء والإدارة: اختيار الفرع أولاً
  const needBranchSelect = isAdmin() || isCRM();
  const branch = needBranchSelect ? (adminBranch||'') : currentUser.branch;

  const branches = [...new Set(db.users.filter(u=>u.active).map(u=>u.branch))].sort();

  sec.innerHTML = `
    <div class="top-bar">
      <div class="page-title"><i class="fas fa-warehouse" style="color:var(--primary);"></i> المخزون</div>
      <div class="action-buttons">
        <button class="btn btn-outline btn-sm" onclick="refreshData()"><i class="fas fa-sync"></i> تحديث</button>
      </div>
    </div>

    ${needBranchSelect ? `
    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <i class="fas fa-store" style="color:var(--primary);font-size:1.4rem;"></i>
        <label style="font-weight:700;">اختر الفرع:</label>
        <select id="stockBranchFilter" onchange="onStockBranchChange()"
          style="width:auto;font-weight:700;color:var(--primary);">

          ${branches.map(b=>`<option value="${esc(b)}" ${b===branch?'selected':''}>${esc(b)}</option>`).join('')}

    </div>` : ''}

      ${branch ? renderStockTable(branch, canEdit) :
        `<div class="card" style="text-align:center;padding:40px;">
          <i class="fas fa-warehouse" style="font-size:3rem;color:var(--text-muted);margin-bottom:16px;display:block;"></i>
          <p style="color:var(--text-muted);">اختر فرعاً لعرض المخزون</p>
        </div>`}
    </div>`;
}

function onStockBranchChange() {
  const b = document.getElementById('stockBranchFilter')?.value||'';
  adminBranch = b;
  const canEdit = isSupervisor()||isAdmin();
  document.getElementById('stockContent').innerHTML =
    b ? renderStockTable(b, canEdit) :
    `<div class="card" style="text-align:center;padding:40px;">
      <p style="color:var(--text-muted);">اختر فرعاً لعرض المخزون</p>
    </div>`;
}

function renderStockTable(branch, canEdit) {
  let items = db.stock.filter(s=>s.branch===branch);
  if (!items.length) return `
    <div class="card" style="text-align:center;padding:40px;">
      <p style="color:var(--text-muted);">لا يوجد مخزون مسجل لهذا الفرع</p>
    </div>`;

  return `
    <div class="card">
      <div class="card-header">
        <span><i class="fas fa-boxes"></i> مخزون ${esc(branch)}</span>
        <input type="text" id="stockSearch" placeholder="🔍 بحث عن صنف..."
          style="width:200px;padding:10px;" oninput="filterStockTable('${jsq(branch)}',${canEdit})">
      </div>
      <div id="stockTableWrap">
        ${buildStockTableHTML(items, canEdit)}
      </div>
    </div>`;
}

function buildStockTableHTML(items, canEdit) {
  return `<div class="table-wrapper"><table>
    <thead><tr>
      <th>الصنف</th><th>الرصيد الحالي</th><th>الحالة</th><th>آخر تحديث</th>
      ${canEdit?'<th>تعديل</th>':''}
    </tr></thead>
    <tbody>
      ${items.map(s=>{
        const stClass = s.qty<=0?'badge-danger':s.qty<=5?'badge-warning':'badge-success';
        const stLabel = s.qty<=0?'نفد':s.qty<=5?'منخفض':'متوفر';
        return `<tr>
          <td><strong>${esc(s.item)}</strong></td>
          <td style="font-size:1.1rem;font-weight:700;">${s.qty}</td>
          <td><span class="badge ${stClass}">${stLabel}</span></td>
          <td style="font-size:.85rem;color:var(--text-muted);">${esc(s.lastUpdate||'')}</td>
          ${canEdit?`<td>
            <button class="btn btn-outline btn-sm" onclick="openStockModal('${jsq(s.branch)}','${jsq(s.item)}',${s.qty})">
              <i class="fas fa-edit"></i>
            </button>
          </td>`:''}
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

function filterStockTable(branch, canEdit) {
  const search = document.getElementById('stockSearch')?.value.toLowerCase()||'';
  const items  = db.stock.filter(s=>
    s.branch===branch && s.item.toLowerCase().includes(search)
  );
  const wrap = document.getElementById('stockTableWrap');
  if (wrap) wrap.innerHTML = buildStockTableHTML(items, canEdit);
}

function openStockModal(branch, item, qty) {
  document.getElementById('stockBranch').value  = branch;
  document.getElementById('stockItem').value    = item;
  document.getElementById('stockNewQty').value  = qty;
  document.getElementById('stockUpdateModal').style.display='flex';
  setTimeout(()=>document.getElementById('stockNewQty').focus(),100);
}

function closeStockModal() {
  document.getElementById('stockUpdateModal').style.display='none';
}

async function confirmStockUpdate() {
  const branch = document.getElementById('stockBranch').value;
  const item   = document.getElementById('stockItem').value;
  const qty    = parseFloat(document.getElementById('stockNewQty').value);
  if (isNaN(qty)||qty<0) return toast('أدخل كمية صحيحة',true);
  try {
    await postForm('updateStock',{branch,item,qty});
    await refreshData(true);
    closeStockModal();
    toast(`✓ تم تحديث مخزون ${item}`);
    renderStock();
  } catch(e){ toast(e.message,true); }
}

        ${canEdit?`<button class="btn btn-primary btn-sm" onclick="openProductModal()">

      </div>

          <select id="prodCatFilter" onchange="filterProductsTable()" style="width:auto;">
            <option value="">كل التصنيفات</option>
            ${[...new Set(db.products.map(p=>p.cat).filter(Boolean))].map(c=>

        </div>
      </div>
      <div id="productsTableWrap">
        ${buildProductsTableHTML(db.products, canEdit)}
      </div>
    </div>`;

function buildProductsTableHTML(products, canEdit) {
  if (!products.length) return '<p style="text-align:center;padding:20px;color:var(--text-muted);">لا توجد منتجات</p>';
  return `<div class="table-wrapper"><table>
    <thead><tr>
      <th>اسم الصنف</th><th>التصنيف</th><th>السعر</th><th>الوحدة</th>
      ${canEdit?'<th>إجراءات</th>':''}
    </tr></thead>
    <tbody>
      ${products.map(p=>`<tr>
        <td><strong>${esc(p.name)}</strong></td>
        <td><span class="badge badge-primary">${esc(p.cat)}</span></td>
        <td><strong>${money(p.price)} ج</strong></td>
        <td>${esc(p.unit)}</td>
        ${canEdit?`<td>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-outline btn-sm" onclick="openProductModal('${jsq(p.name)}')">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct('${jsq(p.name)}')">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </td>`:''}
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function filterProductsTable() {
  const search  = document.getElementById('prodSearchInput')?.value.toLowerCase()||'';
  const catFilter = document.getElementById('prodCatFilter')?.value||'';
  const canEdit = isAdmin();
  let filtered  = db.products;
  if (search)    filtered = filtered.filter(p=>p.name.toLowerCase().includes(search)||p.cat.toLowerCase().includes(search));
  if (catFilter) filtered = filtered.filter(p=>p.cat===catFilter);
  const wrap = document.getElementById('productsTableWrap');
  if (wrap) wrap.innerHTML = buildProductsTableHTML(filtered, canEdit);
}

function openProductModal(name='') {
  editingProductName = name;
  const p = name ? db.products.find(x=>x.name===name) : null;

  document.getElementById('productModalTitle').innerHTML =
    `<i class="fas fa-tag"></i> ${name ? 'تعديل صنف' : 'إضافة صنف جديد'}`;
  document.getElementById('prodName').value  = p?.name||'';
  document.getElementById('prodCat').value   = p?.cat||'';
  document.getElementById('prodPrice').value = p?.price||'';
  document.getElementById('prodUnit').value  = p?.unit||'قطعة';

  // تلميحات التصنيف
  const cats = [...new Set(db.products.map(x=>x.cat).filter(Boolean))];
  document.getElementById('catSuggestions').innerHTML =
    cats.map(c=>`<option value="${esc(c)}">`).join('');

  document.getElementById('productModal').style.display='flex';
  setTimeout(()=>document.getElementById('prodName').focus(),100);
}

function closeProductModal() {
  document.getElementById('productModal').style.display='none';
  editingProductName='';
}

async function confirmSaveProduct() {
  const name  = document.getElementById('prodName').value.trim();
  const cat   = document.getElementById('prodCat').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value)||0;
  const unit  = document.getElementById('prodUnit').value;

  if (!name)    return toast('أدخل اسم الصنف',true);
  if (!cat)     return toast('أدخل التصنيف',true);
  if (price<=0) return toast('أدخل سعراً صحيحاً',true);

  try {
    await postForm('saveProduct',{product:{
      name, cat, price, unit,
      originalName: editingProductName||''
    }});
    await refreshData(true);
    closeProductModal();
    renderProductsManagement();
    toast(`✓ تم ${editingProductName?'تعديل':'إضافة'} الصنف ${name}`);
  } catch(e){ toast(e.message,true); }
}

async function deleteProduct(name) {
  if (!confirm(`حذف الصنف "${name}" نهائياً؟`)) return;
  try {
    await postForm('deleteProduct',{name});
    await refreshData(true);
    renderProductsManagement();
    toast(`✓ تم حذف ${name}`);
  } catch(e){ toast(e.message,true); }
}

        const cnt = db.users.filter(u=>u.pointType===t&&u.active).length;
        return `<div class="kpi-card" style="padding:14px;">
          <div class="kpi-value" style="font-size:1.6rem;">${cnt}</div>
          <div class="kpi-label">${esc(t)}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <div class="card-header">
        <span>المستخدمون (${db.users.length})</span>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <input type="text" id="userSearchInput" placeholder="🔍 بحث..."
            style="width:180px;padding:10px;" oninput="filterUsersTable()">
          <select id="userTypeFilter" onchange="filterUsersTable()" style="width:auto;">
            <option value="">كل الأنواع</option>
            ${pointTypes.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')}
          </select>
          <select id="userBranchFilter" onchange="filterUsersTable()" style="width:auto;">
            <option value="">كل الفروع</option>
            ${[...new Set(db.users.map(u=>u.branch))].sort().map(b=>
              `<option value="${esc(b)}">${esc(b)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="usersTableWrap">
        ${buildUsersTableHTML(db.users)}
      </div>
    </div>`;
}

function buildUsersTableHTML(users) {
  const typeColors = {
    'إدارة':'badge-danger','مشرف':'badge-warning','كاشير':'badge-blue',
    'مندوب_بيع':'badge-primary','دليفري':'badge-success',
    'خدمة العملاء':'badge-blue','فرع':''
  };
  if (!users.length) return '<p style="text-align:center;padding:20px;color:var(--text-muted);">لا يوجد مستخدمون</p>';
  return `<div class="table-wrapper"><table>
    <thead><tr>
      <th>الفرع</th><th>اسم المستخدم</th><th>نوع الصلاحية</th>
      <th>ملاحظات</th><th>الحالة</th><th>إجراءات</th>
    </tr></thead>
    <tbody>
      ${users.map(u=>`<tr>
        <td>${esc(u.branch)}</td>
        <td><strong>${esc(u.username)}</strong></td>
        <td><span class="badge ${typeColors[u.pointType]||''}">${esc(u.pointType)}</span></td>
        <td style="font-size:.85rem;color:var(--text-muted);">${esc(u.notes||'-')}</td>
        <td><span class="badge ${u.active?'badge-success':'badge-danger'}">${u.active?'نشط':'معطل'}</span></td>
        <td>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-outline btn-sm" onclick="openUserModal('${jsq(u.username)}')">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteUser('${jsq(u.username)}','${jsq(u.branch)}')">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function filterUsersTable() {
  const search     = document.getElementById('userSearchInput')?.value.toLowerCase()||'';
  const typeFilter = document.getElementById('userTypeFilter')?.value||'';
  const branchFilter = document.getElementById('userBranchFilter')?.value||'';
  let filtered = db.users;
  if (search)       filtered = filtered.filter(u=>
    u.username.toLowerCase().includes(search)||u.branch.toLowerCase().includes(search));
  if (typeFilter)   filtered = filtered.filter(u=>u.pointType===typeFilter);
  if (branchFilter) filtered = filtered.filter(u=>u.branch===branchFilter);
  const wrap = document.getElementById('usersTableWrap');
  if (wrap) wrap.innerHTML = buildUsersTableHTML(filtered);
}

function openUserModal(username='') {
  editingUsername = username;
  const u = username ? db.users.find(x=>x.username===username) : null;

  document.getElementById('userModalTitle').innerHTML =
    `<i class="fas fa-user-${username?'edit':'plus'}"></i> ${username?'تعديل مستخدم':'إضافة مستخدم جديد'}`;
  document.getElementById('userBranch').value     = u?.branch||'';
  document.getElementById('userUsername').value   = u?.username||'';
  document.getElementById('userPass').value       = u?.pass||'';
  document.getElementById('userSuperPass').value  = u?.superPass||'';
  document.getElementById('userPointType').value  = u?.pointType||'كاشير';
  document.getElementById('userNotes').value      = u?.notes||'';
  document.getElementById('userActive').checked   = u ? u.active : true;

  document.getElementById('userModal').style.display='flex';
  setTimeout(()=>document.getElementById('userBranch').focus(),100);
}

function closeUserModal() {
  document.getElementById('userModal').style.display='none';
  editingUsername='';
}

async function confirmSaveUser() {
  const branch    = document.getElementById('userBranch').value.trim();
  const username  = document.getElementById('userUsername').value.trim();
  const pass      = document.getElementById('userPass').value.trim();
  const superPass = document.getElementById('userSuperPass').value.trim();
  const pointType = document.getElementById('userPointType').value;
  const notes     = document.getElementById('userNotes').value.trim();
  const active    = document.getElementById('userActive').checked;

  if (!branch)   return toast('أدخل الفرع / القسم',true);
  if (!username) return toast('أدخل اسم المستخدم',true);
  if (!pass)     return toast('أدخل كلمة المرور',true);

  // تحقق من تكرار اسم المستخدم
  const duplicate = db.users.find(u=>
    u.username===username && u.branch===branch && u.username!==editingUsername
  );
  if (duplicate) return toast('اسم المستخدم موجود بالفعل في هذا الفرع',true);

  try {
    await postForm('saveUser',{user:{
      branch, username, pass, superPass, pointType, notes, active,
      originalUsername: editingUsername||''
    }});
    await refreshData(true);
    closeUserModal();
    renderUsersManagement();
    toast(`✓ تم ${editingUsername?'تعديل':'إضافة'} المستخدم ${username}`);
  } catch(e){ toast(e.message,true); }
}

async function deleteUser(username, branch) {
  if (!confirm(`حذف المستخدم "${username}" من ${branch}؟`)) return;
  try {
    await postForm('deleteUser',{username, branch});
    await refreshData(true);
    renderUsersManagement();
    toast(`✓ تم حذف المستخدم ${username}`);
  } catch(e){ toast(e.message,true); }
}

// ═══════════════════════════════════════════
// EXPENSES (مصروفات - مشرف/إدارة)
// ═══════════════════════════════════════════
function renderExpenses() {
  const sec    = document.getElementById('sec-expenses');
  const branch = isAdmin() ? (adminBranch||'') : currentUser.branch;
  const today  = new Date().toISOString().slice(0,10);

  let expenses = [...db.expenses].reverse();
  if (branch) expenses = expenses.filter(e=>e.branch===branch);

  const todayExp  = expenses.filter(e=>String(e.date||'').startsWith(today));
  const totalToday= todayExp.reduce((a,b)=>a+b.amount,0);

  // تجميع حسب النوع
  const byType = {};
  todayExp.forEach(e=>{ byType[e.type]=(byType[e.type]||0)+e.amount; });

  sec.innerHTML = `
    <div class="top-bar">
      <div class="page-title"><i class="fas fa-money-bill-wave" style="color:var(--primary);"></i>
        المصروفات ${branch?'· '+esc(branch):''}
      </div>
      <div class="action-buttons">
        ${isSupervisor()||isAdmin() ? `
        <button class="btn btn-primary btn-sm" onclick="showExpenseModal()">
          <i class="fas fa-plus"></i> إضافة مصروف
        </button>` : ''}
        <button class="btn btn-outline btn-sm" onclick="refreshData()"><i class="fas fa-sync"></i></button>
      </div>
    </div>

    <!-- KPIs -->
    <div class="grid-3" style="margin-bottom:20px;">
      <div class="kpi-card">
        <div class="kpi-icon">💸</div>
        <div class="kpi-value">${money(totalToday)}</div>
        <div class="kpi-label">إجمالي مصروفات اليوم (ج.م)</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">🧾</div>
        <div class="kpi-value">${todayExp.length}</div>
        <div class="kpi-label">عدد المصروفات اليوم</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">🤝</div>
        <div class="kpi-value">${todayExp.filter(e=>e.type==='ترضية عميل').length}</div>
        <div class="kpi-label">ترضيات العملاء اليوم</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:20px;">
      <!-- حسب النوع -->
      <div class="card">
        <div class="card-header"><span>📊 المصروفات حسب النوع (اليوم)</span></div>
        ${Object.keys(byType).length ? `
        <div class="table-wrapper"><table>
          <thead><tr><th>النوع</th><th>الإجمالي</th></tr></thead>
          <tbody>${Object.entries(byType).map(([t,v])=>`
            <tr><td>${esc(t)}</td><td><strong>${money(v)} ج</strong></td></tr>
          `).join('')}</tbody>
        </table></div>` :
        '<p style="text-align:center;padding:16px;color:var(--text-muted);">لا مصروفات اليوم</p>'}
      </div>

      <!-- ترضيات العملاء -->
      <div class="card">
        <div class="card-header"><span>🤝 ترضيات العملاء</span></div>
        ${todayExp.filter(e=>e.type==='ترضية عميل').length ? `
        <div class="table-wrapper"><table>
          <thead><tr><th>رقم الشكوى</th><th>المبلغ</th><th>المستخدم</th><th>ملاحظات</th></tr></thead>
          <tbody>${todayExp.filter(e=>e.type==='ترضية عميل').map(e=>`
            <tr>
              <td><span class="badge badge-warning">${esc(e.complaintId||'-')}</span></td>
              <td><strong>${money(e.amount)} ج</strong></td>
              <td>${esc(e.username)}</td>
              <td style="font-size:.85rem;">${esc(e.notes||'')}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>` :
        '<p style="text-align:center;padding:16px;color:var(--text-muted);">لا ترضيات اليوم</p>'}
      </div>
    </div>

    <!-- سجل المصروفات -->
    <div class="card">
      <div class="card-header">
        <span>📋 سجل المصروفات</span>
        <div style="display:flex;gap:10px;">
          <input type="date" id="expDateFilter" value="${today}"
            onchange="filterExpenses()" style="width:auto;">
          <select id="expTypeFilter" onchange="filterExpenses()" style="width:auto;">
            <option value="">كل الأنواع</option>
            <option>مصروف عام</option>
            <option>ترضية عميل</option>
            <option>فودافون كاش</option>
            <option>نثريات</option>
            <option>أخرى</option>
          </select>
        </div>
      </div>
      <div id="expensesTableWrap">
        ${buildExpensesTableHTML(expenses.slice(0,50))}
      </div>
    </div>`;
}

function buildExpensesTableHTML(expenses) {
  if (!expenses.length) return '<p style="text-align:center;padding:20px;color:var(--text-muted);">لا مصروفات</p>';
  return `<div class="table-wrapper"><table>
    <thead><tr>
      <th>التاريخ</th><th>الفرع</th><th>المستخدم</th><th>النوع</th>
      <th>المبلغ</th><th>رقم الشكوى</th><th>ملاحظات</th>
    </tr></thead>
    <tbody>
      ${expenses.map(e=>`<tr>
        <td style="font-size:.85rem;">${esc(e.date||'')}</td>
        <td>${esc(e.branch)}</td>
        <td>${esc(e.username)}</td>
        <td><span class="badge ${e.type==='ترضية عميل'?'badge-warning':
          e.type==='فودافون كاش'?'badge-blue':''}">${esc(e.type)}</span></td>
        <td><strong>${money(e.amount)} ج</strong></td>
        <td>${esc(e.complaintId||'-')}</td>
        <td style="font-size:.85rem;">${esc(e.notes||'')}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function filterExpenses() {
  const dateFilter = document.getElementById('expDateFilter')?.value||'';
  const typeFilter = document.getElementById('expTypeFilter')?.value||'';
  const branch     = isAdmin() ? (adminBranch||'') : currentUser.branch;
  let expenses     = [...db.expenses].reverse();
  if (branch)     expenses = expenses.filter(e=>e.branch===branch);
  if (dateFilter) expenses = expenses.filter(e=>String(e.date||'').startsWith(dateFilter));
  if (typeFilter) expenses = expenses.filter(e=>e.type===typeFilter);
  const wrap = document.getElementById('expensesTableWrap');
  if (wrap) wrap.innerHTML = buildExpensesTableHTML(expenses.slice(0,100));
}

// modal المصروفات
function showExpenseModal() {
  document.getElementById('expenseType').value   = 'مصروف عام';
  document.getElementById('expenseAmount').value = '';
  document.getElementById('complaintId').value   = '';
  document.getElementById('expenseNotes').value  = '';
  document.getElementById('complaintRow').classList.add('hidden');
  document.getElementById('expenseModal').style.display='flex';
  setTimeout(()=>document.getElementById('expenseAmount').focus(),100);
}

function closeExpenseModal() {
  document.getElementById('expenseModal').style.display='none';
}

function toggleComplaintField() {
  const type = document.getElementById('expenseType')?.value||'';
  const row  = document.getElementById('complaintRow');
  if (type==='ترضية عميل') row.classList.remove('hidden');
  else row.classList.add('hidden');
}

async function confirmExpense() {
  const type        = document.getElementById('expenseType').value;
  const amount      = parseFloat(document.getElementById('expenseAmount').value)||0;
  const complaintId = document.getElementById('complaintId').value.trim();
  const notes       = document.getElementById('expenseNotes').value.trim();

  if (amount<=0) return toast('أدخل مبلغاً صحيحاً',true);
  if (type==='ترضية عميل'&&!complaintId) return toast('أدخل رقم الشكوى',true);

  const expense = {
    branch:   currentUser.branch,
    username: currentUser.username,
    type, amount, complaintId, notes,
    shiftId:  currentShift?.id||''
  };

  try {
    await postForm('saveExpense',{expense});
    await refreshData(true);
    closeExpenseModal();
    toast(`✓ تم تسجيل المصروف: ${money(amount)} ج`);

    // طباعة إيصال الترضية
    if (type==='ترضية عميل') printCompensationReceipt(expense);

    const active = document.querySelector('.section.active')?.id?.replace('sec-','');
    if (active==='expenses') renderExpenses();
  } catch(e){ toast(e.message,true); }
}

function printCompensationReceipt(expense) {
  const win = window.open('','_blank','width=400,height:500');
  win.document.write(`
    <html dir="rtl"><head><title>ترضية عميل</title>
    <style>
      body{font-family:Tahoma;padding:24px;direction:rtl;color:#1e1e2a;max-width:350px;margin:auto;}
      h2{color:#b81b5c;text-align:center;} .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #eee;}
      .total{font-size:1.3rem;font-weight:800;color:#b81b5c;text-align:center;margin:16px 0;}
      .footer{text-align:center;font-size:.85rem;color:#888;margin-top:16px;}
    </style></head>
    <body>
      <h2>🍬 سكّر 33</h2>
      <h3 style="text-align:center;">إيصال ترضية عميل</h3>
      <div class="row"><span>الفرع:</span><strong>${esc(expense.branch)}</strong></div>
      <div class="row"><span>المستخدم:</span><strong>${esc(expense.username)}</strong></div>
      <div class="row"><span>رقم الشكوى:</span><strong>${esc(expense.complaintId)}</strong></div>
      <div class="row"><span>التاريخ:</span><span>${new Date().toLocaleString('ar-EG')}</span></div>
      ${expense.notes?`<div class="row"><span>ملاحظات:</span><span>${esc(expense.notes)}</span></div>`:''}
      <div class="total">💰 قيمة الترضية: ${money(expense.amount)} ج.م</div>
      <div class="footer">شكراً لتعاملكم مع سكّر 33<br>هذا الإيصال دليل على استلام الترضية</div>
    </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),300);
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
boot();

})(); // end IIFE
</script>
</body>
