<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sokar POS System</title>
  <meta name="theme-color" content="#b81b5c" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    :root{
      --primary:#b81b5c;
      --primary-2:#d63384;
      --primary-soft:#fde7f1;
      --accent:#0f9d58;
      --accent-soft:#e8f7ef;
      --warn:#f9ab00;
      --warn-soft:#fff7df;
      --danger:#d93025;
      --danger-soft:#fde8e6;
      --blue:#1a73e8;
      --blue-soft:#e8f0fe;

      --bg:#f8f6f9;
      --surface:#ffffff;
      --surface-2:#fcfbfd;
      --border:#eadfe6;
      --text:#1f2430;
      --muted:#7a6f77;

      --shadow-sm:0 4px 12px rgba(0,0,0,.05);
      --shadow:0 12px 30px rgba(20,20,20,.08);
      --shadow-lg:0 20px 60px rgba(20,20,20,.12);

      --radius-sm:12px;
      --radius:18px;
      --radius-lg:28px;

      --sidebar-width:280px;
      --sidebar-collapsed:86px;
      --transition:.25s ease;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:linear-gradient(180deg,#fbf8fb 0%,#f4f1f6 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    button,input,select,textarea{
      font:inherit;
    }

    button{
      cursor:pointer;
      border:none;
      background:none;
    }

    input,select,textarea{
      width:100%;
      border:2px solid var(--border);
      background:#fff;
      border-radius:14px;
      padding:13px 14px;
      outline:none;
      transition:var(--transition);
      color:var(--text);
    }

    input:focus,select:focus,textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(184,27,92,.08);
    }

    .hidden{display:none !important}
    .section{display:none}
    .section.active{display:block}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:13px 18px;
      border-radius:999px;
      font-weight:700;
      transition:var(--transition);
      white-space:nowrap;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      box-shadow:0 8px 20px rgba(184,27,92,.22);
    }

    .btn-primary:hover{transform:translateY(-2px)}
    .btn-outline{
      background:#fff;
      border:2px solid var(--border);
      color:var(--text);
    }
    .btn-outline:hover{
      border-color:var(--primary);
      color:var(--primary);
      transform:translateY(-2px);
    }

    .btn-accent{
      background:linear-gradient(135deg,var(--accent),#22b86a);
      color:#fff;
      box-shadow:0 8px 20px rgba(15,157,88,.18);
    }

    .btn-danger{
      background:linear-gradient(135deg,var(--danger),#ef4444);
      color:#fff;
    }

    .btn-sm{
      padding:8px 12px;
      font-size:.88rem;
      border-radius:12px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      font-size:.85rem;
      font-weight:700;
      background:#eef1f6;
      color:#556;
    }

    .badge-primary{background:var(--primary-soft);color:var(--primary)}
    .badge-success{background:var(--accent-soft);color:var(--accent)}
    .badge-warning{background:var(--warn-soft);color:#9a6700}
    .badge-danger{background:var(--danger-soft);color:var(--danger)}

    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      padding:22px;
    }

    .card-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .card-title{
      font-size:1.18rem;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .app-wrapper{
      min-height:100vh;
      display:flex;
    }

    .sidebar{
      width:var(--sidebar-width);
      position:fixed;
      top:0;
      right:0;
      bottom:0;
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(8px);
      border-left:1px solid var(--border);
      box-shadow:var(--shadow);
      padding:18px 14px;
      display:flex;
      flex-direction:column;
      z-index:100;
      transition:var(--transition);
      overflow:auto;
    }

    .sidebar.collapsed{width:var(--sidebar-collapsed)}
    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-item span,
    .sidebar.collapsed .user-meta,
    .sidebar.collapsed .copyright{
      display:none;
    }

    .logo-area{
      position:relative;
      border-bottom:1px solid var(--border);
      padding:8px 8px 20px;
      margin-bottom:16px;
      text-align:center;
    }

    .logo-icon{
      width:64px;
      height:64px;
      margin:auto;
      border-radius:20px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.7rem;
      box-shadow:0 10px 24px rgba(184,27,92,.2);
    }

    .logo-text h1{
      margin:12px 0 4px;
      font-size:1.45rem;
      line-height:1.1;
      font-weight:900;
      color:var(--primary);
    }

    .logo-text p{
      margin:0;
      color:var(--muted);
      font-size:.88rem;
    }

    .toggle-sidebar{
      position:absolute;
      left:-12px;
      top:50%;
      transform:translateY(-50%);
      width:28px;
      height:28px;
      border-radius:50%;
      background:var(--primary);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-sm);
    }

    .nav-menu{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:18px;
    }

    .nav-item{
      width:100%;
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-radius:18px;
      color:#5f5660;
      font-weight:700;
      transition:var(--transition);
      position:relative;
    }

    .nav-item i{
      width:24px;
      text-align:center;
      font-size:1.1rem;
    }

    .nav-item:hover{
      background:var(--primary-soft);
      color:var(--primary);
      transform:translateX(-3px);
    }

    .nav-item.active{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      box-shadow:0 10px 24px rgba(184,27,92,.22);
    }

    .user-box{
      margin-top:auto;
      padding:14px;
      border-radius:22px;
      background:var(--blue-soft);
      border:1px solid #dce7ff;
    }

    .user-row{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .user-avatar{
      width:42px;
      height:42px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      flex-shrink:0;
    }

    .user-meta .name{
      font-weight:800;
      font-size:.95rem;
    }

    .user-meta .sub{
      font-size:.82rem;
      color:var(--muted);
      margin-top:2px;
    }

    .logout-btn{
      width:100%;
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:2px solid transparent;
      background:#fff;
      color:#4f5561;
      font-weight:800;
    }

    .logout-btn:hover{
      color:var(--danger);
      border-color:#ffd7d3;
      background:#fff7f7;
    }

    .main-content{
      flex:1;
      margin-right:var(--sidebar-width);
      padding:24px;
      transition:var(--transition);
    }

    .main-content.expanded{margin-right:var(--sidebar-collapsed)}

    .top-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .page-title{
      display:flex;
      align-items:center;
      gap:14px;
      font-size:1.7rem;
      font-weight:900;
      letter-spacing:-.3px;
    }

    .page-title i{
      width:50px;
      height:50px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      font-size:1.15rem;
      box-shadow:0 10px 24px rgba(184,27,92,.22);
    }

    .action-buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .kpi-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-bottom:22px;
    }

    .kpi-card{
      background:linear-gradient(180deg,#fff,#fffdfd);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:20px;
      position:relative;
      overflow:hidden;
    }

    .kpi-card::before{
      content:"";
      position:absolute;
      top:0; right:0; left:0;
      height:5px;
      background:linear-gradient(90deg,var(--primary),var(--primary-2));
    }

    .kpi-icon{
      width:50px;
      height:50px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.1rem;
      margin-bottom:14px;
      background:var(--primary-soft);
      color:var(--primary);
    }

    .kpi-value{
      font-size:2rem;
      font-weight:900;
      margin-bottom:4px;
    }

    .kpi-label{
      color:var(--muted);
      font-weight:700;
    }

    .stats-row{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:18px;
    }

    .chart-box{
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      background:linear-gradient(180deg,#fff,#faf7fa);
      border:1px dashed var(--border);
      border-radius:22px;
    }

    .pos-layout,.crm-layout{
      display:flex;
      gap:22px;
      align-items:flex-start;
    }

    .pos-cart-panel,.crm-cart-panel{
      width:390px;
      flex-shrink:0;
      position:sticky;
      top:20px;
    }

    .pos-products-panel,.crm-products-panel{
      flex:1;
      min-width:0;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
      gap:14px;
    }

    .product-card{
      position:relative;
      background:linear-gradient(180deg,#fff,#fcfafc);
      border:2px solid var(--border);
      border-radius:22px;
      padding:18px 14px;
      cursor:pointer;
      transition:var(--transition);
      min-height:148px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
    }

    .product-card:hover{
      transform:translateY(-4px);
      border-color:var(--primary);
      box-shadow:0 16px 32px rgba(184,27,92,.12);
      background:linear-gradient(180deg,#fff,#fff7fb);
    }

    .product-name{
      font-weight:900;
      font-size:1rem;
      margin-bottom:8px;
    }

    .product-price{
      color:var(--primary);
      font-weight:900;
      margin-bottom:8px;
    }

    .product-unit{
      color:var(--muted);
      font-size:.88rem;
      margin-bottom:10px;
    }

    .stock-chip{
      margin:auto;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--blue-soft);
      color:var(--blue);
      font-size:.82rem;
      font-weight:800;
    }

    .stock-chip.low{
      background:var(--warn-soft);
      color:#9a6700;
    }

    .stock-chip.out{
      background:var(--danger-soft);
      color:var(--danger);
    }

    .cart-items{
      max-height:430px;
      overflow:auto;
      padding-left:4px;
    }

    .cart-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:14px 0;
      border-bottom:1px dashed var(--border);
    }

    .cart-row .name{
      font-weight:800;
      margin-bottom:5px;
    }

    .cart-row .meta{
      color:var(--muted);
      font-size:.88rem;
      line-height:1.6;
    }

    .cart-actions{
      display:flex;
      gap:8px;
      margin-top:8px;
    }

    .totals{
      margin-top:18px;
      padding-top:18px;
      border-top:2px solid var(--border);
    }

    .total-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
      color:#4f5561;
      font-weight:700;
    }

    .total-row.grand{
      margin-top:6px;
      padding-top:16px;
      border-top:2px solid var(--border);
      color:var(--primary);
      font-size:1.28rem;
      font-weight:900;
    }

    .search-box{
      position:relative;
      flex:1;
      min-width:230px;
      max-width:320px;
    }

    .search-box i{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      color:#9b8c96;
    }

    .search-box input{
      padding-right:42px;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .chip{
      padding:9px 14px;
      border-radius:999px;
      background:#f1edf1;
      color:#675a63;
      font-weight:800;
      cursor:pointer;
      transition:var(--transition);
    }

    .chip.active,
    .chip:hover{
      background:var(--primary-soft);
      color:var(--primary);
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--border);
      border-radius:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
      background:#fff;
    }

    th,td{
      text-align:right;
      padding:16px 14px;
      border-bottom:1px solid #eee6ec;
      white-space:nowrap;
    }

    th{
      background:linear-gradient(180deg,#fcf2f7,#fff);
      color:#8a1240;
      font-size:.92rem;
      font-weight:900;
    }

    tr:hover td{background:#fcfafc}

    .empty-state{
      text-align:center;
      padding:48px 18px;
      color:var(--muted);
    }

    .empty-state i{
      font-size:3rem;
      color:#d4c7cf;
      margin-bottom:12px;
      display:block;
    }

    .login-screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(circle at top right, rgba(184,27,92,.08), transparent 30%),
        radial-gradient(circle at bottom left, rgba(26,115,232,.08), transparent 28%),
        linear-gradient(180deg,#faf7fb 0%,#f4f1f6 100%);
    }

    .login-card{
      width:100%;
      max-width:500px;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border:1px solid var(--border);
      border-radius:34px;
      box-shadow:var(--shadow-lg);
      padding:34px;
    }

    .login-brand{
      text-align:center;
      margin-bottom:28px;
    }

    .login-brand .icon{
      width:78px;
      height:78px;
      margin:auto;
      border-radius:24px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2rem;
      box-shadow:0 16px 34px rgba(184,27,92,.24);
    }

    .login-brand h1{
      margin:16px 0 6px;
      font-size:2rem;
      color:var(--primary);
      font-weight:900;
    }

    .login-brand p{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
    }

    .form-group{margin-bottom:16px}
    .form-label{
      display:block;
      margin-bottom:8px;
      font-size:.94rem;
      font-weight:800;
    }

    .input-wrap{position:relative}
    .input-wrap i{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      color:#a1919b;
    }

    .input-wrap input,.input-wrap select{
      padding-right:42px;
    }

    .helper-text{
      font-size:.84rem;
      color:var(--muted);
      margin-top:8px;
    }

    .toast{
      position:fixed;
      bottom:24px;
      left:24px;
      z-index:9999;
      display:none;
      min-width:260px;
      max-width:420px;
      color:#fff;
      padding:16px 18px;
      border-radius:18px;
      box-shadow:var(--shadow-lg);
      font-weight:800;
    }

    .toast.success{display:block;background:linear-gradient(135deg,var(--accent),#1fb463)}
    .toast.error{display:block;background:linear-gradient(135deg,var(--danger),#ef4444)}
    .toast.info{display:block;background:linear-gradient(135deg,#1f2937,#374151)}

    .modal{
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.36);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:999;
    }

    .modal-card{
      width:min(540px,100%);
      max-height:90vh;
      overflow:auto;
      background:#fff;
      border-radius:28px;
      border:1px solid var(--border);
      box-shadow:var(--shadow-lg);
      padding:28px;
    }

    .modal-header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .modal-icon{
      width:44px;
      height:44px;
      border-radius:16px;
      background:var(--primary-soft);
      color:var(--primary);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .modal-title{
      font-size:1.25rem;
      font-weight:900;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .muted{color:var(--muted)}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:9px 14px;
      font-weight:800;
      background:var(--warn-soft);
      color:#9a6700;
    }

    .section-shell{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    @media (max-width:1100px){
      .sidebar{
        width:var(--sidebar-collapsed);
      }
      .sidebar .logo-text,
      .sidebar .nav-item span,
      .sidebar .user-meta,
      .sidebar .copyright{
        display:none;
      }
      .main-content{
        margin-right:var(--sidebar-collapsed);
      }
      .stats-row{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:960px){
      .pos-layout,.crm-layout{
        flex-direction:column;
      }
      .pos-cart-panel,.crm-cart-panel{
        width:100%;
        position:static;
      }
    }

    @media (max-width:768px){
      .main-content{
        padding:16px;
      }
      .page-title{
        font-size:1.35rem;
      }
      .kpi-grid{
        grid-template-columns:1fr;
      }
      .product-grid{
        grid-template-columns:repeat(2,1fr);
      }
      .login-card{
        padding:24px;
      }
    }

    @media print{
      .sidebar,.top-bar,.btn,.modal{display:none !important}
      .main-content{margin:0;padding:0}
      .card{box-shadow:none;border:1px solid #ddd}
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="icon"><i class="fas fa-cash-register"></i></div>
        <h1>Sokar System</h1>
        <p>POS · CRM · Delivery · Inventory</p>
      </div>

      <div class="form-group">
        <label class="form-label">User Type</label>
        <div class="input-wrap">
          <i class="fas fa-user-tag"></i>
          <select id="pointTypeSelect">
            <option value="">Select user type</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Branch / User</label>
        <div class="input-wrap">
          <i class="fas fa-store"></i>
          <select id="branchSelect">
            <option value="">Select branch</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input id="passInput" type="password" placeholder="Enter password" />
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;padding:16px" onclick="login()">
        <i class="fas fa-right-to-bracket"></i>
        Login
      </button>

      <div id="loginMsg" class="helper-text" style="text-align:center;margin-top:12px;"></div>
      <div id="loginLoading" class="helper-text hidden" style="text-align:center;">Loading...</div>
    </div>
  </div>

  <!-- App -->
  <div id="appWrapper" class="app-wrapper hidden">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo-area">
        <button class="toggle-sidebar" onclick="toggleSidebar()">

        t.className = "toast";
        t.style.display = "none";

        complaints: renderComplaints,

        <div class="section-shell">
          <div class="top-bar">
            <div class="page-title"><i class="fas ${icon}"></i><span>${title}</span></div>
            <div class="action-buttons">
              <button class="btn btn-outline"><i class="fas fa-rotate"></i> Refresh</button>
            </div>
          </div>
          ${tableShell(headers)}
        </div>
      `;
    }

    function tableShell(headers){
      return `
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="${headers.length}">
                    <div class="empty-state">
                      <i class="fas fa-table"></i>
                      <div>No data available</div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function getBranchesOptions(){
      const branches = [...new Set((State.db.users || []).map(u => u.branch).filter(Boolean))];
      return branches.map(b => `<option value="${b}">${b}</option>`).join("");
    }

    function renderCats(){
      const cats = ["All", ...new Set((State.db.products || []).map(p => p.cat).filter(Boolean))];
      $("catsList").innerHTML = cats.map(cat => `
        <button class="chip ${((State.currentCat || "All") === cat) ? "active" : ""}" onclick="setCategory('${cat}')">${cat}</button>
      `).join("");
    }

    function setCategory(cat){
      State.currentCat = cat;
      renderCats();
      renderProducts();
    }

    function renderProducts(){
      const term = ($("searchInput")?.value || "").toLowerCase().trim();
      let products = [...(State.db.products || [])];

      if(State.currentCat && State.currentCat !== "All"){
        products = products.filter(p => p.cat === State.currentCat);
      }

      if(term){
        products = products.filter(p => String(p.name || "").toLowerCase().includes(term));
      }

      const grid = $("productsGrid");
      if(!grid) return;

      if(!products.length){
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <i class="fas fa-search"></i>
            <div>No products found</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(p => {
        const qty = stockFor(currentBranch(), p.name);
        const cls = qty <= 0 ? "out" : qty <= 5 ? "low" : "";
        return `
          <div class="product-card" onclick="askQty('${String(p.name).replace(/'/g, "\\'")}')">
            <div class="product-name">${p.name}</div>
            <div class="product-price">${money(p.price)}</div>
            <div class="product-unit">${p.unit || ""}</div>
            <div class="stock-chip ${cls}">
              <i class="fas fa-box"></i>
              Available: ${qty}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderCrmCats(){
      const cats = ["All", ...new Set((State.db.products || []).map(p => p.cat).filter(Boolean))];
      $("crmCatsList").innerHTML = cats.map(cat => `
        <button class="chip ${((State.crmCurrentCat || "All") === cat) ? "active" : ""}" onclick="setCrmCategory('${cat}')">${cat}</button>
      `).join("");
    }

    function setCrmCategory(cat){
      State.crmCurrentCat = cat;
      renderCrmCats();
      renderCrmProducts();
    }

    function renderCrmProducts(){
      const term = ($("crmSearchInput")?.value || "").toLowerCase().trim();
      const branch = $("crmBranchSelect")?.value || "";
      let products = [...(State.db.products || [])];

      if(State.crmCurrentCat && State.crmCurrentCat !== "All"){
        products = products.filter(p => p.cat === State.crmCurrentCat);
      }

      if(term){
        products = products.filter(p => String(p.name || "").toLowerCase().includes(term));
      }

      const grid = $("crmProductsGrid");
      if(!grid) return;

      if(!products.length){
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <i class="fas fa-search"></i>
            <div>No CRM products found</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(p => {
        const qty = branch ? stockFor(branch, p.name) : "-";
        const cls = qty === "-" ? "" : qty <= 0 ? "out" : qty <= 5 ? "low" : "";
        return `
          <div class="product-card" onclick="crmAskQty('${String(p.name).replace(/'/g, "\\'")}')">
            <div class="product-name">${p.name}</div>
            <div class="product-price">${money(p.price)}</div>
            <div class="product-unit">${p.unit || ""}</div>
            <div class="stock-chip ${cls}">
              <i class="fas fa-warehouse"></i>
              ${branch ? `Branch Stock: ${qty}` : "Select branch first"}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderCart(){
      const box = $("cartList");
      if(!box) return;

      if(!State.cart.length){
        box.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-cart-shopping"></i>
            <div>No items added yet</div>
          </div>
        `;
      } else {
        box.innerHTML = State.cart.map((item, idx) => `
          <div class="cart-row">
            <div style="flex:1">
              <div class="name">${item.name}</div>
              <div class="meta">
                Qty: ${item.qty} · Price: ${money(item.price)}<br>
                ${item.note ? "Note: " + item.note : ""}
              </div>
              <div class="cart-actions">
                <button class="btn btn-outline btn-sm" onclick="editCartItem(${idx})"><i class="fas fa-pen"></i></button>
                <button class="btn btn-outline btn-sm" onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i></button>
              </div>
            </div>
            <div style="font-weight:900;color:var(--primary)">${money(item.total)}</div>
          </div>
        `).join("");
      }

      const sub = State.cart.reduce((a,b) => a + Number(b.total || 0), 0);
      const fee = Number($("deliveryFee")?.value || 0);
      let discount = Number($("discountVal")?.value || 0);
      if(($("discountType")?.value || "fixed") === "percent"){
        discount = sub * discount / 100;
      }
      const total = Math.max(0, sub + fee - discount);

      $("subTotal").textContent = money(sub);
      $("grandTotal").textContent = money(total);
    }

    function renderCrmCart(){
      const box = $("crmCartList");
      if(!box) return;

      if(!State.crmCart.length){
        box.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <div>No CRM items added yet</div>
          </div>
        `;
      } else {
        box.innerHTML = State.crmCart.map((item, idx) => `
          <div class="cart-row">
            <div style="flex:1">
              <div class="name">${item.name}</div>
              <div class="meta">
                Qty: ${item.qty} · Price: ${money(item.price)}
              </div>
              <div class="cart-actions">
                <button class="btn btn-outline btn-sm" onclick="removeCrmItem(${idx})"><i class="fas fa-trash"></i></button>
              </div>
            </div>
            <div style="font-weight:900;color:var(--primary)">${money(item.total)}</div>
          </div>
        `).join("");
      }

      const total = State.crmCart.reduce((a,b) => a + Number(b.total || 0), 0);
      $("crmGrandTotal").textContent = money(total);
    }

    function askQty(name){
      const product = State.db.products.find(p => p.name === name);
      if(!product) return;
      State.pendingProduct = product;
      State.pendingEditIndex = -1;
      $("qtyTitle").textContent = product.name;
      $("qtyInput").value = 1;
      $("itemNote").value = "";
      $("qtyHint").textContent = "Enter quantity then confirm.";
      $("qtyModal").style.display = "flex";
      window.__qtyMode = "pos";
    }

    function crmAskQty(name){
      const product = State.db.products.find(p => p.name === name);
      if(!product) return;
      State.pendingProduct = product;
      State.pendingEditIndex = -1;
      $("qtyTitle").textContent = product.name + " - CRM";
      $("qtyInput").value = 1;
      $("itemNote").value = "";
      $("qtyHint").textContent = "Enter quantity for CRM order.";
      $("qtyModal").style.display = "flex";
      window.__qtyMode = "crm";
    }

    function closeQty(){
      $("qtyModal").style.display = "none";
    }

    function confirmQty(){
      const qty = Number($("qtyInput").value || 0);
      const note = $("itemNote").value.trim();
      const p = State.pendingProduct;
      if(!p || qty <= 0) return;

      const item = {
        name: p.name,
        price: Number(p.price || 0),
        unit: p.unit || "",
        qty,
        total: qty * Number(p.price || 0),
        note
      };

      if(window.__qtyMode === "crm"){
        const branch = $("crmBranchSelect")?.value || "";
        const available = stockFor(branch, p.name);
        if(branch && qty > available){
          safeShowToast("Quantity exceeds branch stock", "error");
          return;
        }
        State.crmCart.push(item);
        renderCrmCart();
      } else {
        State.cart.push(item);
        renderCart();
      }

      closeQty();
      safeShowToast("Item added successfully", "success");
    }

    function editCartItem(idx){
      const item = State.cart[idx];
      if(!item) return;
      State.pendingProduct = { name:item.name, price:item.price, unit:item.unit };
      State.pendingEditIndex = idx;
      $("qtyTitle").textContent = item.name;
      $("qtyInput").value = item.qty;
      $("itemNote").value = item.note || "";
      $("qtyHint").textContent = "Edit quantity";
      $("qtyModal").style.display = "flex";
      window.__qtyMode = "edit-pos";
    }

    function removeFromCart(idx){
      State.cart.splice(idx,1);
      renderCart();
    }

    function removeCrmItem(idx){
      State.crmCart.splice(idx,1);
      renderCrmCart();
    }

    function clearCart(){
      State.cart = [];
      renderCart();
    }

    function proceedToPayment(){
      $("customerModal").style.display = "flex";
    }

    function closeCustomerModal(){ $("customerModal").style.display = "none"; }
    function closePaymentModal(){ $("paymentModal").style.display = "none"; }
    function closeQrModal(){ $("qrModal").style.display = "none"; }
    function closeComplaintModal(){ $("complaintModal").style.display = "none"; }
    function closeShiftModal(){ $("shiftModal").style.display = "none"; }
    function closeShiftCashModal(){ $("shiftCashModal").style.display = "none"; }

    function confirmCustomerInfo(){
      State.customerData = {
        name: $("customerName").value.trim(),
        phone: $("customerPhone").value.trim(),
        address: $("customerAddress").value.trim()
      };
      closeCustomerModal();
      $("paymentModal").style.display = "flex";
      $("paidAmount").value = $("grandTotal")?.textContent || "0";
    }

    function confirmPayment(){
      safeShowToast("Ready to connect saveOrder with Apps Script", "info");
      closePaymentModal();
    }

    function openComplaintModal(){
      $("complaintModal").style.display = "flex";
    }

    function saveComplaint(){
      safeShowToast("Ready to connect saveComplaint", "info");
      closeComplaintModal();
    }

    function openShiftModal(){
      $("shiftInfo").textContent = State.currentShift ? "Current shift is open." : "No active shift.";
      $("shiftActions").innerHTML = State.currentShift
        ? `<button class="btn btn-danger" style="width:100%" onclick="openShiftCashModal()">Close Current Shift</button>`
        : `<button class="btn btn-primary" style="width:100%" onclick="openNewShift()">Open New Shift</button>`;
      $("shiftModal").style.display = "flex";
    }

    function openNewShift(){
      State.currentShift = { id: "SHIFT-DEMO", startTime: new Date().toLocaleString() };
      updateShiftDisplay();
      closeShiftModal();
      safeShowToast("Shift opened", "success");
    }

    function openShiftCashModal(){
      $("expectedCash").textContent = $("grandTotal")?.textContent || "0.00";
      $("shiftCashModal").style.display = "flex";
    }

    function saveShiftCash(){
      State.currentShift = null;
      updateShiftDisplay();
      closeShiftCashModal();
      closeShiftModal();
      safeShowToast("Shift closed", "success");
    }

    function updateShiftDisplay(){
      $("shiftStatus").textContent = State.currentShift ? "Shift Open" : "No shift opened";
    }

    function printQR(){
      window.print();
    }

    function saveCrmOrderFromCart(){
      safeShowToast("Ready to connect saveCrmOrder", "info");
    }

    async function login(){
      const pointType = $("pointTypeSelect").value;
      const branch = $("branchSelect").value;
      const pass = $("passInput").value.trim();

      if(!pointType || !branch || !pass){
        $("loginMsg").textContent = "Please complete login data.";
        return;
      }

      State.currentUser = { pointType, branch, username: branch };
      $("whoami").textContent = branch + " - " + pointType;
      updateShiftDisplay();

      $("loginScreen").classList.add("hidden");
      $("appWrapper").classList.remove("hidden");
      $("appSections").classList.remove("hidden");
      $("logoutBtn").classList.remove("hidden");

      buildNav();
      renderDashboard();
    }

    function logout(){
      State.currentUser = null;
      State.currentShift = null;
      $("appWrapper").classList.add("hidden");
      $("loginScreen").classList.remove("hidden");
      $("passInput").value = "";
    }

    function fillPointTypes(){
      const types = [...new Set((State.db.users || []).map(u => u.pointType).filter(Boolean))];
      $("pointTypeSelect").innerHTML = `<option value="">Select user type</option>` +
        types.map(t => `<option value="${t}">${t}</option>`).join("");
    }

    function fillBranchesByType(){
      const type = $("pointTypeSelect").value;
      const users = (State.db.users || []).filter(u => u.pointType === type);
      $("branchSelect").innerHTML = `<option value="">Select branch</option>` +
        users.map(u => `<option value="${u.branch}">${u.branch}</option>`).join("");
    }

    function seedDemoData(){
      State.db.users = [
        { branch:"Branch 1", username:"seller1", pointType:"seller" },
        { branch:"Branch 1", username:"cashier1", pointType:"cashier" },
        { branch:"Branch 1", username:"delivery1", pointType:"delivery" },
        { branch:"Branch 2", username:"seller2", pointType:"seller" },
        { branch:"Branch 2", username:"cashier2", pointType:"cashier" },
        { branch:"CRM", username:"crm1", pointType:"crm" }
      ];

      State.db.products = [
        { name:"Sugar 1kg", cat:"Sugar", price:45, unit:"piece" },
        { name:"Brown Sugar", cat:"Sugar", price:60, unit:"piece" },
        { name:"Candy Mix", cat:"Candy", price:80, unit:"kg" },
        { name:"Jelly Box", cat:"Candy", price:35, unit:"piece" },
        { name:"Premium Dates", cat:"Dates", price:120, unit:"kg" },
        { name:"Mini Pack", cat:"Offers", price:25, unit:"piece" }
      ];

      State.db.stock = [
        { branch:"Branch 1", item:"Sugar 1kg", qty:12 },
        { branch:"Branch 1", item:"Brown Sugar", qty:4 },
        { branch:"Branch 1", item:"Candy Mix", qty:9 },
        { branch:"Branch 1", item:"Jelly Box", qty:0 },
        { branch:"Branch 2", item:"Sugar 1kg", qty:7 },
        { branch:"Branch 2", item:"Brown Sugar", qty:13 },
        { branch:"Branch 2", item:"Candy Mix", qty:2 },
        { branch:"Branch 2", item:"Jelly Box", qty:5 },
        { branch:"Branch 2", item:"Premium Dates", qty:8 }
      ];
    }

    document.addEventListener("DOMContentLoaded", () => {
      seedDemoData();
      fillPointTypes();
      $("pointTypeSelect").addEventListener("change", fillBranchesByType);
    });
  </script>
</body>
</html>
