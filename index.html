<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سكر V17 | م/ محمود سلامه</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
:root { --primary: #c2185b; --hover: #ffeb3b; --success: #2e7d32; --bg: #f5f5f5; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
.container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
.btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
.btn-primary { background: var(--primary); color: white; width: 100%; }
.btn-primary:hover { background: var(--hover); color: #333; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tabs button { flex: 1; padding: 15px; border: none; border-radius: 10px; background: #eee; font-weight: bold; }
.tabs button.active { background: var(--primary); color: white; }
.card { padding: 25px 15px; border-radius: 15px; background: var(--primary); color: white; text-align: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
.card:hover { background: var(--hover); color: #333; }
.report-box { background: #f0f4f8; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 5px solid var(--primary); }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 10px; border: 1px solid #ddd; text-align: center; font-size: 14px; }
#loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
input, select { padding: 15px; border-radius: 10px; border: 1px solid #ddd; width: 100%; margin: 5px 0; box-sizing: border-box; }
@media print { .no-print { display: none !important; } #printZone { display: block !important; } }
</style>
</head>
<body>

<div id="loader"><h2>جاري تجهيز سكر V17...</h2><p>تطوير م/ محمود سلامه</p></div>

<div id="loginPage" class="container" style="margin-top: 50px; text-align: center;">
<h1 style="color:var(--primary)">نظام سكر 🍬</h1>
<select id="userSelect"><option value="">--- جاري تحميل الفروع ---</option></select>
<input type="password" id="userPass" placeholder="كلمة المرور">
<button class="btn btn-primary" onclick="handleLogin()">دخول النظام</button>
</div>

<div id="mainApp" style="display: none;">
<div class="container no-print">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
<button class="btn" style="background:#0288d1; color:white; width:auto; padding:8px 15px;" onclick="syncData()">🔄 مزامنة</button>
<h3 id="branchInfo" style="color:var(--primary); margin:0;"></h3>
<button class="btn" style="background:#eee; width:auto; padding:8px 15px;" onclick="logout()">خروج</button>
</div>

<div class="tabs">
<button id="t-pos" class="active" onclick="switchTab('pos')">🛒 كاشير</button>
<button id="t-stock" onclick="switchTab('stock')">📦 المخزون</button>
<button id="t-admin" style="display:none" onclick="switchTab('admin')">📊 الإدارة</button>
</div>

<div id="s-pos">
<input type="text" id="pSearch" placeholder="🔍 ابحث عن صنف..." oninput="filterProducts(this.value)">
<div id="catGrid" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-top:10px;"></div>
<div id="prodGrid" style="display:none; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-top:10px;"></div>
<button id="btnBack" class="btn" onclick="showCats()" style="display:none; background:#999; color:white; width:100%; margin-top:10px;">🔙 عودة</button>
<div id="cartArea" style="display:none; margin-top:20px;">
<div id="cartItems"></div>
<h2 style="text-align:left;">الإجمالي: <span id="finalTotal">0</span> ج.م</h2>
<button class="btn" style="background:var(--success); color:white; width:100%;" onclick="submitOrder()">تأكيد وطباعة ✅</button>
</div>
</div>

<div id="s-stock">
<div class="report-box">
<h4>📦 تقرير مخزون الفرع الحالي</h4>
<div id="stockList"></div>
<button class="btn" style="background:var(--success); color:white; margin-top:10px;" onclick="saveBulkStock()">💾 حفظ التحديثات</button>
</div>
</div>

<div id="s-admin" style="display:none">
<div class="report-box">
<h3>📈 تقرير المبيعات والورديات</h3>
<input type="date" id="repDate" onchange="runAdminReports()">
<select id="repShift" onchange="runAdminReports()"><option value="الكل">كل الورديات</option><option value="صباحية">صباحية</option><option value="مسائية">مسائية</option></select>
<div id="adminSalesResult" style="margin-top:10px; font-weight:bold;"></div>
</div>

<div class="report-box" style="background:#e8f5e9;">
<h3>➕ إضافة صنف جديد للشيت</h3>
<input id="newPName" placeholder="اسم المنتج">
<input id="newPCat" placeholder="القسم">
<input id="newPPrice" type="number" placeholder="السعر">
<button class="btn" style="background:var(--primary); color:white;" onclick="addNewProduct()">حفظ المنتج الجديد</button>
</div>
</div>
</div>

<div id="printZone" style="display:none; text-align:center; width:280px; margin:0 auto;">
<h2>حلواني بندق</h2><hr>
<p id="p-branch"></p><p id="p-inv"></p>
<div id="p-items" style="text-align:right;"></div><hr>
<h2 id="p-total"></h2>
<div id="qrcode" style="display:flex; justify-content:center; margin:15px 0;"></div>
<p>تطوير م/ محمود سلامه</p>
<button class="no-print btn" onclick="resetAppAfterPrint()">أوردر جديد</button>
</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwfowODkNsFW8Px83SwVl6A2YXxUt_DGBlxanin2MFTOIGNEaF4oKLrsFy1ABTHeErX-w/exec";
let db = { products: [], users: [], stock: [], sales: [] };
let cart = []; let userObj = null;

async function syncData() {
document.getElementById("loader").style.display = "flex";
try {
const r = await fetch(API + "?action=getInitialData");
const res = await r.json();
db.products = res.products.map(r => ({ name: r[0], cat: r[1], price: r[2], type: r[3] }));
db.users = res.users;
db.stock = res.stock.map(r => ({ branch: r[0], item: r[1], qty: r[2] }));
db.sales = res.sales.map(r => ({ date: r[0], branch: r[1], details: r[2], total: r[3], inv: r[4], iso: r[5], shift: r[6] }));

const sel = document.getElementById("userSelect");
sel.innerHTML = '<option value="">--- اختر الفرع ---</option><option value="الإدارة">👑 الإدارة العامة</option>';
db.users.forEach(u => sel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`);

if(userObj) { showCats(); renderStock(); runAdminReports(); }
document.getElementById("loader").style.display = "none";
} catch(e) { alert("خطأ في الاتصال!"); }
}

function handleLogin() {
const u = document.getElementById("userSelect").value;
const p = document.getElementById("userPass").value;
if(u === "الإدارة" && p === "0000") { userObj = { branch: "الإدارة", role: "مشرف" }; loginOK(); return; }
const user = db.users.find(x => (x.branch === u && (x.pass === p || x.superPass === p)));
if(user) { userObj = user; userObj.currentRole = (p === user.superPass) ? "مشرف" : "بائع"; loginOK(); }
else alert("خطأ!");
}

function loginOK() {
document.getElementById("loginPage").style.display = "none";
document.getElementById("mainApp").style.display = "block";
document.getElementById("branchInfo").innerText = userObj.branch;
if(userObj.branch === "الإدارة" || userObj.currentRole === "مشرف") document.getElementById("t-admin").style.display = "block";
showCats(); renderStock();
}

function renderStock() {
const box = document.getElementById("stockList"); box.innerHTML = "";
db.products.forEach(p => {
const qty = db.stock.filter(s => s.item === p.name && s.branch === userObj.branch).reduce((acc, curr) => acc + parseFloat(curr.qty || 0), 0);
box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span>${p.name}</span><span>رصيد: <b>${qty}</b> | إضافة: <input type="number" class="qty-in" data-item="${p.name}" style="width:50px"></span></div>`;
});
}

async function saveBulkStock() {
const updates = Array.from(document.querySelectorAll('.qty-in')).filter(i => i.value != "").map(i => ({ item: i.dataset.item, qty: i.value }));
await fetch(API, {method: "POST", body: JSON.stringify({action: "bulkStockUpdate", branch: userObj.branch, updates: updates})});
alert("تم الحفظ"); syncData();
}

async function addNewProduct() {
const p = { name: document.getElementById("newPName").value, cat: document.getElementById("newPCat").value, price: document.getElementById("newPPrice").value, type: "قطعة" };
await fetch(API, {method: "POST", body: JSON.stringify({action: "manageProduct", product: p})});
alert("تمت الإضافة"); syncData();
}

function runAdminReports() {
const d = new Date(document.getElementById("repDate").value).toLocaleDateString('ar-EG');
const s = document.getElementById("repShift").value;
let total = 0;
db.sales.forEach(order => {
if(order.date === d && (s === "الكل" || order.shift === s)) total += parseFloat(order.total);
});
document.getElementById("adminSalesResult").innerText = "إجمالي المبيعات: " + total + " ج.م";
}

async function submitOrder() {
document.getElementById("loader").style.display = "flex";
const inv = "INV-" + Date.now().toString().slice(-6);
const shift = new Date().getHours() < 16 ? "صباحية" : "مسائية";
const order = { date: new Date().toLocaleDateString('ar-EG'), branch: userObj.branch, details: cart.map(i=>`${i.name}(${i.qty})`).join("+"), total: document.getElementById("finalTotal").innerText, invoice: inv, isoDate: new Date().toISOString(), shift: shift };

await fetch(API, {method: "POST", body: JSON.stringify({action: "saveOrder", order: order})});

document.getElementById("p-branch").innerText = "فرع: " + userObj.branch;
document.getElementById("p-inv").innerText = "فاتورة: " + inv;
document.getElementById("p-items").innerHTML = cart.map(i=>`<div>${i.name} x ${i.qty}</div>`).join("");
document.getElementById("p-total").innerText = order.total + " ج.م";

document.getElementById("qrcode").innerHTML = "";
var qr = qrcode(0, 'M'); qr.addData(inv); qr.make();
document.getElementById("qrcode").innerHTML = qr.createImgTag(5);

document.getElementById("loader").style.display = "none";
document.getElementById("mainApp").style.display = "none";
document.getElementById("printZone").style.display = "block";
window.print();
}

function resetAppAfterPrint() {
cart = []; document.getElementById("printZone").style.display = "none";
document.getElementById("mainApp").style.display = "block";
showCats();
}

// وظائف الكاشير والبحث والتبديل (نفس القوة السابقة)
function filterProducts(q) {
if(!q) { showCats(); return; }
document.getElementById("catGrid").style.display = "none"; document.getElementById("btnBack").style.display = "block";
const grid = document.getElementById("prodGrid"); grid.style.display = "grid"; grid.innerHTML = "";
db.products.filter(p => p.name.includes(q)).forEach(p => {
const d = document.createElement("div"); d.className = "card"; d.innerHTML = `${p.name}<br>${p.price}ج`; d.onclick = () => addToCart(p); grid.appendChild(d);
});
}

function showCats() {
document.getElementById("prodGrid").style.display = "none"; document.getElementById("btnBack").style.display = "none";
const grid = document.getElementById("catGrid"); grid.style.display = "grid"; grid.innerHTML = "";
[...new Set(db.products.map(p => p.cat))].forEach(c => {
const d = document.createElement("div"); d.className = "card"; d.innerText = c; d.onclick = () => showProds(c); grid.appendChild(d);
});
}

function showProds(cat) {
document.getElementById("catGrid").style.display = "none"; document.getElementById("btnBack").style.display = "block";
const grid = document.getElementById("prodGrid"); grid.style.display = "grid"; grid.innerHTML = "";
db.products.filter(p => p.cat === cat).forEach(p => {
const d = document.createElement("div"); d.className = "card"; d.innerHTML = `${p.name}<br>${p.price}ج`; d.onclick = () => addToCart(p); grid.appendChild(d);
});
}

function addToCart(p) {
let q = prompt(`كمية ${p.name}:`, "1"); if(!q) return;
cart.push({name: p.name, qty: q, total: (p.price * q)}); renderCart();
}

function renderCart() {
document.getElementById("cartArea").style.display = cart.length ? "block" : "none";
const items = document.getElementById("cartItems"); items.innerHTML = "";
let t = 0; cart.forEach(i => { t += parseFloat(i.total); items.innerHTML += `<div>${i.name} (${i.qty})</div>`; });
document.getElementById("finalTotal").innerText = t.toFixed(2);
}

function switchTab(t) {
["pos", "stock", "admin"].forEach(s => document.getElementById("s-"+s).style.display = "none");
["t-pos", "t-stock", "t-admin"].forEach(s => document.getElementById(s).classList.remove("active"));
document.getElementById("s-"+t).style.display = "block"; document.getElementById("t-"+t).classList.add("active");
}

function logout() { localStorage.clear(); location.reload(); }
window.onload = syncData;
</script>
</body>
</html>
