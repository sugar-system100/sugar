<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="theme-color" content="#b81b5c">
    <meta name="description" content="سُكّر 33 - نظام إدارة الحلويات المتكامل - الإصدار 2.0">
    <title>سُكّر 33 - نظام إدارة الحلويات | V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        :root {
            --primary: #b81b5c;
            --primary-light: #e84a8a;
            --primary-dark: #8a1240;
            --accent: #f9a825;
            --success: #2e7d32;
            --warning: #e65100;
            --danger: #d32f2f;
            --info: #1565c0;
            --bg: #fff9f5;
            --surface: #ffffff;
            --text: #3e2723;
            --text-muted: #795548;
            --border: #f0d9e0;
            --radius: 20px;
            --shadow: 0 8px 25px rgba(184,27,92,0.12);
            --glow: 0 0 15px rgba(184,27,92,0.3);
        }
        
        .dark {
            --bg: #0f080c;
            --surface: #1c1419;
            --text: #f8e9e0;
            --text-muted: #c9a38f;
            --border: #3d2a35;
            --shadow: 0 8px 30px rgba(184,27,92,0.25);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family:'Cairo',sans-serif; 
            background:var(--bg); 
            color:var(--text); 
            overflow:hidden; 
            font-size:15.5px; 
            transition:background .4s,color .4s;
        }
        
        .theme-toggle {
            position:fixed;top:18px;left:18px;z-index:10000;
            width:56px;height:56px;border-radius:50%;background:var(--surface);
            border:3px solid var(--primary);color:var(--primary);
            display:flex;align-items:center;justify-content:center;font-size:26px;
            cursor:pointer;box-shadow:var(--shadow);transition:all .3s;
        }
        .theme-toggle:hover { transform:scale(1.1); }
        
        .glass { background:rgba(255,255,255,0.92); backdrop-filter:blur(16px); }
        .dark .glass { background:rgba(28,20,25,0.92); }
        
        .btn {
            padding:12px 24px;border-radius:35px;font-weight:700;border:none;
            cursor:pointer;display:inline-flex;align-items:center;gap:8px;
            transition:all .25s;font-family:inherit;font-size:.95rem;
        }
        .btn-primary { background:var(--primary);color:white;box-shadow:0 4px 14px rgba(184,27,92,0.3); }
        .btn-primary:hover { background:var(--primary-dark);transform:translateY(-2px); }
        .btn-sm { padding:7px 14px;font-size:13px; }
        
        .product-card {
            background:var(--surface);border:1px solid var(--border);border-radius:20px;
            padding:18px;text-align:center;cursor:pointer;transition:all .25s;
            box-shadow:var(--shadow);position:relative;
        }
        .product-card:hover { 
            transform:translateY(-8px) scale(1.02); 
            border-color:var(--primary); 
            box-shadow:0 15px 35px rgba(184,27,92,0.25);
        }
        .product-card.out-of-stock { opacity:.45; pointer-events:none; }
        
        .stock-badge {
            position:absolute;top:12px;left:12px;font-size:11px;padding:2px 9px;
            border-radius:12px;font-weight:700;
        }
        .stock-low { background:#fff3e0;color:#e65100; }
        .stock-ok { background:#e8f5e9;color:#2e7d32; }
        
        .cart-item {
            display:flex;justify-content:space-between;align-items:center;
            padding:14px 0;border-bottom:1px dashed var(--border);gap:10px;
            transition:all .2s;
        }
        
        .modal {
            position:fixed;inset:0;background:rgba(0,0,0,0.5);
            backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9999;
        }
        .modal.active { display:flex; }
        .modal-card {
            background:var(--surface);border-radius:24px;padding:28px;
            width:92%;max-width:520px;box-shadow:0 25px 70px rgba(0,0,0,0.25);
        }
        
        .toast {
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            color:white;padding:13px 26px;border-radius:40px;font-weight:700;
            box-shadow:0 8px 25px rgba(0,0,0,0.25);z-index:99999;
        }
        
        .chat-msg {
            max-width:78%;padding:11px 16px;border-radius:18px;
            font-size:.92rem;line-height:1.45;margin-bottom:8px;
        }
        .chat-msg.out { background:var(--primary);color:white;margin-left:auto;border-bottom-right-radius:6px; }
        .chat-msg.in { background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:6px; }
        
        .voice-btn {
            background:linear-gradient(135deg,#b81b5c,#e91e63);color:white;border:none;
            border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;
            font-size:20px;box-shadow:0 4px 15px rgba(184,27,92,0.4);transition:all .2s;
        }
        
        .skeleton {
            background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
            background-size:200% 100%;animation:skeleton-loading 1.4s ease infinite;border-radius:8px;
        }
        .dark .skeleton { background:linear-gradient(90deg,#2a2228 25%,#3d2a35 50%,#2a2228 75%); }
        
        .nav-item {
            display:flex;align-items:center;padding:14px 20px;margin:6px 12px;
            border-radius:16px;color:var(--text-muted);font-weight:600;gap:12px;
            cursor:pointer;transition:0.2s;font-size:15.5px;
        }
        .nav-item:hover, .nav-item.active { 
            background:var(--primary-light);color:white; 
        }
        
        .category-item {
            padding:11px 14px;border-radius:14px;cursor:pointer;margin-bottom:5px;
            font-weight:600;display:flex;align-items:center;gap:9px;transition:0.2s;
        }
        .category-item:hover, .category-item.active { 
            background:#fff0f5;color:#b81b5c; 
        }
        
        .kpi-card {
            background:var(--surface);border-radius:18px;padding:18px;
            box-shadow:var(--shadow);border-right:5px solid var(--primary);
        }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" style="height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#b81b5c,#e91e63);">
        <div class="glass" style="background:white;padding:42px 38px;border-radius:28px;width:92%;max-width:420px;text-align:center;box-shadow:0 25px 70px rgba(0,0,0,0.25);">
            <div style="font-size:68px;color:#b81b5c;margin-bottom:12px;">🍬</div>
            <h1 style="color:#b81b5c;margin-bottom:28px;font-weight:800;font-size:2.1rem;">سُكّر 33</h1>
            
            <div class="form-group" style="margin-bottom:16px;text-align:right;">
                <label style="font-weight:700;display:block;margin-bottom:6px;">نوع المستخدم</label>
                <select id="loginPointType" onchange="updateLoginBranches()" style="width:100%;padding:13px 16px;border:2px solid #f0d9e0;border-radius:16px;font-size:15.5px;">
                    <option value="">اختر نوع المستخدم</option>
                    <option value="مندوب_بيع">🍬 مندوب بيع</option>
                    <option value="كاشير">💰 كاشير</option>
                    <option value="دليفري">🛵 دليفري</option>
                    <option value="خدمة العملاء">📞 خدمة العملاء</option>
                    <option value="مدير_فرع">📊 مدير فرع</option>
                    <option value="إدارة">👑 إدارة</option>
                </select>
            </div>
            
            <div class="form-group" style="margin-bottom:16px;text-align:right;">
                <label style="font-weight:700;display:block;margin-bottom:6px;">الفرع</label>
                <select id="loginBranch" style="width:100%;padding:13px 16px;border:2px solid #f0d9e0;border-radius:16px;font-size:15.5px;">
                    <option value="">اختر الفرع...</option>
                </select>
            </div>
            
            <div class="form-group" style="margin-bottom:22px;text-align:right;">
                <label style="font-weight:700;display:block;margin-bottom:6px;">كلمة المرور</label>
                <input type="password" id="loginPass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:13px 16px;border:2px solid #f0d9e0;border-radius:16px;font-size:15.5px;">
            </div>
            
            <button class="btn btn-primary" onclick="doLogin()" style="width:100%;padding:15px;font-size:1.05rem;">
                <i class="fas fa-sign-in-alt"></i> دخول النظام
            </button>
            
            <div id="loginMsg" style="margin-top:16px;font-weight:700;font-size:14px;color:#d32f2f;"></div>
            <p style="margin-top:22px;font-size:12px;color:#795548;">برمجة م/ محمود سلامة — الإصدار 2.0 (محسن)</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appContainer" class="app-container hidden" style="display:flex;height:100vh;overflow:hidden;">
        
        <!-- Sidebar -->
        <aside style="width:265px;min-width:265px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;box-shadow:var(--shadow);z-index:10;">
            <div style="padding:24px 16px;text-align:center;border-bottom:2px dashed #f0d9e0;">
                <div style="font-size:42px;color:#b81b5c;"><i class="fas fa-candy-cane"></i></div>
                <div style="font-size:32px;font-weight:800;color:#b81b5c;margin:6px 0;">سُكّر 33</div>
                <div style="font-size:12.5px;color:#795548;">الإصدار 2.0 • Dark Mode</div>
            </div>
            
            <nav style="flex:1;padding:12px 0;overflow-y:auto;" id="navMenu"></nav>
            
            <div style="padding:18px;border-top:1px solid var(--border);">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                    <div style="width:38px;height:38px;background:#b81b5c;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;">م</div>
                    <div>
                        <div id="userName" style="font-weight:700;"></div>
                        <div id="userRole" style="font-size:12.5px;color:#795548;"></div>
                    </div>
                </div>
                <button onclick="logout()" style="width:100%;padding:10px;border-radius:30px;font-weight:700;background:white;border:2px solid #f0d9e0;color:#3e2723;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14.5px;">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div style="flex:1;overflow-y:auto;padding:20px 24px;" id="mainContent">
            
            <!-- POS Section -->
            <div id="posSection">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
                    <div>
                        <span style="font-size:1.65rem;font-weight:800;color:#b81b5c;">نقطة البيع</span>
                        <span id="shiftInfo" style="margin-right:12px;font-size:13px;color:#795548;"></span>
                    </div>
                    
                    <div style="display:flex;gap:8px;align-items:center;">
                        <button onclick="startVoiceSearch()" class="voice-btn" title="ابحث بالصوت">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <div class="search-box" style="position:relative;width:280px;">
                            <input type="text" id="productSearch" placeholder="ابحث عن منتج أو كود..." onkeyup="searchProducts(this.value)" style="width:100%;padding:13px 45px 13px 16px;border:2px solid var(--border);border-radius:35px;font-size:15.5px;">
                            <i class="fas fa-search" style="position:absolute;right:18px;top:14px;color:#795548;"></i>
                        </div>
                    </div>
                </div>

                <div style="display:flex;gap:16px;height:calc(100vh - 210px);">
                    
                    <!-- Categories -->
                    <div style="width:195px;min-width:180px;background:var(--surface);border-radius:20px;padding:14px;box-shadow:var(--shadow);overflow-y:auto;">
                        <div style="font-weight:700;margin-bottom:10px;padding-right:6px;">الفئات</div>
                        <div id="categoryList"></div>
                    </div>

                    <!-- Products -->
                    <div style="flex:1;background:var(--surface);border-radius:20px;padding:16px;box-shadow:var(--shadow);overflow-y:auto;">
                        <div class="products-grid" id="productsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px;"></div>
                    </div>

                    <!-- Cart -->
                    <div style="width:365px;min-width:340px;background:var(--surface);border-radius:20px;padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;">
                        <div style="font-weight:800;font-size:1.25rem;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">
                            <span>🛒 السلة</span>
                            <span id="cartCount" style="background:#b81b5c;color:white;font-size:12px;padding:2px 9px;border-radius:12px;">0</span>
                        </div>
                        
                        <div id="cartItems" style="flex:1;overflow-y:auto;margin-bottom:12px;"></div>
                        
                        <div style="border-top:2px solid var(--border);padding-top:14px;">
                            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                                <span>الإجمالي الفرعي</span><span id="subtotal">0 ج.م</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                                <span>الخصم</span><span id="discountAmount" style="color:#d32f2f;">0 ج.م</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                                <span>التوصيل</span><span id="deliveryAmount">0 ج.م</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;font-size:1.35rem;font-weight:800;color:#b81b5c;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
                                <span>الإجمالي</span><span id="grandTotal">0 ج.م</span>
                            </div>
                            
                            <div style="margin-top:14px;display:flex;gap:8px;">
                                <button onclick="applyDiscount()" class="btn" style="flex:1;background:#fff3e0;color:#e65100;border:2px solid #ffe0b2;">خصم</button>
                                <button onclick="checkout()" class="btn btn-primary" style="flex:2;">إتمام الدفع</button>
                            </div>
                            
                            <button onclick="parkOrder()" class="btn" style="width:100%;margin-top:8px;background:#e8f5e9;color:#2e7d32;border:2px solid #c8e6c9;">حفظ كفاتورة معلقة</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="otherSections" style="display:none;"></div>
        </div>
    </div>

    <!-- CHAT WIDGET -->
    <div id="chatWidget" onclick="openChat()" style="position:fixed;bottom:24px;right:24px;width:62px;height:62px;border-radius:50%;background:#b81b5c;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 10px 30px rgba(184,27,92,0.4);z-index:998;font-size:26px;">
        <i class="fas fa-comments"></i>
        <div id="chatBadge" style="position:absolute;top:-4px;right:-4px;background:#f9a825;color:white;font-size:10.5px;padding:1px 7px;border-radius:12px;font-weight:800;display:none;">3</div>
    </div>

    <!-- Chat Panel -->
    <div id="chatPanel" class="glass" style="position:fixed;bottom:24px;right:24px;width:380px;height:560px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);display:none;flex-direction:column;z-index:999;overflow:hidden;border:1px solid var(--border);">
        <div style="background:#b81b5c;color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;">💬 الشات الحي</span>
            <span onclick="closeChat()" style="cursor:pointer;font-size:22px;">×</span>
        </div>
        
        <div style="display:flex;border-bottom:1px solid var(--border);">
            <div class="chat-tab active" onclick="switchChatTab(0)" style="flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:600;border-bottom:3px solid #b81b5c;">الفرع</div>
            <div class="chat-tab" onclick="switchChatTab(1)" style="flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:600;">خاص</div>
        </div>
        
        <div id="chatList" style="flex:1;overflow-y:auto;padding:12px;background:#fafafa;"></div>
        
        <div style="padding:10px;border-top:1px solid var(--border);display:flex;gap:8px;">
            <input id="chatInput" type="text" placeholder="اكتب رسالة..." style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:14.5px;" onkeydown="if(event.key==='Enter')sendChatMessage()">
            <button onclick="sendChatMessage()" class="btn btn-primary" style="padding:0 16px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:99999;"></div>

    <script>
        // ==================== GLOBAL STATE ====================
        let State = {
            currentUser: null,
            cart: [],
            appliedDiscount: 0,
            deliveryFee: 0,
            currentShift: null,
            db: { products: [], stock: [], users: [], sales: [], parkedOrders: [], messages: [] },
            editingUser: null,
            selectedBranch: null
        };
        let chatInterval = null;
        let currentChatTab = 0;
        let isOnline = navigator.onLine;

        // ==================== اتصال بسكربت جوجل ====================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbype-hafWpUHWCRogDFCuB7z3UBmhxpED3ddPIxP_XCouwSUfN19iaXH4IbOYRPqcEJmA/exec';

        async function postJson(action, data = {}) {
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...data })
                });
                return await res.json();
            } catch (e) {
                console.error(e);
                return { ok: false, error: 'خطأ في الاتصال بسكربت جوجل' };
            }
        }

        // ==================== THEME ====================
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('sokarTheme', isDark ? 'dark' : 'light');
            const btn = document.getElementById('themeBtn');
            if (btn) btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        // ==================== LOGIN ====================
        function updateLoginBranches() {
            const type = document.getElementById('loginPointType').value;
            const branchSelect = document.getElementById('loginBranch');
            branchSelect.innerHTML = '<option value="">اختر الفرع...</option>';
            if (!type) return;
            const branches = ['فرع الرياض', 'فرع جدة', 'فرع الدمام', 'فرع مكة', 'فرع المدينة'];
            branches.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                branchSelect.appendChild(opt);
            });
        }

        async function doLogin() {
            const type = document.getElementById('loginPointType').value;
            const branch = document.getElementById('loginBranch').value;
            const pass = document.getElementById('loginPass').value;
            const msg = document.getElementById('loginMsg');

            if (!type || !branch || !pass) { msg.innerHTML = '⚠️ أكمل جميع الحقول'; return; }
            msg.innerHTML = 'جاري التحقق...';
            
            setTimeout(() => {
                if (pass === '123456' || pass === 'admin') {
                    State.currentUser = {
                        username: type === 'إدارة' ? 'Admin' : 'كاشير_1',
                        branch: branch,
                        pointType: type,
                        superPass: 'admin123'
                    };
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appContainer').classList.remove('hidden');
                    initApp();
                    showToast('✅ تم تسجيل الدخول بنجاح', 'success');
                } else {
                    msg.innerHTML = '❌ كلمة مرور خاطئة (جرب 123456)';
                }
            }, 600);
        }

        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) location.reload();
        }

        // ==================== INIT ====================
        function initApp() {
            if (!State.currentUser) return;
            document.getElementById('userName').textContent = State.currentUser.username;
            document.getElementById('userRole').textContent = State.currentUser.pointType;
            
            renderNav();
            loadInitialData();
            renderCategories();
            renderProducts();
            
            if (State.currentUser.pointType === 'كاشير') showSection('pos');
            startChatPolling();
            loadSavedCart();
            initEnhancements();
        }

        function renderNav() {
            const nav = document.getElementById('navMenu');
            nav.innerHTML = '';
            const items = [
                {icon: 'cash-register', label: 'نقطة البيع', section: 'pos'},
                {icon: 'users', label: 'إدارة العملاء', section: 'crm'},
                {icon: 'truck', label: 'التوصيل', section: 'delivery'},
                {icon: 'boxes', label: 'المخزون', section: 'stock'},
                {icon: 'chart-line', label: 'لوحة التحكم', section: 'dashboard'},
                {icon: 'comments', label: 'الشات', section: 'chat'},
                {icon: 'user-cog', label: 'المستخدمين', section: 'users'}
            ];
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'nav-item';
                div.innerHTML = `<i class="fas fa-${item.icon}"></i> <span>${item.label}</span>`;
                div.onclick = () => showSection(item.section);
                nav.appendChild(div);
            });
        }

        function showSection(section) {

        function addToCartFromModal(name, price, unit, btn) {
            const qty = parseInt(document.getElementById('modalQty').value) || 1;
            btn.closest('.modal').remove();
            addToCart(name, price, unit, 50, qty);
        }

        // ==================== CART ====================
        function addToCart(name, price, unit, stock = 50, qty = 1) {
            const stockItem = State.db.stock.find(s => s.item === name);
            const available = stockItem ? stockItem.qty : stock;
            if (available < qty) { showToast(`❌ الرصيد غير كافي! متبقي فقط ${available}`, 'error'); return; }
            
            const existing = State.cart.findIndex(i => i.name === name);
            if (existing >= 0) State.cart[existing].qty += qty;
            else State.cart.push({name, price, unit, qty});
            
            updateCartDisplay();
            autoSaveCart();
            showToast(`✅ تمت إضافة ${name}`, 'success');
        }

        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            if (!container) return;
            container.innerHTML = '';
            
            if (State.cart.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#795548;">السلة فارغة</div>`;
                updateTotals(0, 0, 0);
                return;
            }
            
            let subtotal = 0;
            State.cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:700;">${item.name}</div>
                        <div style="font-size:12.5px;color:#795548;">${item.qty} × ${item.price} ج</div>
                    </div>
                    <div style="font-weight:700;color:#b81b5c;white-space:nowrap;">${itemTotal} ج</div>
                    <div style="display:flex;gap:4px;align-items:center;">
                        <button onclick="changeCartQty(${index}, -1)" style="width:26px;height:26px;border-radius:50%;border:1px solid #f0d9e0;background:white;">−</button>
                        <span style="width:22px;text-align:center;font-weight:700;">${item.qty}</span>
                        <button onclick="changeCartQty(${index}, 1)" style="width:26px;height:26px;border-radius:50%;border:1px solid #f0d9e0;background:white;">+</button>
                        <button onclick="removeFromCart(${index})" style="margin-right:6px;color:#d32f2f;"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
            
            const discount = State.appliedDiscount || 0;
            const delivery = State.deliveryFee || 0;
            const grand = subtotal - discount + delivery;
            updateTotals(subtotal, discount, delivery, grand);
            document.getElementById('cartCount').textContent = State.cart.length;
        }

        function changeCartQty(index, delta) {
            State.cart[index].qty = Math.max(1, State.cart[index].qty + delta);
            updateCartDisplay();
            autoSaveCart();
        }

        function removeFromCart(index) {
            State.cart.splice(index, 1);
            updateCartDisplay();
            autoSaveCart();
        }

        function updateTotals(subtotal, discount, delivery, grand = null) {
            if (!grand) grand = subtotal - discount + delivery;
            document.getElementById('subtotal').textContent = subtotal + ' ج.م';
            document.getElementById('discountAmount').textContent = discount + ' ج.م';
            document.getElementById('deliveryAmount').textContent = delivery + ' ج.م';
            document.getElementById('grandTotal').textContent = grand + ' ج.م';
        }

        function applyDiscount() {
            const pass = prompt('أدخل كلمة مرور المشرف لتطبيق الخصم:');
            if (pass !== State.currentUser?.superPass) { showToast('❌ كلمة مرور خاطئة', 'error'); return; }
            const amount = parseFloat(prompt('أدخل قيمة الخصم بالجنيه:')) || 0;
            if (amount > 0) {
                State.appliedDiscount = amount;
                updateCartDisplay();
                showToast('✅ تم تطبيق الخصم', 'success');
            }
        }

        function autoSaveCart() {
            if (State.currentUser) localStorage.setItem('sokarCart_' + State.currentUser.username, JSON.stringify(State.cart));
        }

        function loadSavedCart() {
            if (State.currentUser) {
                const saved = localStorage.getItem('sokarCart_' + State.currentUser.username);
                if (saved) { State.cart = JSON.parse(saved); updateCartDisplay(); }
            }
        }

        // ==================== CHECKOUT + PRINT ====================
        async function checkout() {
            if (State.cart.length === 0) { showToast('السلة فارغة!', 'warning'); return; }
            const customer = prompt('اسم العميل (اختياري):') || 'عميل نقدي';
            const phone = prompt('رقم الهاتف (اختياري):') || '';
            
            const subtotal = State.cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            const total = subtotal - (State.appliedDiscount || 0) + (State.deliveryFee || 0);
            
            const sale = {
                saleId: 'SALE-' + Date.now(),
                date: new Date().toLocaleString('ar-EG'),
                branch: State.currentUser.branch,
                customer, phone,
                items: [...State.cart],
                subtotal, discount: State.appliedDiscount || 0,
                delivery: State.deliveryFee || 0, total,
                cashier: State.currentUser.username
            };
            
            // Deduct stock
            State.cart.forEach(item => {
                const s = State.db.stock.find(x => x.item === item.name);
                if (s) s.qty -= item.qty;
            });
            
            printProfessionalInvoice(sale);
            State.cart = []; State.appliedDiscount = 0;
            updateCartDisplay();
            showToast('✅ تم حفظ الفاتورة وطباعتها', 'success');
        }

                    <hr style="margin:10px 0;border:0;border-top:1px dashed #ccc;">

        function parkOrder() {
            if (State.cart.length === 0) return;
            const id = 'PARK-' + Date.now();
            State.db.parkedOrders.push({
                id, date: new Date().toISOString(),
                branch: State.currentUser.branch,
                cashier: State.currentUser.username,
                data: JSON.stringify({cart: State.cart, discount: State.appliedDiscount})

            localStorage.setItem('parkedOrders', JSON.stringify(State.db.parkedOrders));

            updateCartDisplay();
            showToast('✅ تم حفظ الفاتورة كمعلقة', 'success');
        }

        // ==================== PWA + OFFLINE + SMART RECS ====================
        function initPWA() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
            window.addEventListener('online', () => { isOnline = true; showToast('🌐 تم استعادة الاتصال', 'success'); });
            window.addEventListener('offline', () => { isOnline = false; showToast('📵 وضع عدم الاتصال', 'warning'); });
            
            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', e => {
                e.preventDefault(); deferredPrompt = e;
                const btn = document.createElement('button');
                btn.className = 'btn btn-primary';
                btn.style.cssText = 'position:fixed;bottom:90px;right:24px;z-index:9999;';
                btn.innerHTML = '<i class="fas fa-download"></i> تثبيت التطبيق';
                btn.onclick = async () => {
                    if (deferredPrompt) { deferredPrompt.prompt(); const {outcome} = await deferredPrompt.userChoice; if (outcome === 'accepted') showToast('✅ تم التثبيت!', 'success'); btn.remove(); }
                };
                document.body.appendChild(btn);
            });
        }

        function getSmartRecommendations(cart) {
            const recs = [];
            const names = cart.map(i => i.name.toLowerCase());
            if (names.some(n => n.includes('كيك'))) recs.push({name: 'آيس كريم شوكولاتة', price: 38, reason: 'يكمل الكيك'});
            if (names.some(n => n.includes('حلويات'))) recs.push({name: 'عصير ليمون نعناع', price: 18, reason: 'منعش'});
            if (cart.length >= 2) recs.push({name: 'فطيرة التفاح', price: 28, reason: 'الأكثر مبيعاً'});
            return recs.slice(0, 3);
        }

        function showRecommendations() {
            if (State.cart.length === 0) return;
            const recs = getSmartRecommendations(State.cart);
            if (!recs.length) return;
            
            const c = document.createElement('div');
            c.style.cssText = 'position:fixed;bottom:110px;right:24px;background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.15);padding:14px 18px;z-index:999;max-width:260px;border:1px solid #f0d9e0;';
            let h = `<div style="font-weight:700;margin-bottom:8px;color:#b81b5c;">💡 اقتراحات ذكية</div>`;
            recs.forEach(r => {
                h += `<div onclick="addToCart('${r.name}',${r.price},'قطعة',20,1);this.parentElement.remove();" style="padding:8px 10px;margin:4px 0;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;background:#fff9f5;"><div><div style="font-weight:600;">${r.name}</div><div style="font-size:11.5px;color:#795548;">${r.reason}</div></div><div style="color:#b81b5c;font-weight:700;">${r.price} ج</div></div>`;
            });
            c.innerHTML = h;
            document.body.appendChild(c);
            setTimeout(() => c.parentElement && c.parentElement.removeChild(c), 8500);
        }

        function exportSalesToCSV() {
            const sales = State.db.sales || [];
            if (!sales.length) { showToast('لا توجد بيانات', 'warning'); return; }
            let csv = 'رقم الفاتورة,التاريخ,الفرع,العميل,الإجمالي\n';
            sales.forEach(s => csv += `${s.saleId},${s.date},${s.branch},${s.customer || ''},${s.total}\n`);
            const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `سكر33_مبيعات_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            showToast('✅ تم التصدير', 'success');
        }

        function addExportButton() {
            const nav = document.getElementById('navMenu');
            if (nav) {
                const b = document.createElement('div');
                b.className = 'nav-item';
                b.innerHTML = `<i class="fas fa-file-export"></i> <span>تصدير التقارير</span>`;
                b.onclick = exportSalesToCSV;
                nav.appendChild(b);
            }
        }

        // ==================== ENHANCEMENTS ====================
        function initEnhancements() {
            initPWA();
            addExportButton();
            
            // Smart recs after adding items
            const orig = window.addToCart;
            window.addToCart = function(...args) {
                orig.apply(this, args);
                setTimeout(() => { if (State.cart.length >= 2) showRecommendations(); }, 800);
            };
            
            // Connection status
            const header = document.querySelector('aside');
            if (header) {
                const st = document.createElement('div');
                st.style.cssText = 'font-size:11px;margin:4px 16px;';
                st.innerHTML = isOnline ? '<span style="color:#2e7d32;">● متصل</span>' : '<span style="color:#e65100;">● غير متصل</span>';
                header.appendChild(st);
            }
            
            // Keyboard shortcuts
            document.addEventListener('keydown', e => {
                if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('productSearch')?.focus(); }
                if (e.key === '?' && document.activeElement.tagName === 'BODY') { e.preventDefault(); showRecommendations(); }
                if (e.key.toLowerCase() === 'p' && State.cart.length > 0) { e.preventDefault(); checkout(); }
            });
            
            console.log('%c✅ سُكّر 33 V2.0 COMPLETE - All Features Loaded', 'color:#b81b5c;font-weight:bold;font-size:15px');
        }

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toastContainer') || document.body;
            const t = document.createElement('div');
            t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${type==='error'?'#d32f2f':type==='warning'?'#e65100':'#2e7d32'};color:white;padding:13px 26px;border-radius:40px;font-weight:700;box-shadow:0 8px 25px rgba(0,0,0,0.25);z-index:99999;`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2600);
        }

        // Auto init theme
        if (localStorage.getItem('sokarTheme') === 'dark' || (!localStorage.getItem('sokarTheme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
