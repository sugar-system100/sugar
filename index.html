<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
  <title>سكّر 33 · نظام مبيعات متكامل</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <style>
    :root {
      --primary: #b81b5c;
      --primary-light: #e84a8a;
      --primary-soft: #fce4f0;
      --accent: #0f9d58;
      --accent-soft: #e6f4ea;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --orange: #f57c00;
      --bg: #f9f6f8;
      --surface: #ffffff;
      --border: #e9dee5;
      --text: #1e1e2a;
      --text-muted: #6b5e66;
      --shadow: 0 10px 25px -5px rgba(0,0,0,.05), 0 8px 10px -6px rgba(0,0,0,.02);
      --radius-card: 24px;
      --transition: all .2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.5; }
    button, input, select, textarea { font-size: 1rem; border-radius: 14px; }
    button { cursor: pointer; border: none; background: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; transition: var(--transition); }
    input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); background: #fff; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(184,27,92,.08); }

    .app-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--surface); border-left: 1px solid var(--border); padding: 24px 12px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; box-shadow: var(--shadow); }
    .logo-area { padding: 8px 16px 24px; text-align: center; border-bottom: 2px solid var(--primary-soft); }
    .logo-icon { font-size: 40px; color: var(--primary); }
    .logo-text { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--primary), #d63384); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-menu { flex: 1; margin: 20px 0; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; margin: 6px 0; border-radius: 18px; color: var(--text-muted); width: 100%; text-align: right; }
    .nav-item i { width: 24px; font-size: 1.2rem; }
    .nav-item:hover { background: var(--primary-soft); color: var(--primary); }
    .nav-item.active { background: var(--primary); color: #fff; }
    .user-badge { margin-top: auto; background: var(--blue-soft); padding: 16px; border-radius: 22px; }
    .logout-btn { width: 100%; margin-top: 10px; background: #fff; border: 1px solid var(--border); padding: 10px 14px; border-radius: 14px; }

    .main-content { flex: 1; padding: 24px 32px; max-width: calc(100% - 260px); }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
    .page-title { font-size: 28px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn { padding: 12px 18px; border-radius: 999px; border: 1px solid transparent; box-shadow: var(--shadow); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #9f1650; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-outline { background: white; border-color: var(--border); color: var(--text); }
    .btn-danger { background: #d32f2f; color: white; }
    .btn-orange { background: var(--orange); color: white; }
    .btn-sm { padding: 10px 14px; font-size: .95rem; }

    .card { background: var(--surface); border-radius: var(--radius-card); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-weight: 800; gap: 12px; flex-wrap: wrap; }

    .pos-layout, .crm-layout { display: flex; gap: 20px; }
    .pos-cart-panel, .crm-cart-panel { width: 360px; flex-shrink: 0; }
    .pos-products-panel, .crm-products-panel { flex: 1; min-width: 0; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 16px; max-height: 68vh; overflow-y: auto; padding: 8px 4px; }
    .product-card { background: #fdfbfc; border: 2px solid var(--border); border-radius: 24px; padding: 20px 12px; text-align: center; cursor: pointer; transition: var(--transition); position: relative; }
    .product-card:hover { background: var(--primary-soft); border-color: var(--primary); transform: translateY(-2px); }
    .product-card.out-of-stock { opacity: .55; pointer-events: none; }
    .product-name { font-weight: 800; margin-bottom: 8px; font-size: 1.05rem; }
    .product-meta { font-size: .92rem; color: var(--text-muted); margin-bottom: 4px; }

    .stock-badge { padding: 4px 10px; border-radius: 999px; font-size: .82rem; display: inline-block; margin-top: 8px; }
    .stock-ok { background: #e6f4ea; color: #0f9d58; }
    .stock-low { background: #fff3e0; color: #f57c00; }
    .stock-zero { background: #fde8e8; color: #d32f2f; }

    .cart-items { max-height: 420px; overflow-y: auto; }
    .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px dashed var(--border); gap: 10px; }
    .total-section { border-top: 2px solid var(--border); margin-top: 16px; padding-top: 18px; }
    .pill { background: var(--accent-soft); color: #0b5e38; padding: 8px 14px; border-radius: 999px; font-weight: 800; font-size: .9rem; }
    .pill-warn { background: #fff3e0; color: #f57c00; }

    .table-wrapper { overflow-x: auto; border-radius: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: right; padding: 14px 12px; background: #f5edf1; color: #441c2e; font-weight: 800; white-space: nowrap; }
    td { padding: 14px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }

    .badge { background: #eef1f4; padding: 8px 14px; border-radius: 999px; font-size: .88rem; display: inline-block; }
    .badge-primary { background: var(--primary-soft); color: var(--primary); }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-warning { background: #fff3cd; color: #8a6d00; }
    .badge-danger { background: #fde8e8; color: #b91c1c; }
    .badge-blue { background: #e8f0fe; color: #1a73e8; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .tab { background: #fff; border: 1px solid var(--border); padding: 10px 14px; border-radius: 999px; }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }
    .kpi-card { background: #fff; border: 1px solid var(--border); border-radius: 24px; padding: 20px; box-shadow: var(--shadow); }
    .kpi-icon { font-size: 1.7rem; margin-bottom: 8px; }
    .kpi-value { font-size: 2rem; font-weight: 900; color: var(--primary); }
    .kpi-label { color: var(--text-muted); font-size: .95rem; margin-top: 4px; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .form-row { margin-bottom: 12px; }
    .hidden { display: none !important; }
    .section { display: none; }
    .section.active { display: block; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.3); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 999; padding: 16px; }
    .modal-card { background: white; width: 520px; max-width: 95%; border-radius: 28px; padding: 28px; box-shadow: 0 30px 50px rgba(0,0,0,.18); }
    .toast { position: fixed; bottom: 24px; left: 24px; background: #1e1e2a; color: white; padding: 14px 24px; border-radius: 999px; z-index: 9999; display: none; box-shadow: 0 10px 20px rgba(0,0,0,.2); }

    #qrScannerContainer { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 20px; overflow: hidden; }
    #qrReader { width: 100%; }

    @media (max-width: 1000px) {
      .sidebar { width: 90px; padding: 16px 6px; }
      .sidebar .logo-text, .sidebar .nav-item span, .user-badge span { display: none; }
      .nav-item { justify-content: center; }
      .main-content { max-width: calc(100% - 90px); padding: 16px; }
      .pos-layout, .crm-layout { flex-direction: column; }
      .pos-cart-panel, .crm-cart-panel { width: 100%; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="logo-area">
      <i class="fas fa-candy-cane logo-icon"></i>
      <div class="logo-text">سكّر 33</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">نظام احترافي</div>
    </div>

    <div class="nav-menu" id="navMenu"></div>

    <div class="user-badge">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <i class="fas fa-user-circle" style="font-size:24px;"></i>
        <span id="whoami" style="font-weight:800;">زائر</span>
      </div>
      <div id="shiftStatus" style="font-size:13px;margin-bottom:8px;"></div>
      <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">
        <i class="fas fa-right-from-bracket"></i><span>تسجيل خروج</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div id="loginScreen" style="max-width:520px;margin:80px auto;">
      <div class="card" style="padding:32px;">
        <div style="text-align:center;margin-bottom:28px;">
          <i class="fas fa-lock" style="font-size:48px;color:var(--primary);"></i>
          <h2 style="margin:12px 0;">تسجيل الدخول</h2>
        </div>

        <div style="margin-bottom:14px;">
          <label>القسم / الفرع</label>
          <select id="branchSelect" style="margin-top:6px;">
            <option>جاري التحميل...</option>
          </select>
        </div>

        <div style="margin-bottom:14px;">
          <label>اسم المستخدم</label>
          <input id="usernameInput" type="text" placeholder="اسم المستخدم" onkeydown="if(event.key==='Enter') login()">
        </div>

        <div style="margin-bottom:22px;">
          <label>كلمة المرور</label>
          <input id="passInput" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
        </div>

        <button class="btn btn-primary" style="width:100%;padding:16px;" onclick="login()">
          <i class="fas fa-sign-in-alt"></i> دخول
        </button>
        <div id="loginMsg" style="margin-top:16px;text-align:center;color:#b0003a;"></div>
      </div>
    </div>

    <div id="appSections" class="hidden">
      <div id="adminBranchBar" class="hidden card" style="margin-bottom:20px;padding:14px 18px;">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <strong>الفرع النشط:</strong>
          <select id="adminBranchSelect" style="width:auto;" onchange="onAdminBranchChange()"></select>
        </div>
      </div>

      <div id="sec-dashboard" class="section"></div>
      <div id="sec-pos" class="section active"></div>
      <div id="sec-orders" class="section"></div>
      <div id="sec-crm" class="section"></div>
      <div id="sec-shifts" class="section"></div>
      <div id="sec-stock" class="section"></div>
      <div id="sec-products" class="section"></div>
      <div id="sec-users" class="section"></div>
      <div id="sec-reports" class="section"></div>
      <div id="sec-expenses" class="section"></div>
    </div>
  </main>
</div>

<div class="modal" id="qtyModal">
  <div class="modal-card">
    <h2 id="qtyTitle">الكمية</h2>
    <input id="qtyInput" type="number" min="1" step="1" value="1" style="margin:16px 0;">
    <div id="qtyHint" style="margin-bottom:16px;color:var(--text-muted);"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeQty()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmQty()">تأكيد</button>
    </div>
  </div>
</div>

<div class="modal" id="qrModal">
  <div class="modal-card" style="text-align:center;">
    <h2><i class="fas fa-qrcode"></i> رمز الطلب</h2>
    <div id="qrBonDetails" style="text-align:right;background:#faf7f9;padding:12px;border-radius:16px;margin:14px 0;"></div>
    <div id="qrCodeContainer" style="margin:20px 0;min-height:250px;display:flex;justify-content:center;align-items:center;"></div>
    <p style="margin-bottom:16px;font-weight:800;font-size:1.1rem;" id="qrOrderId"></p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeQrModal()">إغلاق</button>
      <button class="btn btn-primary" style="flex:1" onclick="printQR()"><i class="fas fa-print"></i> طباعة</button>
    </div>
  </div>
</div>

<div class="modal" id="qrScannerModal">
  <div class="modal-card" style="width:520px;">
    <h2 style="text-align:center;margin-bottom:16px;"><i class="fas fa-camera"></i> مسح QR</h2>
    <div id="qrScannerContainer"><div id="qrReader"></div></div>
    <p style="text-align:center;margin:12px 0;">أو</p>
    <input type="text" id="manualQrInput" placeholder="أدخل كود الطلب يدويًا" style="margin-bottom:12px;">
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeQrScanner()">إغلاق</button>
      <button class="btn btn-primary" style="flex:1" onclick="loadManualQR()">تحميل الطلب</button>
    </div>
  </div>
</div>

<div class="modal" id="shiftModal">
  <div class="modal-card">
    <h2><i class="fas fa-clock"></i> إدارة الوردية</h2>
    <div id="shiftInfo" style="margin:16px 0;padding:12px;background:var(--bg);border-radius:16px;"></div>
    <div id="shiftActions"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-outline" style="width:100%;" onclick="closeShiftModal()">إغلاق</button>
    </div>
  </div>
</div>

<div class="modal" id="supervisorModal">
  <div class="modal-card">
    <h2><i class="fas fa-user-shield"></i> صلاحية المشرف</h2>
    <p style="margin:16px 0;">أدخل كلمة مرور المشرف لتفعيل الخصم</p>
    <input id="superPassInput" type="password" placeholder="كلمة المرور">
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeSupervisorModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="verifySupervisorForDiscount()">تأكيد</button>
    </div>
  </div>
</div>

<div class="modal" id="paymentModal">
  <div class="modal-card">
    <h2><i class="fas fa-credit-card"></i> الدفع</h2>
    <div id="paymentSummary" style="background:#faf7f9;padding:14px;border-radius:16px;margin:16px 0;"></div>
    <select id="paymentMethod" style="margin-bottom:12px;">
      <option value="نقدي">نقدي</option>
      <option value="فيزا">فيزا</option>
      <option value="تحويل بنكي">تحويل بنكي</option>
      <option value="فودافون كاش">فودافون كاش</option>
      <option value="إنستاباي">إنستاباي</option>
      <option value="أقساط">أقساط</option>
    </select>
    <input type="number" id="paidAmount" placeholder="المبلغ المدفوع" step="0.5" style="margin-bottom:12px;">
    <input type="text" id="paymentNotes" placeholder="ملاحظات (اختياري)">
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-outline" style="flex:1" onclick="closePaymentModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmPayment()">تأكيد الدفع</button>
    </div>
  </div>
</div>

<div class="modal" id="customerModal">
  <div class="modal-card">
    <h2><i class="fas fa-user"></i> بيانات العميل</h2>
    <div style="margin:16px 0;">
      <input id="customerName" placeholder="اسم العميل" style="margin-bottom:12px;">
      <input id="customerPhone" placeholder="رقم الهاتف" style="margin-bottom:12px;">
      <input id="customerAddress" placeholder="العنوان" style="margin-bottom:12px;">
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeCustomerModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmCustomerInfo()">متابعة</button>
    </div>
  </div>
</div>

<div class="modal" id="stockUpdateModal">
  <div class="modal-card">
    <h2><i class="fas fa-boxes"></i> تحديث المخزون</h2>
    <input id="stockBranch" type="hidden">
    <input id="stockItem" type="hidden">
    <div class="form-row">
      <label>الكمية الجديدة</label>
      <input id="stockNewQty" type="number" min="0" step="0.1">
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeStockModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmStockUpdate()">حفظ</button>
    </div>
  </div>
</div>

<div class="modal" id="productModal">
  <div class="modal-card">
    <h2 id="productModalTitle"><i class="fas fa-tag"></i> إضافة صنف</h2>
    <input id="prodName" placeholder="اسم الصنف" style="margin-bottom:12px;">
    <input id="prodCat" list="catSuggestions" placeholder="التصنيف" style="margin-bottom:12px;">
    <datalist id="catSuggestions"></datalist>
    <input id="prodPrice" type="number" step="0.01" placeholder="السعر" style="margin-bottom:12px;">
    <select id="prodUnit" style="margin-bottom:12px;">
      <option value="قطعة">قطعة</option>
      <option value="كيلو">كيلو</option>
    </select>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeProductModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmSaveProduct()">حفظ</button>
    </div>
  </div>
</div>

<div class="modal" id="userModal">
  <div class="modal-card">
    <h2 id="userModalTitle"><i class="fas fa-user-plus"></i> إضافة مستخدم</h2>
    <input id="userBranch" placeholder="الفرع / القسم" style="margin-bottom:12px;">
    <input id="userUsername" placeholder="اسم المستخدم" style="margin-bottom:12px;">
    <input id="userPass" placeholder="كلمة المرور" style="margin-bottom:12px;">
    <input id="userSuperPass" placeholder="كلمة مرور المشرف" style="margin-bottom:12px;">
    <select id="userPointType" style="margin-bottom:12px;">
      <option>إدارة</option>
      <option>مشرف</option>
      <option>كاشير</option>
      <option>مندوب_بيع</option>
      <option>دليفري</option>
      <option>خدمة العملاء</option>
      <option>فرع</option>
    </select>
    <input id="userNotes" placeholder="ملاحظات" style="margin-bottom:12px;">
    <label style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <input id="userActive" type="checkbox" checked style="width:auto;"> الحساب نشط
    </label>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeUserModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmSaveUser()">حفظ</button>
    </div>
  </div>
</div>

<div class="modal" id="expenseModal">
  <div class="modal-card">
    <h2><i class="fas fa-money-bill-wave"></i> إضافة مصروف</h2>
    <select id="expenseType" onchange="toggleComplaintField()" style="margin-bottom:12px;">
      <option>مصروف عام</option>
      <option>ترضية عميل</option>
      <option>فودافون كاش</option>
      <option>نثريات</option>
      <option>أخرى</option>
    </select>
    <input id="expenseAmount" type="number" step="0.01" placeholder="المبلغ" style="margin-bottom:12px;">
    <div id="complaintRow" class="hidden">
      <input id="complaintId" placeholder="رقم الشكوى" style="margin-bottom:12px;">
    </div>
    <input id="expenseNotes" placeholder="ملاحظات" style="margin-bottom:12px;">
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeExpenseModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmExpense()">حفظ</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
(function(){
'use strict';

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR_KLq4Wbq4f8q5ghfUJSz_-0PMtmDmVvMAUHq6x2Ud3cvEsMW2YtSEZBRWl3iBHvL4Q/exec';

let db = {
  products:[], users:[], stock:[], sales:[], crmOrders:[],
  qrOrders:[], shifts:[], expenses:[], returns:[],
  crmStatuses:['تم الاستلام','جاري التجهيز','خرج للتوصيل','مكتمل','ملغي']
};

let currentUser = null;
let currentShift = null;
let discountEnabled = false;
let currentQROrderId = null;
let html5QrScanner = null;
let adminBranch = '';

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg || '';
  t.style.background = isError ? '#d32f2f' : '#1e1e2a';
  t.style.display = 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.style.display='none', 3500);
}

function stockFor(item, branch=null) {
  const b = branch || currentUser?.branch;
  if (!b) return 0;
  const row = db.stock.find(s => s.branch===b && s.item===item);
  return row ? Number(row.qty||0) : 0;
}

}

function getActiveBranch() {

}

function jsonp(action, params={}) {
  return new Promise((resolve, reject) => {
    const base = SCRIPT_URL;
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({action, callback:cb, ...params});
    const script = document.createElement('script');
    let done = false;

    window[cb] = data => {
      if (done) return;
      done = true;
      try { delete window[cb]; } catch(e){}
      script.remove();
      if (data && data.ok === false) reject(new Error(data.error || 'فشل الطلب'));
      else resolve(data);
    };

    script.onerror = () => {
      if (done) return;
      done = true;
      try { delete window[cb]; } catch(e){}
      script.remove();
      reject(new Error('فشل الاتصال'));
    };

    script.src = base + (base.includes('?') ? '&' : '?') + qs.toString();
    document.body.appendChild(script);

    setTimeout(() => {
      if (done) return;
      done = true;
      try { delete window[cb]; } catch(e){}
      script.remove();
      reject(new Error('انتهت مهلة الاتصال'));
    }, 15000);
  });
}

function postForm(action, payload={}) {
  return new Promise((resolve, reject) => {
    const iframe = document.createElement('iframe');
    iframe.name = 'frm_'+Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = iframe.name;
    form.style.display = 'none';

    const inp = document.createElement('input');
    inp.name = 'payload';
    inp.value = JSON.stringify({action, ...payload});
    form.appendChild(inp);
    document.body.appendChild(form);

    let settled = false;
    const finalize = () => {
      if (settled) return;
      settled = true;
      setTimeout(() => {
        form.remove();
        iframe.remove();
        resolve({ok:true});
      }, 200);
    };

    iframe.onload = finalize;
    try { form.submit(); } catch(e) { reject(e); }
    setTimeout(finalize, 3000);
  });
}

function normalizeData(res) {
  db.users = (res.users||[]).map(r => ({
    branch: String(r[0]||'').trim(),
    username: String(r[1]||'').trim(),
    pass: String(r[2]||'').trim(),
    superPass: String(r[3]||'').trim(),
    pointType: String(r[4]||'').trim(),
    notes: String(r[5]||'').trim(),
    active: r[6]===true || String(r[6]||'').toUpperCase()==='TRUE'
  }));

  db.products = (res.products||[]).map(r => ({
    name: String(r[0]||'').trim(),
    cat: String(r[1]||'').trim(),
    price: +r[2] || 0,
    unit: String(r[3]||'قطعة').trim()
  }));

  db.stock = (res.stock||[]).map(r => ({
    branch: String(r[0]||'').trim(),
    item: String(r[1]||'').trim(),
    qty: +r[2] || 0,
    lastUpdate: String(r[3]||'')
  }));

  db.sales = (res.sales||[]).map(r => ({
    saleId:r[0], date:r[1], branch:r[2], customer:r[3], phone:r[4],
    address:r[5], channel:r[6], status:r[7],
    subtotal:+r[8]||0, discount:+r[9]||0, delivery:+r[10]||0, total:+r[11]||0,
    cashier:r[12], username:r[13], notes:r[14], shiftId:r[15],
    paymentMethod:r[16]||'نقدي', paidAmount:+r[17]||0, qrOrderId:r[18]
  }));

  db.crmOrders = (res.crmOrders||[]).map(r => ({
    id:r[0], createdAt:r[1], branch:r[2], customer:r[3], phone:r[4],
    address:r[5], items:r[6], total:+r[7]||0, notes:r[8], status:r[9], createdBy:r[10]
  }));

  db.qrOrders = (res.qrOrders||[]).map(r => {
    let items = [];
    try { items = JSON.parse(r[5]||'[]'); } catch(e){}
    return {
      id:r[0], date:r[1], creator:r[2], salesmanName:r[3], branch:r[4],
      items, subtotal:+r[6]||0, discount:+r[7]||0, delivery:+r[8]||0, total:+r[9]||0,
      status:r[10], cashier:r[11], closedAt:r[12]
    };
  });

  db.shifts = (res.shifts||[]).map(r => ({
    id:r[0], branch:r[1], cashier:r[2], username:r[3],
    openTime:r[4], closeTime:r[5], totalSales:+r[6]||0, invoiceCount:+r[7]||0, status:r[8]
  }));

  db.expenses = (res.expenses||[]).map(r => ({
    id:r[0], date:r[1], branch:r[2], username:r[3], type:r[4],
    amount:+r[5]||0, complaintId:r[6], notes:r[7], shiftId:r[8]
  }));

  db.returns = (res.returns||[]).map(r => ({
    id:r[0], date:r[1], branch:r[2], username:r[3], originalSaleId:r[4],
    items:r[5], amount:+r[6]||0, reason:r[7], shiftId:r[8]
  }));

  if (res.crmStatuses?.length) db.crmStatuses = res.crmStatuses;
}

async function refreshData(silent=false) {
  try {
    const res = await jsonp('getInitialData');
    normalizeData(res);
    if (currentUser) {
      loadCurrentShift();
      renderAll();
    }
    if (!silent) toast('تم تحديث البيانات ✓');
    return true;
  } catch(e) {
    if (!silent) toast(e.message, true);
    return false;
  }
}

async function boot() {
  try {
    document.getElementById('loginMsg').textContent = 'جاري الاتصال...';
    const res = await jsonp('getInitialData');
    normalizeData(res);
    fillLoginBranches();
    document.getElementById('loginMsg').textContent = '';
    restoreSession();
  } catch(e) {
    document.getElementById('branchSelect').innerHTML = '<option>❌ فشل التحميل</option>';
    document.getElementById('loginMsg').textContent = e.message;
  }
}

function login() {
  const branch = String(document.getElementById('branchSelect').value||'').trim();
  const username = String(document.getElementById('usernameInput').value||'').trim();
  const pass = String(document.getElementById('passInput').value||'').trim();

  if (!branch) return toast('اختر القسم / الفرع', true);
  if (!username) return toast('أدخل اسم المستخدم', true);
  if (!pass) return toast('أدخل كلمة المرور', true);

  const user = db.users.find(u =>
    u.active &&
    u.branch===branch &&
    u.username===username &&
    (u.pass===pass || u.superPass===pass)
  );

  if (!user) return toast('بيانات الدخول غير صحيحة', true);

  currentUser = {...user};
  localStorage.setItem('SOKAR_USER', JSON.stringify(currentUser));
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appSections').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.remove('hidden');
  updateUIForUser();
}

function restoreSession() {
  try {
    const u = JSON.parse(localStorage.getItem('SOKAR_USER'));
    if (!u) return;
    const still = db.users.some(usr => usr.branch===u.branch && usr.username===u.username && usr.active);
    if (!still) { localStorage.removeItem('SOKAR_USER'); return; }
    currentUser = u;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appSections').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    updateUIForUser();
  } catch(e){}
}

function logout() {
  currentUser = null;
  localStorage.removeItem('SOKAR_USER');
  location.reload();
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById('sec-'+id);
  if (sec) sec.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.getAttribute('data-sec')===id));

  const map = {
    dashboard: renderDashboard,
    pos: renderPOS,
    orders: renderOrders,
    crm: renderCRM,
    shifts: renderShifts,
    stock: renderStock,
    products: renderProductsManagement,
    users: renderUsersManagement,
    reports: renderReports,
    expenses: renderExpenses
  };
  if (map[id]) map[id]();
}

  const active = document.querySelector('.section.active')?.id?.replace('sec-','') || 'pos';
  showSection(active);
}

  currentShift = db.shifts.find(s =>
    s.branch===currentUser.branch &&
    (s.cashier===currentUser.username || s.username===currentUser.username) &&
    s.status==='مفتوحة'
  ) || null;
  updateShiftDisplay();
}

  const el = document.getElementById('shiftStatus');

  if (currentShift) {
    el.innerHTML = `<span style="color:#0f9d58;font-weight:700;">🟢 وردية مفتوحة</span><br>

function renderCats() {
  const box = document.getElementById('catsList');
  if (!box) return;
  const cats = ['الكل', ...new Set(db.products.map(p=>p.cat).filter(Boolean))];
  const activeCat = pendingContext==='crm' ? crmCurrentCat : currentCat;
  box.innerHTML = cats.map(c => `<span class="badge ${c===activeCat?'badge-success':''}" onclick="setCategory('${jsq(c)}')">${esc(c)}</span>`).join('');
}

function setCategory(cat) {
  if (pendingContext==='crm') crmCurrentCat = cat;
  else currentCat = cat;
  renderCats();
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (!grid) return;
  const search = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
  const activeCat = pendingContext==='crm' ? crmCurrentCat : currentCat;
  const branch = getActiveBranch();

  let filtered = db.products.filter(p => activeCat==='الكل' || p.cat===activeCat);
  if (search) filtered = filtered.filter(p =>
    p.name.toLowerCase().includes(search) || p.cat.toLowerCase().includes(search)
  );

  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text-muted);">لا توجد منتجات</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const st = stockFor(p.name, branch);
    const stClass = st<=0 ? 'stock-zero' : st<=5 ? 'stock-low' : 'stock-ok';
    const stLabel = st<=0 ? '❌ نفد' : st<=5 ? `⚠ ${st}` : `${st}`;
    const clickable = isCRM() ? '' : `onclick="askQty('${jsq(p.name)}')"`;
    return `<div class="product-card ${st<=0&&!isCRM()?'out-of-stock':''}" ${clickable}>
      <div class="product-name">${esc(p.name)}</div>
      <div class="product-meta">${money(p.price)} ج.م${isWeight(p)?'/كجم':''}</div>
      <div class="product-meta">${esc(p.cat)}</div>
      <span class="stock-badge ${stClass}">${stLabel}</span>
    </div>`;
  }).join('');
}

function askQty(name, context='pos') {
  const p = db.products.find(x=>x.name===name);
  if (!p) return;
  pendingProduct = p;
  pendingEditIndex = -1;
  pendingContext = context;
  document.getElementById('qtyTitle').textContent = isWeight(p) ? `الوزن (جرام) · ${p.name}` : `الكمية · ${p.name}`;
  document.getElementById('qtyInput').value = isWeight(p) ? 500 : 1;
  document.getElementById('qtyInput').step = isWeight(p) ? 50 : 1;
  document.getElementById('qtyInput').min = isWeight(p) ? 50 : 1;
  document.getElementById('qtyHint').textContent = isWeight(p) ? `أدخل الوزن بالجرام | سعر الكيلو: ${money(p.price)} ج` : `أدخل عدد القطع | سعر القطعة: ${money(p.price)} ج`;
  document.getElementById('qtyModal').style.display = 'flex';
}

function closeQty() {
  document.getElementById('qtyModal').style.display = 'none';
  pendingProduct = null;
  pendingEditIndex = -1;
}

function confirmQty() {
  let qty = parseFloat(document.getElementById('qtyInput').value);
  if (isNaN(qty) || qty<=0) return toast('أدخل كمية صحيحة', true);
  if (!pendingProduct) return;

  const chargeQty = isWeight(pendingProduct) ? qty/1000 : qty;
  const total = chargeQty * pendingProduct.price;
  const targetCart = pendingContext==='crm' ? crmCart : cart;

  if (pendingEditIndex>=0) {
    const item = targetCart[pendingEditIndex];
    if (item) {
      item.qty = qty;
      item.chargeQty = chargeQty;
      item.total = total;
    }
  } else {
    const existing = targetCart.find(i=>i.name===pendingProduct.name);
    if (existing) {
      existing.qty += qty;
      existing.chargeQty += chargeQty;
      existing.total = existing.chargeQty * existing.price;
    } else {
      targetCart.push({name:pendingProduct.name, unit:pendingProduct.unit, price:pendingProduct.price, qty, chargeQty, total});
    }
  }

  closeQty();
  if (pendingContext==='crm') renderCRMCart();
  else renderCart();
}

function editCartItem(index, context='pos') {
  const targetCart = context==='crm' ? crmCart : cart;
  const item = targetCart[index];
  if (!item) return;
  const p = db.products.find(x=>x.name===item.name);
  if (!p) return;
  pendingProduct = p;
  pendingEditIndex = index;
  pendingContext = context;
  document.getElementById('qtyTitle').textContent = `تعديل · ${p.name}`;
  document.getElementById('qtyInput').value = item.qty;
  document.getElementById('qtyInput').step = isWeight(p)?50:1;
  document.getElementById('qtyInput').min = isWeight(p)?50:1;
  document.getElementById('qtyHint').textContent = isWeight(p)?'الوزن بالجرام':'الكمية';
  document.getElementById('qtyModal').style.display = 'flex';
}

function removeFromCart(index, context='pos') {
  if (context==='crm') crmCart.splice(index,1);
  else cart.splice(index,1);
  if (context==='crm') renderCRMCart();
  else renderCart();
}

function renderCart() {
  const box = document.getElementById('cartList');
  if (!box) return;

  if (!cart.length) {
    box.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">السلة فارغة</div>';
  } else {
    box.innerHTML = cart.map((i,idx)=>`
      <div class="cart-row">
        <div style="flex:1;">
          <strong>${esc(i.name)}</strong>
          <div class="product-meta">${isWeight(i)?i.qty+' جم':i.qty} × ${money(i.price)} ج</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <strong>${money(i.total)} ج</strong>
          <i class="fas fa-edit" style="cursor:pointer;color:var(--blue);" onclick="editCartItem(${idx})"></i>
          <i class="fas fa-trash" style="cursor:pointer;color:#d32f2f;" onclick="removeFromCart(${idx})"></i>
        </div>
      </div>`).join('');
  }

  const sub = cart.reduce((a,b)=>a+b.total,0);
  const fee = parseFloat(document.getElementById('deliveryFee')?.value)||0;
  const discType = document.getElementById('discountType')?.value||'fixed';
  let disc = parseFloat(document.getElementById('discountVal')?.value)||0;
  if (discType==='percent') disc = sub*(disc/100);
  const total = Math.max(0, sub+fee-disc);

  const subEl = document.getElementById('subTotal');
  const grandEl = document.getElementById('grandTotal');
  if (subEl) subEl.textContent = money(sub);
  if (grandEl) grandEl.textContent = money(total)+' ج.م';
}

async function createQROrder() {
  if (!cart.length) return toast('السلة فارغة', true);

  const sub = cart.reduce((a,b)=>a+b.total,0);
  const fee = parseFloat(document.getElementById('deliveryFee')?.value)||0;
  const discType = document.getElementById('discountType')?.value||'fixed';
  let disc = parseFloat(document.getElementById('discountVal')?.value)||0;
  if (discType==='percent') disc = sub*(disc/100);
  const total = Math.max(0, sub+fee-disc);

  const order = {
    branch: currentUser.branch,
    creator: currentUser.username,
    salesmanName: currentUser.username,
    items: cart.map(i=>({name:i.name, qty:i.qty, price:i.price, total:i.total})),
    subtotal: sub, delivery: fee, discount: disc, total
  };

  try {
    await postForm('createQROrder',{order});
    const fallbackId = 'QR-' + Date.now();
    showQRModal(fallbackId, order);
    toast('تم إنشاء QR ✓');
  } catch(e){ toast(e.message||'فشل إنشاء QR', true); }
}

function showQRModal(orderId, orderData=null) {
  document.getElementById('qrOrderId').textContent = orderId;
  const details = document.getElementById('qrBonDetails');
  details.innerHTML = orderData ? `
    <div><strong>المندوب:</strong> ${esc(currentUser?.username||'')}</div>
    <div style="margin-top:8px;"><strong>الأصناف:</strong></div>
    ${(orderData.items||[]).map(i=>`<div>• ${esc(i.name)} × ${i.qty} = ${money(i.total)} ج</div>`).join('')}
    <hr class="divider">
    <div><strong>الإجمالي:</strong> ${money(orderData.total)} ج.م</div>` : '';

  const container = document.getElementById('qrCodeContainer');
  container.innerHTML = '';
  QRCode.toCanvas(document.createElement('canvas'), orderId, {width:240}, (err, canvas) => {
    if (err) { container.innerHTML = '<p style="color:red;">فشل إنشاء QR</p>'; return; }
    container.appendChild(canvas);
    document.getElementById('qrModal').style.display = 'flex';

function printQR() {
  const canvas = document.querySelector('#qrCodeContainer canvas');
  const orderId = document.getElementById('qrOrderId').textContent;
  const details = document.getElementById('qrBonDetails').innerHTML;
  if (!canvas) return;
  const win = window.open('');
  win.document.write(`
    <html dir="rtl"><head><title>بون QR - ${orderId}</title>
    <style>body{font-family:Tahoma;padding:20px;direction:rtl;max-width:420px;margin:auto;}h3{color:#b81b5c;}</style></head>
    <body>

      <div style="text-align:center;margin:18px 0;">
        <img src="${canvas.toDataURL()}">
        <p style="font-weight:bold;">${orderId}</p>

  win.document.close();
  setTimeout(()=>win.print(), 300);

async function loadQROrder(orderId) {
  try {
    const res = await jsonp('getQROrder',{orderId});
    if (!res.order) return toast('الطلب غير موجود', true);
    const order = res.order;
    if (order.status==='مكتمل') return toast('هذا الطلب مكتمل بالفعل', true);
    cart = (order.items||[]).map(i => {
      const p = db.products.find(pp=>pp.name===i.name) || {unit:'قطعة'};
      return {name:i.name, unit:p.unit, price:i.price, qty:i.qty, chargeQty:isWeight(p)?(i.qty/1000):i.qty, total:i.total};
    });
    currentQROrderId = orderId;
    closeQrScanner();
    renderPOS();
    const d1 = document.getElementById('deliveryFee'); if (d1) d1.value = order.delivery || 0;
    const d2 = document.getElementById('discountVal'); if (d2) d2.value = order.discount || 0;
    renderCart();
    toast(`تم تحميل الطلب ${orderId}`);
  } catch(e){ toast(e.message, true); }
}

function renderStockTable(branch, canEdit) {

function buildStockTableHTML(items, canEdit) {
  return `<div class="table-wrapper"><table>

function filterStockTable(branch, canEdit) {

async function confirmExpense() {
  const type = document.getElementById('expenseType').value;
  const amount = parseFloat(document.getElementById('expenseAmount').value)||0;
  const complaintId = document.getElementById('complaintId').value.trim();
  const notes = document.getElementById('expenseNotes').value.trim();

  if (amount<=0) return toast('أدخل مبلغاً صحيحاً', true);
  if (type==='ترضية عميل' && !complaintId) return toast('أدخل رقم الشكوى', true);

  const expense = {
    branch: currentUser.branch,
    username: currentUser.username,
    type, amount, complaintId, notes,
    shiftId: currentShift?.id || ''
  };

  try {
    await postForm('saveExpense',{expense});
    await refreshData(true);
    closeExpenseModal();
    toast('تم تسجيل المصروف ✓');
    if (document.querySelector('.section.active')?.id === 'sec-expenses') renderExpenses();
  } catch(e){ toast(e.message,true); }
}
