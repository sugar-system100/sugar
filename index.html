<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سكر 33 - تسجيل دخول</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root{--primary:#b81b5c;--bg:#f9f6f8;--surface:#fff;--border:#e9dee5;--text:#1e1e2a;--muted:#6b5e66;--shadow:0 10px 25px -5px rgba(0,0,0,.05),0 8px 10px -6px rgba(0,0,0,.02)}
    *{box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text)}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;box-shadow:var(--shadow)}
    h1{text-align:center;margin:12px 0 6px}
    p{text-align:center;color:var(--muted);margin:0 0 24px}
    label{display:block;margin:0 0 8px;font-weight:700}
    select,input,button{width:100%;padding:14px 16px;border-radius:14px;font-size:16px}
    select,input{border:1.5px solid var(--border);margin-bottom:16px}
    button{border:none;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}
    .msg{margin-top:14px;text-align:center;color:#b0003a;min-height:24px}
    .ok{color:#0f9d58}
    .logo{font-size:52px;color:var(--primary);text-align:center;display:block}
    .box{background:#faf7f9;border:1px dashed var(--border);padding:14px;border-radius:16px;margin-top:18px;font-size:14px;color:var(--muted)}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <i class="fas fa-candy-cane logo"></i>
    <h1>سكر 33</h1>
    <p>شاشة دخول 3 اختيارات: نوع المستخدم ثم الفرع ثم كلمة المرور</p>

    <label>نوع المستخدم</label>
    <select id="pointTypeSelect">
      <option value="">جاري التحميل...</option>
    </select>

    <label>الفرع / المستخدم</label>
    <select id="branchSelect">
      <option value="">اختر نوع المستخدم أولاً</option>
    </select>

    <label>كلمة المرور</label>
    <input id="passInput" type="password" placeholder="••••••••" />

    <button id="loginBtn">دخول</button>
    <div id="loginMsg" class="msg"></div>

    <div class="box">
      هذا ملف نظيف لحل مشكلة شاشة الدخول فقط. عدّل رابط Apps Script داخل المتغير <b>SCRIPT_URL</b> إذا لزم الأمر.
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR_KLq4Wbq4f8q5ghfUJSz_-0PMtmDmVvMAUHq6x2Ud3cvEsMW2YtSEZBRWl3iBHvL4Q/exec';
  let db = { users: [] };

  const msg = document.getElementById('loginMsg');
  const pointTypeSelect = document.getElementById('pointTypeSelect');
  const branchSelect = document.getElementById('branchSelect');
  const passInput = document.getElementById('passInput');
  const loginBtn = document.getElementById('loginBtn');

  function setMsg(text, ok=false){
    msg.textContent = text || '';
    msg.className = ok ? 'msg ok' : 'msg';
  }

  function esc(s){
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function jsonp(action, params={}){
    return new Promise((resolve, reject) => {
      const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const qs = new URLSearchParams({ action, callback: cb, ...params });
      const script = document.createElement('script');
      let done = false;

      window[cb] = data => {
        if (done) return;
        done = true;
        try { delete window[cb]; } catch(e){}
        script.remove();
        if (data && data.ok === false) reject(new Error(data.error || 'فشل الطلب'));
        else resolve(data);
      };

      script.onerror = () => {
        if (done) return;
        done = true;
        try { delete window[cb]; } catch(e){}
        script.remove();
        reject(new Error('فشل الاتصال بالسيرفر'));
      };

      script.src = SCRIPT_URL + (SCRIPT_URL.includes('?') ? '&' : '?') + qs.toString();
      document.body.appendChild(script);

      setTimeout(() => {
        if (done) return;
        done = true;
        try { delete window[cb]; } catch(e){}
        script.remove();
        reject(new Error('انتهت مهلة الاتصال'));
      }, 15000);
    });
  }

  function normalizeData(res){
    db.users = (res.users || []).map(r => ({
      branch: String(r[0] || '').trim(),
      pass: String(r[1] || '').trim(),
      superPass: String(r[2] || '').trim(),
      pointType: String(r[3] || '').trim(),
      notes: String(r[4] || '').trim(),
      active: r[5] === true || String(r[5] || '').toUpperCase() === 'TRUE'
    }));
  }

  function fillUserTypes(){
    const types = [...new Set(db.users.filter(u => u.active).map(u => u.pointType).filter(Boolean))];
    pointTypeSelect.innerHTML = '<option value="">اختر نوع المستخدم</option>' +
      types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  }

  function fillBranchesByType(){
    const type = String(pointTypeSelect.value || '').trim();
    if (!type) {
      branchSelect.innerHTML = '<option value="">اختر نوع المستخدم أولاً</option>';
      return;
    }
    const branches = db.users.filter(u => u.active && u.pointType === type).map(u => u.branch);
    branchSelect.innerHTML = '<option value="">اختر الفرع / المستخدم</option>' +
      branches.map(b => `<option value="${esc(b)}">${esc(b)}</option>`).join('');
  }

  function login(){
    const pointType = String(pointTypeSelect.value || '').trim();
    const branch = String(branchSelect.value || '').trim();
    const pass = String(passInput.value || '').trim();

    if (!pointType) return setMsg('اختر نوع المستخدم');
    if (!branch) return setMsg('اختر الفرع / المستخدم');
    if (!pass) return setMsg('أدخل كلمة المرور');

    const user = db.users.find(u =>
      u.active &&
      u.pointType === pointType &&
      u.branch === branch &&
      (u.pass === pass || u.superPass === pass)
    );

    if (!user) return setMsg('بيانات الدخول غير صحيحة');

    localStorage.setItem('SOKAR_USER', JSON.stringify(user));
    setMsg('تم تسجيل الدخول بنجاح', true);
  }

  async function boot(){
    try {
      setMsg('جاري تحميل المستخدمين...');
      const res = await jsonp('getInitialData');
      normalizeData(res);
      fillUserTypes();
      branchSelect.innerHTML = '<option value="">اختر نوع المستخدم أولاً</option>';
      setMsg('جاهز لتسجيل الدخول', true);
    } catch(e) {
      setMsg(e.message || 'فشل التحميل');
      pointTypeSelect.innerHTML = '<option value="">فشل التحميل</option>';
      branchSelect.innerHTML = '<option value="">فشل التحميل</option>';
    }
  }

  pointTypeSelect.addEventListener('change', fillBranchesByType);
  loginBtn.addEventListener('click', login);
  passInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  boot();
})();
</script>
</body>
</html>
