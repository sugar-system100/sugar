<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام سكر V12 | م/ محمود سلامه</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root { --primary: #c2185b; --success: #2e7d32; --bg: #f8f9fa; --offline: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .status-bar { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .online { background: #e8f5e9; color: #2e7d32; }
        .offline { background: #fff3e0; color: #ef6c00; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .card { padding: 20px; border-radius: 12px; border: 1px solid #eee; background: white; text-align: center; font-weight: bold; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        @media print { .no-print { display: none !important; } #printZone { display: block !important; } }
    </style>
</head>
<body>

<div id="loader"><h2>جاري المزامنة...</h2><p>تطوير م/ محمود سلامه</p></div>

<div id="mainApp" class="container">
    <div class="nav no-print" style="display:flex; justify-content:space-between; align-items:center;">
        <div id="netStatus" class="status-bar online">● متصل بالإنترنت</div>
        <h3 id="branchInfo" style="color:var(--primary); margin:0;">سكر V12 🍬</h3>
        <button onclick="logout()" class="btn" style="background:none;">خروج</button>
    </div>

    <button id="syncBtn" class="btn no-print" style="width:100%; background:#0288d1; color:white; margin:10px 0; display:none;" onclick="pushOfflineData()">🔄 يوجد بيانات غير مرفوعة.. اضغط للمزامنة</button>

    <div id="loginSection" style="text-align:center; padding:20px;">
        <select id="userSelect" style="padding:15px; width:100%; border-radius:10px;"><option>جاري التحميل...</option></select>
        <input type="password" id="userPass" placeholder="كلمة المرور" style="padding:15px; width:100%; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
        <button onclick="handleLogin()" class="btn" style="background:var(--primary); color:white; width:100%;">دخول</button>
    </div>

    <div id="appContent" style="display:none;">
        <div class="tabs no-print" style="display:flex; gap:10px; margin:15px 0;">
            <button class="btn" style="flex:1; background:var(--primary); color:white;" onclick="switchTab('pos')">البيع</button>
            <button class="btn" style="flex:1; background:#eee;" onclick="switchTab('stock')">المخزون</button>
        </div>

        <div id="s-pos">
            <input type="text" id="pSearch" placeholder="🔍 بحث عن منتج..." oninput="filterProducts(this.value)" style="padding:15px; width:100%; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;">
            <div id="catGrid" class="grid"></div>
            <div id="prodGrid" class="grid" style="display:none"></div>
            <div id="cartArea" style="margin-top:20px; display:none;">
                <div id="cartItems"></div>
                <h2>الإجمالي: <span id="finalTotal">0</span> ج.م</h2>
                <button onclick="submitOrder()" class="btn" style="background:var(--success); color:white; width:100%;">تأكيد وطباعة ✅</button>
            </div>
        </div>
        
        <div id="s-stock" style="display:none">
            <div id="stockList"></div>
        </div>
    </div>
</div>

<div id="printZone" style="display:none; text-align:center; width:280px; margin:0 auto;">
    <h2>حلواني بندق</h2><hr>
    <p id="p-branch"></p><p id="p-inv"></p>
    <div id="p-items" style="text-align:right;"></div><hr>
    <h2 id="p-total"></h2>
    <div id="qrcode" style="display:flex; justify-content:center;"></div>
    <p>تطوير م/ محمود سلامه</p>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw6eFJV_xy9h4pFcpjQS_9y-fBdjt-Ro22mGlI5XORAYqlzdm2s_BiFiENZLA5xgx6xqA/exec"; 
    let db = { products: [], users: [], stock: [] };
    let cart = []; let userObj = null;

    // دالة فحص الإنترنت
    window.addEventListener('online', () => {
        updateStatus(true);
        pushOfflineData();
    });
    window.addEventListener('offline', () => updateStatus(false));

    function updateStatus(isOnline) {
        const el = document.getElementById("netStatus");
        el.className = "status-bar " + (isOnline ? "online" : "offline");
        el.innerText = isOnline ? "● متصل بالإنترنت" : "● وضع الأوفلاين (النت مقطوع)";
    }

    async function syncDB() {
        try {
            const r = await fetch(API + "?action=getInitialData");
            db = await r.json();
            localStorage.setItem("sugar_db", JSON.stringify(db));
            renderUsers();
        } catch(e) {
            db = JSON.parse(localStorage.getItem("sugar_db") || "{}");
            renderUsers();
        }
    }

    function renderUsers() {
        const sel = document.getElementById("userSelect");
        sel.innerHTML = '<option value="">--- اختر المستخدم ---</option>';
        db.users.forEach(u => sel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`);
    }

    function handleLogin() {
        const u = document.getElementById("userSelect").value;
        const p = document.getElementById("userPass").value;
        const user = db.users.find(x => x.branch === u && x.pass === p);
        if(user) {
            userObj = user;
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("appContent").style.display = "block";
            document.getElementById("branchInfo").innerText = user.branch;
            showCats();
            renderStock();
            pushOfflineData();
        } else alert("خطأ!");
    }

    // البيع والمخزون
    function addToCart(p) {
        let q = prompt(`كمية ${p.name}:`, "1"); if(!q) return;
        cart.push({name: p.name, qty: q, total: (p.price * q)});
        renderCart();
    }

    function renderCart() {
        document.getElementById("cartArea").style.display = cart.length ? "block" : "none";
        const items = document.getElementById("cartItems"); items.innerHTML = "";
        let t = 0; cart.forEach(i => { t += i.total; items.innerHTML += `<div>${i.name} (${i.qty}) - ${i.total}ج</div>`; });
        document.getElementById("finalTotal").innerText = t.toFixed(2);
    }

    async function submitOrder() {
        const inv = "INV-" + Date.now().toString().slice(-6);
        const order = { 
            date: new Date().toLocaleString('ar-EG'), branch: userObj.branch, 
            details: cart.map(i=>`${i.name}(${i.qty})`).join("+"), 
            total: document.getElementById("finalTotal").innerText, invoice: inv, user: userObj.branch 
        };

        // حفظ محلي فوراً
        const offlineOrders = JSON.parse(localStorage.getItem("offline_orders") || "[]");
        offlineOrders.push(order);
        localStorage.setItem("offline_orders", JSON.stringify(offlineOrders));

        // محاولة رفع البيانات
        pushOfflineData();

        // طباعة الكيو آر (تتم حتى لو النت قاطع)
        printBill(order);
    }

    async function pushOfflineData() {
        if (!navigator.onLine) return;
        const orders = JSON.parse(localStorage.getItem("offline_orders") || "[]");
        const stock = JSON.parse(localStorage.getItem("offline_stock") || "[]");
        
        if (orders.length === 0 && stock.length === 0) {
            document.getElementById("syncBtn").style.display = "none";
            return;
        }

        try {
            const res = await fetch(API, { 
                method: "POST", 
                body: JSON.stringify({ action: "syncOfflineData", orders: orders, stockUpdates: stock }) 
            });
            if (await res.text() === "Sync_OK") {
                localStorage.setItem("offline_orders", "[]");
                localStorage.setItem("offline_stock", "[]");
                document.getElementById("syncBtn").style.display = "none";
            }
        } catch(e) {
            document.getElementById("syncBtn").style.display = "block";
        }
    }

    function printBill(order) {
        document.getElementById("p-branch").innerText = "فرع: " + order.branch;
        document.getElementById("p-inv").innerText = "فاتورة: " + order.invoice;
        document.getElementById("p-items").innerHTML = cart.map(i=>`<div>${i.name} x ${i.qty}</div>`).join("");
        document.getElementById("p-total").innerText = order.total + " ج.م";
        
        document.getElementById("qrcode").innerHTML = "";
        var qr = qrcode(0, 'M'); qr.addData(order.invoice); qr.make();
        document.getElementById("qrcode").innerHTML = qr.createImgTag(5);
        
        window.print();
        cart = []; renderCart();
    }

    // ... دوال البحث والأقسام والمخزون المعتادة ...
    window.onload = syncDB;
</script>
</body>
</html>
