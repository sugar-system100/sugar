<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>سكّر 33 · نظام مبيعات متكامل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  <style>
    :root {
      --primary: #b81b5c; --primary-light: #e84a8a; --primary-soft: #fce4f0; --accent: #0f9d58; --accent-soft: #e6f4ea;
      --blue: #1a73e8; --blue-soft: #e8f0fe; --bg: #f9f6f8; --surface: #ffffff; --border: #e9dee5; --text: #1e1e2a;
      --text-muted: #6b5e66; --shadow: 0 10px 25px -5px rgba(0,0,0,0.05),0 8px 10px -6px rgba(0,0,0,0.02); --radius-card: 24px; --radius-btn: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Tahoma',sans-serif; }
    body { background:var(--bg); color:var(--text); line-height:1.5; }
    button, input, select, textarea { font-size:1rem; border-radius:14px; }
    button { cursor:pointer; background:none; border:none; font-weight:600; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
    input, select, textarea { border:1.5px solid var(--border); padding:12px 16px; background:var(--surface); outline:none; width:100%; }
    input:focus, select:focus, textarea:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(184,27,92,0.08); }
    .app-wrapper { display:flex; min-height:100vh; }
    .sidebar { width:280px; background:var(--surface); border-left:1px solid var(--border); padding:24px 12px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; box-shadow:var(--shadow); }
    .logo-area { padding:8px 16px 24px; text-align:center; border-bottom:2px solid var(--primary-soft); }
    .logo-icon { font-size:40px; color:var(--primary); }
    .logo-text { font-size:26px; font-weight:800; background:linear-gradient(135deg,var(--primary),#d63384); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-menu { flex:1; margin:20px 0; }
    .nav-item { display:flex; align-items:center; gap:14px; padding:14px 18px; margin:6px 0; border-radius:18px; color:var(--text-muted); font-weight:600; cursor:pointer; width:100%; text-align:right; }
    .nav-item i { width:24px; font-size:1.3rem; }
    .nav-item:hover { background:var(--primary-soft); color:var(--primary); }
    .nav-item.active { background:var(--primary); color:white; box-shadow:0 8px 14px -6px rgba(184,27,92,0.3); }
    .user-badge { margin-top:auto; background:var(--blue-soft); padding:16px; border-radius:22px; }
    .logout-btn { width:100%; margin-top:10px; background:#fff; border:1px solid var(--border); padding:10px 14px; border-radius:14px; }
    .main-content { flex:1; padding:24px 32px; max-width:calc(100% - 280px); }
    .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; gap:12px; flex-wrap:wrap; }
    .page-title { font-size:28px; font-weight:700; color:#2c1b24; display:flex; align-items:center; gap:10px; }
    .action-buttons { display:flex; gap:12px; flex-wrap:wrap; }
    .btn { padding:14px 22px; border-radius:40px; font-weight:700; box-shadow:var(--shadow); border:1px solid transparent; transition:all 0.2s; font-size:1rem; }
    .btn-primary { background:var(--primary); color:white; }
    .btn-primary:hover { background:#9f1650; transform:scale(0.98); }
    .btn-accent { background:var(--accent); color:white; }
    .btn-outline { background:white; border-color:var(--border); color:var(--text); }
    .btn-outline:hover { background:#f5f0f2; }
    .btn-danger { background:#d32f2f; color:white; }
    .pos-layout, .crm-layout { display:flex; gap:20px; }
    .pos-cart-panel, .crm-cart-panel { width:340px; flex-shrink:0; }
    .pos-products-panel, .crm-products-panel { flex:1; min-width:0; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
    .card { background:var(--surface); border-radius:var(--radius-card); padding:20px; box-shadow:var(--shadow); border:1px solid var(--border); }
    .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; font-weight:700; font-size:1.2rem; }
    .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px; max-height:68vh; overflow-y:auto; padding:8px 4px; }
    .product-card { background:#fdfbfc; border:2px solid var(--border); border-radius:24px; padding:20px 12px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .product-card:hover { background:var(--primary-soft); border-color:var(--primary); transform:translateY(-4px); }
    .product-name { font-weight:800; margin-bottom:8px; font-size:1.1rem; }
    .product-meta { font-size:.95rem; color:var(--text-muted); margin-bottom:6px; }
    .stock-badge { background:#e8f0fe; padding:4px 10px; border-radius:30px; font-size:.85rem; display:inline-block; margin-top:8px; }
    .cart-items { max-height:420px; overflow-y:auto; }
    .cart-row { display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px dashed var(--border); gap:10px; }
    .total-section { border-top:2px solid var(--border); margin-top:16px; padding-top:20px; }
    .pill { background:var(--accent-soft); color:#0b5e38; padding:10px 20px; border-radius:40px; font-weight:700; }
    .table-wrapper { overflow-x:auto; border-radius:20px; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:right; padding:16px 14px; background:#f5edf1; color:#441c2e; font-weight:700; }
    td { padding:16px 14px; border-bottom:1px solid var(--border); }
    .badge { background:#e4e7eb; padding:8px 16px; border-radius:30px; font-size:.9rem; display:inline-block; cursor:pointer; }
    .badge-success { background:#d1fae5; color:#065f46; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.3); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:999; padding:16px; }
    .modal-card { background:white; width:500px; max-width:94%; border-radius:32px; padding:28px; box-shadow:0 30px 50px rgba(0,0,0,.2); }
    .toast { position:fixed; bottom:24px; left:24px; background:#1e1e2a; color:white; padding:14px 28px; border-radius:60px; z-index:9999; display:none; }
    .hidden { display:none !important; }
    .section { display:none; }
    .section.active { display:block; }
    .branch-selector { display:flex; align-items:center; gap:12px; background:var(--surface); padding:8px 16px; border-radius:40px; border:1px solid var(--border); }
    .stat-card { text-align:center; padding:16px; }
    .stat-value { font-size:2.5rem; font-weight:800; color:var(--primary); }
    .stat-label { color:var(--text-muted); margin-top:8px; }
    @media (max-width:1000px) {
      .sidebar { width:90px; padding:16px 6px; }
      .sidebar .logo-text, .sidebar .nav-item span, .user-badge span { display:none; }
      .nav-item { justify-content:center; }
      .main-content { max-width:calc(100% - 90px); padding:16px; }
      .pos-layout, .crm-layout { flex-direction:column; }
      .pos-cart-panel, .crm-cart-panel { width:100%; }
      .grid-3, .grid-4 { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="sidebar">
    <div class="logo-area">
      <i class="fas fa-candy-cane logo-icon"></i>
      <div class="logo-text">سكّر 33</div>
      <div style="font-size:12px;color:var(--text-muted);">نظام احترافي</div>
    </div>
    <div class="nav-menu" id="navMenu"></div>
    <div class="user-badge">
      <div><i class="fas fa-user-circle"></i> <span id="whoami">زائر</span></div>
      <button class="logout-btn hidden" id="logoutBtn" onclick="logout()"><i class="fas fa-right-from-bracket"></i> تسجيل خروج</button>
    </div>
  </div>

  <div class="main-content">
    <div id="loginScreen" style="max-width:500px; margin:80px auto;">
      <div class="card" style="padding:32px;">
        <div style="text-align:center; margin-bottom:30px;"><i class="fas fa-lock" style="font-size:48px; color:var(--primary);"></i><h2>تسجيل الدخول</h2></div>
        <div><label>نوع المستخدم</label><select id="pointTypeSelect" onchange="fillBranchesByType()"><option>جاري التحميل...</option></select></div>
        <div style="margin:20px 0"><label>الفرع / المستخدم</label><select id="branchSelect"><option>اختر النوع أولاً</option></select></div>
        <div><label>كلمة المرور</label><input id="passInput" type="password" onkeydown="if(event.key==='Enter') login()"></div>
        <button class="btn btn-primary" style="width:100%; padding:16px; margin-top:24px;" onclick="login()">دخول</button>
        <div id="loginMsg" style="margin-top:16px; color:#b0003a;"></div>
      </div>
    </div>

    <div id="appSections" class="hidden">
      <!-- الأقسام ستُنشأ ديناميكيًا حسب نوع المستخدم -->
    </div>
  </div>
</div>

<!-- مودالات عامة -->
<div class="modal" id="qtyModal"><div class="modal-card"><h2 id="qtyTitle">الكمية</h2><input id="qtyInput" type="number" min="0.05" step="0.05" value="1"><div id="qtyHint"></div><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeQty()">إلغاء</button><button class="btn btn-primary" onclick="confirmQty()">تأكيد</button></div></div></div>
<div class="modal" id="qrModal"><div class="modal-card" style="text-align:center;"><h2>رمز الطلب</h2><div id="qrCodeContainer" style="margin:20px 0; min-height:250px;"></div><p id="qrOrderId"></p><div id="qrItemsList" style="margin:10px 0; font-size:0.9rem;"></div><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeQrModal()">إلغاء</button><button class="btn btn-primary" onclick="printQR()"><i class="fas fa-print"></i> طباعة</button></div></div></div>
<div class="modal" id="qrScannerModal"><div class="modal-card"><h2>مسح QR</h2><div id="qrReader"></div><input id="manualQrInput" placeholder="أدخل الكود يدويًا"><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeQrScanner()">إلغاء</button><button class="btn btn-primary" onclick="loadManualQR()">تحميل</button></div></div></div>
<div class="modal" id="paymentModal"><div class="modal-card"><h2>طريقة الدفع</h2><select id="paymentMethod"><option value="نقدي">نقدي</option><option value="فيزا">فيزا</option><option value="فودافون كاش">فودافون كاش</option><option value="تحويل بنكي">تحويل بنكي</option><option value="إنستاباي">إنستاباي</option><option value="أقساط">أقساط</option></select><input id="paidAmount" type="number" placeholder="المبلغ المدفوع"><input id="paymentNotes" placeholder="ملاحظات"><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closePaymentModal()">إلغاء</button><button class="btn btn-primary" onclick="confirmPayment()">تأكيد</button></div></div></div>
<div class="modal" id="expenseModal"><div class="modal-card"><h2>تسجيل مصروف</h2><select id="expenseType"><option value="ترضية">ترضية</option><option value="مصروف عام">مصروف عام</option><option value="فودافون كاش">فودافون كاش</option></select><input id="expenseAmount" type="number" placeholder="المبلغ"><input id="expenseComplaint" placeholder="رقم الشكوى (للترضية)"><textarea id="expenseNotes" placeholder="ملاحظات"></textarea><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeExpenseModal()">إلغاء</button><button class="btn btn-primary" onclick="saveExpense()">حفظ</button></div></div></div>
<div class="modal" id="customerModal"><div class="modal-card"><h2>بيانات العميل</h2><input id="customerName" placeholder="الاسم"><input id="customerPhone" placeholder="الهاتف"><input id="customerAddress" placeholder="العنوان"><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeCustomerModal()">إلغاء</button><button class="btn btn-primary" onclick="confirmCustomerInfo()">متابعة</button></div></div></div>
<div class="modal" id="productModal"><div class="modal-card"><h2 id="productModalTitle">إضافة منتج</h2><input id="prodId" type="hidden"><input id="prodName" placeholder="اسم المنتج"><input id="prodCat" placeholder="التصنيف"><input id="prodPrice" type="number" placeholder="السعر" step="0.5"><select id="prodUnit"><option value="قطعة">قطعة</option><option value="كيلو">كيلو</option></select><div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="closeProductModal()">إلغاء</button><button class="btn btn-primary" onclick="saveProduct()">حفظ</button></div></div></div>
<div id="toast" class="toast"></div>

<script>
(function(){
  'use strict';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZNym90xcdTnFgjONg3B3F7FGzMcU4ESj-Z-lbLP8J-vhlya4tUEpFAMEVAUTANcgLnA/exec';
  
  let db = { products:[], users:[], stock:[], sales:[], crmOrders:[], qrOrders:[], shifts:[], expenses:[], categories:[] };
  let currentUser = null, currentCat = 'الكل', cart = [], pendingProduct = null, pendingEditIndex = -1, currentShift = null, currentQROrderId = null, html5QrScanner = null;
  let crmCart = [], crmCurrentCat = 'الكل', selectedBranch = null;
  let discountEnabled = false, customerData = {};

  const money = n => (Number(n||0)).toFixed(2);
  const toast = (m,e) => { const t=document.getElementById('toast'); t.textContent=m; t.style.background=e?'#d32f2f':'#1e1e2a'; t.style.display='block'; setTimeout(()=>t.style.display='none',3500); };
  const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const jsq = s => String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const isWeight = p => String(p.unit||'').trim() === 'كيلو';

  function jsonp(action, params={}) {
    return new Promise((resolve, reject) => {
      const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36); window[cb]=data=>{ delete window[cb]; script.remove(); if(data?.ok===false) reject(new Error(data.error)); else resolve(data); };
      const script = document.createElement('script'); script.src = SCRIPT_URL+(SCRIPT_URL.includes('?')?'&':'?')+new URLSearchParams({action,callback:cb,...params});
      script.onerror = ()=>reject(new Error('فشل الاتصال')); document.body.appendChild(script);
    });
  }
  function postForm(action, payload={}) {
    return new Promise((resolve) => {
      const iframe = document.createElement('iframe'); iframe.name='frm_'+Date.now(); iframe.style.display='none'; document.body.appendChild(iframe);
      const form = document.createElement('form'); form.method='POST'; form.action=SCRIPT_URL; form.target=iframe.name;
      form.appendChild(Object.assign(document.createElement('input'),{name:'payload',value:JSON.stringify({action,...payload})}));
      document.body.appendChild(form); form.submit();
      setTimeout(()=>{ form.remove(); iframe.remove(); resolve({ok:true}); },2000);
    });
  }

  function normalizeData(res) {
    db.products = (res.products||[]).map(r=>({ id:r[0], name:r[0], cat:r[1], price:+r[2]||0, unit:r[3]||'قطعة' }));
    db.users = (res.users||[]).map(r=>({ branch:r[0], pass:r[1], superPass:r[2], pointType:r[3], notes:r[4], active:r[5]!==false, permissions:r[6]?r[6].split(','):[] }));
    db.stock = (res.stock||[]).map(r=>({ branch:r[0], item:r[1], qty:+r[2]||0, lastUpdate:r[3] }));
    db.sales = (res.sales||[]).map(r=>({ saleId:r[0], date:r[1], branch:r[2], customer:r[3], phone:r[4], channel:r[5], status:r[6], subtotal:+r[7]||0, discount:+r[8]||0, delivery:+r[9]||0, total:+r[10]||0, cashier:r[11], notes:r[12], shiftId:r[13], paymentMethod:r[14] }));
    db.crmOrders = (res.crmOrders||[]).map(r=>({ id:r[0], createdAt:r[1], branch:r[2], customer:r[3], phone:r[4], address:r[5], items:r[6], total:+r[7]||0, notes:r[8], status:r[9], createdBy:r[10] }));
    db.shifts = (res.shifts||[]).map(r=>({ id:r[0], branch:r[1], cashier:r[2], openTime:r[3], closeTime:r[4], totalSales:+r[5]||0, status:r[6] }));
    db.expenses = (res.expenses||[]).map(r=>({ id:r[0], date:r[1], branch:r[2], type:r[3], amount:+r[4]||0, complaint:r[5], notes:r[6], cashier:r[7] }));
    db.categories = [...new Set(db.products.map(p=>p.cat))];
  }

  async function refreshData(silent=false) { try { const res=await jsonp('getInitialData'); normalizeData(res); if(currentUser) renderAll(); if(!silent) toast('تم التحديث'); } catch(e) { if(!silent) toast(e.message,true); } }

  async function boot() {
    try { const res=await jsonp('getInitialData'); normalizeData(res); fillBranches(); restoreSession(); } catch(e) { document.getElementById('pointTypeSelect').innerHTML='<option>فشل التحميل</option>'; }
  }

  function fillBranches() {
    const types = [...new Set(db.users.filter(u=>u.active).map(u=>u.pointType))];
    document.getElementById('pointTypeSelect').innerHTML = '<option value="">اختر النوع</option>'+types.map(t=>`<option>${esc(t)}</option>`).join('');
  }
  function fillBranchesByType() {
    const type = document.getElementById('pointTypeSelect').value;
    const sel = document.getElementById('branchSelect');
    if(!type) { sel.innerHTML='<option>اختر النوع أولاً</option>'; return; }
    const branches = db.users.filter(u=>u.active && u.pointType===type).map(u=>u.branch);
    sel.innerHTML = '<option value="">اختر الفرع</option>'+branches.map(b=>`<option>${esc(b)}</option>`).join('');
  }

  function login() {
    const type = document.getElementById('pointTypeSelect').value;
    const branch = document.getElementById('branchSelect').value;
    const pass = document.getElementById('passInput').value;
    const user = db.users.find(u=>u.active && u.pointType===type && u.branch===branch && (u.pass===pass||u.superPass===pass));
    if(!user) return toast('بيانات خاطئة',true);
    currentUser = user; localStorage.setItem('SOKAR_USER',JSON.stringify(user));
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    buildUI(); renderAll();
  }

  function restoreSession() {
    try { const u=JSON.parse(localStorage.getItem('SOKAR_USER')); if(u) { currentUser=u; document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('logoutBtn').classList.remove('hidden'); buildUI(); renderAll(); } } catch(e){}
  }

  function logout() { localStorage.removeItem('SOKAR_USER'); location.reload(); }

  function buildUI() {
    document.getElementById('whoami').textContent = `${currentUser.branch} (${currentUser.pointType})`;
    const nav = document.getElementById('navMenu');
    const sections = document.getElementById('appSections');
    const pt = currentUser.pointType;
    
    let navItems = [], sectionIds = [];
    if (pt === 'إدارة') {
      navItems = [
        { id:'dashboard', label:'لوحة التحكم', icon:'chart-pie' },
        { id:'shifts', label:'الورديات', icon:'clock' },
        { id:'reports', label:'تقارير المبيعات', icon:'chart-bar' },
        { id:'products', label:'المنتجات', icon:'tags' },
        { id:'users', label:'المستخدمون', icon:'user-cog' },
        { id:'stock', label:'المخزون', icon:'warehouse' },
        { id:'expenses', label:'المصروفات', icon:'money-bill' }
      ];
      sectionIds = navItems.map(i=>i.id);
    } else if (pt === 'خدمة العملاء') {
      navItems = [
        { id:'crm', label:'المنتجات', icon:'cubes' },
        { id:'shifts', label:'الورديات', icon:'clock' },
        { id:'reports', label:'تقارير المبيعات', icon:'chart-bar' },
        { id:'stock', label:'المخزون', icon:'warehouse' }
      ];
      sectionIds = navItems.map(i=>i.id);
    } else if (pt === 'مندوب_بيع') {
      navItems = [{ id:'pos', label:'نقطة البيع', icon:'cash-register' }, { id:'stock', label:'المخزون', icon:'warehouse' }];
      sectionIds = navItems.map(i=>i.id);
    } else if (pt === 'كاشير') {
      navItems = [{ id:'pos', label:'نقطة البيع', icon:'cash-register' }, { id:'stock', label:'المخزون', icon:'warehouse' }];
      sectionIds = navItems.map(i=>i.id);
    } else if (pt === 'دليفري') {
      navItems = [{ id:'pos', label:'نقطة البيع', icon:'cash-register' }, { id:'crmOrders', label:'طلبات CRM', icon:'headset' }, { id:'stock', label:'المخزون', icon:'warehouse' }];
      sectionIds = navItems.map(i=>i.id);
    }

    nav.innerHTML = navItems.map(item => `<div class="nav-item" data-sec="${item.id}" onclick="showSection('${item.id}')"><i class="fas fa-${item.icon}"></i><span>${item.label}</span></div>`).join('');
    sections.innerHTML = sectionIds.map(id => `<div id="sec-${id}" class="section"></div>`).join('');
    if (pt === 'إدارة') { document.getElementById('sec-dashboard').innerHTML = '<div class="branch-selector" style="margin-bottom:20px;"><label>الفرع:</label><select id="adminBranchSelect" onchange="renderDashboard()"></select></div><div id="dashboardContent" class="grid-4"></div>'; fillAdminBranchSelect(); }
    showSection(sectionIds[0]);
  }

  function fillAdminBranchSelect() {
    const sel = document.getElementById('adminBranchSelect');
    if(!sel) return;
    const branches = ['كل الفروع', ...new Set(db.users.filter(u=>['فرع','مندوب_بيع','كاشير','دليفري'].includes(u.pointType)).map(u=>u.branch))];
    sel.innerHTML = branches.map(b=>`<option>${esc(b)}</option>`).join('');
  }

  function showSection(id) {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.sec===id));
    if (id==='dashboard') renderDashboard();
    else if (id==='shifts') renderShifts();
    else if (id==='reports') renderReports();
    else if (id==='products') renderProductsManagement();
    else if (id==='users') renderUsersManagement();
    else if (id==='stock') renderStock();
    else if (id==='expenses') renderExpenses();
    else if (id==='crm') renderCRM();
    else if (id==='pos') renderPOS();
    else if (id==='crmOrders') renderDeliveryCRM();
  }

  function renderAll() { showSection(document.querySelector('.nav-item.active')?.dataset.sec || 'dashboard'); }

  // ========== ADMIN DASHBOARD ==========
  function renderDashboard() {
    const branch = document.getElementById('adminBranchSelect')?.value || 'كل الفروع';
    const todaySales = db.sales.filter(s=> (branch==='كل الفروع'||s.branch===branch) && s.date===new Date().toLocaleDateString('ar-EG')).reduce((a,b)=>a+b.total,0);
    const openShift = db.shifts.find(s=> (branch==='كل الفروع'||s.branch===branch) && s.status==='مفتوح');
    const shiftSales = openShift ? db.sales.filter(s=>s.shiftId===openShift.id).reduce((a,b)=>a+b.total,0) : 0;
    const invoiceCount = openShift ? db.sales.filter(s=>s.shiftId===openShift.id).length : 0;
    
    document.getElementById('dashboardContent').innerHTML = `
      <div class="card stat-card"><div class="stat-value">${money(todaySales)}</div><div class="stat-label">مبيعات اليوم</div></div>
      <div class="card stat-card"><div class="stat-value">${money(shiftSales)}</div><div class="stat-label">مبيعات الوردية</div></div>
      <div class="card stat-card"><div class="stat-value">${invoiceCount}</div><div class="stat-label">عدد الفواتير</div></div>
      <div class="card stat-card"><div class="stat-value">0</div><div class="stat-label">مرتجعات اليوم</div></div>
    `;
  }

  function renderShifts() {
    const branch = document.getElementById('adminBranchSelect')?.value || 'كل الفروع';
    const shifts = db.shifts.filter(s=> branch==='كل الفروع'||s.branch===branch);
    const html = shifts.map(shift => {
      const sales = db.sales.filter(s=>s.shiftId===shift.id);
      return `<div class="card"><h3>${esc(shift.branch)} - ${esc(shift.openTime)}</h3><table><tr><th>كود</th><th>الوقت</th><th>الإجمالي</th><th>الأصناف</th></tr>${sales.map(s=>`<tr><td>${esc(s.saleId)}</td><td>${esc(s.date)}</td><td>${money(s.total)}</td><td>${esc(s.notes)}</td></tr>`).join('')}</table></div>`;
    }).join('');
    document.getElementById('sec-shifts').innerHTML = `<div class="top-bar"><h2>الورديات</h2><div class="branch-selector"><select id="shiftBranchSelect" onchange="renderShifts()">${document.getElementById('adminBranchSelect')?.innerHTML||''}</select></div></div>${html}`;
  }

  function renderReports() {
    document.getElementById('sec-reports').innerHTML = `
      <div class="top-bar"><h2>تقارير المبيعات</h2></div>
      <div class="grid-2">
        <div class="card"><h3>تقرير عام</h3><select id="reportPeriod"><option value="day">يومي</option><option value="week">أسبوعي</option><option value="month">شهري</option></select><button onclick="generateGeneralReport()">عرض</button><div id="generalReportResult"></div></div>
        <div class="card"><h3>تقرير حسب الأصناف</h3><select id="itemReportPeriod"><option value="day">يومي</option><option value="week">أسبوعي</option><option value="month">شهري</option></select><button onclick="generateItemReport()">عرض</button><div id="itemReportResult"></div></div>
        <div class="card"><h3>تقرير حسب التصنيفات</h3><select id="catReportPeriod"><option value="day">يومي</option><option value="week">أسبوعي</option><option value="month">شهري</option></select><button onclick="generateCategoryReport()">عرض</button><div id="categoryReportResult"></div></div>
        <div class="card"><h3>المرتجعات</h3><select id="returnPeriod"><option value="day">يومي</option><option value="week">أسبوعي</option><option value="month">شهري</option></select><button onclick="generateReturnReport()">عرض</button><div id="returnReportResult"></div></div>
      </div>
    `;
  }

  // ========== POS (مندوب / كاشير / دليفري) ==========
  function renderPOS() {
    const pt = currentUser.pointType;
    const isSalesman = pt === 'مندوب_بيع';
    const isCashier = pt === 'كاشير';
    const isDelivery = pt === 'دليفري';
    const showDelivery = isDelivery;
    const showDiscount = isCashier || isDelivery;
    
    document.getElementById('sec-pos').innerHTML = `
      <div class="top-bar"><h2>نقطة البيع - ${esc(currentUser.branch)}</h2>
        <div class="action-buttons">
          ${isSalesman?'<button class="btn btn-primary" onclick="createQROrder()"><i class="fas fa-qrcode"></i> إنشاء QR</button>':''}
          ${(isCashier||isDelivery)?'<button class="btn btn-accent" onclick="openQRScanner()"><i class="fas fa-camera"></i> مسح QR</button>':''}
          ${!isSalesman?'<button class="btn btn-outline" onclick="openExpenseModal()"><i class="fas fa-money-bill"></i> مصروفات</button>':''}
          <button class="btn btn-outline" onclick="refreshData()"><i class="fas fa-sync"></i> تحديث</button>
        </div>
      </div>
      <div class="pos-layout">
        <div class="pos-cart-panel"><div class="card"><div class="card-header"><span>السلة</span></div><div id="cartList" class="cart-items"></div><div class="total-section">
          ${showDelivery?'<div><label>توصيل</label><input id="deliveryFee" type="number" value="0" step="0.5" oninput="renderCart()"></div>':''}
          ${showDiscount?`<div><label>خصم</label><select id="discountType"><option value="fixed">مبلغ</option><option value="percent">%</option></select><input id="discountVal" type="number" value="0" step="0.5" oninput="renderCart()" ${!discountEnabled?'readonly onclick="requestDiscountSupervisor()"':''}></div>`:''}
          <div style="display:flex; justify-content:space-between;"><span>الإجمالي</span><span id="grandTotal">0 ج.م</span></div>
          <button class="btn btn-primary" style="width:100%; margin-top:16px;" onclick="proceedToPayment()">متابعة الدفع</button>
        </div></div></div>
        <div class="pos-products-panel"><div class="card"><div class="card-header"><span>المنتجات</span><input type="text" id="searchInput" placeholder="بحث..." oninput="renderProducts()"></div>
        <div id="catsList"></div><div id="productsGrid" class="product-grid"></div></div></div>
      </div>
    `;
    renderCats(); renderProducts(); renderCart();
  }

  function renderCats() { document.getElementById('catsList').innerHTML = ['الكل',...db.categories].map(c=>`<span class="badge ${c===currentCat?'badge-success':''}" onclick="setCategory('${jsq(c)}')">${esc(c)}</span>`).join(''); }
  function setCategory(c) { currentCat=c; renderCats(); renderProducts(); }
  function renderProducts() {
    const q = document.getElementById('searchInput')?.value||'';
    let filtered = db.products.filter(p=> currentCat==='الكل'||p.cat===currentCat);
    if(q) filtered = filtered.filter(p=> p.name.includes(q)||p.cat.includes(q));
    const st = db.stock.filter(s=>s.branch===currentUser.branch);
    document.getElementById('productsGrid').innerHTML = filtered.map(p=>`<div class="product-card" onclick="askQty('${jsq(p.name)}')"><div class="product-name">${esc(p.name)}</div><div class="product-meta">${money(p.price)}</div><div class="stock-badge">${st.find(s=>s.item===p.name)?.qty||0}</div></div>`).join('');
  }

  function askQty(n) { const p=db.products.find(x=>x.name===n); pendingProduct=p; document.getElementById('qtyInput').value=isWeight(p)?1000:1; document.getElementById('qtyModal').style.display='flex'; }
  function closeQty() { document.getElementById('qtyModal').style.display='none'; }
  function confirmQty() {
    let q = parseFloat(document.getElementById('qtyInput').value); if(!q||!pendingProduct) return;
    const charge = isWeight(pendingProduct)?q/1000:q;
    const exist = cart.find(i=>i.name===pendingProduct.name);
    if(exist) { exist.qty+=q; exist.total+=charge*pendingProduct.price; }
    else cart.push({ name:pendingProduct.name, price:pendingProduct.price, qty:q, total:charge*pendingProduct.price });
    closeQty(); renderCart();
  }
  function renderCart() {
    document.getElementById('cartList').innerHTML = cart.map((i,idx)=>`<div class="cart-row"><div>${esc(i.name)} (${i.qty})</div><div>${money(i.total)} <i class="fas fa-trash" onclick="cart.splice(${idx},1);renderCart()"></i></div></div>`).join('');
    const sub = cart.reduce((a,b)=>a+b.total,0), fee=parseFloat(document.getElementById('deliveryFee')?.value)||0, disc=parseFloat(document.getElementById('discountVal')?.value)||0;
    document.getElementById('grandTotal').textContent = money(sub+fee-disc)+' ج.م';
  }

  async function createQROrder() {
    if(!cart.length) return toast('السلة فارغة');
    const order = { branch:currentUser.branch, salesman:currentUser.branch, items:cart, total:cart.reduce((a,b)=>a+b.total,0) };
    const res = await postForm('createQROrder',{order});
    if(res.orderId) { showQRModal(res.orderId, cart); toast('تم إنشاء QR'); } else toast('فشل');
  }

  function showQRModal(id, items) {
    document.getElementById('qrOrderId').textContent = id;
    document.getElementById('qrItemsList').innerHTML = `<strong>مندوب البيع: ${esc(currentUser.branch)}</strong><br>` + items.map(i=>`${esc(i.name)} (${i.qty})`).join(' - ');
    QRCode.toCanvas(document.createElement('canvas'), id, {width:250}, (e,c)=>document.getElementById('qrCodeContainer').appendChild(c));
    document.getElementById('qrModal').style.display='flex';
  }
  function closeQrModal() { document.getElementById('qrModal').style.display='none'; }

  function proceedToPayment() {
    if(!cart.length) return toast('السلة فارغة');
    if(currentUser.pointType==='دليفري') openCustomerModal();
    else openPaymentModal();
  }

  function openCustomerModal() { document.getElementById('customerModal').style.display='flex'; }
  function closeCustomerModal() { document.getElementById('customerModal').style.display='none'; }
  function confirmCustomerInfo() {
    customerData = { name:document.getElementById('customerName').value, phone:document.getElementById('customerPhone').value, address:document.getElementById('customerAddress').value };
    closeCustomerModal(); openPaymentModal();
  }

  function openPaymentModal() { document.getElementById('paymentModal').style.display='flex'; }
  function closePaymentModal() { document.getElementById('paymentModal').style.display='none'; }
  async function confirmPayment() {
    const method = document.getElementById('paymentMethod').value;
    const paid = parseFloat(document.getElementById('paidAmount').value);
    const order = { branch:currentUser.branch, items:cart, total:cart.reduce((a,b)=>a+b.total,0), paymentMethod:method, paidAmount:paid, customer:customerData };
    await postForm('finalizeOrder',{order});
    if(method==='فودافون كاش') await postForm('addExpense',{type:'فودافون كاش',amount:paid, cashier:currentUser.branch});
    toast('تم البيع'); cart=[]; renderCart(); closePaymentModal();
  }

  function openExpenseModal() { document.getElementById('expenseModal').style.display='flex'; }
  function closeExpenseModal() { document.getElementById('expenseModal').style.display='none'; }
  async function saveExpense() {
    const exp = { type:document.getElementById('expenseType').value, amount:parseFloat(document.getElementById('expenseAmount').value), complaint:document.getElementById('expenseComplaint').value, notes:document.getElementById('expenseNotes').value, branch:currentUser.branch, cashier:currentUser.branch };
    await postForm('addExpense',exp); toast('تم تسجيل المصروف'); closeExpenseModal();
  }

  // ========== دوال إضافية مختصرة ==========
  function renderStock() {
    const branch = currentUser.pointType==='إدارة' ? (document.getElementById('adminBranchSelect')?.value||'') : currentUser.branch;
    const stock = db.stock.filter(s=>s.branch===branch);
    document.getElementById('sec-stock').innerHTML = `<div class="top-bar"><h2>المخزون - ${esc(branch)}</h2><input type="text" id="stockSearch" placeholder="بحث..." oninput="filterStock()"></div><div class="table-wrapper"><table><tr><th>الصنف</th><th>الكمية</th><th>آخر تحديث</th></tr>${stock.map(s=>`<tr><td>${esc(s.item)}</td><td>${s.qty}</td><td>${esc(s.lastUpdate)}</td></tr>`).join('')}</table></div>`;
  }

  function renderProductsManagement() {
    document.getElementById('sec-products').innerHTML = `<div class="top-bar"><h2>المنتجات</h2><button class="btn btn-primary" onclick="openProductModal()">إضافة منتج</button><button class="btn btn-accent" onclick="syncProductsToBranches()">مزامنة لجميع الفروع</button></div>
      <input type="text" id="prodSearch" placeholder="بحث..." oninput="filterProducts()">
      <div class="table-wrapper"><table><tr><th>الاسم</th><th>التصنيف</th><th>السعر</th><th>الوحدة</th><th>إجراءات</th></tr>${db.products.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.cat)}</td><td>${money(p.price)}</td><td>${esc(p.unit)}</td><td><i class="fas fa-edit" onclick="editProduct('${jsq(p.name)}')"></i></td></tr>`).join('')}</table></div>`;
  }

  function renderUsersManagement() {
    document.getElementById('sec-users').innerHTML = `<div class="top-bar"><h2>المستخدمون</h2><button class="btn btn-primary" onclick="openUserModal()">إضافة مستخدم</button></div>
      <div class="table-wrapper"><table><tr><th>المستخدم</th><th>النوع</th><th>الصلاحيات</th><th>نشط</th><th>إجراءات</th></tr>${db.users.map(u=>`<tr><td>${esc(u.branch)}</td><td>${esc(u.pointType)}</td><td>${esc(u.permissions.join(','))}</td><td>${u.active?'✅':'❌'}</td><td><i class="fas fa-edit" onclick="editUser('${jsq(u.branch)}')"></i></td></tr>`).join('')}</table></div>`;
  }

  function renderExpenses() {
    const branch = document.getElementById('adminBranchSelect')?.value||'كل الفروع';
    const exp = db.expenses.filter(e=>branch==='كل الفروع'||e.branch===branch);
    document.getElementById('sec-expenses').innerHTML = `<div class="top-bar"><h2>المصروفات</h2></div><table><tr><th>التاريخ</th><th>الفرع</th><th>النوع</th><th>المبلغ</th><th>رقم الشكوى</th><th>ملاحظات</th></tr>${exp.map(e=>`<tr><td>${esc(e.date)}</td><td>${esc(e.branch)}</td><td>${esc(e.type)}</td><td>${money(e.amount)}</td><td>${esc(e.complaint)}</td><td>${esc(e.notes)}</td></tr>`).join('')}</table>`;
  }

  function renderCRM() {
    document.getElementById('sec-crm').innerHTML = `<div class="top-bar"><h2>المنتجات</h2></div><div class="pos-layout"><div class="pos-cart-panel"><div class="card"><div class="card-header">طلب CRM</div><input id="crmCustomer" placeholder="العميل"><input id="crmPhone" placeholder="الهاتف"><input id="crmAddress" placeholder="العنوان"><select id="crmBranchSelect"></select><div id="crmCartList"></div><div>الإجمالي: <span id="crmTotal">0</span></div><button onclick="submitCRMOrder()">إرسال</button></div></div><div class="pos-products-panel"><div class="card"><input id="crmSearch" placeholder="بحث"><div id="crmCats"></div><div id="crmProductsGrid" class="product-grid"></div></div></div></div>`;
    fillCrmBranches(); renderCrmCats(); renderCrmProducts();
  }

  function renderDeliveryCRM() {
    const orders = db.crmOrders.filter(o=>o.branch===currentUser.branch);
    document.getElementById('sec-crmOrders').innerHTML = `<div class="top-bar"><h2>طلبات CRM</h2></div><div class="table-wrapper"><table><tr><th>كود</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>إجراء</th></tr>${orders.map(o=>`<tr><td>${esc(o.id)}</td><td>${esc(o.customer)}</td><td>${money(o.total)}</td><td>${esc(o.status)}</td><td><button onclick="editDeliveryOrder('${esc(o.id)}')">تعديل</button></td></tr>`).join('')}</table></div>`;
  }

  // ========== دوال مساعدة للإدارة ==========
  function openProductModal(p=null) {
    if(p) { document.getElementById('prodId').value=p.name; document.getElementById('prodName').value=p.name; document.getElementById('prodCat').value=p.cat; document.getElementById('prodPrice').value=p.price; document.getElementById('prodUnit').value=p.unit; document.getElementById('productModalTitle').textContent='تعديل منتج'; }
    else { document.getElementById('prodId').value=''; document.getElementById('productModalTitle').textContent='إضافة منتج'; }
    document.getElementById('productModal').style.display='flex';
  }
  function closeProductModal() { document.getElementById('productModal').style.display='none'; }
  async function saveProduct() {
    const p = { name:document.getElementById('prodName').value, cat:document.getElementById('prodCat').value, price:document.getElementById('prodPrice').value, unit:document.getElementById('prodUnit').value, oldName:document.getElementById('prodId').value };
    await postForm('manageProduct', {product:p}); toast('تم الحفظ'); closeProductModal(); refreshData();
  }
  async function syncProductsToBranches() { await postForm('syncProducts'); toast('تمت المزامنة'); }

  function editProduct(name) { const p = db.products.find(x=>x.name===name); if(p) openProductModal(p); }

  window.login=login; window.logout=logout; window.showSection=showSection; window.refreshData=refreshData; window.askQty=askQty; window.closeQty=closeQty; window.confirmQty=confirmQty; window.renderCart=renderCart; window.createQROrder=createQROrder; window.closeQrModal=closeQrModal; window.proceedToPayment=proceedToPayment; window.openCustomerModal=openCustomerModal; window.closeCustomerModal=closeCustomerModal; window.confirmCustomerInfo=confirmCustomerInfo; window.openPaymentModal=openPaymentModal; window.closePaymentModal=closePaymentModal; window.confirmPayment=confirmPayment; window.openExpenseModal=openExpenseModal; window.closeExpenseModal=closeExpenseModal; window.saveExpense=saveExpense; window.openProductModal=openProductModal; window.closeProductModal=closeProductModal; window.saveProduct=saveProduct; window.syncProductsToBranches=syncProductsToBranches; window.editProduct=editProduct; window.setCategory=setCategory; window.renderProducts=renderProducts; window.renderDashboard=renderDashboard; window.renderShifts=renderShifts; window.fillBranchesByType=fillBranchesByType;

  boot();
})();
</script>
</body>
</html>
