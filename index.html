<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نظام سكر الإداري | م/ محمود سلامه</title>
    <style>
        :root { --primary: #c2185b; --success: #2e7d32; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; background: #f0f0f0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .tabs button.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(194, 24, 91, 0.3); }
        .btn-sync { background: #0288d1; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .card { padding: 20px; border: 1px solid #eee; border-radius: 12px; cursor: pointer; font-weight: bold; text-align: center; background: #fff; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-color: var(--primary); }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .report-section { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><h2 style="margin-top:20px; color:var(--primary)">جاري مزامنة البيانات...</h2></div>

<div id="loginPage" class="container" style="margin-top: 50px; text-align: center;">
    <h1>نظام سكر 🍬</h1>
    <select id="userSelect"><option value="">--- اختر الفرع ---</option></select>
    <input type="password" id="userPass" placeholder="كلمة المرور">
    <button class="btn-sync" style="width:100%; padding:15px; font-size:18px;" onclick="handleLogin()">دخول النظام</button>
</div>

<div id="mainApp" style="display: none;">
    <div class="container no-print">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom:10px; margin-bottom:15px;">
            <button class="btn-sync" onclick="location.reload()">🔄 تحديث فوري (Sync)</button>
            <h3 id="userInfo" style="margin:0; color:var(--primary)"></h3>
            <button onclick="logout()">خروج 🚪</button>
        </div>

        <div class="tabs">
            <button id="t-pos" class="active" onclick="switchTab('pos')">الكاشير</button>
            <button id="t-stock" onclick="switchTab('stock')">المخزون</button>
            <button id="t-admin" style="display:none" onclick="switchTab('admin')">لوحة الإدارة</button>
        </div>

        <div id="s-pos" class="tab-content">
            <input type="text" placeholder="🔍 ابحث عن صنف..." oninput="search(this.value)">
            <div id="catGrid" class="grid" style="margin-top:15px;"></div>
            <div id="prodGrid" class="grid" style="display:none; margin-top:15px;"></div>
            <button id="btnBack" onclick="showCats()" style="display:none; width:100%; margin:10px 0; padding:10px;">🔙 عودة للأقسام</button>
        </div>

        <div id="s-admin" class="tab-content" style="display:none">
            <div class="report-section">
                <h3>📊 تحليلات سكر الذكية</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div style="background:#fff; padding:15px; border-radius:10px;">
                        <h4>🏆 الأفضل مبيعاً (Top 5)</h4>
                        <div id="topSalesList"></div>
                    </div>
                    <div style="background:#fff; padding:15px; border-radius:10px;">
                        <h4>🔮 توقعات الغد</h4>
                        <p id="predictionText"></p>
                    </div>
                </div>
            </div>

            <div class="report-section" style="margin-top:20px;">
                <h3>👥 إدارة الموظفين والصلاحيات</h3>
                <input type="text" id="newBranch" placeholder="اسم المستخدم / الفرع">
                <input type="text" id="newPass" placeholder="كلمة المرور">
                <input type="text" id="newSuper" placeholder="باسورد المشرف (للعمليات الحساسة)">
                <select id="newRole"><option value="بائع">بائع (صلاحيات محدودة)</option><option value="مشرف">مشرف (صلاحيات كاملة)</option></select>
                <button class="btn-sync" style="background:var(--success); width:100%;" onclick="addUser()">إضافة الموظف للقاعدة</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzdZcuCltf9DIZX_UrrescLwN6u5gFFSUg8deh1O6gjyGmrSWI522C8ET_iTiKkA-iH3Q/exec";
    let db = { products: [], users: [], stock: [], sales: [] };
    let currentBranch = ""; let userRole = "";

    async function init() {
        try {
            const r = await fetch(API + "?action=getInitialData");
            db = await r.json();
            const sel = document.getElementById("userSelect");
            db.users.forEach(u => sel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`);
            
            if(localStorage.getItem("sugarUser")) {
                currentBranch = localStorage.getItem("sugarUser");
                userRole = localStorage.getItem("sugarRole");
                loginOK();
            }
            document.getElementById("loader").style.display = "none";
        } catch(e) { alert("خطأ في المزامنة!"); }
    }

    function handleLogin() {
        const u = document.getElementById("userSelect").value;
        const p = document.getElementById("userPass").value;
        const user = db.users.find(x => x.branch === u && x.pass === p);
        if(user) {
            localStorage.setItem("sugarUser", u);
            localStorage.setItem("sugarRole", user.role);
            location.reload();
        } else alert("كلمة المرور خطأ!");
    }

    function loginOK() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("userInfo").innerText = "👤 " + currentBranch + " (" + userRole + ")";
        if(userRole === "مشرف" || currentBranch === "الإدارة") {
            document.getElementById("t-admin").style.display = "block";
            generateReports();
        }
        showCats();
    }

    function generateReports() {
        const counts = {};
        db.sales.forEach(s => counts[s.item] = (counts[s.item] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);
        document.getElementById("topSalesList").innerHTML = sorted.map(x => `<div>✅ ${x[0]}</div>`).join("");
        document.getElementById("predictionText").innerText = sorted.length ? `بناءً على الأداء، يُنصح بتجهيز كمية إضافية من [${sorted[0][0]}] ليوم غد.` : "لا توجد بيانات كافية للتوقع.";
    }

    async function addUser() {
        const newUser = {
            branch: document.getElementById("newBranch").value,
            pass: document.getElementById("newPass").value,
            super: document.getElementById("newSuper").value,
            role: document.getElementById("newRole").value
        };
        if(!newUser.branch || !newUser.pass) return alert("اكمل البيانات!");
        document.getElementById("loader").style.display = "flex";
        await fetch(API, {method:"POST", body: JSON.stringify({action:"addUser", newUser})});
        alert("تم الحفظ والمزامنة بنجاح ✅");
        location.reload();
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(s => s.style.display = "none");
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove("active"));
        document.getElementById("s-"+t).style.display = "block";
        document.getElementById("t-"+t).classList.add("active");
    }

    function showCats() {
        const grid = document.getElementById("catGrid"); grid.innerHTML = "";
        grid.style.display = "grid"; document.getElementById("prodGrid").style.display = "none";
        document.getElementById("btnBack").style.display = "none";
        const cats = [...new Set(db.products.map(p => p.cat))];
        cats.forEach(c => {
            const d = document.createElement("div"); d.className = "card"; d.innerText = c;
            d.onclick = () => showProds(c); grid.appendChild(d);
        });
    }

    function showProds(cat) {
        const grid = document.getElementById("prodGrid"); grid.innerHTML = "";
        grid.style.display = "grid"; document.getElementById("catGrid").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        db.products.filter(p => p.cat === cat).forEach(p => {
            const d = document.createElement("div"); d.className = "card"; d.innerHTML = `${p.name}<br><small>${p.price}ج</small>`;
            d.onclick = () => alert("تمت الإضافة للسلة (وظيفة البيع)"); grid.appendChild(d);
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
    window.onload = init;
</script>
</body>
</html>
