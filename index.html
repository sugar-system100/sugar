<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نظام سكر الإداري V7 | م/ محمود سلامه</title>
    <style>
        :root { --primary: #c2185b; --success: #2e7d32; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #eee; transition: 0.3s; }
        .tabs button.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .card { padding: 20px; border-radius: 12px; border: 1px solid #eee; background: white; cursor: pointer; font-weight: bold; transition: 0.2s; text-align: center; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .cat-card { background: var(--primary); color: white; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .admin-box { background: #f0f4f8; padding: 20px; border-radius: 12px; margin-top: 15px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; margin: 5px 0; box-sizing: border-box; }
        @media print { .no-print { display: none !important; } #printZone { display: block !important; } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><h2 style="color:var(--primary); margin-top:20px;">جاري مزامنة بيانات م/ محمود سلامه...</h2></div>

<div id="loginPage" class="container" style="margin-top: 50px; text-align: center;">
    <h1>سكر V7 🍬</h1>
    <select id="userSelect"><option value="">--- اختر المستخدم ---</option></select>
    <input type="password" id="userPass" placeholder="كلمة المرور">
    <button onclick="handleLogin()" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">دخول النظام</button>
</div>

<div id="mainApp" style="display: none;">
    <div class="container no-print">
        <div class="nav">
            <button onclick="location.reload()" style="background:#0288d1; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">🔄 مزامنة فوري</button>
            <h3 id="branchDisplay" style="margin:0; color:var(--primary);"></h3>
            <button onclick="logout()" style="background:#eee; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">خروج</button>
        </div>

        <div class="tabs">
            <button id="t-pos" class="active" onclick="switchTab('pos')">شاشة البيع</button>
            <button id="t-stock" onclick="switchTab('stock')">المخزون</button>
            <button id="t-admin" style="display:none" onclick="switchTab('admin')">الإدارة والتقارير</button>
        </div>

        <div id="s-pos">
            <input type="text" placeholder="🔍 بحث سريع..." oninput="filterItems(this.value)">
            <div id="catGrid" class="grid" style="margin-top:15px;"></div>
            <div id="prodGrid" class="grid" style="display:none; margin-top:15px;"></div>
            <button id="btnBack" onclick="showCats()" style="display:none; width:100%; margin:10px 0; padding:10px;">🔙 عودة للأقسام</button>

            <table id="cartTable" style="display:none; width:100%; margin-top:20px;">
                <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>حذف</th></tr></thead>
                <tbody id="cartBody" style="text-align:center;"></tbody>
            </table>
            <div id="totalArea" style="display:none; margin-top:20px; text-align:left;">
                <h2 style="color:var(--primary);">الإجمالي: <span id="finalTotal">0</span> ج.م</h2>
                <button onclick="checkout()" style="width:100%; padding:20px; background:var(--success); color:white; border:none; border-radius:12px; font-size:20px; font-weight:bold; cursor:pointer;">تأكيد وطباعة ✅</button>
            </div>
        </div>

        <div id="s-admin" style="display:none">
            <div class="admin-box">
                <h3>📊 التقارير الذكية</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div style="background:white; padding:15px; border-radius:10px;">
                        <h4>⭐ Top 5 الأكثر مبيعاً</h4>
                        <div id="top5"></div>
                    </div>
                    <div style="background:white; padding:15px; border-radius:10px;">
                        <h4>🔮 توقعات الغد</h4>
                        <p id="prediction"></p>
                    </div>
                </div>
            </div>

            <div class="admin-box" style="margin-top:20px;">
                <h3>👤 إضافة مندوب / مشرف</h3>
                <input type="text" id="nuName" placeholder="الاسم / الفرع">
                <input type="text" id="nuPass" placeholder="كلمة المرور">
                <select id="nuRole"><option value="بائع">بائع</option><option value="مشرف">مشرف</option></select>
                <button onclick="addUser()" style="background:var(--success); color:white; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">حفظ المستخدم</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzX4jUeG0kZpdLes41T_w3I4G9c0-VBczIO8hlrOjb4mO2KnzfvKuxaX2bPUhLk8yfA3g/exec";
    let db = { products: [], users: [], stock: [], stats: {} };
    let cart = []; let currentBranch = "";

    async function init() {
        try {
            const r = await fetch(API + "?action=getInitialData");
            db = await r.json();
            const sel = document.getElementById("userSelect");
            db.users.forEach(u => sel.innerHTML += `<option value="${u.branch}">${u.branch}</option>`);

            if(localStorage.getItem("sugarUser")) {
                currentBranch = localStorage.getItem("sugarUser");
                loginOK(localStorage.getItem("sugarRole"));
            }
            document.getElementById("loader").style.display = "none";
        } catch(e) { alert("خطأ في المزامنة.. جاري إعادة المحاولة"); location.reload(); }
    }

    function handleLogin() {
        const u = document.getElementById("userSelect").value;
        const p = document.getElementById("userPass").value;
        const user = db.users.find(x => x.branch === u && x.pass === p);
        if(user) {
            currentBranch = u;
            localStorage.setItem("sugarUser", u);
            localStorage.setItem("sugarRole", user.role);
            loginOK(user.role);
        } else alert("بيانات خطأ!");
    }

    function loginOK(role) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("branchDisplay").innerText = currentBranch + " (" + role + ")";
        if(role === "مشرف" || currentBranch === "الإدارة") {
            document.getElementById("t-admin").style.display = "block";
            renderAdmin();
        }
        showCats();
    }

    function showCats() {
        document.getElementById("btnBack").style.display = "none";
        document.getElementById("prodGrid").style.display = "none";
        const grid = document.getElementById("catGrid"); grid.style.display = "grid"; grid.innerHTML = "";
        const cats = [...new Set(db.products.map(p => p.cat))];
        cats.forEach(c => {
            const d = document.createElement("div"); d.className = "card cat-card"; d.innerText = c;
            d.onclick = () => showProds(c); grid.appendChild(d);
        });
    }

    function showProds(cat) {
        document.getElementById("catGrid").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        const grid = document.getElementById("prodGrid"); grid.style.display = "grid"; grid.innerHTML = "";
        db.products.filter(p => p.cat === cat).forEach(p => {
            const d = document.createElement("div"); d.className = "card";
            d.innerHTML = `${p.name}<br><small>${p.price}ج</small>`;
            d.onclick = () => addToCart(p); grid.appendChild(d);
        });
    }

    function addToCart(p) {
        let q = prompt(`كمية ${p.name}:`, "1"); if(!q) return;
        let pr = p.type == "weight" ? (p.price/1000*q) : (p.price*q);
        cart.push({name: p.name, qty: q, total: pr});
        renderCart();
    }

    function renderCart() {
        const b = document.getElementById("cartBody"); b.innerHTML = ""; let t = 0;
        cart.forEach((i, idx) => {
            t += i.total;
            b.innerHTML += `<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.total.toFixed(2)}</td><td onclick="cart.splice(${idx},1);renderCart()" style="cursor:pointer; color:red;">❌</td></tr>`;
        });
        document.getElementById("cartTable").style.display = cart.length ? "table" : "none";
        document.getElementById("totalArea").style.display = cart.length ? "block" : "none";
        document.getElementById("finalTotal").innerText = t.toFixed(2);
    }

    function renderAdmin() {
        document.getElementById("top5").innerHTML = db.stats.top5.map(x => `<div>⭐ ${x}</div>`).join("");
        document.getElementById("prediction").innerText = db.stats.prediction ? `بناءً على تحليلات م/ محمود سلامه، يُنصح بتجهيز كمية إضافية من [${db.stats.prediction}] غداً.` : "لا توجد بيانات كافية.";
    }

    async function checkout() {
        document.getElementById("loader").style.display = "flex";
        const inv = "SKR-" + Date.now().toString().slice(-6);
        const orderData = {
            action: "saveOrder", cart: cart,
            order: { date: new Date().toLocaleString(), branch: currentBranch, details: cart.map(i=>`${i.name}(${i.qty})`).join("+"), total: document.getElementById("finalTotal").innerText, invoice: inv, isoDate: new Date().toISOString() }
        };
        await fetch(API, {method: "POST", body: JSON.stringify(orderData)});
        location.reload();
    }

    function switchTab(t) {
        ["pos", "stock", "admin"].forEach(s => document.getElementById("s-"+s).style.display = "none");
        ["t-pos", "t-stock", "t-admin"].forEach(s => document.getElementById(s).classList.remove("active"));
        document.getElementById("s-"+t).style.display = "block";
        document.getElementById("t-"+t).classList.add("active");
    }

    function logout() { localStorage.clear(); location.reload(); }
    window.onload = init;
</script>
</body>
</html>
